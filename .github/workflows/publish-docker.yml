name: Publish Docker image

on:
  schedule:
    - cron: '0 0 * * *'

  push:
    branches: [master, release/*, performance]
    paths: [src/Nethermind/**]

  workflow_dispatch:
    inputs:
      image-name:
        description: Image name
        required: true
        default: nethermind
      tag:
        description: Image tag
        required: true
      dockerfile:
        description: Dockerfile
        required: true
        default: Dockerfile
      build-config:
        description: Build configuration
        required: true
        default: release
        type: choice
        options: [release, debug]
      platforms:
        description: Comma-separated Docker platforms to build
        required: false
        default: linux/amd64,linux/arm64

jobs:
  publish-docker:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false
          tool-cache: false
          swap-storage: false

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Publish Docker image
        uses: ./.github/actions/publish-docker
        with:
          image-name: ${{ github.event.inputs.image-name || 'nethermind' }}
          tag: ${{ github.event.inputs.tag || (github.event_name == 'schedule' && 'nightly') || '' }}
          dockerfile: ${{ github.event.inputs.dockerfile || 'Dockerfile' }}
          build-config: ${{ github.event.inputs.build-config || 'release' }}
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
