name: Run nethtest (EEST engine tests)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || inputs.branch || github.ref_name }}-${{ inputs.test_type || 'engineTest' }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: false
        default: ''
        type: string
      test_type:
        description: Test type
        required: true
        default: engineTest
        type: choice
        options:
          - engineTest
          - blockTest
          - stateTest
      filter:
        description: Regex filter for test names (optional)
        required: false
        default: ''
        type: string
      idle_timeout_minutes:
        description: Fail nethtest if no test progress is logged for this many minutes
        required: false
        default: '10'
        type: string

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm
  TEST_TYPE: ${{ inputs.test_type || 'engineTest' }}
  FILTER: ${{ inputs.filter || '' }}
  IDLE_TIMEOUT_MINUTES: ${{ inputs.idle_timeout_minutes || '10' }}
  # Single fixture source: the next-fork (BAL) release of ethereum/execution-specs.
  # It contains fixtures for all forks (Frontier..Amsterdam), so a separate
  # execution-spec-tests "current spec" run adds no extra coverage.
  EEST_REPOSITORY: ethereum/execution-specs
  EEST_VERSION: latest-bal
  EEST_ARCHIVE: fixtures_bal.tar.gz
  # ubuntu-latest runners have 16 GB of RAM. The runner ships with server GC
  # (throughput-oriented, collects lazily), which previously ballooned past the
  # runner limit on the full fixture set. Workstation GC keeps the heap tight;
  # the fixture set is additionally split across jobs with --chunk.
  DOTNET_gcServer: '0'

defaults:
  run:
    shell: bash

jobs:
  approval-state:
    name: Evaluate PR approval
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check approval state
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_STATE: ${{ github.event.pull_request.state || '' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "master" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$PR_NUMBER" ]; then
            PR_DATA="$(gh api "repos/${{ github.repository }}/pulls?head=$REPOSITORY_OWNER:$REF_NAME&state=open&per_page=1")"
            PR_NUMBER="$(jq -r '.[0].number // ""' <<< "$PR_DATA")"
            PR_STATE="$(jq -r '.[0].state // ""' <<< "$PR_DATA")"
            PR_AUTHOR="$(jq -r '.[0].user.login // ""' <<< "$PR_DATA")"
          fi

          if [ "$PR_STATE" != "open" ]; then
            echo "PR is not open; nethtest will be skipped."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APPROVALS="$(gh api --paginate "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            | jq -s --arg author "$PR_AUTHOR" --arg approved APPROVED '[.[][] | select(.user.login != $author)] | group_by(.user.login) | map(max_by(.submitted_at)) | map(select(.state == $approved)) | length')"

          echo "Latest approval count: $APPROVALS"
          if [ "$APPROVALS" -gt 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No current approval found; nethtest will be skipped."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  nethtest:
    name: nethtest ${{ matrix.test_setup }} ${{ matrix.chunk }} --${{ inputs.test_type || 'engineTest' }}
    needs: approval-state
    if: needs.approval-state.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the Ethereum.Blockchain.Pyspec.Test config matrix:
        # - sequential       = default pyspec chunks (ParallelExecution/BatchRead forced off)
        # - flat_sequential  = same under the flat state layout (TEST_USE_FLAT equivalent)
        # - flat_parallel / flat_batchread / flat_parallelfull = the Amsterdam BAL
        #   parallel-execution / batch-read prewarm variants, scoped to the Amsterdam
        #   fixture subtree because the toggles are no-ops on pre-BAL forks.
        # The full fixture set is split into interleaved file chunks (--chunk NofM)
        # so each job fits within ubuntu-latest memory.
        include:
          - { test_setup: sequential, chunk: 1of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 2of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 3of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 4of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 5of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 6of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 7of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: sequential, chunk: 8of8, scope: full, flatdb: '', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 1of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 2of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 3of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 4of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 5of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 6of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 7of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          - { test_setup: flat_sequential, chunk: 8of8, scope: full, flatdb: '1', parallel: 'false', batchread: 'false' }
          # Parallel-execution variants run every tx of a block concurrently with
          # per-tx overlay state, so their peak memory is much higher than the
          # sequential runs — smaller chunks and fewer workers keep them within
          # the ubuntu-latest limit.
          - { test_setup: flat_parallel, chunk: 1of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'false', workers: '2' }
          - { test_setup: flat_parallel, chunk: 2of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'false', workers: '2' }
          - { test_setup: flat_parallel, chunk: 3of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'false', workers: '2' }
          - { test_setup: flat_parallel, chunk: 4of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'false', workers: '2' }
          - { test_setup: flat_batchread, chunk: 1of2, scope: amsterdam, flatdb: '1', parallel: 'false', batchread: 'true' }
          - { test_setup: flat_batchread, chunk: 2of2, scope: amsterdam, flatdb: '1', parallel: 'false', batchread: 'true' }
          - { test_setup: flat_parallelfull, chunk: 1of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'true', workers: '2' }
          - { test_setup: flat_parallelfull, chunk: 2of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'true', workers: '2' }
          - { test_setup: flat_parallelfull, chunk: 3of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'true', workers: '2' }
          - { test_setup: flat_parallelfull, chunk: 4of4, scope: amsterdam, flatdb: '1', parallel: 'true', batchread: 'true', workers: '2' }
    env:
      TEST_SETUP: ${{ matrix.test_setup }}
      CHUNK: ${{ matrix.chunk }}
      SCOPE: ${{ matrix.scope }}
      FLATDB: ${{ matrix.flatdb }}
      PARALLEL: ${{ matrix.parallel }}
      BATCHREAD: ${{ matrix.batchread }}
      WORKERS: ${{ matrix.workers || '4' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Build Nethermind.Test.Runner
        working-directory: src/Nethermind
        run: dotnet build Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -c Release -p:PublishReadyToRun=false

      - name: Resolve EEST release
        id: eest_release
        run: |
          if [ "$EEST_VERSION" = "latest" ]; then
            RESOLVED_EEST_VERSION="$(curl -fsSL \
              --max-time 300 \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$EEST_REPOSITORY/releases/latest" \
              | jq -r '.tag_name')"
          elif [[ "$EEST_VERSION" == latest-* ]]; then
            KEYWORD="${EEST_VERSION#latest-}"
            RESOLVED_EEST_VERSION="$(curl -fsSL \
              --max-time 300 \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$EEST_REPOSITORY/releases?per_page=20" \
              | jq -r --arg keyword "$KEYWORD" '[.[] | select(.tag_name | contains($keyword))] | first | .tag_name')"
          else
            RESOLVED_EEST_VERSION="$EEST_VERSION"
          fi

          if [ -z "$RESOLVED_EEST_VERSION" ] || [ "$RESOLVED_EEST_VERSION" = "null" ]; then
            echo "::error::Could not resolve EEST release for $EEST_REPOSITORY ($EEST_VERSION)"
            exit 1
          fi

          echo "version=$RESOLVED_EEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved EEST release: $RESOLVED_EEST_VERSION"

      - name: Cache EEST fixtures
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/eest-fixtures
          key: eest-${{ env.EEST_REPOSITORY }}-${{ steps.eest_release.outputs.version }}-${{ env.EEST_ARCHIVE }}

      - name: Download EEST fixtures
        env:
          RESOLVED_EEST_VERSION: ${{ steps.eest_release.outputs.version }}
        run: |
          RUNNER_TMP="${RUNNER_TEMP:-/tmp}"
          if command -v cygpath >/dev/null 2>&1; then
            RUNNER_TMP="$(cygpath -u "$RUNNER_TMP")"
          fi
          EEST_DIR="$RUNNER_TMP/eest-fixtures/$RESOLVED_EEST_VERSION"
          if [ ! -d "$EEST_DIR" ]; then
            mkdir -p "$EEST_DIR"
            ARCHIVE_URL="https://github.com/$EEST_REPOSITORY/releases/download/$RESOLVED_EEST_VERSION/$EEST_ARCHIVE"
            echo "Downloading EEST fixtures from $ARCHIVE_URL"
            curl -fsSL --max-time 300 --retry 3 --retry-delay 5 "$ARCHIVE_URL" | tar -xz -C "$EEST_DIR"
          else
            echo "EEST fixtures already cached at $EEST_DIR"
          fi

      - name: Resolve fixture path
        id: fixtures
        env:
          RESOLVED_EEST_VERSION: ${{ steps.eest_release.outputs.version }}
        run: |
          RUNNER_TMP="${RUNNER_TEMP:-/tmp}"
          if command -v cygpath >/dev/null 2>&1; then
            RUNNER_TMP="$(cygpath -u "$RUNNER_TMP")"
          fi
          EEST_DIR="$RUNNER_TMP/eest-fixtures/$RESOLVED_EEST_VERSION"
          if [ "$TEST_TYPE" = "engineTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'blockchain_tests_engine' | head -1)"
          elif [ "$TEST_TYPE" = "blockTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'blockchain_tests' | head -1)"
          elif [ "$TEST_TYPE" = "stateTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'state_tests' | head -1)"
          fi

          if [ -z "$FIXTURE_DIR" ] || [ ! -d "$FIXTURE_DIR" ]; then
            echo "::error::Could not find fixture directory for $TEST_TYPE in $EEST_DIR"
            find "$EEST_DIR" -maxdepth 3 -type d | head -30
            exit 1
          fi

          if [ "$SCOPE" = "amsterdam" ]; then
            # Newer releases prefix fork dirs with "for_"; older ones don't.
            SCOPED_DIR="$(find "$FIXTURE_DIR" -maxdepth 1 -type d \( -name 'for_amsterdam' -o -name 'amsterdam' \) | head -1)"
            if [ -z "$SCOPED_DIR" ]; then
              echo "::error::Could not find Amsterdam fixture subdirectory in $FIXTURE_DIR"
              find "$FIXTURE_DIR" -maxdepth 1 -type d | head -30
              exit 1
            fi
            FIXTURE_DIR="$SCOPED_DIR"
          fi

          echo "fixture_dir=$FIXTURE_DIR" >> "$GITHUB_OUTPUT"
          echo "Found fixture directory: $FIXTURE_DIR"
          echo "Fixture count: $(find "$FIXTURE_DIR" -name '*.json' | wc -l) JSON files"

      - name: Run nethtest and parse results
        working-directory: src/Nethermind
        timeout-minutes: 55
        env:
          RESOLVED_EEST_VERSION: ${{ steps.eest_release.outputs.version }}
        run: |
          FILTER_ARG=""
          if [ -n "$FILTER" ]; then
            FILTER_ARG="--filter $FILTER"
          fi

          SETUP_ARGS="--chunk $CHUNK"
          if [ "$FLATDB" = "1" ]; then
            SETUP_ARGS="$SETUP_ARGS --flatdb"
          fi
          if [ -n "$PARALLEL" ]; then
            SETUP_ARGS="$SETUP_ARGS --parallelExecution $PARALLEL"
          fi
          if [ -n "$BATCHREAD" ]; then
            SETUP_ARGS="$SETUP_ARGS --batchRead $BATCHREAD"
          fi

          RUNNER_TMP="${RUNNER_TEMP:-/tmp}"
          if command -v cygpath >/dev/null 2>&1; then
            RUNNER_TMP="$(cygpath -u "$RUNNER_TMP")"
          fi
          RESULTS_FILE="$RUNNER_TMP/nethtest-results.json"
          STDERR_FILE="$RUNNER_TMP/nethtest-stderr.log"
          CLEAN_FILE="$RUNNER_TMP/nethtest-clean.log"
          LOW_MEMORY_FILE="$RUNNER_TMP/nethtest-low-memory"
          WATCHDOG_TIMEOUT_FILE="$RUNNER_TMP/nethtest-watchdog-timeout"

          # Write summary even if the process crashes
          write_summary() {
            echo ""
            echo "=== Writing summary ==="
            # Strip ANSI codes and extract only progress/failure lines
            sed 's/\x1b\[[0-9;]*m//g' "$STDERR_FILE" 2>/dev/null | grep -E "^(PROGRESS|FAIL|EXCEPTION) " > "$CLEAN_FILE" 2>/dev/null || true

            HAS_JSON=false
            if [ -s "$RESULTS_FILE" ] && jq empty "$RESULTS_FILE" 2>/dev/null; then
              HAS_JSON=true
              TOTAL=$(jq 'length' "$RESULTS_FILE")
              PASSED=$(jq '[.[] | select(.pass == true)] | length' "$RESULTS_FILE")
              FAILED=$(jq '[.[] | select(.pass == false)] | length' "$RESULTS_FILE")
            else
              FAILED=$(awk '/^(FAIL|EXCEPTION) / { count++ } END { print count + 0 }' "$CLEAN_FILE" 2>/dev/null)
              PROGRESS_STATS=$(grep -E "^(PROGRESS|FAIL|EXCEPTION) \\[[0-9]+/[0-9]+\\]" "$CLEAN_FILE" 2>/dev/null \
                | sed -E 's/.*\[([0-9]+)\/([0-9]+)\].*/\1 \2/' \
                | awk '{ if ($1 > done) done = $1; total = $2 } END { printf "%d %d", done, total }')
              DONE="${PROGRESS_STATS%% *}"
              TOTAL="${PROGRESS_STATS##* }"
              if [ "$TOTAL" -eq 0 ]; then
                TOTAL=$FAILED
              fi
              PASSED=$(( DONE > FAILED ? DONE - FAILED : 0 ))
            fi

            HEADER="nethtest results"
            if [ "$HAS_JSON" = false ] && [ "$TOTAL" -gt 0 ]; then
              HEADER="nethtest results (process crashed - partial results from stderr)"
            elif [ "$TOTAL" -eq 0 ]; then
              HEADER="nethtest results (process crashed before producing output)"
            fi

            {
              echo "## $HEADER"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Test setup | \`$TEST_SETUP\` |"
              echo "| Test type | \`--$TEST_TYPE\` |"
              echo "| Chunk | \`$CHUNK\` |"
              echo "| Scope | \`$SCOPE\` |"
              echo "| Setup args | \`$SETUP_ARGS\` |"
              echo "| EEST repository | \`$EEST_REPOSITORY\` |"
              echo "| EEST version | \`$RESOLVED_EEST_VERSION\` |"
              if [ "$EEST_VERSION" != "$RESOLVED_EEST_VERSION" ]; then
                echo "| EEST version input | \`$EEST_VERSION\` |"
              fi
              echo "| EEST archive | \`$EEST_ARCHIVE\` |"
              echo "| Workers | $WORKERS |"
              echo "| Total | $TOTAL |"
              echo "| Passed | **$PASSED** |"
              echo "| Failed | **$FAILED** |"
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$FAILED" -gt 0 ]; then
              MAX_SUMMARY_FAILURES=500
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Failures by error type" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              if [ "$HAS_JSON" = true ]; then
                jq -r '[.[] | select(.pass == false)] | group_by(.error) | sort_by(-length) | .[] | "| \(length) | \(.[0].error[:120] // "no error") |"' "$RESULTS_FILE" \
                  | awk 'NR <= 30' | { echo "| Count | Error |"; echo "|-------|-------|"; cat; } >> "$GITHUB_STEP_SUMMARY"
              else
                # Group by error: extract text after the status separator
                grep -E "^(FAIL|EXCEPTION) " "$CLEAN_FILE" 2>/dev/null \
                  | sed -E 's/.*( - |— )//' | sort | uniq -c | sort -rn \
                  | awk 'NR <= 30 {printf "| %s | %s |\n", $1, substr($0, index($0,$2))}' \
                  | { echo "| Count | Error |"; echo "|-------|-------|"; cat; } >> "$GITHUB_STEP_SUMMARY"
              fi

              {
                echo ""
                if [ "$FAILED" -gt "$MAX_SUMMARY_FAILURES" ]; then
                  echo "> Showing first $MAX_SUMMARY_FAILURES failed tests. Full results are available in the uploaded artifact."
                  echo ""
                fi
                echo "<details><summary>Failed tests</summary>"
                echo ""
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              if [ "$HAS_JSON" = true ]; then
                jq -r '.[] | select(.pass == false) | "\(.fork) | \(.name) | \(.error[:100])"' "$RESULTS_FILE" \
                  | sort | awk -v max="$MAX_SUMMARY_FAILURES" 'NR <= max' >> "$GITHUB_STEP_SUMMARY"
              else
                grep -E "^(FAIL|EXCEPTION) " "$CLEAN_FILE" 2>/dev/null \
                  | sort | awk -v max="$MAX_SUMMARY_FAILURES" 'NR <= max' >> "$GITHUB_STEP_SUMMARY"
              fi
              { echo '```'; echo "</details>"; } >> "$GITHUB_STEP_SUMMARY"
            fi

            # Local repro command
            FILTER_CMD=""
            if [ -n "$FILTER" ]; then
              FILTER_CMD=" --filter '$FILTER'"
            fi
            {
              echo ""
              echo "### Run locally"
              echo ""
              echo '```bash'
              echo "# 1. Download EEST fixtures (once)"
              echo "mkdir -p /tmp/eest && curl -fsSL https://github.com/$EEST_REPOSITORY/releases/download/$RESOLVED_EEST_VERSION/$EEST_ARCHIVE | tar -xz -C /tmp/eest"
              echo ""
              echo "# 2. Build and run"
              echo "cd src/Nethermind"
              echo "dotnet build Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -c Release -p:PublishReadyToRun=false"
              echo "dotnet run --no-build --no-launch-profile -c Release --project Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -- --$TEST_TYPE --input /tmp/eest/fixtures --jsonout --workers '$WORKERS' --neverTrace ${SETUP_ARGS}${FILTER_CMD}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
          }

          cleanup() {
            if [ -n "${HEARTBEAT_PID:-}" ]; then
              kill "$HEARTBEAT_PID" 2>/dev/null || true
              wait "$HEARTBEAT_PID" 2>/dev/null || true
            fi

            if [ -n "${WATCHDOG_PID:-}" ]; then
              kill "$WATCHDOG_PID" 2>/dev/null || true
              wait "$WATCHDOG_PID" 2>/dev/null || true
            fi

            write_summary
          }

          trap cleanup EXIT

          touch "$RESULTS_FILE" "$STDERR_FILE"
          rm -f "$WATCHDOG_TIMEOUT_FILE" "$LOW_MEMORY_FILE"

          print_diagnostics() {
            echo ""
            echo "=== nethtest diagnostics $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
            echo "Results file size: $(wc -c < "$RESULTS_FILE") bytes"
            echo "Stderr lines: $(wc -l < "$STDERR_FILE")"
            echo ""
            echo "--- memory ---"
            free -h || true
            if [ -f /sys/fs/cgroup/memory.current ]; then
              echo "cgroup memory.current=$(cat /sys/fs/cgroup/memory.current)"
              echo "cgroup memory.max=$(cat /sys/fs/cgroup/memory.max)"
              if [ -f /sys/fs/cgroup/memory.events ]; then
                echo "--- cgroup memory.events ---"
                cat /sys/fs/cgroup/memory.events
              fi
            fi
            echo ""
            echo "--- largest processes by RSS ---"
            ps -eo pid,ppid,stat,comm,%mem,rss,vsz,etime,args --sort=-rss | head -20 || true
            echo ""
            echo "--- recent nethtest status ---"
            tail -30 "$STDERR_FILE" | sed 's/\x1b\[[0-9;]*m//g' || true
            echo "================================"
          }

          terminate_nethtest() {
            kill -QUIT "$NETHTEST_PID" 2>/dev/null || true
            sleep 10
            kill -TERM "$NETHTEST_PID" 2>/dev/null || true
            sleep 10
            kill -KILL "$NETHTEST_PID" 2>/dev/null || true
          }

          check_memory_pressure() {
            local available_mb
            available_mb=$(awk '/MemAvailable:/ {print int($2 / 1024)}' /proc/meminfo 2>/dev/null || echo 0)
            if [ "$available_mb" -gt 0 ] && [ "$available_mb" -lt 1024 ]; then
              echo "::error::MemAvailable is ${available_mb}MiB; terminating nethtest before the runner OOMs"
              touch "$LOW_MEMORY_FILE"
              print_diagnostics
              terminate_nethtest
              return 1
            fi

            return 0
          }

          on_termination() {
            echo "::warning::Run step received a termination signal"
            print_diagnostics
            exit 143
          }
          trap on_termination TERM INT

          heartbeat() {
            while true; do
              sleep 60 || exit 0
              echo "nethtest still running at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              print_diagnostics
            done
          }
          heartbeat &
          HEARTBEAT_PID=$!

          watchdog() {
            local idle_timeout_seconds=$((IDLE_TIMEOUT_MINUTES * 60))
            while kill -0 "$NETHTEST_PID" 2>/dev/null; do
              sleep 10 || exit 0

              check_memory_pressure || exit 0

              local last_progress
              last_progress=$(stat -c %Y "$STDERR_FILE" 2>/dev/null || echo 0)
              local now
              now=$(date +%s)
              local idle_seconds=$((now - last_progress))

              if [ "$idle_seconds" -ge "$idle_timeout_seconds" ]; then
                echo "::error::nethtest produced no stderr progress for ${idle_seconds}s; terminating it"
                touch "$WATCHDOG_TIMEOUT_FILE"
                print_diagnostics
                terminate_nethtest
                exit 0
              fi
            done
          }

          set +e
          dotnet run --no-build --no-launch-profile -c Release \
            --project Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -- \
            --$TEST_TYPE \
            --input "${{ steps.fixtures.outputs.fixture_dir }}" \
            --jsonout \
            --workers "$WORKERS" \
            --neverTrace \
            $SETUP_ARGS \
            $FILTER_ARG \
            > "$RESULTS_FILE" \
            2> >(tee "$STDERR_FILE" >&2) &
          NETHTEST_PID=$!
          watchdog &
          WATCHDOG_PID=$!
          wait "$NETHTEST_PID"
          rc=$?
          set -e

          echo "Exit code: $rc"
          echo "Results file size: $(wc -c < "$RESULTS_FILE") bytes"
          echo "Stderr lines: $(wc -l < "$STDERR_FILE")"

          if [ -f "$LOW_MEMORY_FILE" ]; then
            echo "::error::nethtest was terminated because runner memory was nearly exhausted"
            rc=137
          elif [ -f "$WATCHDOG_TIMEOUT_FILE" ]; then
            echo "::error::nethtest was terminated by the idle watchdog"
            rc=124
          fi

          if [ $rc -eq 0 ]; then
            if [ -s "$RESULTS_FILE" ] && jq empty "$RESULTS_FILE" 2>/dev/null; then
              FAILED_AFTER_RUN=$(jq '[.[] | select(.pass == false)] | length' "$RESULTS_FILE")
            else
              FAILED_AFTER_RUN=$(sed 's/\x1b\[[0-9;]*m//g' "$STDERR_FILE" 2>/dev/null | awk '/^(FAIL|EXCEPTION) / { count++ } END { print count + 0 }')
            fi

            if [ "$FAILED_AFTER_RUN" -gt 0 ]; then
              echo "::error::$FAILED_AFTER_RUN nethtest cases failed"
              rc=1
            fi
          fi

          if [ $rc -ne 0 ]; then
            echo "::warning::nethtest exited with code $rc"
            echo "--- stderr (last 50 lines) ---"
            tail -50 "$STDERR_FILE" | sed 's/\x1b\[[0-9;]*m//g'
            exit $rc
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nethtest-results-${{ matrix.test_setup }}-${{ matrix.chunk }}-${{ env.TEST_TYPE }}
          path: |
            ${{ runner.temp }}/nethtest-results.json
            ${{ runner.temp }}/nethtest-stderr.log
          retention-days: 30
