name: Run nethtest (EEST engine tests)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [feat/evm-enginetest, fix/bal-parallel-execution-crash]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: false
        default: ''
        type: string
      test_type:
        description: Test type
        required: true
        default: engineTest
        type: choice
        options:
          - engineTest
          - blockTest
          - stateTest
      eest_version:
        description: EEST fixtures version (tag from ethereum/execution-spec-tests)
        required: false
        default: bal@v5.6.0
        type: string
      eest_archive:
        description: EEST fixtures archive name
        required: false
        default: fixtures_bal.tar.gz
        type: string
      workers:
        description: Parallel workers
        required: false
        default: '4'
        type: string
      filter:
        description: Regex filter for test names (optional)
        required: false
        default: ''
        type: string

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm
  TEST_TYPE: ${{ inputs.test_type || 'engineTest' }}
  EEST_VERSION: ${{ inputs.eest_version || 'bal@v5.6.0' }}
  EEST_ARCHIVE: ${{ inputs.eest_archive || 'fixtures_bal.tar.gz' }}
  WORKERS: ${{ inputs.workers || '4' }}
  FILTER: ${{ inputs.filter || '' }}

defaults:
  run:
    shell: bash

jobs:
  nethtest:
    name: nethtest --${{ inputs.test_type || 'engineTest' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build Nethermind.Test.Runner
        working-directory: src/Nethermind
        run: dotnet build Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -c Release

      - name: Cache EEST fixtures
        uses: actions/cache@v5
        with:
          path: /tmp/eest-fixtures
          key: eest-${{ env.EEST_VERSION }}-${{ env.EEST_ARCHIVE }}

      - name: Download EEST fixtures
        run: |
          EEST_DIR="/tmp/eest-fixtures/$EEST_VERSION"
          if [ ! -d "$EEST_DIR" ]; then
            mkdir -p "$EEST_DIR"
            ARCHIVE_URL="https://github.com/ethereum/execution-spec-tests/releases/download/$EEST_VERSION/$EEST_ARCHIVE"
            echo "Downloading EEST fixtures from $ARCHIVE_URL"
            curl -fsSL "$ARCHIVE_URL" | tar -xz -C "$EEST_DIR"
          else
            echo "EEST fixtures already cached at $EEST_DIR"
          fi

      - name: Resolve fixture path
        id: fixtures
        run: |
          EEST_DIR="/tmp/eest-fixtures/$EEST_VERSION"
          if [ "$TEST_TYPE" = "engineTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'blockchain_tests_engine' | head -1)"
          elif [ "$TEST_TYPE" = "blockTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'blockchain_tests' | head -1)"
          elif [ "$TEST_TYPE" = "stateTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'state_tests' | head -1)"
          fi

          if [ -z "$FIXTURE_DIR" ] || [ ! -d "$FIXTURE_DIR" ]; then
            echo "::error::Could not find fixture directory for $TEST_TYPE in $EEST_DIR"
            find "$EEST_DIR" -maxdepth 3 -type d | head -30
            exit 1
          fi

          echo "fixture_dir=$FIXTURE_DIR" >> "$GITHUB_OUTPUT"
          echo "Found fixture directory: $FIXTURE_DIR"
          echo "Fixture count: $(find "$FIXTURE_DIR" -name '*.json' | wc -l) JSON files"

      - name: Run nethtest and parse results
        working-directory: src/Nethermind
        run: |
          FILTER_ARG=""
          if [ -n "$FILTER" ]; then
            FILTER_ARG="--filter $FILTER"
          fi

          # Write summary even if the process crashes
          write_summary() {
            echo ""
            echo "=== Writing summary ==="
            # Strip ANSI codes and extract only PASS/FAIL/EXCEPTION lines
            sed 's/\x1b\[[0-9;]*m//g' /tmp/nethtest-stderr.log 2>/dev/null | grep -E "(^|[ \t])(PASS|FAIL|EXCEPTION) " | sed 's/.*\(PASS\|FAIL\|EXCEPTION\)/\1/' > /tmp/nethtest-clean.log 2>/dev/null || true

            HAS_JSON=false
            if [ -s /tmp/nethtest-results.json ] && jq empty /tmp/nethtest-results.json 2>/dev/null; then
              HAS_JSON=true
              TOTAL=$(jq 'length' /tmp/nethtest-results.json)
              PASSED=$(jq '[.[] | select(.pass == true)] | length' /tmp/nethtest-results.json)
              FAILED=$(jq '[.[] | select(.pass == false)] | length' /tmp/nethtest-results.json)
            else
              TOTAL=$(grep -cE "^(PASS|FAIL|EXCEPTION) " /tmp/nethtest-clean.log 2>/dev/null || echo 0)
              PASSED=$(grep -c "^PASS " /tmp/nethtest-clean.log 2>/dev/null || echo 0)
              FAILED=$(( TOTAL - PASSED ))
            fi

            HEADER="nethtest results"
            if [ "$HAS_JSON" = false ] && [ "$TOTAL" -gt 0 ]; then
              HEADER="nethtest results (process crashed — partial results from stderr)"
            elif [ "$TOTAL" -eq 0 ]; then
              HEADER="nethtest results (process crashed before producing output)"
            fi

            {
              echo "## $HEADER"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Test type | \`--$TEST_TYPE\` |"
              echo "| EEST version | \`$EEST_VERSION\` |"
              echo "| Workers | $WORKERS |"
              echo "| Total | $TOTAL |"
              echo "| Passed | **$PASSED** |"
              echo "| Failed | **$FAILED** |"
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$FAILED" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Failures by error type" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              if [ "$HAS_JSON" = true ]; then
                jq -r '[.[] | select(.pass == false)] | group_by(.error) | sort_by(-length) | .[] | "| \(length) | \(.[0].error[:120] // "no error") |"' /tmp/nethtest-results.json \
                  | head -30 | { echo "| Count | Error |"; echo "|-------|-------|"; cat; } >> "$GITHUB_STEP_SUMMARY"
              else
                # Group by error: extract text after " — " separator
                grep -E "^(FAIL|EXCEPTION) " /tmp/nethtest-clean.log 2>/dev/null \
                  | sed 's/.*— //' | sort | uniq -c | sort -rn \
                  | head -30 | awk '{printf "| %s | %s |\n", $1, substr($0, index($0,$2))}' \
                  | { echo "| Count | Error |"; echo "|-------|-------|"; cat; } >> "$GITHUB_STEP_SUMMARY"
              fi

              {
                echo ""
                echo "<details><summary>All $FAILED failed tests</summary>"
                echo ""
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              if [ "$HAS_JSON" = true ]; then
                jq -r '.[] | select(.pass == false) | "\(.fork) | \(.name) | \(.error[:100])"' /tmp/nethtest-results.json \
                  | sort >> "$GITHUB_STEP_SUMMARY"
              else
                grep -E "^(FAIL|EXCEPTION) " /tmp/nethtest-clean.log 2>/dev/null \
                  | sort >> "$GITHUB_STEP_SUMMARY"
              fi
              { echo '```'; echo "</details>"; } >> "$GITHUB_STEP_SUMMARY"
            fi

            # Local repro command
            FILTER_CMD=""
            if [ -n "$FILTER" ]; then
              FILTER_CMD=" --filter '$FILTER'"
            fi
            {
              echo ""
              echo "### Run locally"
              echo ""
              echo '```bash'
              echo "# 1. Download EEST fixtures (once)"
              echo "mkdir -p /tmp/eest && curl -fsSL https://github.com/ethereum/execution-spec-tests/releases/download/$EEST_VERSION/$EEST_ARCHIVE | tar -xz -C /tmp/eest"
              echo ""
              echo "# 2. Build and run"
              echo "cd src/Nethermind"
              echo "dotnet build Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -c Release"
              echo "dotnet run --no-build --no-launch-profile -c Release --project Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -- --$TEST_TYPE --input /tmp/eest/fixtures --jsonout --workers $WORKERS --neverTrace${FILTER_CMD}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
          }

          trap write_summary EXIT

          touch /tmp/nethtest-results.json /tmp/nethtest-stderr.log

          # Named pipe to tee stderr to both console and log file
          STDERR_PIPE=$(mktemp -u)
          mkfifo "$STDERR_PIPE"
          tee /tmp/nethtest-stderr.log < "$STDERR_PIPE" >&2 &
          TEE_PID=$!

          set +e
          dotnet run --no-build --no-launch-profile -c Release \
            --project Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -- \
            --$TEST_TYPE \
            --input "${{ steps.fixtures.outputs.fixture_dir }}" \
            --jsonout \
            --workers $WORKERS \
            --neverTrace \
            $FILTER_ARG \
            > /tmp/nethtest-results.json \
            2> "$STDERR_PIPE"
          rc=$?
          wait $TEE_PID 2>/dev/null || true
          rm -f "$STDERR_PIPE"
          set -e

          echo "Exit code: $rc"
          echo "Results file size: $(wc -c < /tmp/nethtest-results.json) bytes"
          echo "Stderr lines: $(wc -l < /tmp/nethtest-stderr.log)"

          if [ $rc -ne 0 ]; then
            echo "::warning::nethtest exited with code $rc"
            echo "--- stderr (last 50 lines) ---"
            sed 's/\x1b\[[0-9;]*m//g' /tmp/nethtest-stderr.log | tail -50
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nethtest-results-${{ env.TEST_TYPE }}
          path: |
            /tmp/nethtest-results.json
            /tmp/nethtest-stderr.log
          retention-days: 30
