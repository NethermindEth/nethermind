name: Run nethtest (EEST engine tests)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.test_type || 'engineTest' }}
  cancel-in-progress: true

on:
  push:
    branches: [feat/evm-enginetest]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: false
        default: ''
        type: string
      test_type:
        description: Test type
        required: true
        default: engineTest
        type: choice
        options:
          - engineTest
          - blockTest
          - stateTest
      filter:
        description: Regex filter for test names (optional)
        required: false
        default: ''
        type: string
      idle_timeout_minutes:
        description: Fail nethtest if no test progress is logged for this many minutes
        required: false
        default: '10'
        type: string

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm
  TEST_TYPE: ${{ inputs.test_type || 'engineTest' }}
  FILTER: ${{ inputs.filter || '' }}
  IDLE_TIMEOUT_MINUTES: ${{ inputs.idle_timeout_minutes || '10' }}

defaults:
  run:
    shell: bash

jobs:
  nethtest:
    name: nethtest ${{ matrix.test_setup }} on ${{ matrix.runner }} --${{ inputs.test_type || 'engineTest' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_setup: current_spec
            runner: ubuntu-latest-16-cores
            eest_repository: ethereum/execution-spec-tests
            eest_version: latest
            eest_archive: fixtures_stable.tar.gz
            workers: '8'
          - test_setup: new_spec
            runner: ubuntu-latest-16-cores
            eest_repository: ethereum/execution-specs
            eest_version: tests-bal@v7.0.0
            eest_archive: fixtures_bal.tar.gz
            workers: '8'
    env:
      TEST_SETUP: ${{ matrix.test_setup }}
      EEST_REPOSITORY: ${{ matrix.eest_repository }}
      EEST_VERSION: ${{ matrix.eest_version }}
      EEST_ARCHIVE: ${{ matrix.eest_archive }}
      WORKERS: ${{ matrix.workers }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-${{ runner.arch }}-

      - name: Build Nethermind.Test.Runner
        working-directory: src/Nethermind
        run: dotnet build Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -c Release

      - name: Resolve EEST release
        id: eest_release
        run: |
          if [ "$EEST_VERSION" = "latest" ]; then
            RESOLVED_EEST_VERSION="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$EEST_REPOSITORY/releases/latest" \
              | jq -r '.tag_name')"
          else
            RESOLVED_EEST_VERSION="$EEST_VERSION"
          fi

          if [ -z "$RESOLVED_EEST_VERSION" ] || [ "$RESOLVED_EEST_VERSION" = "null" ]; then
            echo "::error::Could not resolve EEST release for $EEST_REPOSITORY ($EEST_VERSION)"
            exit 1
          fi

          echo "version=$RESOLVED_EEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved EEST release: $RESOLVED_EEST_VERSION"

      - name: Cache EEST fixtures
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/eest-fixtures
          key: eest-${{ matrix.eest_repository }}-${{ steps.eest_release.outputs.version }}-${{ matrix.eest_archive }}

      - name: Download EEST fixtures
        env:
          RESOLVED_EEST_VERSION: ${{ steps.eest_release.outputs.version }}
        run: |
          RUNNER_TMP="${RUNNER_TEMP:-/tmp}"
          if command -v cygpath >/dev/null 2>&1; then
            RUNNER_TMP="$(cygpath -u "$RUNNER_TMP")"
          fi
          EEST_DIR="$RUNNER_TMP/eest-fixtures/$RESOLVED_EEST_VERSION"
          if [ ! -d "$EEST_DIR" ]; then
            mkdir -p "$EEST_DIR"
            ARCHIVE_URL="https://github.com/$EEST_REPOSITORY/releases/download/$RESOLVED_EEST_VERSION/$EEST_ARCHIVE"
            echo "Downloading EEST fixtures from $ARCHIVE_URL"
            curl -fsSL "$ARCHIVE_URL" | tar -xz -C "$EEST_DIR"
          else
            echo "EEST fixtures already cached at $EEST_DIR"
          fi

      - name: Resolve fixture path
        id: fixtures
        env:
          RESOLVED_EEST_VERSION: ${{ steps.eest_release.outputs.version }}
        run: |
          RUNNER_TMP="${RUNNER_TEMP:-/tmp}"
          if command -v cygpath >/dev/null 2>&1; then
            RUNNER_TMP="$(cygpath -u "$RUNNER_TMP")"
          fi
          EEST_DIR="$RUNNER_TMP/eest-fixtures/$RESOLVED_EEST_VERSION"
          if [ "$TEST_TYPE" = "engineTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'blockchain_tests_engine' | head -1)"
          elif [ "$TEST_TYPE" = "blockTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'blockchain_tests' | head -1)"
          elif [ "$TEST_TYPE" = "stateTest" ]; then
            FIXTURE_DIR="$(find "$EEST_DIR" -type d -name 'state_tests' | head -1)"
          fi

          if [ -z "$FIXTURE_DIR" ] || [ ! -d "$FIXTURE_DIR" ]; then
            echo "::error::Could not find fixture directory for $TEST_TYPE in $EEST_DIR"
            find "$EEST_DIR" -maxdepth 3 -type d | head -30
            exit 1
          fi

          echo "fixture_dir=$FIXTURE_DIR" >> "$GITHUB_OUTPUT"
          echo "Found fixture directory: $FIXTURE_DIR"
          echo "Fixture count: $(find "$FIXTURE_DIR" -name '*.json' | wc -l) JSON files"

      - name: Run nethtest and parse results
        working-directory: src/Nethermind
        timeout-minutes: 55
        env:
          RESOLVED_EEST_VERSION: ${{ steps.eest_release.outputs.version }}
        run: |
          FILTER_ARG=""
          if [ -n "$FILTER" ]; then
            FILTER_ARG="--filter $FILTER"
          fi

          RUNNER_TMP="${RUNNER_TEMP:-/tmp}"
          if command -v cygpath >/dev/null 2>&1; then
            RUNNER_TMP="$(cygpath -u "$RUNNER_TMP")"
          fi
          RESULTS_FILE="$RUNNER_TMP/nethtest-results.json"
          STDERR_FILE="$RUNNER_TMP/nethtest-stderr.log"
          CLEAN_FILE="$RUNNER_TMP/nethtest-clean.log"
          LOW_MEMORY_FILE="$RUNNER_TMP/nethtest-low-memory"
          WATCHDOG_TIMEOUT_FILE="$RUNNER_TMP/nethtest-watchdog-timeout"

          # Write summary even if the process crashes
          write_summary() {
            echo ""
            echo "=== Writing summary ==="
            # Strip ANSI codes and extract only progress/failure lines
            sed 's/\x1b\[[0-9;]*m//g' "$STDERR_FILE" 2>/dev/null | grep -E "^(PROGRESS|FAIL|EXCEPTION) " > "$CLEAN_FILE" 2>/dev/null || true

            HAS_JSON=false
            if [ -s "$RESULTS_FILE" ] && jq empty "$RESULTS_FILE" 2>/dev/null; then
              HAS_JSON=true
              TOTAL=$(jq 'length' "$RESULTS_FILE")
              PASSED=$(jq '[.[] | select(.pass == true)] | length' "$RESULTS_FILE")
              FAILED=$(jq '[.[] | select(.pass == false)] | length' "$RESULTS_FILE")
            else
              FAILED=$(grep -cE "^(FAIL|EXCEPTION) " "$CLEAN_FILE" 2>/dev/null || echo 0)
              PROGRESS_STATS=$(grep -E "^(PROGRESS|FAIL|EXCEPTION) \\[[0-9]+/[0-9]+\\]" "$CLEAN_FILE" 2>/dev/null \
                | sed -E 's/.*\[([0-9]+)\/([0-9]+)\].*/\1 \2/' \
                | awk '{ if ($1 > done) done = $1; total = $2 } END { printf "%d %d", done, total }')
              DONE="${PROGRESS_STATS%% *}"
              TOTAL="${PROGRESS_STATS##* }"
              if [ "$TOTAL" -eq 0 ]; then
                TOTAL=$FAILED
              fi
              PASSED=$(( DONE > FAILED ? DONE - FAILED : 0 ))
            fi

            HEADER="nethtest results"
            if [ "$HAS_JSON" = false ] && [ "$TOTAL" -gt 0 ]; then
              HEADER="nethtest results (process crashed - partial results from stderr)"
            elif [ "$TOTAL" -eq 0 ]; then
              HEADER="nethtest results (process crashed before producing output)"
            fi

            {
              echo "## $HEADER"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Test setup | \`$TEST_SETUP\` |"
              echo "| Test type | \`--$TEST_TYPE\` |"
              echo "| EEST repository | \`$EEST_REPOSITORY\` |"
              echo "| EEST version | \`$RESOLVED_EEST_VERSION\` |"
              if [ "$EEST_VERSION" != "$RESOLVED_EEST_VERSION" ]; then
                echo "| EEST version input | \`$EEST_VERSION\` |"
              fi
              echo "| EEST archive | \`$EEST_ARCHIVE\` |"
              echo "| Runner | \`${{ matrix.runner }}\` |"
              echo "| Workers | $WORKERS |"
              echo "| Total | $TOTAL |"
              echo "| Passed | **$PASSED** |"
              echo "| Failed | **$FAILED** |"
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$FAILED" -gt 0 ]; then
              MAX_SUMMARY_FAILURES=500
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Failures by error type" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              if [ "$HAS_JSON" = true ]; then
                jq -r '[.[] | select(.pass == false)] | group_by(.error) | sort_by(-length) | .[] | "| \(length) | \(.[0].error[:120] // "no error") |"' "$RESULTS_FILE" \
                  | awk 'NR <= 30' | { echo "| Count | Error |"; echo "|-------|-------|"; cat; } >> "$GITHUB_STEP_SUMMARY"
              else
                # Group by error: extract text after the status separator
                grep -E "^(FAIL|EXCEPTION) " "$CLEAN_FILE" 2>/dev/null \
                  | sed -E 's/.*( - |— )//' | sort | uniq -c | sort -rn \
                  | awk 'NR <= 30 {printf "| %s | %s |\n", $1, substr($0, index($0,$2))}' \
                  | { echo "| Count | Error |"; echo "|-------|-------|"; cat; } >> "$GITHUB_STEP_SUMMARY"
              fi

              {
                echo ""
                if [ "$FAILED" -gt "$MAX_SUMMARY_FAILURES" ]; then
                  echo "> Showing first $MAX_SUMMARY_FAILURES failed tests. Full results are available in the uploaded artifact."
                  echo ""
                fi
                echo "<details><summary>Failed tests</summary>"
                echo ""
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              if [ "$HAS_JSON" = true ]; then
                jq -r '.[] | select(.pass == false) | "\(.fork) | \(.name) | \(.error[:100])"' "$RESULTS_FILE" \
                  | sort | awk -v max="$MAX_SUMMARY_FAILURES" 'NR <= max' >> "$GITHUB_STEP_SUMMARY"
              else
                grep -E "^(FAIL|EXCEPTION) " "$CLEAN_FILE" 2>/dev/null \
                  | sort | awk -v max="$MAX_SUMMARY_FAILURES" 'NR <= max' >> "$GITHUB_STEP_SUMMARY"
              fi
              { echo '```'; echo "</details>"; } >> "$GITHUB_STEP_SUMMARY"
            fi

            # Local repro command
            FILTER_CMD=""
            if [ -n "$FILTER" ]; then
              FILTER_CMD=" --filter '$FILTER'"
            fi
            {
              echo ""
              echo "### Run locally"
              echo ""
              echo '```bash'
              echo "# 1. Download EEST fixtures (once)"
              echo "mkdir -p /tmp/eest && curl -fsSL https://github.com/$EEST_REPOSITORY/releases/download/$RESOLVED_EEST_VERSION/$EEST_ARCHIVE | tar -xz -C /tmp/eest"
              echo ""
              echo "# 2. Build and run"
              echo "cd src/Nethermind"
              echo "dotnet build Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -c Release"
              echo "dotnet run --no-build --no-launch-profile -c Release --project Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -- --$TEST_TYPE --input /tmp/eest/fixtures --jsonout --workers $WORKERS --neverTrace${FILTER_CMD}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
          }

          cleanup() {
            if [ -n "${HEARTBEAT_PID:-}" ]; then
              kill "$HEARTBEAT_PID" 2>/dev/null || true
              wait "$HEARTBEAT_PID" 2>/dev/null || true
            fi

            if [ -n "${WATCHDOG_PID:-}" ]; then
              kill "$WATCHDOG_PID" 2>/dev/null || true
              wait "$WATCHDOG_PID" 2>/dev/null || true
            fi

            write_summary
          }

          trap cleanup EXIT

          touch "$RESULTS_FILE" "$STDERR_FILE"
          rm -f "$WATCHDOG_TIMEOUT_FILE" "$LOW_MEMORY_FILE"

          print_diagnostics() {
            echo ""
            echo "=== nethtest diagnostics $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
            echo "Results file size: $(wc -c < "$RESULTS_FILE") bytes"
            echo "Stderr lines: $(wc -l < "$STDERR_FILE")"
            echo ""
            echo "--- memory ---"
            free -h || true
            if [ -f /sys/fs/cgroup/memory.current ]; then
              echo "cgroup memory.current=$(cat /sys/fs/cgroup/memory.current)"
              echo "cgroup memory.max=$(cat /sys/fs/cgroup/memory.max)"
              if [ -f /sys/fs/cgroup/memory.events ]; then
                echo "--- cgroup memory.events ---"
                cat /sys/fs/cgroup/memory.events
              fi
            fi
            echo ""
            echo "--- largest processes by RSS ---"
            ps -eo pid,ppid,stat,comm,%mem,rss,vsz,etime,args --sort=-rss | head -20 || true
            echo ""
            echo "--- recent nethtest status ---"
            tail -30 "$STDERR_FILE" | sed 's/\x1b\[[0-9;]*m//g' || true
            echo "================================"
          }

          terminate_nethtest() {
            kill -QUIT "$NETHTEST_PID" 2>/dev/null || true
            sleep 10
            kill -TERM "$NETHTEST_PID" 2>/dev/null || true
            sleep 10
            kill -KILL "$NETHTEST_PID" 2>/dev/null || true
          }

          check_memory_pressure() {
            local available_mb
            available_mb=$(awk '/MemAvailable:/ {print int($2 / 1024)}' /proc/meminfo 2>/dev/null || echo 0)
            if [ "$available_mb" -gt 0 ] && [ "$available_mb" -lt 1024 ]; then
              echo "::error::MemAvailable is ${available_mb}MiB; terminating nethtest before the runner OOMs"
              touch "$LOW_MEMORY_FILE"
              print_diagnostics
              terminate_nethtest
              return 1
            fi

            return 0
          }

          on_termination() {
            echo "::warning::Run step received a termination signal"
            print_diagnostics
            exit 143
          }
          trap on_termination TERM INT

          heartbeat() {
            while true; do
              sleep 60 || exit 0
              echo "nethtest still running at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              print_diagnostics
            done
          }
          heartbeat &
          HEARTBEAT_PID=$!

          watchdog() {
            local idle_timeout_seconds=$((IDLE_TIMEOUT_MINUTES * 60))
            while kill -0 "$NETHTEST_PID" 2>/dev/null; do
              sleep 10 || exit 0

              check_memory_pressure || exit 0

              local last_progress
              last_progress=$(stat -c %Y "$STDERR_FILE" 2>/dev/null || echo 0)
              local now
              now=$(date +%s)
              local idle_seconds=$((now - last_progress))

              if [ "$idle_seconds" -ge "$idle_timeout_seconds" ]; then
                echo "::error::nethtest produced no stderr progress for ${idle_seconds}s; terminating it"
                touch "$WATCHDOG_TIMEOUT_FILE"
                print_diagnostics
                terminate_nethtest
                exit 0
              fi
            done
          }

          set +e
          dotnet run --no-build --no-launch-profile -c Release \
            --project Nethermind.Test.Runner/Nethermind.Test.Runner.csproj -- \
            --$TEST_TYPE \
            --input "${{ steps.fixtures.outputs.fixture_dir }}" \
            --jsonout \
            --workers $WORKERS \
            --neverTrace \
            $FILTER_ARG \
            > "$RESULTS_FILE" \
            2> >(tee "$STDERR_FILE" >&2) &
          NETHTEST_PID=$!
          watchdog &
          WATCHDOG_PID=$!
          wait "$NETHTEST_PID"
          rc=$?
          set -e

          echo "Exit code: $rc"
          echo "Results file size: $(wc -c < "$RESULTS_FILE") bytes"
          echo "Stderr lines: $(wc -l < "$STDERR_FILE")"

          if [ -f "$LOW_MEMORY_FILE" ]; then
            echo "::error::nethtest was terminated because runner memory was nearly exhausted"
            rc=137
          elif [ -f "$WATCHDOG_TIMEOUT_FILE" ]; then
            echo "::error::nethtest was terminated by the idle watchdog"
            rc=124
          fi

          if [ $rc -eq 0 ]; then
            if [ -s "$RESULTS_FILE" ] && jq empty "$RESULTS_FILE" 2>/dev/null; then
              FAILED_AFTER_RUN=$(jq '[.[] | select(.pass == false)] | length' "$RESULTS_FILE")
            else
              FAILED_AFTER_RUN=$(sed 's/\x1b\[[0-9;]*m//g' "$STDERR_FILE" 2>/dev/null | grep -cE "^(FAIL|EXCEPTION) " || echo 0)
            fi

            if [ "$FAILED_AFTER_RUN" -gt 0 ]; then
              echo "::error::$FAILED_AFTER_RUN nethtest cases failed"
              rc=1
            fi
          fi

          if [ $rc -ne 0 ]; then
            echo "::warning::nethtest exited with code $rc"
            echo "--- stderr (last 50 lines) ---"
            tail -50 "$STDERR_FILE" | sed 's/\x1b\[[0-9;]*m//g'
            exit $rc
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nethtest-results-${{ matrix.test_setup }}-${{ matrix.runner }}-${{ env.TEST_TYPE }}
          path: |
            ${{ runner.temp }}/nethtest-results.json
            ${{ runner.temp }}/nethtest-stderr.log
          retention-days: 30
