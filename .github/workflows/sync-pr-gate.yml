name: Sync PR Gate (Hoodi)

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to test"
        default: ""
        required: false
      mode:
        description: "Sync mode to run"
        type: choice
        options:
          - Both
          - HalfPath
          - Flat
        default: Both
        required: true

concurrency:
  group: sync-pr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: "1"
  TERM: xterm

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine sync modes
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODE_INPUT: ${{ github.event.inputs.mode }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            requested_mode="${MODE_INPUT}"
          else
            requested_mode="Both"
          fi

          case "$requested_mode" in
            Both)
              modes='["HalfPath","Flat"]'
              ;;
            HalfPath)
              modes='["HalfPath"]'
              ;;
            Flat)
              modes='["Flat"]'
              ;;
          esac

          matrix=$(echo "$modes" | jq -c --arg run_id "$GITHUB_RUN_ID" '[.[] as $mode | {
            network: "hoodi",
            cl: "lodestar",
            cl_image: "chainsafe/lodestar:latest",
            checkpoint_sync_url: "https://checkpoint-sync.hoodi.ethpandaops.io",
            timeout: 180,
            agent: "g6-standard-6",
            mode: $mode,
            runner_label: (
              (if $mode == "Flat" then "f-" else "hp-" end)
              + $run_id + "-pr-hoodi"
            )
          }]')

          echo "matrix=$(echo "$matrix" | jq -c .)" >> "$GITHUB_OUTPUT"

  create_a_runner:
    needs: [setup-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}

      - name: Create a Runner
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "create"
          runner_label: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          machine_type: "${{ matrix.config.agent }}"
          image: "linode/ubuntu24.04"
          tags: "core, self-hosted, dynamic"
          organization: "NethermindEth"
          repo_name: "nethermind"
          blocked_ports: "8545,8546,8547,8551,8552,8553"

  sync-hoodi:
    needs: [setup-matrix, create_a_runner]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    name: "Sync hoodi (${{ matrix.config.mode }})"
    runs-on: ${{ matrix.config.runner_label }}
    timeout-minutes: ${{ matrix.config.timeout }}
    steps:
      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "nethermind,post-merge-smoke-tests"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: true
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Checkout tests repository
        uses: actions/checkout@v6
        with:
          repository: NethermindEth/post-merge-smoke-tests
          path: tests
          token: ${{ steps.gh-app.outputs.token }}
          clean: true

      - name: Installing requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y make build-essential jq screen lshw dmidecode fio zip

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.X"

      - name: Install Sedge environment
        run: |
          git clone https://github.com/NethermindEth/sedge.git sedge --branch core --single-branch
          cd sedge
          make compile

      - name: Install Docker via Sedge
        working-directory: sedge
        run: ./build/sedge deps install

      - name: Build Docker image locally
        run: |
          docker build -t nethermind:pr-local \
            --build-arg BUILD_CONFIG=release \
            --build-arg CI=true \
            --build-arg COMMIT_HASH=${{ github.sha }} \
            .

      - name: Run Sedge
        working-directory: sedge
        env:
          SYNC_MODE: ${{ matrix.config.mode }}
          CL_CLIENT: ${{ matrix.config.cl }}
          CL_IMAGE: ${{ matrix.config.cl_image }}
          CHECKPOINT_URL: ${{ matrix.config.checkpoint_sync_url }}
          SEQ_API_KEY: ${{ secrets.SEQ_API_KEY }}
          GRAFANA_URL: ${{ secrets.GRAFANA_CONNECTION_STRING }}
        run: |
          case "${SYNC_MODE,,}" in
            halfpath) flatdb_enabled=false ;;
            flat)     flatdb_enabled=true ;;
          esac

          node_name="SyncPRGate-hoodi-${SYNC_MODE}-${GITHUB_RUN_ID}"

          mkdir -p execution-data/logs/configs
          mv ../tests/predefined_configs/customNLog.config execution-data/logs/configs/customNLog.config

          ./build/sedge generate \
            --logging none \
            -p $GITHUB_WORKSPACE/sedge \
            full-node \
            -c ${CL_CLIENT}:${CL_IMAGE} \
            -e nethermind:nethermind:pr-local \
            --map-all \
            --no-mev-boost \
            --no-validator \
            --network hoodi \
            --el-extra-flag FlatDb.Enabled=$flatdb_enabled \
            --el-extra-flag Sync.NonValidatorNode=true \
            --el-extra-flag Sync.DownloadBodiesInFastSync=false \
            --el-extra-flag Sync.DownloadReceiptsInFastSync=false \
            --el-extra-flag Sync.VerifyTrieOnStateSyncFinished=true \
            --el-extra-flag loggerConfigSource=/nethermind/data/logs/configs/customNLog.config \
            --el-extra-flag Sync.SnapSync=true \
            --el-extra-flag "Metrics.NodeName=${node_name}" \
            --el-extra-flag Metrics.Enabled=true \
            --el-extra-flag "Seq.ServerUrl=https://seq.nethermind.io" \
            --el-extra-flag "Seq.ApiKey=${SEQ_API_KEY}" \
            --el-extra-flag Seq.MinLevel=Info \
            --el-extra-flag "Init.LogRules=Synchronization.Peers.SyncPeersReport:Debug" \
            --el-extra-flag "Metrics.PushGatewayUrl=${GRAFANA_URL}" \
            --checkpoint-sync-url=${CHECKPOINT_URL}

          # Use docker compose directly instead of `sedge run` because sedge run
          # does `docker compose pull` which fails for the locally-built image.
          docker compose up -d

      - name: Wait for hoodi to sync
        env:
          NETWORK: hoodi
          SYNC_MODE: ${{ matrix.config.mode }}
        run: python scripts/wait-for-sync.py

      - name: Get Nethermind Debug Logs
        if: failure() || cancelled()
        run: |
          target_dir=$(find . -type d -name "*execution-data*" | head -n 1)
          cd "$target_dir/logs"
          log_file=$(find . -type f -name "*.log" | head -n 1)
          artifact_name=$(basename "$log_file")-hoodi-${{ matrix.config.mode }}-${{ github.run_id }}
          zip "${artifact_name}.zip" "$log_file"
          echo "artifact_name=$artifact_name" >> $GITHUB_ENV
          echo "artifact_path=$(pwd)/${artifact_name}.zip" >> $GITHUB_ENV

      - name: Upload Nethermind Debug logs artifact
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ${{ env.artifact_path }}
          retention-days: 7

      - name: Get Consensus Logs
        if: always()
        run: docker logs sedge-consensus-client

      - name: Check size of DB
        if: always()
        run: du -h $GITHUB_WORKSPACE/sedge

  destroy_runner:
    needs: [setup-matrix, create_a_runner, sync-hoodi]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}

      - name: Destroy VM (make sure is removed)
        continue-on-error: true
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "destroy-machine"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"

      - name: Destroy Runner
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "destroy-runner"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"
