name: Code formatting

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spacing-check:
    name: Check whitespaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Format
        run: |
          dotnet format whitespace src/Nethermind/ --folder
          dotnet format whitespace tools/ --folder

      - name: Check formatting changes
        run: |
          git diff --exit-code --diff-filter=M --stat || {
            echo ""
            echo "::error::Code formatting violations detected. Run 'dotnet format whitespace src/Nethermind/ --folder && dotnet format whitespace tools/ --folder' locally to fix."
            echo ""
            echo "Diff of required changes:"
            git diff --diff-filter=M
            exit 1
          }

      - name: Check spelling
        uses: streetsidesoftware/cspell-action@v7
