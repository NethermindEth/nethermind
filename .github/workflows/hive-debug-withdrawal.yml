name: "Hive: all suites (withdrawal parallelism fix)"

on:
  push:
    branches: [debug/hive-withdrawal-hang]
  workflow_dispatch:
    inputs:
      log-level:
        description: Log level
        required: true
        default: '3'
        type: choice
        options: ['0', '1', '2', '3', '4', '5']

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out Nethermind repository
        uses: actions/checkout@v6
        with:
          path: nethermind

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: nethermind
          file: nethermind/Dockerfile
          tags: nethermind:test-${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "engine: withdrawal tests (parallelism 2)"
            slug: engine-withdrawals
            suite: ethereum/engine
            limit: "engine-withdrawals"
            parallelism: 2
          - name: "engine: non-withdrawal tests (parallelism 4)"
            slug: engine-other
            suite: ethereum/engine
            limit: "engine-(api|auth|exchange-capabilities|cancun)"
            parallelism: 4
          - name: "graphql (parallelism 4)"
            slug: graphql
            suite: ethereum/graphql
            limit: ""
            parallelism: 4
          - name: "rpc-compat (parallelism 4)"
            slug: rpc-compat
            suite: ethereum/rpc-compat
            limit: ""
            parallelism: 4
          - name: "sync (parallelism 4)"
            slug: sync
            suite: ethereum/sync
            limit: ""
            parallelism: 4
    steps:
      - name: Set up parameters
        run: |
          echo "LOG_LEVEL=${{ github.event.inputs.log-level || '3' }}" >> $GITHUB_ENV

      - name: Check out Nethermind repository
        uses: actions/checkout@v6
        with:
          path: nethermind

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Check out Hive repository
        uses: actions/checkout@v6
        with:
          repository: ethereum/hive
          ref: master
          path: hive

      - name: Patch Hive Dockerfile
        run: sed -i 's#FROM $baseimage:$tag#FROM nethermind:test-${{ github.sha }}#g' hive/clients/nethermind/Dockerfile

      - name: Build Hive
        working-directory: hive
        run: go build .

      - name: Run Hive
        continue-on-error: true
        working-directory: hive
        run: |
          HIVE_ARGS="--client nethermind
            --sim ${{ matrix.suite }}
            --sim.loglevel $LOG_LEVEL
            --sim.parallelism ${{ matrix.parallelism }}"
          [[ -n "${{ matrix.limit }}" ]] && HIVE_ARGS+=" --sim.limit ${{ matrix.limit }}"
          ./hive $HIVE_ARGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.slug }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: hive/workspace
          retention-days: 7

      - name: Print results
        if: always()
        run: |
          rm -f hive/workspace/logs/hive.json
          nethermind/scripts/hive-results.sh "hive/workspace/logs/*.json"
