name: Run EXPB Reproducible Benchmarks

on:
  workflow_dispatch:
    inputs:
      expb_repo:
        description: execution-payloads-benchmarks repository in owner/repo format
        required: false
        default: NethermindEth/execution-payloads-benchmarks
      expb_branch:
        description: execution-payloads-benchmarks branch or tag
        required: false
        default: main
      state_layout:
        description: State layout mode
        required: true
        type: choice
        options:
          - halfpath
          - flat
        default: flat
      payload_set:
        description: Payload set mode
        required: true
        type: choice
        options:
          - realblocks
          - superblocks
        default: superblocks
      delay_seconds:
        description: Value used to replace <<DELAY>> placeholder (integer)
        required: false
        default: "0"
      amount:
        description: Override payload amount (default 1000 for realblocks, 100 for superblocks)
        required: false
        default: ""
      additional_extra_flags:
        description: >-
          Optional extra Nethermind flags. Example (single): --Merge.SweepMemory=NoGC.
          Example (multiple): --Sync.FastSync=false, --Pruning.CacheMb=12000
          (or provide one flag per line).
        required: false
        default: ""
      flat_write_buffer_floor:
        description: >-
          FlatDb write-buffer (memtable) floor in bytes for flat-layout runs, applied as
          --FlatDb.PersistenceWriteBufferFloor. Keeps small-CompactSize persistence batches from
          shrinking RocksDB memtables (decouples write amplification from CompactSize). Set empty to
          disable. Ignored for non-flat layouts and when additional_extra_flags already sets it.
        required: false
        default: "67108864"
      expb_env:
        description: >-
          Optional environment variables passed to the expb process (KEY=VALUE,
          comma- or newline-separated). Applies to both single-image and
          multi-image runs. Enables expb env-gated options, e.g.
          EXPB_EVM_WARMUP=1 (per-block eth_simulateV1 warmup). Values that
          themselves contain commas must use the newline-separated form, since
          commas are treated as entry separators.
        required: false
        default: ""
      rebuild_docker:
        description: Rebuild Nethermind Docker image before running benchmarks
        required: false
        type: boolean
        default: true
      run_count:
        description: Number of times to run the benchmark (for reproducibility testing)
        required: false
        type: number
        default: 1
      docker_images:
        description: >-
          Force-test specific Docker images (comma-separated full image references including repo).
          Skips docker build; runs each image as a separate benchmark.
          Example: nethermindeth/nethermind:master-21f1dca,nethermind/nethermind:latest
        required: false
        default: ""
      enable_retrospective:
        description: Enable retrospective multi-image benchmark (scans Docker Hub for recent master-* images)
        required: false
        type: boolean
        default: false
      retrospective_last:
        description: Number of recent master-* Docker images to consider (retrospective mode)
        required: false
        type: number
        default: 100
      retrospective_step:
        description: Pick every Nth image from the pool (retrospective mode)
        required: false
        type: number
        default: 10
      dottrace:
        description: Enable JetBrains dotTrace profiling (captures .dtp snapshot per run)
        required: false
        type: boolean
        default: false
      readtrace:
        description: >-
          Collect per-read provenance trace (readtrace-*.csv.gz artifact). Requires a Nethermind
          branch with the ReadTrace diagnostics (--Blocks.ReadTraceOutput). Pair with a small
          amount (e.g. 100) or set readtrace_blocks to bound trace size.
        required: false
        type: boolean
        default: false
      readtrace_blocks:
        description: >-
          Read-trace block filter passed as --Blocks.ReadTraceBlocks. Empty = all blocks;
          'first:N', 'A-B' range, or comma-separated block numbers.
        required: false
        default: ""
  pull_request:
    types: [labeled]
  push:
    branches:
      - master

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    if: github.event_name != 'pull_request' || (github.event.action == 'labeled' && github.event.label.name == 'performance is good' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      mode: ${{ steps.resolve.outputs.mode }}
      branch: ${{ steps.resolve.outputs.branch }}
      clean_branch: ${{ steps.resolve.outputs.clean_branch }}
      should_trigger_publish_docker: ${{ steps.resolve.outputs.should_trigger_publish_docker }}
      should_wait_for_publish_docker: ${{ steps.resolve.outputs.should_wait_for_publish_docker }}
      rebuild_docker: ${{ steps.resolve.outputs.rebuild_docker }}
      config_file: ${{ steps.resolve.outputs.config_file }}
      image_label: ${{ steps.resolve.outputs.image_label }}
      expb_repo: ${{ steps.resolve.outputs.expb_repo }}
      expb_branch: ${{ steps.resolve.outputs.expb_branch }}
      expb_data_dir: ${{ steps.resolve.outputs.expb_data_dir }}
      delay_seconds: ${{ steps.resolve.outputs.delay_seconds }}
      amount: ${{ steps.resolve.outputs.amount }}
      additional_extra_flags: ${{ steps.resolve.outputs.additional_extra_flags }}
      expb_env: ${{ steps.resolve.outputs.expb_env }}
      cleanup_grace_seconds: ${{ steps.resolve.outputs.cleanup_grace_seconds }}
      scenario_name: ${{ steps.resolve.outputs.scenario_name }}
      run_count: ${{ steps.resolve.outputs.run_count }}
      run_indices: ${{ steps.resolve.outputs.run_indices }}
      docker_images: ${{ steps.resolve.outputs.docker_images }}
      retrospective_last: ${{ steps.resolve.outputs.retrospective_last }}
      retrospective_step: ${{ steps.resolve.outputs.retrospective_step }}
      state_layout: ${{ steps.resolve.outputs.state_layout }}
      payload_sets: ${{ steps.resolve.outputs.payload_sets }}
      dottrace: ${{ steps.resolve.outputs.dottrace }}
      readtrace: ${{ steps.resolve.outputs.readtrace }}
      readtrace_blocks: ${{ steps.resolve.outputs.readtrace_blocks }}
    steps:
      - name: Resolve branch and configuration
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_LABEL: ${{ github.event.label.name }}
          PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPO: ${{ github.repository }}
          PUSH_BRANCH: ${{ github.ref_name }}
          DISPATCH_STATE_LAYOUT: ${{ inputs.state_layout }}
          DISPATCH_PAYLOAD_SET: ${{ inputs.payload_set }}
          DISPATCH_EXPB_REPO: ${{ inputs.expb_repo }}
          DISPATCH_EXPB_BRANCH: ${{ inputs.expb_branch }}
          DISPATCH_DELAY_SECONDS: ${{ inputs.delay_seconds }}
          DISPATCH_AMOUNT: ${{ inputs.amount }}
          DISPATCH_ADDITIONAL_EXTRA_FLAGS: ${{ inputs.additional_extra_flags }}
          DISPATCH_FLAT_WRITE_BUFFER_FLOOR: ${{ inputs.flat_write_buffer_floor }}
          DISPATCH_EXPB_ENV: ${{ inputs.expb_env }}
          DISPATCH_REBUILD_DOCKER: ${{ inputs.rebuild_docker }}
          DISPATCH_RUN_COUNT: ${{ inputs.run_count }}
          DISPATCH_DOCKER_IMAGES: ${{ inputs.docker_images }}
          DISPATCH_ENABLE_RETROSPECTIVE: ${{ inputs.enable_retrospective }}
          DISPATCH_RETROSPECTIVE_LAST: ${{ inputs.retrospective_last }}
          DISPATCH_RETROSPECTIVE_STEP: ${{ inputs.retrospective_step }}
          DISPATCH_DOTTRACE: ${{ inputs.dottrace }}
          DISPATCH_READTRACE: ${{ inputs.readtrace }}
          DISPATCH_READTRACE_BLOCKS: ${{ inputs.readtrace_blocks }}
        run: |
          set -euo pipefail

          should_run="true"
          mode="single"
          # Default FlatDb write-buffer floor (bytes) for flat layout; overridden by the dispatch input.
          flat_write_buffer_floor="67108864"
          expb_env=""
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            branch="${PUSH_BRANCH}"
            state_layout="${DISPATCH_STATE_LAYOUT}"
            payload_set="${DISPATCH_PAYLOAD_SET}"
            expb_repo="${DISPATCH_EXPB_REPO}"
            expb_branch="${DISPATCH_EXPB_BRANCH}"
            expb_data_dir="/mnt/sda/expb-data"
            delay_seconds="${DISPATCH_DELAY_SECONDS:-0}"
            if [[ -n "${DISPATCH_AMOUNT}" ]]; then
              amount="${DISPATCH_AMOUNT}"
            elif [[ "${payload_set}" == "realblocks" ]]; then
              amount="1000"
            else
              amount="100"
            fi
            additional_extra_flags="${DISPATCH_ADDITIONAL_EXTRA_FLAGS:-}"
            flat_write_buffer_floor="${DISPATCH_FLAT_WRITE_BUFFER_FLOOR-67108864}"
            expb_env="${DISPATCH_EXPB_ENV:-}"
            cleanup_grace_seconds="90"
            rebuild_docker="${DISPATCH_REBUILD_DOCKER:-true}"
            run_count="${DISPATCH_RUN_COUNT:-1}"
            payload_sets="[\"${payload_set}\"]"

            # Determine mode: multi-image if docker_images or retrospective is enabled
            docker_images="${DISPATCH_DOCKER_IMAGES:-}"
            enable_retrospective="${DISPATCH_ENABLE_RETROSPECTIVE:-false}"
            retrospective_last="${DISPATCH_RETROSPECTIVE_LAST:-100}"
            retrospective_step="${DISPATCH_RETROSPECTIVE_STEP:-10}"
            dottrace="${DISPATCH_DOTTRACE:-false}"
            readtrace="${DISPATCH_READTRACE:-false}"
            readtrace_blocks="${DISPATCH_READTRACE_BLOCKS:-}"
            if [[ -n "${docker_images}" || "${enable_retrospective}" == "true" ]]; then
              mode="multi"
            fi
          elif [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ "${PR_LABEL}" != "performance is good" ]]; then
              should_run="false"
            fi
            if [[ -n "${PR_HEAD_REPO:-}" && "${PR_HEAD_REPO}" != "${CURRENT_REPO}" ]]; then
              should_run="false"
            fi
            branch="${PR_HEAD_BRANCH}"
            state_layout="flat"
            payload_set="superblocks"
            payload_sets='["superblocks","realblocks"]'
            expb_repo="NethermindEth/execution-payloads-benchmarks"
            expb_branch="main"
            expb_data_dir="/mnt/sda/expb-data"
            delay_seconds="0"
            amount=""
            additional_extra_flags=""
            cleanup_grace_seconds="90"
            rebuild_docker="true"
            run_count="3"
            dottrace="false"
            readtrace="false"
            readtrace_blocks=""
          else
            branch="${PUSH_BRANCH}"
            state_layout="flat"
            payload_set="superblocks"
            payload_sets='["superblocks","realblocks"]'
            expb_repo="NethermindEth/execution-payloads-benchmarks"
            expb_branch="main"
            expb_data_dir="/mnt/sda/expb-data"
            delay_seconds="0"
            amount=""
            additional_extra_flags=""
            cleanup_grace_seconds="90"
            rebuild_docker="true"
            run_count="3"
            dottrace="false"
            readtrace="false"
            readtrace_blocks=""
          fi

          # Default the FlatDb write-buffer (memtable) floor for flat layout by routing it through the
          # extra-flags pipeline, so it actually reaches Nethermind (same path as additional_extra_flags).
          # Skipped for non-flat layouts, when disabled (empty), or when the caller already set it.
          if [[ "${state_layout}" == "flat" && -n "${flat_write_buffer_floor:-}" ]]; then
            if ! printf '%s' "${additional_extra_flags}" | grep -qi "PersistenceWriteBufferFloor"; then
              floor_flag="--FlatDb.PersistenceWriteBufferFloor=${flat_write_buffer_floor}"
              if [[ -n "${additional_extra_flags}" ]]; then
                additional_extra_flags="${additional_extra_flags}, ${floor_flag}"
              else
                additional_extra_flags="${floor_flag}"
              fi
            fi
          fi

          branch="${branch#refs/heads/}"
          if [[ -z "${branch}" ]]; then
            echo "Failed to resolve branch for event '${EVENT_NAME}'."
            exit 1
          fi

          if ! [[ "${delay_seconds}" =~ ^-?[0-9]+(\.[0-9]+)?$ ]]; then
            echo "delay_seconds must be a number (integer or decimal seconds, e.g. 0.25), got '${delay_seconds}'."
            exit 1
          fi

          if ! [[ "${cleanup_grace_seconds}" =~ ^[0-9]+$ ]]; then
            echo "cleanup_grace_seconds must be a non-negative integer, got '${cleanup_grace_seconds}'."
            exit 1
          fi

          if [[ "${rebuild_docker}" != "true" && "${rebuild_docker}" != "false" ]]; then
            echo "rebuild_docker must be true or false, got '${rebuild_docker}'."
            exit 1
          fi

          if ! [[ "${run_count}" =~ ^[0-9]+$ ]] || [[ "${run_count}" -lt 1 ]]; then
            echo "run_count must be a positive integer, got '${run_count}'."
            exit 1
          fi

          # Build JSON array of run indices: [1] or [1,2,3] etc.
          run_indices="["
          for (( i=1; i<=run_count; i++ )); do
            if [[ "${i}" -gt 1 ]]; then run_indices+=","; fi
            run_indices+="${i}"
          done
          run_indices+="]"

          clean_branch="$(echo "${branch}" | sed 's/[^a-zA-Z0-9._-]/-/g')"

          should_trigger_publish_docker="true"
          should_wait_for_publish_docker="false"
          if [[ "${branch}" == "master" || "${branch}" == "paprika" || "${branch}" == "performance" || "${branch}" == release/* ]]; then
            should_trigger_publish_docker="false"
            # On push, publish-docker.yml runs in parallel — wait for it instead of triggering
            if [[ "${EVENT_NAME}" == "push" ]]; then
              should_wait_for_publish_docker="true"
            fi
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" && "${rebuild_docker}" != "true" ]]; then
            should_trigger_publish_docker="false"
          fi

          if [[ "${state_layout}" == "flat" && "${payload_set}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet-flat.yaml"
          elif [[ "${state_layout}" == "flat" && "${payload_set}" == "realblocks" ]]; then
            config_file="github-action-mainnet-flat.yaml"
          elif [[ "${state_layout}" == "halfpath" && "${payload_set}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet.yaml"
          else
            config_file="github-action-mainnet.yaml"
          fi

          scenario_name="nethermind-${state_layout}-${payload_set}-${clean_branch}-delay${delay_seconds}s"

          {
            echo "should_run=${should_run}"
            echo "branch=${branch}"
            echo "clean_branch=${clean_branch}"
            echo "should_trigger_publish_docker=${should_trigger_publish_docker}"
            echo "should_wait_for_publish_docker=${should_wait_for_publish_docker}"
            echo "rebuild_docker=${rebuild_docker}"
            echo "config_file=${config_file}"
            echo "image_label=nethermindeth/nethermind:${clean_branch}"
            echo "expb_repo=${expb_repo}"
            echo "expb_branch=${expb_branch}"
            echo "expb_data_dir=${expb_data_dir}"
            echo "delay_seconds=${delay_seconds}"
            echo "amount=${amount}"
            echo "cleanup_grace_seconds=${cleanup_grace_seconds}"
            echo "mode=${mode}"
            echo "scenario_name=${scenario_name}"
            echo "run_count=${run_count}"
            echo "run_indices=${run_indices}"
            echo "docker_images=${docker_images:-}"
            echo "retrospective_last=${retrospective_last:-100}"
            echo "retrospective_step=${retrospective_step:-10}"
            echo "state_layout=${state_layout}"
            echo "payload_sets=${payload_sets}"
            echo "dottrace=${dottrace}"
            echo "readtrace=${readtrace}"
            echo "readtrace_blocks=${readtrace_blocks}"
            echo "additional_extra_flags<<EOF"
            printf '%s\n' "${additional_extra_flags}"
            echo "EOF"
            echo "expb_env<<EOF"
            printf '%s\n' "${expb_env}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  prepare-docker:
    needs: [resolve]
    if: needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'single'
    runs-on: ubuntu-latest
    steps:
      - name: Docker image source
        if: needs.resolve.outputs.should_trigger_publish_docker != 'true' && needs.resolve.outputs.should_wait_for_publish_docker != 'true'
        run: |
          echo "Skipping publish-docker.yml for branch '${{ needs.resolve.outputs.branch }}'."
          echo "Using existing image '${{ needs.resolve.outputs.image_label }}'."

      - name: Checkout repository
        if: needs.resolve.outputs.should_trigger_publish_docker == 'true'
        uses: actions/checkout@v6

      - name: Trigger publish-docker.yml
        if: needs.resolve.outputs.should_trigger_publish_docker == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish-docker.yml
          ref: ${{ needs.resolve.outputs.branch }}
          token: ${{ github.token }}
          inputs: '{
            "image-name": "nethermind",
            "tag": "${{ needs.resolve.outputs.clean_branch }}",
            "dockerfile": "Dockerfile",
            "build-config": "release"
            }'

      - name: Wait for publish-docker.yml to complete
        if: needs.resolve.outputs.should_trigger_publish_docker == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_ID: publish-docker.yml
          MAX_WAIT_MINUTES: "10"
          INTERVAL: "10"
          TIMEOUT: "120"
          ORG_NAME: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          NAME_FILTER: Publish Docker image
          REF: ${{ needs.resolve.outputs.branch }}
        run: |
          chmod +x scripts/wait-for-workflow.sh
          ./scripts/wait-for-workflow.sh

      - name: Wait for parallel publish-docker.yml
        if: needs.resolve.outputs.should_wait_for_publish_docker == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for parallel publish-docker.yml triggered by the same push (SHA: ${HEAD_SHA})..."

          max_discovery_seconds=300  # 5 min to discover the run
          poll_interval=15
          max_completion_seconds=7200  # 2 hours to complete

          # Phase 1: discover the parallel publish-docker run for this commit
          elapsed=0
          run_id=""
          while [[ -z "${run_id}" ]]; do
            response=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/publish-docker.yml/runs?head_sha=${HEAD_SHA}&per_page=5" \
              || echo '{"workflow_runs":[]}')

            run_id=$(echo "${response}" | jq -r '[.workflow_runs[] | select(.name | test("Publish Docker"))] | .[0].id // empty')

            if [[ -n "${run_id}" ]]; then
              echo "Found publish-docker run: ${run_id}"
              break
            fi

            elapsed=$(( elapsed + poll_interval ))
            if [[ "${elapsed}" -ge "${max_discovery_seconds}" ]]; then
              echo "No publish-docker.yml run found for SHA ${HEAD_SHA} within ${max_discovery_seconds}s."
              echo "This push may not include src/Nethermind changes. Proceeding with existing image."
              exit 0
            fi

            echo "No run found yet, retrying in ${poll_interval}s... (${elapsed}/${max_discovery_seconds}s)"
            sleep "${poll_interval}"
          done

          # Phase 2: wait for the run to complete
          elapsed=0
          while true; do
            run_data=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${run_id}" \
              || echo '{}')

            status=$(echo "${run_data}" | jq -r '.status // "unknown"')
            conclusion=$(echo "${run_data}" | jq -r '.conclusion // empty')

            if [[ "${status}" == "completed" ]]; then
              if [[ "${conclusion}" == "success" ]]; then
                echo "Parallel publish-docker.yml completed successfully."
                echo "Run: https://github.com/${OWNER}/${REPO}/actions/runs/${run_id}"
                exit 0
              else
                echo "Parallel publish-docker.yml finished with conclusion: ${conclusion}"
                echo "Run: https://github.com/${OWNER}/${REPO}/actions/runs/${run_id}"
                echo "Benchmark will proceed but may use a stale Docker image."
                exit 1
              fi
            fi

            elapsed=$(( elapsed + poll_interval ))
            if [[ "${elapsed}" -ge "${max_completion_seconds}" ]]; then
              echo "Timeout waiting for publish-docker.yml run ${run_id} to complete (${max_completion_seconds}s)."
              exit 1
            fi

            echo "Run ${run_id} status: ${status} — waiting ${poll_interval}s... (${elapsed}/${max_completion_seconds}s)"
            sleep "${poll_interval}"
          done

  benchmark:
    name: benchmark (${{ matrix.payload_set }}${{ needs.resolve.outputs.run_count != '1' && format(', run {0}', matrix.run) || '' }})
    needs: [resolve, prepare-docker]
    if: needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'single'
    strategy:
      matrix:
        run: ${{ fromJson(needs.resolve.outputs.run_indices) }}
        payload_set: ${{ fromJson(needs.resolve.outputs.payload_sets) }}
      max-parallel: 1
      fail-fast: false
    runs-on: [self-hosted, reproducible-benchmarks]
    timeout-minutes: 720
    env:
      EXPB_DATA_DIR: ${{ needs.resolve.outputs.expb_data_dir }}
      NETHERMIND_IMAGE: ${{ needs.resolve.outputs.image_label }}
      CLEANUP_GRACE_SECONDS: ${{ needs.resolve.outputs.cleanup_grace_seconds }}
    steps:
      - name: Resolve benchmark config for payload set
        id: resolve-config
        shell: bash
        env:
          STATE_LAYOUT: ${{ needs.resolve.outputs.state_layout }}
          PAYLOAD_SET: ${{ matrix.payload_set }}
          CLEAN_BRANCH: ${{ needs.resolve.outputs.clean_branch }}
          DELAY_SECONDS: ${{ needs.resolve.outputs.delay_seconds }}
          RUN: ${{ matrix.run }}
          RUN_COUNT: ${{ needs.resolve.outputs.run_count }}
        run: |
          set -euo pipefail
          if [[ "${STATE_LAYOUT}" == "flat" && "${PAYLOAD_SET}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet-flat.yaml"
          elif [[ "${STATE_LAYOUT}" == "flat" && "${PAYLOAD_SET}" == "realblocks" ]]; then
            config_file="github-action-mainnet-flat.yaml"
          elif [[ "${STATE_LAYOUT}" == "halfpath" && "${PAYLOAD_SET}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet.yaml"
          else
            config_file="github-action-mainnet.yaml"
          fi
          scenario_name="nethermind-${STATE_LAYOUT}-${PAYLOAD_SET}-${CLEAN_BRANCH}-delay${DELAY_SECONDS}s"
          if [[ "${RUN_COUNT}" -gt 1 ]]; then
            scenario_name="${scenario_name}-run${RUN}"
          fi
          echo "CONFIG_FILE=${config_file}" >> "${GITHUB_ENV}"
          echo "SCENARIO_NAME=${scenario_name}" >> "${GITHUB_ENV}"
          echo "config_file=${config_file}" >> "${GITHUB_OUTPUT}"
          echo "scenario_name=${scenario_name}" >> "${GITHUB_OUTPUT}"

      - name: Print resolved inputs
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Payload set: ${{ matrix.payload_set }}"
          echo "Nethermind branch: ${{ needs.resolve.outputs.branch }}"
          echo "Docker image: ${NETHERMIND_IMAGE}"
          echo "Config file: ${EXPB_DATA_DIR}/${CONFIG_FILE}"
          echo "Delay placeholder value: ${{ needs.resolve.outputs.delay_seconds }}"
          echo "Rebuild docker requested: ${{ needs.resolve.outputs.rebuild_docker }}"
          echo "Publish docker workflow triggered: ${{ needs.resolve.outputs.should_trigger_publish_docker }}"
          echo "Cleanup grace period (s): ${CLEANUP_GRACE_SECONDS}"
          echo "Scenario name: ${SCENARIO_NAME}"

      - name: Ensure EXPB config file exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${EXPB_DATA_DIR}/${CONFIG_FILE}" ]]; then
            echo "Config file '${EXPB_DATA_DIR}/${CONFIG_FILE}' does not exist."
            echo "Available github-action config files in '${EXPB_DATA_DIR}':"
            ls -1 "${EXPB_DATA_DIR}"/github-action*mainnet*.yaml || true
            exit 1
          fi

      - name: Render benchmark config
        id: render-config
        shell: bash
        env:
          SOURCE_CONFIG_FILE: ${{ env.EXPB_DATA_DIR }}/${{ env.CONFIG_FILE }}
          RENDERED_CONFIG_FILE: ${{ runner.temp }}/rendered-expb-config.yaml
          DOCKER_TAG: ${{ needs.resolve.outputs.clean_branch }}
          DELAY_SECONDS: ${{ needs.resolve.outputs.delay_seconds }}
          AMOUNT: ${{ needs.resolve.outputs.amount }}
          PAYLOAD_SET: ${{ matrix.payload_set }}
          SCENARIO_NAME: ${{ env.SCENARIO_NAME }}
          ADDITIONAL_EXTRA_FLAGS: ${{ needs.resolve.outputs.additional_extra_flags }}
          READTRACE: ${{ needs.resolve.outputs.readtrace }}
          READTRACE_BLOCKS: ${{ needs.resolve.outputs.readtrace_blocks }}
        run: |
          set -euo pipefail
          if [[ -z "${AMOUNT}" ]]; then
            if [[ "${PAYLOAD_SET}" == "realblocks" ]]; then
              AMOUNT="1000"
            else
              AMOUNT="100"
            fi
          fi
          flags_file="$(mktemp)"
          printf '%s' "${ADDITIONAL_EXTRA_FLAGS}" \
            | tr '\r' '\n' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | sed '/^$/d' \
            | awk '
                function emit_pending() {
                  if (pending != "") {
                    print pending
                    pending = ""
                  }
                }
                {
                  line = $0

                  # Convert "--Key Value" to "--Key=Value" to avoid bare value tokens.
                  if (match(line, /^--[^[:space:]=]+[[:space:]]+/)) {
                    key = substr(line, 1, RLENGTH)
                    sub(/[[:space:]]+$/, "", key)
                    value = substr(line, RLENGTH + 1)
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                    emit_pending()
                    print key "=" value
                    next
                  }

                  if (line ~ /^--/) {
                    emit_pending()
                    pending = line
                    next
                  }

                  if (pending != "") {
                    print pending "=" line
                    pending = ""
                  } else {
                    print line
                  }
                }
                END {
                  emit_pending()
                }
              ' \
            > "${flags_file}"

          YQ="${RUNNER_TEMP}/yq"
          if [[ ! -x "${YQ}" ]]; then
            curl -sSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o "${YQ}"
            chmod +x "${YQ}"
          fi

          # Replace placeholders and rename scenario key with sed (preserves comments)
          sed \
            -e "s#<<DOCKER_TAG>>#${DOCKER_TAG}#g" \
            -e "s#<<DELAY>>#${DELAY_SECONDS}#g" \
            ${AMOUNT:+-e "s#<<AMOUNT>>#${AMOUNT}#g"} \
            -e "s#^\([[:space:]]*\)nethermind:#\1${SCENARIO_NAME}:#g" \
            "${SOURCE_CONFIG_FILE}" > "${RENDERED_CONFIG_FILE}"

          # Append extra flags using yq (proper YAML handling)
          scenario_key="${SCENARIO_NAME}"
          while IFS= read -r flag; do
            [[ -z "${flag}" ]] && continue
            "${YQ}" -i ".scenarios.\"${scenario_key}\".extra_flags += [\"${flag}\"]" "${RENDERED_CONFIG_FILE}"
          done < "${flags_file}"

          if [[ "${READTRACE}" == "true" ]]; then
            # Host-backed volume auto-created by expb under outputs/.../volumes/readtrace; survives container cleanup.
            "${YQ}" -i ".scenarios.\"${scenario_key}\".extra_volumes.readtrace = {\"bind\": \"/readtrace\", \"mode\": \"rw\"}" "${RENDERED_CONFIG_FILE}"
            "${YQ}" -i ".scenarios.\"${scenario_key}\".extra_flags += [\"--Blocks.ReadTraceOutput=/readtrace\"]" "${RENDERED_CONFIG_FILE}"
            if [[ -n "${READTRACE_BLOCKS}" ]]; then
              "${YQ}" -i ".scenarios.\"${scenario_key}\".extra_flags += [\"--Blocks.ReadTraceBlocks=${READTRACE_BLOCKS}\"]" "${RENDERED_CONFIG_FILE}"
            fi
          fi

          echo "rendered_config_file=${RENDERED_CONFIG_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Install or upgrade expb
        shell: bash
        env:
          EXPB_REPO: ${{ needs.resolve.outputs.expb_repo }}
          EXPB_BRANCH: ${{ needs.resolve.outputs.expb_branch }}
        run: |
          set -euo pipefail

          if ! command -v uv >/dev/null 2>&1; then
            echo "uv is required on runner but was not found in PATH."
            exit 1
          fi

          if [[ "${EXPB_REPO}" == "NethermindEth/execution-payloads-benchmarks" && "${EXPB_BRANCH}" == "main" ]]; then
            expb_source="git+https://github.com/NethermindEth/execution-payloads-benchmarks"
          elif [[ -n "${EXPB_BRANCH}" ]]; then
            expb_source="git+https://github.com/${EXPB_REPO}@${EXPB_BRANCH}"
          else
            expb_source="git+https://github.com/${EXPB_REPO}"
          fi

          echo "Installing expb from ${expb_source}"
          uv tool install --force --from "${expb_source}" expb
          echo "$(uv tool dir --bin)" >> "${GITHUB_PATH}"

      - name: Start memory sampler
        id: mem-sampler
        continue-on-error: true
        shell: bash
        env:
          MEM_SAMPLE_INTERVAL: "5"
        run: |
          set -uo pipefail
          sampler="${RUNNER_TEMP}/mem-sampler.sh"
          csv="${RUNNER_TEMP}/mem-samples.csv"
          stopfile="${RUNNER_TEMP}/mem-sampler.stop"
          pidfile="${RUNNER_TEMP}/mem-sampler.pid"

          # Clear any stale sampler/state from a previous matrix cell on this runner.
          pkill -f "${sampler}" 2>/dev/null || true
          rm -f "${csv}" "${stopfile}" "${pidfile}" || true

          cat > "${sampler}" <<'MEM_SAMPLER_EOF'
          #!/usr/bin/env bash
          # Append "epoch,used_bytes,mem_perc,source" for the Nethermind container.
          # Preferred signal is cgroup 'anon' (v2) / 'total_rss' (v1) read from the host
          # cgroup files — anonymous memory only (managed heap + native allocs + RocksDB
          # block cache), excluding reclaimable page cache; that is the true leak / OOM
          # signal. 'docker stats' MemUsage still counts active file cache, so it is only
          # a fallback when the cgroup files are unreadable.
          set -uo pipefail
          CSV="$1"
          STOPFILE="${2:-}"
          INTERVAL="${MEM_SAMPLE_INTERVAL:-5}"
          IMAGE="${NETHERMIND_IMAGE:-}"
          MAX_SECONDS="${MEM_SAMPLER_MAX_SECONDS:-21600}"
          ABSENT_LIMIT="${MEM_SAMPLER_ABSENT_LIMIT:-3}"

          host_mem_total() { awk '/^MemTotal:/ { print $2 * 1024; exit }' /proc/meminfo 2>/dev/null; }

          discover() {
            local id=""
            if [[ -n "${IMAGE}" ]]; then
              id="$(docker ps --filter "ancestor=${IMAGE}" --format '{{.ID}}' 2>/dev/null | head -n1)"
            fi
            if [[ -z "${id}" ]]; then
              id="$(docker ps --format '{{.ID}}|{{.Image}}' 2>/dev/null \
                | awk -F'|' 'tolower($2) ~ /nethermind/ { print $1; exit }')"
            fi
            printf '%s' "${id}"
          }

          read_stat() { awk -v k="$2" '$1 == k { print $2; exit }' "$1" 2>/dev/null; }

          # Echo "statpath<TAB>statkey<TAB>limitbytes"; statkey 'stats' => docker-stats fallback.
          resolve_source() {
            local cid="$1" fid base lim ht d
            fid="$(docker inspect -f '{{.Id}}' "${cid}" 2>/dev/null)"
            ht="$(host_mem_total)"
            if [[ -n "${fid}" ]]; then
              for base in "/sys/fs/cgroup/system.slice/docker-${fid}.scope" "/sys/fs/cgroup/docker/${fid}"; do
                if [[ -r "${base}/memory.stat" ]] && [[ -n "$(read_stat "${base}/memory.stat" anon)" ]]; then
                  lim="$(cat "${base}/memory.max" 2>/dev/null)"
                  [[ "${lim}" =~ ^[0-9]+$ ]] || lim="${ht}"
                  printf '%s\tanon\t%s' "${base}/memory.stat" "${lim:-0}"
                  return 0
                fi
              done
              d="/sys/fs/cgroup/memory/docker/${fid}"
              if [[ -r "${d}/memory.stat" ]] && [[ -n "$(read_stat "${d}/memory.stat" total_rss)" ]]; then
                lim="$(cat "${d}/memory.limit_in_bytes" 2>/dev/null)"
                if ! [[ "${lim}" =~ ^[0-9]+$ ]] || { [[ -n "${ht}" ]] && [[ "${lim}" -gt "${ht}" ]]; }; then lim="${ht}"; fi
                printf '%s\ttotal_rss\t%s' "${d}/memory.stat" "${lim:-0}"
                return 0
              fi
            fi
            printf '\tstats\t0'
          }

          to_bytes() {
            awk -v s="$1" 'BEGIN {
              gsub(/^[ \t]+|[ \t]+$/, "", s)
              if (match(s, /^[0-9.]+/)) { num = substr(s, 1, RLENGTH) + 0; unit = substr(s, RLENGTH + 1) }
              else { print 0; exit }
              gsub(/[ \t]/, "", unit); u = tolower(unit); m = 1
              if (u == "b" || u == "") m = 1
              else if (u == "kib") m = 1024
              else if (u == "mib") m = 1024 * 1024
              else if (u == "gib") m = 1024 * 1024 * 1024
              else if (u == "tib") m = 1024 * 1024 * 1024 * 1024
              else if (u == "kb") m = 1000
              else if (u == "mb") m = 1000000
              else if (u == "gb") m = 1000000000
              else if (u == "tb") m = 1000000000000
              printf "%.0f", num * m
            }'
          }

          start="$(date +%s)"
          seen=0
          absent=0
          last_cid=""
          stat_path=""
          stat_key="stats"
          limit=0
          echo "# epoch,bytes,mem_perc,source" >> "${CSV}"
          while :; do
            [[ -n "${STOPFILE}" && -f "${STOPFILE}" ]] && break
            [[ $(( $(date +%s) - start )) -ge "${MAX_SECONDS}" ]] && break
            cid="$(discover)"
            if [[ -n "${cid}" ]]; then
              if [[ "${cid}" != "${last_cid}" ]]; then
                last_cid="${cid}"
                IFS=$'\t' read -r stat_path stat_key limit < <(resolve_source "${cid}")
              fi
              seen=1; absent=0
              bytes=""; perc=""; src="${stat_key}"
              if [[ "${stat_key}" == "anon" || "${stat_key}" == "total_rss" ]] && [[ -n "${stat_path}" ]]; then
                bytes="$(read_stat "${stat_path}" "${stat_key}")"
                if [[ "${bytes}" =~ ^[0-9]+$ && "${limit}" =~ ^[0-9]+$ && "${limit}" -gt 0 ]]; then
                  perc="$(awk -v b="${bytes}" -v l="${limit}" 'BEGIN { printf "%.1f", b / l * 100 }')"
                fi
              fi
              if [[ -z "${bytes}" || ! "${bytes}" =~ ^[0-9]+$ ]]; then
                src="stats"
                line="$(docker stats --no-stream --format '{{.MemUsage}};{{.MemPerc}}' "${cid}" 2>/dev/null | head -n1)"
                if [[ -n "${line}" ]]; then
                  usage="${line%%;*}"; perc="${line##*;}"
                  usage="${usage%%/*}"; perc="${perc%\%}"
                  bytes="$(to_bytes "${usage}")"
                fi
              fi
              if [[ -n "${bytes}" && "${bytes}" =~ ^[0-9]+$ && "${bytes}" != "0" ]]; then
                printf '%s,%s,%s,%s\n' "$(date +%s)" "${bytes}" "${perc:-}" "${src}" >> "${CSV}"
              fi
            elif [[ "${seen}" -eq 1 ]]; then
              absent=$(( absent + 1 ))
              [[ "${absent}" -ge "${ABSENT_LIMIT}" ]] && break
            fi
            sleep "${INTERVAL}"
          done
          MEM_SAMPLER_EOF
          chmod +x "${sampler}" || true

          nohup bash "${sampler}" "${csv}" "${stopfile}" > "${RUNNER_TEMP}/mem-sampler.out" 2>&1 &
          echo $! > "${pidfile}"
          disown || true
          echo "Memory sampler started (pid $(cat "${pidfile}" 2>/dev/null || echo '?'), image '${NETHERMIND_IMAGE:-?}', every ${MEM_SAMPLE_INTERVAL}s)."

      - name: Run expb scenarios
        id: run-expb
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.EXPB_DATA_DIR }}
        env:
          RAW_RUN_LOG: ${{ runner.temp }}/expb-run.log
          DOTTRACE: ${{ needs.resolve.outputs.dottrace }}
          EXPB_ENV_PASSTHROUGH: ${{ needs.resolve.outputs.expb_env }}
        run: |
          set -euo pipefail
          expb_pid=""
          : > "${RAW_RUN_LOG}"

          # Export caller-provided expb env tuning (comma- or newline-separated KEY=VALUE;
          # values containing commas must use the newline-separated form).
          if [[ -n "${EXPB_ENV_PASSTHROUGH:-}" ]]; then
            while IFS= read -r _kv; do
              _kv="$(printf '%s' "${_kv}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
              [[ -z "${_kv}" ]] && continue
              if [[ "${_kv}" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
                export "${_kv}"
                echo "Exported expb env: ${_kv%%=*}=<value>"
              else
                echo "::warning::Skipping invalid expb_env entry (expected KEY=VALUE): ${_kv}"
              fi
            done < <(printf '%s\n' "${EXPB_ENV_PASSTHROUGH}" | tr ',' '\n')
          fi

          on_terminate() {
            echo "Termination signal received. Waiting up to ${CLEANUP_GRACE_SECONDS}s for expb cleanup."
            if [[ -n "${expb_pid}" ]] && kill -0 "${expb_pid}" 2>/dev/null; then
              kill -TERM "${expb_pid}" 2>/dev/null || true

              remaining="${CLEANUP_GRACE_SECONDS}"
              while [[ "${remaining}" -gt 0 ]]; do
                if ! kill -0 "${expb_pid}" 2>/dev/null; then
                  echo "expb exited during cleanup grace period."
                  break
                fi
                sleep 1
                remaining=$((remaining - 1))
              done

              if kill -0 "${expb_pid}" 2>/dev/null; then
                echo "Cleanup grace period elapsed. Forcing expb shutdown."
                kill -KILL "${expb_pid}" 2>/dev/null || true
              fi
            fi
            exit 143
          }

          trap on_terminate TERM INT

          dottrace_flag=""
          if [[ "${DOTTRACE}" == "true" ]]; then
            dottrace_flag="--dottrace"
          fi

          # Marker for dottrace artifact collection — only files newer than this
          touch "${RUNNER_TEMP}/.expb-run-marker"

          fifo="${RUNNER_TEMP}/expb-pipe"
          mkfifo "${fifo}"
          tee "${RAW_RUN_LOG}" < "${fifo}" &
          tee_pid=$!

          expb execute-scenarios \
            --config-file "${{ steps.render-config.outputs.rendered_config_file }}" \
            --per-payload-metrics \
            --per-payload-metrics-logs \
            --print-logs \
            ${dottrace_flag} \
            > "${fifo}" 2>&1 &
          expb_pid=$!

          set +e
          wait "${expb_pid}"
          expb_exit_code=$?
          set -e

          rm -f "${fifo}"
          wait "${tee_pid}"

          exit "${expb_exit_code}"

      - name: Analyze benchmark output
        id: analyze
        if: always()
        shell: bash
        env:
          RAW_RUN_LOG: ${{ runner.temp }}/expb-run.log
        run: |
          set -euo pipefail

          clean_log="${RUNNER_TEMP}/expb-run.clean.log"
          exception_lines="${RUNNER_TEMP}/expb-exceptions.log"
          invalid_block_lines="${RUNNER_TEMP}/expb-invalid-blocks.log"
          processing_ms="${RUNNER_TEMP}/expb-processing-ms.txt"
          processing_ms_sorted="${RUNNER_TEMP}/expb-processing-ms-sorted.txt"
          metrics_file="${RUNNER_TEMP}/expb-metrics.env"

          if [[ ! -f "${RAW_RUN_LOG}" ]]; then
            echo "Run output log '${RAW_RUN_LOG}' was not produced."
            exit 1
          fi

          sed -E 's/\x1B\[[0-9;?]*[ -/]*[@-~]//g' "${RAW_RUN_LOG}" > "${clean_log}"

          grep -in "Exception" "${clean_log}" > "${exception_lines}" || true
          exception_found="false"
          if [[ -s "${exception_lines}" ]]; then
            exception_found="true"
            echo "Found Exception lines in benchmark output:"
            head -n 40 "${exception_lines}"
          fi

          grep -Ein "invalid[[:space:]_-]*block" "${clean_log}" > "${invalid_block_lines}" || true
          invalid_block_found="false"
          if [[ -s "${invalid_block_lines}" ]]; then
            invalid_block_found="true"
            echo "Found invalid block lines in benchmark output:"
            head -n 40 "${invalid_block_lines}"
          fi

          # Flag additional severe runtime signals (warn, don't hard-fail)
          for pattern in "Unhandled" "Fatal" "^.*ERROR.*$"; do
            severe_lines=$(grep -in "${pattern}" "${clean_log}" | head -n 20) || true
            if [[ -n "${severe_lines}" ]]; then
              echo "::warning::Severe log pattern '${pattern}' detected in benchmark output"
              echo "${severe_lines}"
            fi
          done

          # Extract client-side processing times from SSE data feed (primary)
          client_ms="${RUNNER_TEMP}/expb-client-ms.txt"
          client_ms_sorted="${RUNNER_TEMP}/expb-client-ms-sorted.txt"
          grep -oP '\[payload-server\] client_metric block_number=\d+ processing_ms=\K[0-9]+(\.[0-9]+)?' "${clean_log}" > "${client_ms}" || true

          # Fall back to K6 TTFB table if no client metrics available
          if [[ -s "${client_ms}" ]]; then
            echo "Using SSE client_metric data ($(wc -l < "${client_ms}") samples)."
            cp "${client_ms}" "${processing_ms}"
          else
            echo "No SSE client_metric data found, falling back to K6 TTFB table."
            awk -F'|' '
              /^[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+(\.[0-9]+)?[[:space:]]*\|[[:space:]]*$/ {
                value = $4
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                if (value ~ /^[0-9]+(\.[0-9]+)?$/) {
                  print value
                }
              }
            ' "${clean_log}" > "${processing_ms}"
          fi

          count=$(wc -l < "${processing_ms}")
          count="${count//[[:space:]]/}"
          if [[ "${count}" -eq 0 ]]; then
            echo "Could not extract any processing_ms data from benchmark output."
            exit 1
          fi

          compute_percentiles() {
            local input_file="$1"
            local prefix="$2"
            local sorted_file="${input_file}.sorted"
            local n

            sort -n "${input_file}" > "${sorted_file}"
            n=$(wc -l < "${sorted_file}")
            n="${n//[[:space:]]/}"

            local min max avg median p90 p95 p99
            min=$(head -n 1 "${sorted_file}")
            max=$(tail -n 1 "${sorted_file}")
            avg=$(awk '{sum += $1} END {printf "%.2f", sum / NR}' "${sorted_file}")

            if (( n % 2 == 1 )); then
              local mi=$(( (n + 1) / 2 ))
              median=$(sed -n "${mi}p" "${sorted_file}")
            else
              local lo=$(( n / 2 ))
              local hi=$(( lo + 1 ))
              local lv hv
              lv=$(sed -n "${lo}p" "${sorted_file}")
              hv=$(sed -n "${hi}p" "${sorted_file}")
              median=$(awk -v a="${lv}" -v b="${hv}" 'BEGIN {printf "%.2f", (a + b) / 2}')
            fi

            local p90i=$(( (90 * n + 99) / 100 ))
            local p95i=$(( (95 * n + 99) / 100 ))
            local p99i=$(( (99 * n + 99) / 100 ))
            p90=$(sed -n "${p90i}p" "${sorted_file}")
            p95=$(sed -n "${p95i}p" "${sorted_file}")
            p99=$(sed -n "${p99i}p" "${sorted_file}")

            echo "${prefix}COUNT=${n}"
            echo "${prefix}AVG=${avg}"
            echo "${prefix}MEDIAN=${median}"
            echo "${prefix}P90=${p90}"
            echo "${prefix}P95=${p95}"
            echo "${prefix}P99=${p99}"
            echo "${prefix}MIN=${min}"
            echo "${prefix}MAX=${max}"
          }

          compute_percentiles "${processing_ms}" "" > "${metrics_file}"

          # Also compute K6 TTFB metrics when client metrics were primary
          if [[ -s "${client_ms}" ]]; then
            ttfb_ms="${RUNNER_TEMP}/expb-ttfb-ms.txt"
            awk -F'|' '
              /^[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+(\.[0-9]+)?[[:space:]]*\|[[:space:]]*$/ {
                value = $4
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                if (value ~ /^[0-9]+(\.[0-9]+)?$/) {
                  print value
                }
              }
            ' "${clean_log}" > "${ttfb_ms}"
            if [[ -s "${ttfb_ms}" ]]; then
              compute_percentiles "${ttfb_ms}" "TTFB_" >> "${metrics_file}"
            fi
          fi

          # Print human-readable summary
          echo ""
          echo "========================================="
          if [[ -s "${client_ms}" ]]; then
            echo "  Client Processing (SSE) Metrics"
          else
            echo "  Processing Metrics (K6 TTFB)"
          fi
          echo "========================================="
          while IFS='=' read -r key val; do
            printf "  %-10s %s ms\n" "${key}" "${val}"
          done < "${metrics_file}"
          if [[ -s "${client_ms}" ]] && grep -q "^TTFB_AVG=" "${metrics_file}" 2>/dev/null; then
            echo "-----------------------------------------"
            echo "  K6 TTFB (secondary)"
            echo "-----------------------------------------"
            grep "^TTFB_" "${metrics_file}" | while IFS='=' read -r key val; do
              printf "  %-10s %s ms\n" "${key#TTFB_}" "${val}"
            done
          fi
          echo "========================================="
          echo ""

          # Populate GITHUB_OUTPUT
          {
            echo "exception_found=${exception_found}"
            echo "exception_lines_file=${exception_lines}"
            echo "invalid_block_found=${invalid_block_found}"
            echo "invalid_block_lines_file=${invalid_block_lines}"
            echo "metrics_file=${metrics_file}"
            while IFS= read -r line; do
              key="${line%%=*}"
              val="${line#*=}"
              echo "${key,,}=${val}"
            done < "${metrics_file}"
          } >> "${GITHUB_OUTPUT}"

      - name: Stop sampler and analyze memory
        id: mem-analyze
        if: always()
        continue-on-error: true
        shell: bash
        env:
          MEM_NEAR_LIMIT_PERC: "90"
          MEM_SLOPE_MB_PER_MIN_MIN: "15"
          MEM_GROWTH_MB_MIN: "256"
          MEM_MIN_SAMPLES: "5"
          MEM_WARMUP_FRAC: "0.3"
          METRICS_FILE: ${{ runner.temp }}/expb-metrics.env
        run: |
          set -uo pipefail
          csv="${RUNNER_TEMP}/mem-samples.csv"
          stopfile="${RUNNER_TEMP}/mem-sampler.stop"
          pidfile="${RUNNER_TEMP}/mem-sampler.pid"
          awkfile="${RUNNER_TEMP}/mem-analyze.awk"

          # Signal the sampler to stop, then give it a moment to flush and exit.
          touch "${stopfile}" || true
          if [[ -f "${pidfile}" ]]; then
            spid="$(cat "${pidfile}" 2>/dev/null || true)"
            for _ in $(seq 1 15); do
              if [[ -z "${spid}" ]] || ! kill -0 "${spid}" 2>/dev/null; then break; fi
              sleep 1
            done
            if [[ -n "${spid}" ]] && kill -0 "${spid}" 2>/dev/null; then
              kill -TERM "${spid}" 2>/dev/null || true
            fi
          fi

          if [[ ! -f "${csv}" ]] || ! grep -qv '^#' "${csv}" 2>/dev/null; then
            echo "No memory samples were collected."
            {
              echo "MEM_SAMPLES=0"
              echo "MEM_SEVERITY=0"
              echo "MEM_VERDICT=ℹ️ no memory samples collected"
            } >> "${METRICS_FILE}"
            exit 0
          fi

          cat > "${awkfile}" <<'MEM_AWK_EOF'
          # Analyze a memory-sample CSV: epoch,bytes,mem_perc,source (# lines ignored).
          # Emits KEY=VALUE lines consumed by the workflow. All sizes in MiB.
          #
          # Leak detection ignores the cold-start ramp: a freshly started node grows
          # from cold to a warm plateau (a one-time step, NOT a leak). The verdict is
          # computed on the POST-WARMUP window using the least-squares slope of the
          # per-time-bucket minima (the "floor"). Flat floor => plateau (healthy);
          # sustained positive floor slope => a footprint that never clears (leak).
          BEGIN { FS = "," }
          /^#/ { next }
          NF >= 2 && $2 + 0 > 0 {
            n++
            t[n] = $1 + 0
            b[n] = ($2 + 0) / 1048576.0
            p[n] = $3 + 0
            s[n] = $4
          }
          END {
            if (n == 0) { print "SAMPLES=0"; exit }
            t0 = t[1]; tN = t[n]; dur = tN - t0
            peak = b[1]; minv = b[1]; sum = 0; peakperc = p[1]; src = ""
            for (i = 1; i <= n; i++) {
              if (b[i] > peak) peak = b[i]
              if (b[i] < minv) minv = b[i]
              sum += b[i]
              if (p[i] > peakperc) peakperc = p[i]
              if (s[i] != "") src = s[i]
            }
            avg = sum / n
            frac = WARMUP_FRAC + 0
            if (frac <= 0 || frac >= 1) frac = 0.3
            cutoff = t0 + frac * dur
            m = 0
            for (i = 1; i <= n; i++) if (t[i] >= cutoff) { m++; mt[m] = t[i]; mb[m] = b[i] }
            if (m < 4) { m = 0; for (i = 1; i <= n; i++) { m++; mt[m] = t[i]; mb[m] = b[i] }; cutoff = t0 }
            warmup_s = cutoff - t0
            mt0 = mt[1]; mtN = mt[m]; mdur = mtN - mt0
            K = 10; if (m < K) K = m
            for (j = 1; j <= K; j++) { bmin[j] = -1; bsum[j] = 0; bcnt[j] = 0; btsum[j] = 0 }
            for (i = 1; i <= m; i++) {
              j = (mdur > 0) ? int((mt[i] - mt0) / mdur * K) + 1 : 1
              if (j > K) j = K; if (j < 1) j = 1
              if (bmin[j] < 0 || mb[i] < bmin[j]) bmin[j] = mb[i]
              bsum[j] += mb[i]; bcnt[j]++; btsum[j] += mt[i]
            }
            kk = 0
            for (j = 1; j <= K; j++) if (bcnt[j] > 0) { kk++; fmin[kk] = bmin[j]; ftime[kk] = btsum[j] / bcnt[j] }
            baseline = fmin[1]; end_floor = fmin[kk]
            growth = end_floor - baseline
            growth_pct = (baseline > 0) ? (growth / baseline) * 100.0 : 0
            Sx = 0; Sy = 0; Sxy = 0; Sxx = 0
            for (j = 1; j <= kk; j++) { x = (ftime[j] - mt0) / 60.0; y = fmin[j]; Sx += x; Sy += y; Sxy += x * y; Sxx += x * x }
            denom = kk * Sxx - Sx * Sx
            slope = (denom != 0) ? (kk * Sxy - Sx * Sy) / denom : 0
            UK = 10; if (n < UK) UK = n
            for (j = 1; j <= UK; j++) { ubsum[j] = 0; ubcnt[j] = 0 }
            for (i = 1; i <= n; i++) {
              uj = (dur > 0) ? int((t[i] - t0) / dur * UK) + 1 : 1
              if (uj > UK) uj = UK; if (uj < 1) uj = 1
              ubsum[uj] += b[i]; ubcnt[uj]++
            }
            uu = 0
            for (j = 1; j <= UK; j++) if (ubcnt[j] > 0) { uu++; umean[uu] = ubsum[j] / ubcnt[j] }
            printf "SAMPLES=%d\n", n
            printf "SOURCE=%s\n", (src == "" ? "unknown" : src)
            printf "DURATION_S=%d\n", dur
            printf "WARMUP_S=%d\n", warmup_s
            printf "BUCKETS=%d\n", kk
            printf "PEAK_MB=%.1f\n", peak
            printf "PEAK_PERC=%.1f\n", peakperc
            printf "MIN_MB=%.1f\n", minv
            printf "AVG_MB=%.1f\n", avg
            printf "BASELINE_MB=%.1f\n", baseline
            printf "END_FLOOR_MB=%.1f\n", end_floor
            printf "FLOOR_GROWTH_MB=%.1f\n", growth
            printf "FLOOR_GROWTH_PCT=%.1f\n", growth_pct
            printf "FLOOR_SLOPE_MB_PER_MIN=%.2f\n", slope
            printf "SPARK_USAGE_IDX=%s\n", sparkline(umean, uu)
            printf "SPARK_FLOOR_IDX=%s\n", sparkline(fmin, kk)
          }
          function sparkline(arr, cnt,   j, lo, hi, out, lvl) {
            if (cnt <= 0) return ""
            lo = arr[1]; hi = arr[1]
            for (j = 1; j <= cnt; j++) { if (arr[j] < lo) lo = arr[j]; if (arr[j] > hi) hi = arr[j] }
            out = ""
            for (j = 1; j <= cnt; j++) {
              lvl = (hi > lo) ? int((arr[j] - lo) / (hi - lo) * 7 + 0.5) : 0
              out = out (j > 1 ? " " : "") lvl
            }
            return out
          }
          MEM_AWK_EOF

          NEAR_LIMIT_PERC="${MEM_NEAR_LIMIT_PERC:-90}"
          SLOPE_MIN="${MEM_SLOPE_MB_PER_MIN_MIN:-15}"
          GROWTH_MB_MIN="${MEM_GROWTH_MB_MIN:-256}"
          MIN_SAMPLES="${MEM_MIN_SAMPLES:-5}"
          WARMUP_FRAC="${MEM_WARMUP_FRAC:-0.3}"
          MEM_LEVELS=(▁ ▂ ▃ ▄ ▅ ▆ ▇ █)

          declare -A A=()
          while IFS='=' read -r k v; do
            [[ -z "${k}" ]] && continue
            A["${k}"]="${v}"
          done < <(awk -v WARMUP_FRAC="${WARMUP_FRAC}" -f "${awkfile}" "${csv}")

          samples="${A[SAMPLES]:-0}"
          source="${A[SOURCE]:-unknown}"
          hsize() { awk -v m="${1:-0}" 'BEGIN { if (m + 0 >= 1024) printf "%.2f GiB", m / 1024.0; else printf "%.0f MiB", m }'; }
          spark() { local out="" i; for i in $1; do out+="${MEM_LEVELS[$i]}"; done; printf '%s' "${out}"; }
          ge() { awk -v a="${1:-0}" -v b="${2:-0}" 'BEGIN { print (a + 0 >= b + 0) ? 1 : 0 }'; }

          src_note=""
          [[ "${source}" == "stats" ]] && src_note=" (docker stats — includes active page cache)"

          if [[ "${samples}" -lt "${MIN_SAMPLES}" ]]; then
            verdict="ℹ️ insufficient samples (${samples})"
            severity=0
            spark_usage=""; spark_floor=""
          else
            near="$(ge "${A[PEAK_PERC]:-0}" "${NEAR_LIMIT_PERC}")"
            slope_hit="$(ge "${A[FLOOR_SLOPE_MB_PER_MIN]:-0}" "${SLOPE_MIN}")"
            growth_hit="$(ge "${A[FLOOR_GROWTH_MB]:-0}" "${GROWTH_MB_MIN}")"
            grow=0
            [[ "${slope_hit}" -eq 1 && "${growth_hit}" -eq 1 ]] && grow=1
            severity=0
            [[ "${grow}" -eq 1 ]] && severity=$(( severity + 1 ))
            [[ "${near}" -eq 1 ]] && severity=$(( severity + 2 ))
            case "${severity}" in
              0) verdict="✅ stable (floor clears)" ;;
              1) verdict="⚠️ rising floor (possible leak)" ;;
              2) verdict="⚠️ near memory limit" ;;
              3) verdict="🔴 rising floor near limit" ;;
            esac
            spark_usage="$(spark "${A[SPARK_USAGE_IDX]:-}")"
            spark_floor="$(spark "${A[SPARK_FLOOR_IDX]:-}")"
          fi

          echo "----- Memory (container) -----"
          if [[ "${samples}" -lt "${MIN_SAMPLES}" ]]; then
            echo "  ${verdict}"
          else
            printf "  Samples        %s over %ss (source: %s%s)\n" "${samples}" "${A[DURATION_S]:-0}" "${source}" "${src_note}"
            printf "  Warmup skipped %ss\n" "${A[WARMUP_S]:-0}"
            printf "  Peak           %s (%s%% of limit/host)\n" "$(hsize "${A[PEAK_MB]:-0}")" "${A[PEAK_PERC]:-?}"
            printf "  Baseline floor %s (post-warmup)\n" "$(hsize "${A[BASELINE_MB]:-0}")"
            printf "  End floor      %s\n" "$(hsize "${A[END_FLOOR_MB]:-0}")"
            printf "  Floor growth   %s (%s%%)\n" "$(hsize "${A[FLOOR_GROWTH_MB]:-0}")" "${A[FLOOR_GROWTH_PCT]:-0}"
            printf "  Floor trend    %s MiB/min\n" "${A[FLOOR_SLOPE_MB_PER_MIN]:-0}"
            printf "  Usage shape    %s\n" "${spark_usage}"
            printf "  Floor shape    %s\n" "${spark_floor}"
            printf "  Verdict        %s\n" "${verdict}"
          fi

          {
            echo "MEM_SAMPLES=${samples}"
            echo "MEM_SOURCE=${source}"
            echo "MEM_SEVERITY=${severity}"
            echo "MEM_VERDICT=${verdict}"
            if [[ "${samples}" -ge "${MIN_SAMPLES}" ]]; then
              echo "MEM_DURATION_S=${A[DURATION_S]:-}"
              echo "MEM_WARMUP_S=${A[WARMUP_S]:-}"
              echo "MEM_PEAK_MB=${A[PEAK_MB]:-}"
              echo "MEM_PEAK_PERC=${A[PEAK_PERC]:-}"
              echo "MEM_MIN_MB=${A[MIN_MB]:-}"
              echo "MEM_AVG_MB=${A[AVG_MB]:-}"
              echo "MEM_BASELINE_MB=${A[BASELINE_MB]:-}"
              echo "MEM_END_FLOOR_MB=${A[END_FLOOR_MB]:-}"
              echo "MEM_FLOOR_GROWTH_MB=${A[FLOOR_GROWTH_MB]:-}"
              echo "MEM_FLOOR_GROWTH_PCT=${A[FLOOR_GROWTH_PCT]:-}"
              echo "MEM_FLOOR_SLOPE_MB_PER_MIN=${A[FLOOR_SLOPE_MB_PER_MIN]:-}"
              echo "MEM_SPARK_USAGE=${spark_usage}"
              echo "MEM_SPARK_FLOOR=${spark_floor}"
            fi
          } >> "${METRICS_FILE}"

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expb-single-metrics-${{ matrix.payload_set }}-run${{ matrix.run }}
          # Deterministic path (not steps.analyze.outputs.metrics_file): the analyze step can
          # exit before setting that output on a crash/OOM, but the mem-analyze step still
          # appends MEM_* here, so the memory verdict survives a metrics-less run.
          path: ${{ runner.temp }}/expb-metrics.env
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload memory samples artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expb-memory-${{ matrix.payload_set }}-run${{ matrix.run }}
          path: |
            ${{ runner.temp }}/mem-samples.csv
            ${{ runner.temp }}/mem-sampler.out
          retention-days: 30
          if-no-files-found: ignore

      - name: Enforce run quality gates
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.run-expb.outcome }}" != "success" ]]; then
            echo "expb execute-scenarios did not finish successfully."
            exit 1
          fi

          if [[ "${{ steps.analyze.outputs.exception_found }}" == "true" ]]; then
            echo "Exceptions were detected in run output. Failing workflow."
            if [[ -f "${{ steps.analyze.outputs.exception_lines_file }}" ]]; then
              head -n 40 "${{ steps.analyze.outputs.exception_lines_file }}"
            fi
            exit 1
          fi

          if [[ "${{ steps.analyze.outputs.invalid_block_found }}" == "true" ]]; then
            echo "Invalid block lines were detected in run output. Failing workflow."
            if [[ -f "${{ steps.analyze.outputs.invalid_block_lines_file }}" ]]; then
              head -n 40 "${{ steps.analyze.outputs.invalid_block_lines_file }}"
            fi
            exit 1
          fi

      - name: Collect and upload dotTrace snapshots
        if: always() && needs.resolve.outputs.dottrace == 'true'
        shell: bash
        env:
          ARCHIVE: ${{ runner.temp }}/dottrace-${{ matrix.payload_set }}-run${{ matrix.run }}.zip
          MARKER: ${{ runner.temp }}/.expb-run-marker
        run: |
          set -euo pipefail

          mapfile -t dottrace_dirs < <(find "${EXPB_DATA_DIR}/outputs" -type d -name 'dottrace' -newer "${MARKER}" 2>/dev/null)
          if [[ "${#dottrace_dirs[@]}" -eq 0 ]]; then
            echo "No dottrace output directories found for this run."
            exit 0
          fi

          echo "Collecting from ${#dottrace_dirs[@]} dottrace director(ies):"
          printf '  %s\n' "${dottrace_dirs[@]}"

          file_count=0
          for d in "${dottrace_dirs[@]}"; do
            file_count=$(( file_count + $(find "${d}" -type f | wc -l) ))
          done
          if [[ "${file_count}" -eq 0 ]]; then
            echo "Dottrace directories are empty, skipping zip."
            exit 0
          fi

          zip -9r "${ARCHIVE}" "${dottrace_dirs[@]}"

      - name: Upload dotTrace artifact
        if: always() && needs.resolve.outputs.dottrace == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dottrace-${{ matrix.payload_set }}-run${{ matrix.run }}
          path: ${{ runner.temp }}/dottrace-${{ matrix.payload_set }}-run${{ matrix.run }}.zip
          retention-days: 30
          if-no-files-found: ignore

      - name: Collect read-trace output
        if: always() && needs.resolve.outputs.readtrace == 'true'
        shell: bash
        env:
          ARCHIVE: ${{ runner.temp }}/readtrace-${{ matrix.payload_set }}-run${{ matrix.run }}.zip
          MARKER: ${{ runner.temp }}/.expb-run-marker
        run: |
          set -euo pipefail

          mapfile -t readtrace_dirs < <(find "${EXPB_DATA_DIR}/outputs" -type d -name 'readtrace' -newer "${MARKER}" 2>/dev/null)
          if [[ "${#readtrace_dirs[@]}" -eq 0 ]]; then
            echo "No readtrace output directories found for this run."
            exit 0
          fi

          echo "Collecting from ${#readtrace_dirs[@]} readtrace director(ies):"
          printf '  %s\n' "${readtrace_dirs[@]}"

          file_count=0
          for d in "${readtrace_dirs[@]}"; do
            file_count=$(( file_count + $(find "${d}" -type f | wc -l) ))
          done
          if [[ "${file_count}" -eq 0 ]]; then
            echo "Readtrace directories are empty, skipping zip."
            exit 0
          fi

          zip -1r "${ARCHIVE}" "${readtrace_dirs[@]}"

      - name: Upload read-trace artifact
        if: always() && needs.resolve.outputs.readtrace == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: readtrace-${{ matrix.payload_set }}-run${{ matrix.run }}
          path: ${{ runner.temp }}/readtrace-${{ matrix.payload_set }}-run${{ matrix.run }}.zip
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup rendered config
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          # Always remove the deterministic rendered config path
          rm -f "${RUNNER_TEMP}/rendered-expb-config.yaml" || true

          # Also remove the path reported by render-config (if any and different)
          rendered_config_file="${{ steps.render-config.outputs.rendered_config_file }}"
          if [[ -n "${rendered_config_file}" && "${rendered_config_file}" != "${RUNNER_TEMP}/rendered-expb-config.yaml" ]]; then
            rm -f "${rendered_config_file}" || true
          fi

  # ---------------------------------------------------------------------------
  # PR comment: aggregates metrics from all payload_set matrix entries
  # ---------------------------------------------------------------------------

  report:
    needs: [resolve, benchmark]
    if: always() && github.event_name == 'pull_request' && needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'single'
    runs-on: ubuntu-latest
    steps:
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/all-metrics
          pattern: expb-single-metrics-*

      - name: Restore master metrics (superblocks)
        id: restore-master-superblocks
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: /tmp/expb-master-metrics-cache-superblocks
          key: expb-master-metrics-v4-superblocks-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            expb-master-metrics-v4-superblocks-

      - name: Restore master metrics (realblocks)
        id: restore-master-realblocks
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: /tmp/expb-master-metrics-cache-realblocks
          key: expb-master-metrics-v4-realblocks-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            expb-master-metrics-v4-realblocks-

      - name: Build PR comparison comment
        id: pr-comment
        shell: bash
        env:
          METRICS_DIR: ${{ runner.temp }}/all-metrics
          MASTER_SUPERBLOCKS: /tmp/expb-master-metrics-cache-superblocks/master-metrics.env
          MASTER_REALBLOCKS: /tmp/expb-master-metrics-cache-realblocks/master-metrics.env
          PAYLOAD_SETS: ${{ needs.resolve.outputs.payload_sets }}
          RUN_COUNT: ${{ needs.resolve.outputs.run_count }}
          STATE_LAYOUT: ${{ needs.resolve.outputs.state_layout }}
          CLEAN_BRANCH: ${{ needs.resolve.outputs.clean_branch }}
          DELAY_SECONDS: ${{ needs.resolve.outputs.delay_seconds }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          marker="<!-- expb-reproducible-benchmark-report -->"
          comment_file="${RUNNER_TEMP}/expb-pr-comment.md"
          : > "${comment_file}"
          run_count="${RUN_COUNT:-1}"

          # Mean of each stat across run metric files; RUNS records how many runs contributed.
          aggregate_runs() {
            local out="$1"
            shift
            local files=("$@")
            local prefix key values f v mean
            : > "${out}"
            for prefix in "" "TTFB_"; do
              for key in COUNT AVG MEDIAN P90 P95 P99 MIN MAX; do
                values=""
                for f in "${files[@]}"; do
                  v=$(grep -E "^${prefix}${key}=" "${f}" | head -n 1 | cut -d'=' -f2- || true)
                  if [[ -n "${v}" ]]; then values+="${v} "; fi
                done
                if [[ -n "${values}" ]]; then
                  mean=$(echo "${values}" | tr ' ' '\n' | awk 'NF {sum += $1; n++} END {printf "%.2f", sum/n}')
                  echo "${prefix}${key}=${mean}" >> "${out}"
                fi
              done
            done
            echo "RUNS=${#files[@]}" >> "${out}"
          }

          load_metric() {
            local file="$1"
            local key="$2"
            if [[ -f "${file}" ]]; then
              grep -E "^${key}=" "${file}" | head -n 1 | cut -d'=' -f2- || true
            fi
          }

          load_metric_with_fallback() {
            local file="$1"
            local primary_key="$2"
            local fallback_key="$3"
            local value=""
            value="$(load_metric "${file}" "${primary_key}")"
            if [[ -z "${value}" ]]; then
              value="$(load_metric "${file}" "${fallback_key}")"
            fi
            printf '%s' "${value}"
          }

          percentage_delta() {
            local current="$1"
            local baseline="$2"
            if [[ -z "${current}" || -z "${baseline}" ]]; then
              echo "n/a"
              return
            fi
            awk -v c="${current}" -v b="${baseline}" 'BEGIN { if (b == 0) { print "n/a"; } else { printf "%+.2f%%", ((c - b) / b) * 100; } }'
          }

          append_line() {
            printf '%s\n' "$1" >> "${comment_file}"
          }

          append_blank() {
            printf '\n' >> "${comment_file}"
          }

          emit_metrics_section() {
            local label="$1"
            local current_metrics="$2"
            local master_metrics="$3"
            local prefix="$4"

            local metrics=("AVG" "MEDIAN" "P90" "P95" "P99" "MIN" "MAX")

            if [[ ! -f "${master_metrics}" ]] || ! grep -q "^${prefix}AVG=" "${master_metrics}" 2>/dev/null; then
              append_line "| Metric | ${PR_COL} |"
              append_line "|---|---:|"
              for m in "${metrics[@]}"; do
                local val
                val="$(load_metric "${current_metrics}" "${prefix}${m}")"
                if [[ -z "${val}" ]]; then val="$(load_metric_with_fallback "${current_metrics}" "${prefix}${m}" "${prefix}MEAN")"; fi
                append_line "| ${m} (ms) | ${val:-n/a} |"
              done
              return
            fi

            append_line "| Metric | ${PR_COL} | ${MASTER_COL} | Delta |"
            append_line "|---|---:|---:|---:|"
            for m in "${metrics[@]}"; do
              local cv mv
              cv="$(load_metric "${current_metrics}" "${prefix}${m}")"
              if [[ -z "${cv}" ]]; then cv="$(load_metric_with_fallback "${current_metrics}" "${prefix}${m}" "${prefix}MEAN")"; fi
              mv="$(load_metric "${master_metrics}" "${prefix}${m}")"
              if [[ -z "${mv}" ]]; then mv="$(load_metric_with_fallback "${master_metrics}" "${prefix}${m}" "${prefix}MEAN")"; fi
              append_line "| ${m} (ms) | ${cv:-n/a} | ${mv:-n/a} | $(percentage_delta "${cv}" "${mv}") |"
            done
          }

          build_table() {
            local payload_set="$1"
            local current_metrics="$2"
            local master_metrics="$3"
            local scenario_name="nethermind-${STATE_LAYOUT}-${payload_set}-${CLEAN_BRANCH}-delay${DELAY_SECONDS}s"

            append_blank
            append_line "#### ${payload_set}"
            append_blank

            if [[ ! -f "${current_metrics}" ]]; then
              append_line "No metrics were produced for \`${scenario_name}\`."
              return
            fi

            append_line "Scenario: \`${scenario_name}\`"

            local pr_runs master_runs
            pr_runs="$(load_metric "${current_metrics}" "RUNS")"
            master_runs="$(load_metric "${master_metrics}" "RUNS")"
            PR_COL="PR"
            if [[ -n "${pr_runs}" && "${pr_runs}" -gt 1 ]]; then
              PR_COL="PR (mean of ${pr_runs} runs)"
            fi
            MASTER_COL="Master (cached)"
            if [[ -n "${master_runs}" && "${master_runs}" -gt 1 ]]; then
              MASTER_COL="Master (cached, mean of ${master_runs} runs)"
            fi

            if [[ ! -f "${master_metrics}" ]]; then
              append_line "No cached master baseline for \`${payload_set}\`. A baseline will be created from the next successful \`master\` push run."
            fi

            # Primary: client-side (SSE) metrics or fallback
            append_blank
            if grep -q "^TTFB_AVG=" "${current_metrics}" 2>/dev/null; then
              append_line "**Client Processing (SSE)**"
            fi
            append_blank
            emit_metrics_section "Processing" "${current_metrics}" "${master_metrics}" ""

            # Per-run breakdown behind the mean-of-runs comparison table
            if [[ "${run_count}" -gt 1 ]]; then
              append_blank
              append_line "<details><summary>Per-run breakdown</summary>"
              append_blank
              append_line "| Run | AVG (ms) | Median (ms) | P90 (ms) | P95 (ms) | P99 (ms) | Min (ms) | Max (ms) |"
              append_line "|---:|---:|---:|---:|---:|---:|---:|---:|"
              local r rf
              for (( r=1; r<=run_count; r++ )); do
                rf="${METRICS_DIR}/expb-single-metrics-${payload_set}-run${r}/expb-metrics.env"
                if [[ ! -f "${rf}" ]]; then
                  append_line "| ${r} | - | - | - | - | - | - | - |"
                  continue
                fi
                append_line "| ${r} | $(load_metric "${rf}" "AVG") | $(load_metric "${rf}" "MEDIAN") | $(load_metric "${rf}" "P90") | $(load_metric "${rf}" "P95") | $(load_metric "${rf}" "P99") | $(load_metric "${rf}" "MIN") | $(load_metric "${rf}" "MAX") |"
              done
              append_blank
              append_line "</details>"
            fi

            # Secondary: K6 TTFB metrics (only shown when SSE data was primary)
            if grep -q "^TTFB_AVG=" "${current_metrics}" 2>/dev/null; then
              append_blank
              append_line "<details><summary>K6 TTFB</summary>"
              append_blank
              emit_metrics_section "TTFB" "${current_metrics}" "${master_metrics}" "TTFB_"
              append_blank
              append_line "</details>"
            fi

            # Memory (container) — leak / OOM-headroom watch (per run)
            local mem_rows="" mem_worst_sev=-1 mem_worst_verdict="" mem_have_any=0 mem_have_rows=0
            local mr mrf msev mvd mpeak
            for (( mr=1; mr<=run_count; mr++ )); do
              mrf="${METRICS_DIR}/expb-single-metrics-${payload_set}-run${mr}/expb-metrics.env"
              [[ -f "${mrf}" ]] || continue
              msev="$(load_metric "${mrf}" "MEM_SEVERITY")"
              [[ -z "${msev}" ]] && continue
              mem_have_any=1
              mvd="$(load_metric "${mrf}" "MEM_VERDICT")"
              [[ "${msev}" -gt "${mem_worst_sev}" ]] && { mem_worst_sev="${msev}"; mem_worst_verdict="${mvd}"; }
              mpeak="$(load_metric "${mrf}" "MEM_PEAK_MB")"
              [[ -z "${mpeak}" ]] && continue
              mem_have_rows=1
              mem_rows+="| ${mr} | $(load_metric "${mrf}" "MEM_PEAK_MB") | $(load_metric "${mrf}" "MEM_PEAK_PERC") | $(load_metric "${mrf}" "MEM_BASELINE_MB") | $(load_metric "${mrf}" "MEM_END_FLOOR_MB") | $(load_metric "${mrf}" "MEM_FLOOR_GROWTH_MB") | $(load_metric "${mrf}" "MEM_FLOOR_GROWTH_PCT") | $(load_metric "${mrf}" "MEM_SPARK_FLOOR") | ${mvd} |"$'\n'
            done
            if [[ "${mem_have_any}" -eq 1 ]]; then
              append_blank
              append_line "<details><summary>Memory (container) — ${mem_worst_verdict}</summary>"
              append_blank
              if [[ "${mem_have_rows}" -eq 1 ]]; then
                append_line "| Run | Peak (MiB) | Peak % | Baseline (MiB) | End floor (MiB) | Floor Δ (MiB) | Floor Δ % | Floor shape | Verdict |"
                append_line "|---:|---:|---:|---:|---:|---:|---:|:--|:--|"
                printf '%s' "${mem_rows}" >> "${comment_file}"
              else
                append_line "Verdict: ${mem_worst_verdict}"
              fi
              append_blank
              append_line "</details>"
            fi
          }

          append_line "${marker}"
          append_line "### EXPB Benchmark Comparison"
          append_blank
          append_line "Run: [View workflow run](${RUN_URL})"

          # Iterate over each payload_set from the matrix
          mapfile -t payload_sets < <(echo "${PAYLOAD_SETS}" | jq -r '.[]')

          for ps in "${payload_sets[@]}"; do
            # Aggregate PR metrics across all runs (mean per stat)
            run_files=()
            for (( r=1; r<=run_count; r++ )); do
              f="${METRICS_DIR}/expb-single-metrics-${ps}-run${r}/expb-metrics.env"
              [[ -f "${f}" ]] && run_files+=("${f}")
            done

            current_metrics="${RUNNER_TEMP}/expb-pr-metrics-${ps}.env"
            if [[ "${#run_files[@]}" -gt 0 ]]; then
              aggregate_runs "${current_metrics}" "${run_files[@]}"
            else
              # Leave the file absent so build_table reports missing metrics
              rm -f "${current_metrics}"
            fi

            # Master metrics from cache
            if [[ "${ps}" == "superblocks" ]]; then
              master_metrics="${MASTER_SUPERBLOCKS}"
            else
              master_metrics="${MASTER_REALBLOCKS}"
            fi

            build_table "${ps}" "${current_metrics}" "${master_metrics}"
          done

          {
            echo "body<<EOF"
            cat "${comment_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish PR comparison comment
        uses: actions/github-script@v8
        env:
          COMMENT_BODY: ${{ steps.pr-comment.outputs.body }}
        with:
          script: |
            const marker = '<!-- expb-reproducible-benchmark-report -->';
            const body = process.env.COMMENT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # Master baseline: aggregate all runs (mean per metric) and cache for PR comparisons.
  # Runs only when every benchmark job passed its quality gates (implicit success()).
  # ---------------------------------------------------------------------------

  save-master-baseline:
    needs: [resolve, benchmark]
    if: github.event_name == 'push' && github.ref_name == 'master' && needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'single'
    runs-on: ubuntu-latest
    steps:
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/all-metrics
          pattern: expb-single-metrics-*

      - name: Aggregate runs into master baseline
        id: aggregate
        shell: bash
        env:
          METRICS_DIR: ${{ runner.temp }}/all-metrics
          PAYLOAD_SETS: ${{ needs.resolve.outputs.payload_sets }}
          RUN_COUNT: ${{ needs.resolve.outputs.run_count }}
        run: |
          set -euo pipefail
          run_count="${RUN_COUNT:-1}"

          # Mean of each stat across run metric files; RUNS records how many runs contributed.
          aggregate_runs() {
            local out="$1"
            shift
            local files=("$@")
            local prefix key values f v mean
            : > "${out}"
            for prefix in "" "TTFB_"; do
              for key in COUNT AVG MEDIAN P90 P95 P99 MIN MAX; do
                values=""
                for f in "${files[@]}"; do
                  v=$(grep -E "^${prefix}${key}=" "${f}" | head -n 1 | cut -d'=' -f2- || true)
                  if [[ -n "${v}" ]]; then values+="${v} "; fi
                done
                if [[ -n "${values}" ]]; then
                  mean=$(echo "${values}" | tr ' ' '\n' | awk 'NF {sum += $1; n++} END {printf "%.2f", sum/n}')
                  echo "${prefix}${key}=${mean}" >> "${out}"
                fi
              done
            done
            echo "RUNS=${#files[@]}" >> "${out}"
          }

          mapfile -t payload_sets < <(echo "${PAYLOAD_SETS}" | jq -r '.[]')

          for ps in "${payload_sets[@]}"; do
            run_files=()
            for (( r=1; r<=run_count; r++ )); do
              f="${METRICS_DIR}/expb-single-metrics-${ps}-run${r}/expb-metrics.env"
              [[ -f "${f}" ]] && run_files+=("${f}")
            done

            if [[ "${#run_files[@]}" -eq 0 ]]; then
              echo "No metrics found for '${ps}'; skipping baseline update."
              echo "save_${ps}=false" >> "${GITHUB_OUTPUT}"
              continue
            fi

            mkdir -p "/tmp/expb-master-metrics-cache-${ps}"
            aggregate_runs "/tmp/expb-master-metrics-cache-${ps}/master-metrics.env" "${run_files[@]}"
            echo "Baseline for '${ps}' (mean of ${#run_files[@]} run(s)):"
            cat "/tmp/expb-master-metrics-cache-${ps}/master-metrics.env"
            echo "save_${ps}=true" >> "${GITHUB_OUTPUT}"
          done

      - name: Save master metrics cache (superblocks)
        if: steps.aggregate.outputs.save_superblocks == 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/expb-master-metrics-cache-superblocks
          key: expb-master-metrics-v4-superblocks-${{ github.run_id }}

      - name: Save master metrics cache (realblocks)
        if: steps.aggregate.outputs.save_realblocks == 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/expb-master-metrics-cache-realblocks
          key: expb-master-metrics-v4-realblocks-${{ github.run_id }}

  # ---------------------------------------------------------------------------
  # Single-image summary: aggregates all runs × payload_sets into GITHUB_STEP_SUMMARY
  # ---------------------------------------------------------------------------

  single-summary:
    needs: [resolve, benchmark]
    if: always() && needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'single'
    runs-on: ubuntu-latest
    steps:
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/all-metrics
          pattern: expb-single-metrics-*

      - name: Build summary
        shell: bash
        env:
          METRICS_DIR: ${{ runner.temp }}/all-metrics
          PAYLOAD_SETS: ${{ needs.resolve.outputs.payload_sets }}
          RUN_COUNT: ${{ needs.resolve.outputs.run_count }}
          STATE_LAYOUT: ${{ needs.resolve.outputs.state_layout }}
          CLEAN_BRANCH: ${{ needs.resolve.outputs.clean_branch }}
          DELAY_SECONDS: ${{ needs.resolve.outputs.delay_seconds }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          summary_file="${RUNNER_TEMP}/single-summary.md"
          run_count="${RUN_COUNT:-1}"

          load_metric() {
            local file="$1"
            local key="$2"
            if [[ -f "${file}" ]]; then
              grep -E "^${key}=" "${file}" | head -n 1 | cut -d'=' -f2- || true
            fi
          }

          mapfile -t payload_sets < <(echo "${PAYLOAD_SETS}" | jq -r '.[]')

          {
            echo "## EXPB Benchmark Results"
            echo ""
            echo "Branch: \`${CLEAN_BRANCH}\` | Layout: \`${STATE_LAYOUT}\` | Delay: \`${DELAY_SECONDS}s\` | Runs: \`${run_count}\`"
            echo ""
            echo "Run: [View workflow run](${RUN_URL})"
          } > "${summary_file}"

          for ps in "${payload_sets[@]}"; do
            scenario_name="nethermind-${STATE_LAYOUT}-${ps}-${CLEAN_BRANCH}-delay${DELAY_SECONDS}s"

            {
              echo ""
              echo "### ${ps}"
              echo ""
              echo "Scenario: \`${scenario_name}\`"
              echo ""
            } >> "${summary_file}"

            # Detect metrics source from first available run
            source_label=""
            for (( r=1; r<=run_count; r++ )); do
              mf="${METRICS_DIR}/expb-single-metrics-${ps}-run${r}/expb-metrics.env"
              if [[ -f "${mf}" ]]; then
                ttfb_check=$(load_metric "${mf}" "TTFB_AVG")
                if [[ -n "${ttfb_check}" ]]; then
                  source_label="SSE"
                else
                  source_label="TTFB"
                fi
                break
              fi
            done

            if [[ "${run_count}" -gt 1 ]]; then
              # Per-run table
              {
                echo "| Run | Source | AVG (ms) | Median (ms) | P90 (ms) | P95 (ms) | P99 (ms) | Min (ms) | Max (ms) |"
                echo "|---:|--------|----------|-------------|----------|----------|----------|----------|----------|"
              } >> "${summary_file}"

              avg_values=""
              median_values=""
              p90_values=""
              p95_values=""
              p99_values=""
              min_values=""
              max_values=""
              valid_runs=0

              for (( r=1; r<=run_count; r++ )); do
                mf="${METRICS_DIR}/expb-single-metrics-${ps}-run${r}/expb-metrics.env"
                if [[ ! -f "${mf}" ]]; then
                  echo "| ${r} | - | - | - | - | - | - | - | - |" >> "${summary_file}"
                  continue
                fi

                src=""
                ttfb_check=$(load_metric "${mf}" "TTFB_AVG")
                if [[ -n "${ttfb_check}" ]]; then src="SSE"; else src="TTFB"; fi

                avg=$(load_metric "${mf}" "AVG")
                median=$(load_metric "${mf}" "MEDIAN")
                p90=$(load_metric "${mf}" "P90")
                p95=$(load_metric "${mf}" "P95")
                p99=$(load_metric "${mf}" "P99")
                min_val=$(load_metric "${mf}" "MIN")
                max_val=$(load_metric "${mf}" "MAX")

                echo "| ${r} | ${src} | ${avg} | ${median} | ${p90} | ${p95} | ${p99} | ${min_val} | ${max_val} |" >> "${summary_file}"

                if [[ -n "${avg}" ]]; then
                  valid_runs=$(( valid_runs + 1 ))
                  avg_values="${avg_values} ${avg}"
                  median_values="${median_values} ${median}"
                  p90_values="${p90_values} ${p90}"
                  p95_values="${p95_values} ${p95}"
                  p99_values="${p99_values} ${p99}"
                  min_values="${min_values} ${min_val}"
                  max_values="${max_values} ${max_val}"
                fi
              done

              # Cross-run aggregate
              if [[ "${valid_runs}" -gt 1 ]]; then
                compute_mean() {
                  echo "$@" | tr ' ' '\n' | awk 'NF {sum += $1; n++} END {if (n>0) printf "%.2f", sum/n; else print "n/a"}'
                }
                compute_min_of() {
                  echo "$@" | tr ' ' '\n' | awk 'NF {if (min=="" || $1+0 < min+0) min=$1} END {print (min != "" ? min : "n/a")}'
                }
                compute_max_of() {
                  echo "$@" | tr ' ' '\n' | awk 'NF {if (max=="" || $1+0 > max+0) max=$1} END {print (max != "" ? max : "n/a")}'
                }

                {
                  echo ""
                  echo "**Aggregate across ${valid_runs} runs:**"
                  echo ""
                  echo "| Stat | AVG (ms) | Median (ms) | P90 (ms) | P95 (ms) | P99 (ms) | Min (ms) | Max (ms) |"
                  echo "|------|----------|-------------|----------|----------|----------|----------|----------|"
                  echo "| Mean | $(compute_mean ${avg_values}) | $(compute_mean ${median_values}) | $(compute_mean ${p90_values}) | $(compute_mean ${p95_values}) | $(compute_mean ${p99_values}) | $(compute_mean ${min_values}) | $(compute_mean ${max_values}) |"
                  echo "| Best | $(compute_min_of ${avg_values}) | $(compute_min_of ${median_values}) | $(compute_min_of ${p90_values}) | $(compute_min_of ${p95_values}) | $(compute_min_of ${p99_values}) | $(compute_min_of ${min_values}) | $(compute_min_of ${max_values}) |"
                  echo "| Worst | $(compute_max_of ${avg_values}) | $(compute_max_of ${median_values}) | $(compute_max_of ${p90_values}) | $(compute_max_of ${p95_values}) | $(compute_max_of ${p99_values}) | $(compute_max_of ${min_values}) | $(compute_max_of ${max_values}) |"
                } >> "${summary_file}"
              fi
            else
              # Single run — simple table
              mf="${METRICS_DIR}/expb-single-metrics-${ps}-run1/expb-metrics.env"
              if [[ ! -f "${mf}" ]]; then
                echo "No metrics were produced." >> "${summary_file}"
              else
                src=""
                ttfb_check=$(load_metric "${mf}" "TTFB_AVG")
                if [[ -n "${ttfb_check}" ]]; then src=" (SSE)"; fi

                {
                  echo "| Metric | Value${src} |"
                  echo "|---|---:|"
                  echo "| AVG (ms) | $(load_metric "${mf}" "AVG") |"
                  echo "| Median (ms) | $(load_metric "${mf}" "MEDIAN") |"
                  echo "| P90 (ms) | $(load_metric "${mf}" "P90") |"
                  echo "| P95 (ms) | $(load_metric "${mf}" "P95") |"
                  echo "| P99 (ms) | $(load_metric "${mf}" "P99") |"
                  echo "| Min (ms) | $(load_metric "${mf}" "MIN") |"
                  echo "| Max (ms) | $(load_metric "${mf}" "MAX") |"
                } >> "${summary_file}"

                if [[ -n "${ttfb_check}" ]]; then
                  {
                    echo ""
                    echo "<details><summary>K6 TTFB</summary>"
                    echo ""
                    echo "| Metric | Value |"
                    echo "|---|---:|"
                    echo "| AVG (ms) | $(load_metric "${mf}" "TTFB_AVG") |"
                    echo "| Median (ms) | $(load_metric "${mf}" "TTFB_MEDIAN") |"
                    echo "| P90 (ms) | $(load_metric "${mf}" "TTFB_P90") |"
                    echo "| P95 (ms) | $(load_metric "${mf}" "TTFB_P95") |"
                    echo "| P99 (ms) | $(load_metric "${mf}" "TTFB_P99") |"
                    echo "| Min (ms) | $(load_metric "${mf}" "TTFB_MIN") |"
                    echo "| Max (ms) | $(load_metric "${mf}" "TTFB_MAX") |"
                    echo ""
                    echo "</details>"
                  } >> "${summary_file}"
                fi
              fi
            fi

            # Memory (container) — leak / OOM-headroom watch (per run)
            mem_worst_sev=-1; mem_worst_verdict=""; mem_rows=""; mem_have_any=0; mem_have_rows=0
            for (( mr=1; mr<=run_count; mr++ )); do
              mf="${METRICS_DIR}/expb-single-metrics-${ps}-run${mr}/expb-metrics.env"
              [[ -f "${mf}" ]] || continue
              msev="$(load_metric "${mf}" "MEM_SEVERITY")"
              [[ -z "${msev}" ]] && continue
              mem_have_any=1
              mvd="$(load_metric "${mf}" "MEM_VERDICT")"
              [[ "${msev}" -gt "${mem_worst_sev}" ]] && { mem_worst_sev="${msev}"; mem_worst_verdict="${mvd}"; }
              mpeak="$(load_metric "${mf}" "MEM_PEAK_MB")"
              [[ -z "${mpeak}" ]] && continue
              mem_have_rows=1
              mem_rows+="| ${mr} | $(load_metric "${mf}" "MEM_PEAK_MB") | $(load_metric "${mf}" "MEM_PEAK_PERC") | $(load_metric "${mf}" "MEM_BASELINE_MB") | $(load_metric "${mf}" "MEM_END_FLOOR_MB") | $(load_metric "${mf}" "MEM_FLOOR_GROWTH_MB") | $(load_metric "${mf}" "MEM_FLOOR_GROWTH_PCT") | $(load_metric "${mf}" "MEM_SPARK_FLOOR") | ${mvd} |"$'\n'
            done
            if [[ "${mem_have_any}" -eq 1 ]]; then
              {
                echo ""
                echo "**Memory (container):** ${mem_worst_verdict}"
                echo ""
                if [[ "${mem_have_rows}" -eq 1 ]]; then
                  echo "| Run | Peak (MiB) | Peak % | Baseline (MiB) | End floor (MiB) | Floor Δ (MiB) | Floor Δ % | Floor shape | Verdict |"
                  echo "|---:|---:|---:|---:|---:|---:|---:|:--|:--|"
                  printf '%s' "${mem_rows}"
                fi
              } >> "${summary_file}"
            fi
          done

          echo "--- Single Benchmark Summary ---"
          cat "${summary_file}"
          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # Multi-image path: retrospective or explicit docker_images
  # ---------------------------------------------------------------------------

  resolve-images:
    needs: [resolve]
    if: needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'multi'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      ordered_tags: ${{ steps.resolve.outputs.ordered_tags }}
    steps:
      - name: Resolve Docker images
        id: resolve
        shell: bash
        env:
          DOCKER_IMAGES: ${{ needs.resolve.outputs.docker_images }}
          LAST: ${{ needs.resolve.outputs.retrospective_last }}
          STEP: ${{ needs.resolve.outputs.retrospective_step }}
          RUN_COUNT: ${{ needs.resolve.outputs.run_count }}
        run: |
          set -euo pipefail

          all_tags=()
          all_images=()
          all_dates=()

          if [[ -n "${DOCKER_IMAGES}" ]]; then
            # Explicit docker images mode: parse comma-separated full image references
            echo "Parsing explicit docker images: ${DOCKER_IMAGES}"
            IFS=',' read -ra raw_images <<< "${DOCKER_IMAGES}"
            for raw in "${raw_images[@]}"; do
              image="$(echo "${raw}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
              if [[ -n "${image}" ]]; then
                all_images+=("${image}")
                all_tags+=("${image##*:}")
                all_dates+=("n/a")
              fi
            done
            echo "Parsed ${#all_images[@]} explicit docker images."
          else
            # Retrospective mode: scan Docker Hub for master-* images
            if ! [[ "${LAST}" =~ ^[0-9]+$ ]] || [[ "${LAST}" -lt 1 ]]; then
              echo "retrospective_last must be a positive integer, got '${LAST}'."
              exit 1
            fi
            if ! [[ "${STEP}" =~ ^[0-9]+$ ]] || [[ "${STEP}" -lt 1 ]]; then
              echo "retrospective_step must be a positive integer, got '${STEP}'."
              exit 1
            fi

            echo "Fetching last ${LAST} master-* Docker images from Docker Hub (step=${STEP})..."

            page=1
            page_size=100
            remaining="${LAST}"

            while [[ "${remaining}" -gt 0 ]]; do
              fetch_size="${page_size}"
              if [[ "${remaining}" -lt "${page_size}" ]]; then
                fetch_size="${remaining}"
              fi

              url="https://hub.docker.com/v2/repositories/nethermindeth/nethermind/tags?page_size=${fetch_size}&page=${page}&name=master-"
              response=$(curl -sf "${url}" || echo '{"results":[]}')

              mapfile -t page_tags < <(echo "${response}" | jq -r '.results[] | select(.name | test("^master-[0-9a-f]{7}$")) | .name')
              mapfile -t page_dates < <(echo "${response}" | jq -r '.results[] | select(.name | test("^master-[0-9a-f]{7}$")) | .last_updated[:10]')

              if [[ "${#page_tags[@]}" -eq 0 ]]; then
                echo "No more tags found at page ${page}."
                break
              fi

              for i in "${!page_tags[@]}"; do
                all_tags+=("${page_tags[$i]}")
                all_images+=("nethermindeth/nethermind:${page_tags[$i]}")
                all_dates+=("${page_dates[$i]}")
              done

              remaining=$(( remaining - page_size ))
              page=$(( page + 1 ))
            done

            echo "Found ${#all_tags[@]} master-* images on Docker Hub."

            if [[ "${#all_tags[@]}" -eq 0 ]]; then
              echo "No master-<sha7> Docker images found."
              exit 1
            fi

            # Apply step: pick every Nth image (newest first)
            selected_tags=()
            selected_images=()
            selected_dates=()
            for (( i=0; i<${#all_tags[@]}; i+=STEP )); do
              selected_tags+=("${all_tags[$i]}")
              selected_images+=("${all_images[$i]}")
              selected_dates+=("${all_dates[$i]}")
            done

            all_tags=("${selected_tags[@]}")
            all_images=("${selected_images[@]}")
            all_dates=("${selected_dates[@]}")
            echo "Selected ${#all_tags[@]} images after applying step=${STEP}."
          fi

          if [[ "${#all_tags[@]}" -eq 0 ]]; then
            echo "No images to benchmark."
            exit 1
          fi

          # GitHub Actions matrix has a limit of 256 entries
          if [[ "${#all_tags[@]}" -gt 256 ]]; then
            echo "Warning: truncating to 256 matrix entries (GitHub Actions limit)."
            all_tags=("${all_tags[@]:0:256}")
            all_images=("${all_images[@]:0:256}")
            all_dates=("${all_dates[@]:0:256}")
          fi

          for i in "${!all_tags[@]}"; do
            echo "  ${all_tags[$i]}  ${all_dates[$i]}"
          done

          # Build matrix JSON (with run dimension) and ordered list
          run_count="${RUN_COUNT:-1}"
          matrix_json='{"include":['
          ordered_json='['
          first_matrix=true
          first_ordered=true
          for i in "${!all_tags[@]}"; do
            tag="${all_tags[$i]}"
            image="${all_images[$i]}"
            date="${all_dates[$i]}"
            if [[ "${first_ordered}" != "true" ]]; then ordered_json+=','; fi
            first_ordered=false
            ordered_json+="{\"tag\":\"${tag}\",\"date\":\"${date}\",\"image\":\"${image}\"}"
            for (( r=1; r<=run_count; r++ )); do
              if [[ "${first_matrix}" != "true" ]]; then matrix_json+=','; fi
              first_matrix=false
              matrix_json+="{\"tag\":\"${tag}\",\"date\":\"${date}\",\"image\":\"${image}\",\"run\":${r}}"
            done
          done
          matrix_json+=']}'
          ordered_json+=']'

          {
            echo "matrix=${matrix_json}"
            echo "ordered_tags=${ordered_json}"
          } >> "${GITHUB_OUTPUT}"

  benchmark-multi:
    name: benchmark (${{ matrix.tag }}${{ needs.resolve.outputs.run_count != '1' && format(', run {0}', matrix.run) || '' }})
    needs: [resolve, resolve-images]
    if: needs.resolve.outputs.should_run == 'true' && needs.resolve.outputs.mode == 'multi'
    strategy:
      matrix: ${{ fromJson(needs.resolve-images.outputs.matrix) }}
      max-parallel: 1
      fail-fast: false
    runs-on: [self-hosted, reproducible-benchmarks]
    timeout-minutes: 720
    env:
      EXPB_DATA_DIR: ${{ needs.resolve.outputs.expb_data_dir }}
      CONFIG_FILE: ${{ needs.resolve.outputs.config_file }}
      NETHERMIND_IMAGE: ${{ matrix.image }}
      CLEANUP_GRACE_SECONDS: ${{ needs.resolve.outputs.cleanup_grace_seconds }}
    steps:
      - name: Print resolved inputs
        run: |
          echo "Multi-image benchmark run"
          echo "Docker image: ${NETHERMIND_IMAGE}"
          echo "Image tag: ${{ matrix.tag }}"
          echo "Run: ${{ matrix.run }} of ${{ needs.resolve.outputs.run_count }}"
          echo "Config file: ${EXPB_DATA_DIR}/${CONFIG_FILE}"
          echo "Delay placeholder value: ${{ needs.resolve.outputs.delay_seconds }}"
          echo "Cleanup grace period (s): ${CLEANUP_GRACE_SECONDS}"

      - name: Ensure EXPB config file exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${EXPB_DATA_DIR}/${CONFIG_FILE}" ]]; then
            echo "Config file '${EXPB_DATA_DIR}/${CONFIG_FILE}' does not exist."
            echo "Available github-action config files in '${EXPB_DATA_DIR}':"
            ls -1 "${EXPB_DATA_DIR}"/github-action*mainnet*.yaml || true
            exit 1
          fi

      - name: Render benchmark config
        id: render-config
        shell: bash
        env:
          SOURCE_CONFIG_FILE: ${{ env.EXPB_DATA_DIR }}/${{ env.CONFIG_FILE }}
          RENDERED_CONFIG_FILE: ${{ runner.temp }}/rendered-expb-config-${{ matrix.tag }}-run${{ matrix.run }}.yaml
          DOCKER_TAG: ${{ matrix.tag }}
          DELAY_SECONDS: ${{ needs.resolve.outputs.delay_seconds }}
          AMOUNT: ${{ needs.resolve.outputs.amount }}
          SCENARIO_NAME: nethermind-multi-${{ matrix.tag }}-run${{ matrix.run }}
          ADDITIONAL_EXTRA_FLAGS: ${{ needs.resolve.outputs.additional_extra_flags }}
        run: |
          set -euo pipefail
          flags_file="$(mktemp)"
          printf '%s' "${ADDITIONAL_EXTRA_FLAGS}" \
            | tr '\r' '\n' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | sed '/^$/d' \
            | awk '
                function emit_pending() {
                  if (pending != "") {
                    print pending
                    pending = ""
                  }
                }
                {
                  line = $0
                  if (match(line, /^--[^[:space:]=]+[[:space:]]+/)) {
                    key = substr(line, 1, RLENGTH)
                    sub(/[[:space:]]+$/, "", key)
                    value = substr(line, RLENGTH + 1)
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                    emit_pending()
                    print key "=" value
                    next
                  }
                  if (line ~ /^--/) {
                    emit_pending()
                    pending = line
                    next
                  }
                  if (pending != "") {
                    print pending "=" line
                    pending = ""
                  } else {
                    print line
                  }
                }
                END {
                  emit_pending()
                }
              ' \
            > "${flags_file}"

          YQ="${RUNNER_TEMP}/yq"
          if [[ ! -x "${YQ}" ]]; then
            curl -sSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o "${YQ}"
            chmod +x "${YQ}"
          fi

          # Replace placeholders and rename scenario key with sed (preserves comments)
          sed \
            -e "s#<<DOCKER_TAG>>#${DOCKER_TAG}#g" \
            -e "s#<<DELAY>>#${DELAY_SECONDS}#g" \
            ${AMOUNT:+-e "s#<<AMOUNT>>#${AMOUNT}#g"} \
            -e "s#^\([[:space:]]*\)nethermind:#\1${SCENARIO_NAME}:#g" \
            "${SOURCE_CONFIG_FILE}" > "${RENDERED_CONFIG_FILE}"

          # Append extra flags using yq (proper YAML handling)
          scenario_key="${SCENARIO_NAME}"
          while IFS= read -r flag; do
            [[ -z "${flag}" ]] && continue
            "${YQ}" -i ".scenarios.\"${scenario_key}\".extra_flags += [\"${flag}\"]" "${RENDERED_CONFIG_FILE}"
          done < "${flags_file}"

          echo "rendered_config_file=${RENDERED_CONFIG_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Install or upgrade expb
        shell: bash
        env:
          EXPB_REPO: ${{ needs.resolve.outputs.expb_repo }}
          EXPB_BRANCH: ${{ needs.resolve.outputs.expb_branch }}
        run: |
          set -euo pipefail
          if ! command -v uv >/dev/null 2>&1; then
            echo "uv is required on runner but was not found in PATH."
            exit 1
          fi
          if [[ "${EXPB_REPO}" == "NethermindEth/execution-payloads-benchmarks" && "${EXPB_BRANCH}" == "main" ]]; then
            expb_source="git+https://github.com/NethermindEth/execution-payloads-benchmarks"
          elif [[ -n "${EXPB_BRANCH}" ]]; then
            expb_source="git+https://github.com/${EXPB_REPO}@${EXPB_BRANCH}"
          else
            expb_source="git+https://github.com/${EXPB_REPO}"
          fi
          echo "Installing expb from ${expb_source}"
          uv tool install --force --from "${expb_source}" expb
          echo "$(uv tool dir --bin)" >> "${GITHUB_PATH}"

      - name: Start memory sampler
        id: mem-sampler
        continue-on-error: true
        shell: bash
        env:
          MEM_SAMPLE_INTERVAL: "5"
          MEM_SAMPLER: ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.sh
          MEM_CSV: ${{ runner.temp }}/mem-samples-${{ matrix.tag }}-run${{ matrix.run }}.csv
          MEM_STOPFILE: ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.stop
          MEM_PIDFILE: ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.pid
          MEM_OUT: ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.out
        run: |
          set -uo pipefail
          sampler="${MEM_SAMPLER}"
          csv="${MEM_CSV}"
          stopfile="${MEM_STOPFILE}"
          pidfile="${MEM_PIDFILE}"

          # Clear any stale sampler/state from a previous matrix cell on this runner.
          pkill -f "${sampler}" 2>/dev/null || true
          rm -f "${csv}" "${stopfile}" "${pidfile}" || true

          cat > "${sampler}" <<'MEM_SAMPLER_EOF'
          #!/usr/bin/env bash
          # Append "epoch,used_bytes,mem_perc,source" for the Nethermind container.
          # Preferred signal is cgroup 'anon' (v2) / 'total_rss' (v1) read from the host
          # cgroup files — anonymous memory only (managed heap + native allocs + RocksDB
          # block cache), excluding reclaimable page cache; that is the true leak / OOM
          # signal. 'docker stats' MemUsage still counts active file cache, so it is only
          # a fallback when the cgroup files are unreadable.
          set -uo pipefail
          CSV="$1"
          STOPFILE="${2:-}"
          INTERVAL="${MEM_SAMPLE_INTERVAL:-5}"
          IMAGE="${NETHERMIND_IMAGE:-}"
          MAX_SECONDS="${MEM_SAMPLER_MAX_SECONDS:-21600}"
          ABSENT_LIMIT="${MEM_SAMPLER_ABSENT_LIMIT:-3}"

          host_mem_total() { awk '/^MemTotal:/ { print $2 * 1024; exit }' /proc/meminfo 2>/dev/null; }

          discover() {
            local id=""
            if [[ -n "${IMAGE}" ]]; then
              id="$(docker ps --filter "ancestor=${IMAGE}" --format '{{.ID}}' 2>/dev/null | head -n1)"
            fi
            if [[ -z "${id}" ]]; then
              id="$(docker ps --format '{{.ID}}|{{.Image}}' 2>/dev/null \
                | awk -F'|' 'tolower($2) ~ /nethermind/ { print $1; exit }')"
            fi
            printf '%s' "${id}"
          }

          read_stat() { awk -v k="$2" '$1 == k { print $2; exit }' "$1" 2>/dev/null; }

          # Echo "statpath<TAB>statkey<TAB>limitbytes"; statkey 'stats' => docker-stats fallback.
          resolve_source() {
            local cid="$1" fid base lim ht d
            fid="$(docker inspect -f '{{.Id}}' "${cid}" 2>/dev/null)"
            ht="$(host_mem_total)"
            if [[ -n "${fid}" ]]; then
              for base in "/sys/fs/cgroup/system.slice/docker-${fid}.scope" "/sys/fs/cgroup/docker/${fid}"; do
                if [[ -r "${base}/memory.stat" ]] && [[ -n "$(read_stat "${base}/memory.stat" anon)" ]]; then
                  lim="$(cat "${base}/memory.max" 2>/dev/null)"
                  [[ "${lim}" =~ ^[0-9]+$ ]] || lim="${ht}"
                  printf '%s\tanon\t%s' "${base}/memory.stat" "${lim:-0}"
                  return 0
                fi
              done
              d="/sys/fs/cgroup/memory/docker/${fid}"
              if [[ -r "${d}/memory.stat" ]] && [[ -n "$(read_stat "${d}/memory.stat" total_rss)" ]]; then
                lim="$(cat "${d}/memory.limit_in_bytes" 2>/dev/null)"
                if ! [[ "${lim}" =~ ^[0-9]+$ ]] || { [[ -n "${ht}" ]] && [[ "${lim}" -gt "${ht}" ]]; }; then lim="${ht}"; fi
                printf '%s\ttotal_rss\t%s' "${d}/memory.stat" "${lim:-0}"
                return 0
              fi
            fi
            printf '\tstats\t0'
          }

          to_bytes() {
            awk -v s="$1" 'BEGIN {
              gsub(/^[ \t]+|[ \t]+$/, "", s)
              if (match(s, /^[0-9.]+/)) { num = substr(s, 1, RLENGTH) + 0; unit = substr(s, RLENGTH + 1) }
              else { print 0; exit }
              gsub(/[ \t]/, "", unit); u = tolower(unit); m = 1
              if (u == "b" || u == "") m = 1
              else if (u == "kib") m = 1024
              else if (u == "mib") m = 1024 * 1024
              else if (u == "gib") m = 1024 * 1024 * 1024
              else if (u == "tib") m = 1024 * 1024 * 1024 * 1024
              else if (u == "kb") m = 1000
              else if (u == "mb") m = 1000000
              else if (u == "gb") m = 1000000000
              else if (u == "tb") m = 1000000000000
              printf "%.0f", num * m
            }'
          }

          start="$(date +%s)"
          seen=0
          absent=0
          last_cid=""
          stat_path=""
          stat_key="stats"
          limit=0
          echo "# epoch,bytes,mem_perc,source" >> "${CSV}"
          while :; do
            [[ -n "${STOPFILE}" && -f "${STOPFILE}" ]] && break
            [[ $(( $(date +%s) - start )) -ge "${MAX_SECONDS}" ]] && break
            cid="$(discover)"
            if [[ -n "${cid}" ]]; then
              if [[ "${cid}" != "${last_cid}" ]]; then
                last_cid="${cid}"
                IFS=$'\t' read -r stat_path stat_key limit < <(resolve_source "${cid}")
              fi
              seen=1; absent=0
              bytes=""; perc=""; src="${stat_key}"
              if [[ "${stat_key}" == "anon" || "${stat_key}" == "total_rss" ]] && [[ -n "${stat_path}" ]]; then
                bytes="$(read_stat "${stat_path}" "${stat_key}")"
                if [[ "${bytes}" =~ ^[0-9]+$ && "${limit}" =~ ^[0-9]+$ && "${limit}" -gt 0 ]]; then
                  perc="$(awk -v b="${bytes}" -v l="${limit}" 'BEGIN { printf "%.1f", b / l * 100 }')"
                fi
              fi
              if [[ -z "${bytes}" || ! "${bytes}" =~ ^[0-9]+$ ]]; then
                src="stats"
                line="$(docker stats --no-stream --format '{{.MemUsage}};{{.MemPerc}}' "${cid}" 2>/dev/null | head -n1)"
                if [[ -n "${line}" ]]; then
                  usage="${line%%;*}"; perc="${line##*;}"
                  usage="${usage%%/*}"; perc="${perc%\%}"
                  bytes="$(to_bytes "${usage}")"
                fi
              fi
              if [[ -n "${bytes}" && "${bytes}" =~ ^[0-9]+$ && "${bytes}" != "0" ]]; then
                printf '%s,%s,%s,%s\n' "$(date +%s)" "${bytes}" "${perc:-}" "${src}" >> "${CSV}"
              fi
            elif [[ "${seen}" -eq 1 ]]; then
              absent=$(( absent + 1 ))
              [[ "${absent}" -ge "${ABSENT_LIMIT}" ]] && break
            fi
            sleep "${INTERVAL}"
          done
          MEM_SAMPLER_EOF
          chmod +x "${sampler}" || true

          nohup bash "${sampler}" "${csv}" "${stopfile}" > "${MEM_OUT}" 2>&1 &
          echo $! > "${pidfile}"
          disown || true
          echo "Memory sampler started (pid $(cat "${pidfile}" 2>/dev/null || echo '?'), image '${NETHERMIND_IMAGE:-?}', every ${MEM_SAMPLE_INTERVAL}s)."

      - name: Run expb scenarios
        id: run-expb
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.EXPB_DATA_DIR }}
        env:
          RAW_RUN_LOG: ${{ runner.temp }}/expb-run-${{ matrix.tag }}-run${{ matrix.run }}.log
          DOTTRACE: ${{ needs.resolve.outputs.dottrace }}
          EXPB_ENV_PASSTHROUGH: ${{ needs.resolve.outputs.expb_env }}
        run: |
          set -euo pipefail
          expb_pid=""
          : > "${RAW_RUN_LOG}"

          # Export caller-provided expb env tuning (comma- or newline-separated KEY=VALUE;
          # values containing commas must use the newline-separated form).
          if [[ -n "${EXPB_ENV_PASSTHROUGH:-}" ]]; then
            while IFS= read -r _kv; do
              _kv="$(printf '%s' "${_kv}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
              [[ -z "${_kv}" ]] && continue
              if [[ "${_kv}" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
                export "${_kv}"
                echo "Exported expb env: ${_kv%%=*}=<value>"
              else
                echo "::warning::Skipping invalid expb_env entry (expected KEY=VALUE): ${_kv}"
              fi
            done < <(printf '%s\n' "${EXPB_ENV_PASSTHROUGH}" | tr ',' '\n')
          fi

          on_terminate() {
            echo "Termination signal received. Waiting up to ${CLEANUP_GRACE_SECONDS}s for expb cleanup."
            if [[ -n "${expb_pid}" ]] && kill -0 "${expb_pid}" 2>/dev/null; then
              kill -TERM "${expb_pid}" 2>/dev/null || true
              remaining="${CLEANUP_GRACE_SECONDS}"
              while [[ "${remaining}" -gt 0 ]]; do
                if ! kill -0 "${expb_pid}" 2>/dev/null; then
                  echo "expb exited during cleanup grace period."
                  break
                fi
                sleep 1
                remaining=$((remaining - 1))
              done
              if kill -0 "${expb_pid}" 2>/dev/null; then
                echo "Cleanup grace period elapsed. Forcing expb shutdown."
                kill -KILL "${expb_pid}" 2>/dev/null || true
              fi
            fi
            exit 143
          }

          trap on_terminate TERM INT

          dottrace_flag=""
          if [[ "${DOTTRACE}" == "true" ]]; then
            dottrace_flag="--dottrace"
          fi

          # Marker for dottrace artifact collection — only files newer than this
          touch "${RUNNER_TEMP}/.expb-run-marker"

          fifo="${RUNNER_TEMP}/expb-pipe"
          mkfifo "${fifo}"
          tee "${RAW_RUN_LOG}" < "${fifo}" &
          tee_pid=$!

          expb execute-scenarios \
            --config-file "${{ steps.render-config.outputs.rendered_config_file }}" \
            --per-payload-metrics \
            --per-payload-metrics-logs \
            --print-logs \
            ${dottrace_flag} \
            > "${fifo}" 2>&1 &
          expb_pid=$!

          set +e
          wait "${expb_pid}"
          expb_exit_code=$?
          set -e

          rm -f "${fifo}"
          wait "${tee_pid}"

          exit "${expb_exit_code}"

      - name: Analyze benchmark output
        id: analyze
        if: always()
        shell: bash
        env:
          RAW_RUN_LOG: ${{ runner.temp }}/expb-run-${{ matrix.tag }}-run${{ matrix.run }}.log
          TAG: ${{ matrix.tag }}
          RUN: ${{ matrix.run }}
        run: |
          set -euo pipefail

          key="${TAG}-run${RUN}"
          clean_log="${RUNNER_TEMP}/expb-run-${key}.clean.log"
          exception_lines="${RUNNER_TEMP}/expb-exceptions-${key}.log"
          invalid_block_lines="${RUNNER_TEMP}/expb-invalid-blocks-${key}.log"
          processing_ms="${RUNNER_TEMP}/expb-processing-ms-${key}.txt"
          processing_ms_sorted="${RUNNER_TEMP}/expb-processing-ms-sorted-${key}.txt"
          metrics_dir="${RUNNER_TEMP}/expb-metrics-${key}"

          mkdir -p "${metrics_dir}"

          if [[ ! -f "${RAW_RUN_LOG}" ]]; then
            echo "Run output log '${RAW_RUN_LOG}' was not produced."
            {
              echo "TAG=${TAG}"
              echo "RUN=${RUN}"
              echo "ERROR=no_log"
            } > "${metrics_dir}/metrics.env"
            exit 1
          fi

          sed -E 's/\x1B\[[0-9;?]*[ -/]*[@-~]//g' "${RAW_RUN_LOG}" > "${clean_log}"

          grep -in "Exception" "${clean_log}" > "${exception_lines}" || true
          exception_found="false"
          if [[ -s "${exception_lines}" ]]; then
            exception_found="true"
            echo "Found Exception lines in benchmark output:"
            head -n 40 "${exception_lines}"
          fi

          grep -Ein "invalid[[:space:]_-]*block" "${clean_log}" > "${invalid_block_lines}" || true
          invalid_block_found="false"
          if [[ -s "${invalid_block_lines}" ]]; then
            invalid_block_found="true"
            echo "Found invalid block lines in benchmark output:"
            head -n 40 "${invalid_block_lines}"
          fi

          # Flag additional severe runtime signals (warn, don't hard-fail)
          for pattern in "Unhandled" "Fatal" "^.*ERROR.*$"; do
            severe_lines=$(grep -in "${pattern}" "${clean_log}" | head -n 20) || true
            if [[ -n "${severe_lines}" ]]; then
              echo "::warning::Severe log pattern '${pattern}' detected in benchmark output"
              echo "${severe_lines}"
            fi
          done

          # Extract client-side processing times from SSE data feed (primary)
          client_ms="${RUNNER_TEMP}/expb-client-ms-${key}.txt"
          grep -oP '\[payload-server\] client_metric block_number=\d+ processing_ms=\K[0-9]+(\.[0-9]+)?' "${clean_log}" > "${client_ms}" || true

          # Fall back to K6 TTFB table if no client metrics available
          if [[ -s "${client_ms}" ]]; then
            echo "Using SSE client_metric data ($(wc -l < "${client_ms}") samples)."
            cp "${client_ms}" "${processing_ms}"
          else
            echo "No SSE client_metric data found, falling back to K6 TTFB table."
            awk -F'|' '
              /^[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+(\.[0-9]+)?[[:space:]]*\|[[:space:]]*$/ {
                value = $4
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                if (value ~ /^[0-9]+(\.[0-9]+)?$/) {
                  print value
                }
              }
            ' "${clean_log}" > "${processing_ms}"
          fi

          count=$(wc -l < "${processing_ms}")
          count="${count//[[:space:]]/}"

          if [[ "${count}" -eq 0 ]]; then
            echo "Could not extract any processing_ms data from benchmark output."
            {
              echo "TAG=${TAG}"
              echo "RUN=${RUN}"
              echo "EXCEPTION_FOUND=${exception_found}"
              echo "INVALID_BLOCK_FOUND=${invalid_block_found}"
              echo "ERROR=no_metrics"
            } > "${metrics_dir}/metrics.env"
            exit 1
          fi

          compute_percentiles() {
            local input_file="$1"
            local prefix="$2"
            local sorted_file="${input_file}.sorted"
            local n

            sort -n "${input_file}" > "${sorted_file}"
            n=$(wc -l < "${sorted_file}")
            n="${n//[[:space:]]/}"

            local min max avg median p90 p95 p99
            min=$(head -n 1 "${sorted_file}")
            max=$(tail -n 1 "${sorted_file}")
            avg=$(awk '{sum += $1} END {printf "%.2f", sum / NR}' "${sorted_file}")

            if (( n % 2 == 1 )); then
              local mi=$(( (n + 1) / 2 ))
              median=$(sed -n "${mi}p" "${sorted_file}")
            else
              local lo=$(( n / 2 ))
              local hi=$(( lo + 1 ))
              local lv hv
              lv=$(sed -n "${lo}p" "${sorted_file}")
              hv=$(sed -n "${hi}p" "${sorted_file}")
              median=$(awk -v a="${lv}" -v b="${hv}" 'BEGIN {printf "%.2f", (a + b) / 2}')
            fi

            local p90i=$(( (90 * n + 99) / 100 ))
            local p95i=$(( (95 * n + 99) / 100 ))
            local p99i=$(( (99 * n + 99) / 100 ))
            p90=$(sed -n "${p90i}p" "${sorted_file}")
            p95=$(sed -n "${p95i}p" "${sorted_file}")
            p99=$(sed -n "${p99i}p" "${sorted_file}")

            echo "${prefix}COUNT=${n}"
            echo "${prefix}AVG=${avg}"
            echo "${prefix}MEDIAN=${median}"
            echo "${prefix}P90=${p90}"
            echo "${prefix}P95=${p95}"
            echo "${prefix}P99=${p99}"
            echo "${prefix}MIN=${min}"
            echo "${prefix}MAX=${max}"
          }

          {
            echo "TAG=${TAG}"
            echo "RUN=${RUN}"
            echo "EXCEPTION_FOUND=${exception_found}"
            echo "INVALID_BLOCK_FOUND=${invalid_block_found}"
          } > "${metrics_dir}/metrics.env"
          compute_percentiles "${processing_ms}" "" >> "${metrics_dir}/metrics.env"

          # Also compute K6 TTFB metrics when client metrics were primary
          if [[ -s "${client_ms}" ]]; then
            ttfb_ms="${RUNNER_TEMP}/expb-ttfb-ms-${key}.txt"
            awk -F'|' '
              /^[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|[[:space:]]*[0-9]+(\.[0-9]+)?[[:space:]]*\|[[:space:]]*$/ {
                value = $4
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                if (value ~ /^[0-9]+(\.[0-9]+)?$/) {
                  print value
                }
              }
            ' "${clean_log}" > "${ttfb_ms}"
            if [[ -s "${ttfb_ms}" ]]; then
              compute_percentiles "${ttfb_ms}" "TTFB_" >> "${metrics_dir}/metrics.env"
            fi
          fi

          echo ""
          echo "========================================="
          echo "  Metrics for ${TAG} run ${RUN}"
          if [[ -s "${client_ms}" ]]; then
            echo "  Source: Client Processing (SSE)"
          else
            echo "  Source: K6 TTFB"
          fi
          echo "========================================="
          grep -v "^TAG=\|^RUN=\|^EXCEPTION_\|^INVALID_\|^TTFB_" "${metrics_dir}/metrics.env" | while IFS='=' read -r key val; do
            printf "  %-10s %s ms\n" "${key}" "${val}"
          done
          if grep -q "^TTFB_AVG=" "${metrics_dir}/metrics.env" 2>/dev/null; then
            echo "-----------------------------------------"
            echo "  K6 TTFB (secondary)"
            echo "-----------------------------------------"
            grep "^TTFB_" "${metrics_dir}/metrics.env" | while IFS='=' read -r key val; do
              printf "  %-10s %s ms\n" "${key#TTFB_}" "${val}"
            done
          fi
          echo "========================================="
          echo ""

      - name: Stop sampler and analyze memory
        id: mem-analyze
        if: always()
        continue-on-error: true
        shell: bash
        env:
          MEM_NEAR_LIMIT_PERC: "90"
          MEM_SLOPE_MB_PER_MIN_MIN: "15"
          MEM_GROWTH_MB_MIN: "256"
          MEM_MIN_SAMPLES: "5"
          MEM_WARMUP_FRAC: "0.3"
          MEM_CSV: ${{ runner.temp }}/mem-samples-${{ matrix.tag }}-run${{ matrix.run }}.csv
          MEM_STOPFILE: ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.stop
          MEM_PIDFILE: ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.pid
          MEM_AWKFILE: ${{ runner.temp }}/mem-analyze-${{ matrix.tag }}-run${{ matrix.run }}.awk
          METRICS_FILE: ${{ runner.temp }}/expb-metrics-${{ matrix.tag }}-run${{ matrix.run }}/metrics.env
          MEM_TAG: ${{ matrix.tag }}
          MEM_RUN: ${{ matrix.run }}
        run: |
          set -uo pipefail
          csv="${MEM_CSV}"
          stopfile="${MEM_STOPFILE}"
          pidfile="${MEM_PIDFILE}"
          awkfile="${MEM_AWKFILE}"
          mkdir -p "$(dirname "${METRICS_FILE}")" || true

          # Signal the sampler to stop, then give it a moment to flush and exit.
          touch "${stopfile}" || true
          if [[ -f "${pidfile}" ]]; then
            spid="$(cat "${pidfile}" 2>/dev/null || true)"
            for _ in $(seq 1 15); do
              if [[ -z "${spid}" ]] || ! kill -0 "${spid}" 2>/dev/null; then break; fi
              sleep 1
            done
            if [[ -n "${spid}" ]] && kill -0 "${spid}" 2>/dev/null; then
              kill -TERM "${spid}" 2>/dev/null || true
            fi
          fi

          if [[ ! -f "${csv}" ]] || ! grep -qv '^#' "${csv}" 2>/dev/null; then
            echo "No memory samples were collected."
            {
              echo "MEM_SAMPLES=0"
              echo "MEM_SEVERITY=0"
              echo "MEM_VERDICT=ℹ️ no memory samples collected"
            } >> "${METRICS_FILE}"
            exit 0
          fi

          cat > "${awkfile}" <<'MEM_AWK_EOF'
          # Analyze a memory-sample CSV: epoch,bytes,mem_perc,source (# lines ignored).
          # Emits KEY=VALUE lines consumed by the workflow. All sizes in MiB.
          #
          # Leak detection ignores the cold-start ramp: a freshly started node grows
          # from cold to a warm plateau (a one-time step, NOT a leak). The verdict is
          # computed on the POST-WARMUP window using the least-squares slope of the
          # per-time-bucket minima (the "floor"). Flat floor => plateau (healthy);
          # sustained positive floor slope => a footprint that never clears (leak).
          BEGIN { FS = "," }
          /^#/ { next }
          NF >= 2 && $2 + 0 > 0 {
            n++
            t[n] = $1 + 0
            b[n] = ($2 + 0) / 1048576.0
            p[n] = $3 + 0
            s[n] = $4
          }
          END {
            if (n == 0) { print "SAMPLES=0"; exit }
            t0 = t[1]; tN = t[n]; dur = tN - t0
            peak = b[1]; minv = b[1]; sum = 0; peakperc = p[1]; src = ""
            for (i = 1; i <= n; i++) {
              if (b[i] > peak) peak = b[i]
              if (b[i] < minv) minv = b[i]
              sum += b[i]
              if (p[i] > peakperc) peakperc = p[i]
              if (s[i] != "") src = s[i]
            }
            avg = sum / n
            frac = WARMUP_FRAC + 0
            if (frac <= 0 || frac >= 1) frac = 0.3
            cutoff = t0 + frac * dur
            m = 0
            for (i = 1; i <= n; i++) if (t[i] >= cutoff) { m++; mt[m] = t[i]; mb[m] = b[i] }
            if (m < 4) { m = 0; for (i = 1; i <= n; i++) { m++; mt[m] = t[i]; mb[m] = b[i] }; cutoff = t0 }
            warmup_s = cutoff - t0
            mt0 = mt[1]; mtN = mt[m]; mdur = mtN - mt0
            K = 10; if (m < K) K = m
            for (j = 1; j <= K; j++) { bmin[j] = -1; bsum[j] = 0; bcnt[j] = 0; btsum[j] = 0 }
            for (i = 1; i <= m; i++) {
              j = (mdur > 0) ? int((mt[i] - mt0) / mdur * K) + 1 : 1
              if (j > K) j = K; if (j < 1) j = 1
              if (bmin[j] < 0 || mb[i] < bmin[j]) bmin[j] = mb[i]
              bsum[j] += mb[i]; bcnt[j]++; btsum[j] += mt[i]
            }
            kk = 0
            for (j = 1; j <= K; j++) if (bcnt[j] > 0) { kk++; fmin[kk] = bmin[j]; ftime[kk] = btsum[j] / bcnt[j] }
            baseline = fmin[1]; end_floor = fmin[kk]
            growth = end_floor - baseline
            growth_pct = (baseline > 0) ? (growth / baseline) * 100.0 : 0
            Sx = 0; Sy = 0; Sxy = 0; Sxx = 0
            for (j = 1; j <= kk; j++) { x = (ftime[j] - mt0) / 60.0; y = fmin[j]; Sx += x; Sy += y; Sxy += x * y; Sxx += x * x }
            denom = kk * Sxx - Sx * Sx
            slope = (denom != 0) ? (kk * Sxy - Sx * Sy) / denom : 0
            UK = 10; if (n < UK) UK = n
            for (j = 1; j <= UK; j++) { ubsum[j] = 0; ubcnt[j] = 0 }
            for (i = 1; i <= n; i++) {
              uj = (dur > 0) ? int((t[i] - t0) / dur * UK) + 1 : 1
              if (uj > UK) uj = UK; if (uj < 1) uj = 1
              ubsum[uj] += b[i]; ubcnt[uj]++
            }
            uu = 0
            for (j = 1; j <= UK; j++) if (ubcnt[j] > 0) { uu++; umean[uu] = ubsum[j] / ubcnt[j] }
            printf "SAMPLES=%d\n", n
            printf "SOURCE=%s\n", (src == "" ? "unknown" : src)
            printf "DURATION_S=%d\n", dur
            printf "WARMUP_S=%d\n", warmup_s
            printf "BUCKETS=%d\n", kk
            printf "PEAK_MB=%.1f\n", peak
            printf "PEAK_PERC=%.1f\n", peakperc
            printf "MIN_MB=%.1f\n", minv
            printf "AVG_MB=%.1f\n", avg
            printf "BASELINE_MB=%.1f\n", baseline
            printf "END_FLOOR_MB=%.1f\n", end_floor
            printf "FLOOR_GROWTH_MB=%.1f\n", growth
            printf "FLOOR_GROWTH_PCT=%.1f\n", growth_pct
            printf "FLOOR_SLOPE_MB_PER_MIN=%.2f\n", slope
            printf "SPARK_USAGE_IDX=%s\n", sparkline(umean, uu)
            printf "SPARK_FLOOR_IDX=%s\n", sparkline(fmin, kk)
          }
          function sparkline(arr, cnt,   j, lo, hi, out, lvl) {
            if (cnt <= 0) return ""
            lo = arr[1]; hi = arr[1]
            for (j = 1; j <= cnt; j++) { if (arr[j] < lo) lo = arr[j]; if (arr[j] > hi) hi = arr[j] }
            out = ""
            for (j = 1; j <= cnt; j++) {
              lvl = (hi > lo) ? int((arr[j] - lo) / (hi - lo) * 7 + 0.5) : 0
              out = out (j > 1 ? " " : "") lvl
            }
            return out
          }
          MEM_AWK_EOF

          NEAR_LIMIT_PERC="${MEM_NEAR_LIMIT_PERC:-90}"
          SLOPE_MIN="${MEM_SLOPE_MB_PER_MIN_MIN:-15}"
          GROWTH_MB_MIN="${MEM_GROWTH_MB_MIN:-256}"
          MIN_SAMPLES="${MEM_MIN_SAMPLES:-5}"
          WARMUP_FRAC="${MEM_WARMUP_FRAC:-0.3}"
          MEM_LEVELS=(▁ ▂ ▃ ▄ ▅ ▆ ▇ █)

          declare -A A=()
          while IFS='=' read -r k v; do
            [[ -z "${k}" ]] && continue
            A["${k}"]="${v}"
          done < <(awk -v WARMUP_FRAC="${WARMUP_FRAC}" -f "${awkfile}" "${csv}")

          samples="${A[SAMPLES]:-0}"
          source="${A[SOURCE]:-unknown}"
          hsize() { awk -v m="${1:-0}" 'BEGIN { if (m + 0 >= 1024) printf "%.2f GiB", m / 1024.0; else printf "%.0f MiB", m }'; }
          spark() { local out="" i; for i in $1; do out+="${MEM_LEVELS[$i]}"; done; printf '%s' "${out}"; }
          ge() { awk -v a="${1:-0}" -v b="${2:-0}" 'BEGIN { print (a + 0 >= b + 0) ? 1 : 0 }'; }

          src_note=""
          [[ "${source}" == "stats" ]] && src_note=" (docker stats — includes active page cache)"

          if [[ "${samples}" -lt "${MIN_SAMPLES}" ]]; then
            verdict="ℹ️ insufficient samples (${samples})"
            severity=0
            spark_usage=""; spark_floor=""
          else
            near="$(ge "${A[PEAK_PERC]:-0}" "${NEAR_LIMIT_PERC}")"
            slope_hit="$(ge "${A[FLOOR_SLOPE_MB_PER_MIN]:-0}" "${SLOPE_MIN}")"
            growth_hit="$(ge "${A[FLOOR_GROWTH_MB]:-0}" "${GROWTH_MB_MIN}")"
            grow=0
            [[ "${slope_hit}" -eq 1 && "${growth_hit}" -eq 1 ]] && grow=1
            severity=0
            [[ "${grow}" -eq 1 ]] && severity=$(( severity + 1 ))
            [[ "${near}" -eq 1 ]] && severity=$(( severity + 2 ))
            case "${severity}" in
              0) verdict="✅ stable (floor clears)" ;;
              1) verdict="⚠️ rising floor (possible leak)" ;;
              2) verdict="⚠️ near memory limit" ;;
              3) verdict="🔴 rising floor near limit" ;;
            esac
            spark_usage="$(spark "${A[SPARK_USAGE_IDX]:-}")"
            spark_floor="$(spark "${A[SPARK_FLOOR_IDX]:-}")"
          fi

          echo "----- Memory (container): ${MEM_TAG:-?} run ${MEM_RUN:-?} -----"
          if [[ "${samples}" -lt "${MIN_SAMPLES}" ]]; then
            echo "  ${verdict}"
          else
            printf "  Samples        %s over %ss (source: %s%s)\n" "${samples}" "${A[DURATION_S]:-0}" "${source}" "${src_note}"
            printf "  Warmup skipped %ss\n" "${A[WARMUP_S]:-0}"
            printf "  Peak           %s (%s%% of limit/host)\n" "$(hsize "${A[PEAK_MB]:-0}")" "${A[PEAK_PERC]:-?}"
            printf "  Baseline floor %s (post-warmup)\n" "$(hsize "${A[BASELINE_MB]:-0}")"
            printf "  End floor      %s\n" "$(hsize "${A[END_FLOOR_MB]:-0}")"
            printf "  Floor growth   %s (%s%%)\n" "$(hsize "${A[FLOOR_GROWTH_MB]:-0}")" "${A[FLOOR_GROWTH_PCT]:-0}"
            printf "  Floor trend    %s MiB/min\n" "${A[FLOOR_SLOPE_MB_PER_MIN]:-0}"
            printf "  Usage shape    %s\n" "${spark_usage}"
            printf "  Floor shape    %s\n" "${spark_floor}"
            printf "  Verdict        %s\n" "${verdict}"
          fi

          {
            echo "MEM_SAMPLES=${samples}"
            echo "MEM_SOURCE=${source}"
            echo "MEM_SEVERITY=${severity}"
            echo "MEM_VERDICT=${verdict}"
            if [[ "${samples}" -ge "${MIN_SAMPLES}" ]]; then
              echo "MEM_DURATION_S=${A[DURATION_S]:-}"
              echo "MEM_WARMUP_S=${A[WARMUP_S]:-}"
              echo "MEM_PEAK_MB=${A[PEAK_MB]:-}"
              echo "MEM_PEAK_PERC=${A[PEAK_PERC]:-}"
              echo "MEM_MIN_MB=${A[MIN_MB]:-}"
              echo "MEM_AVG_MB=${A[AVG_MB]:-}"
              echo "MEM_BASELINE_MB=${A[BASELINE_MB]:-}"
              echo "MEM_END_FLOOR_MB=${A[END_FLOOR_MB]:-}"
              echo "MEM_FLOOR_GROWTH_MB=${A[FLOOR_GROWTH_MB]:-}"
              echo "MEM_FLOOR_GROWTH_PCT=${A[FLOOR_GROWTH_PCT]:-}"
              echo "MEM_FLOOR_SLOPE_MB_PER_MIN=${A[FLOOR_SLOPE_MB_PER_MIN]:-}"
              echo "MEM_SPARK_USAGE=${spark_usage}"
              echo "MEM_SPARK_FLOOR=${spark_floor}"
            fi
          } >> "${METRICS_FILE}"

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expb-metrics-${{ matrix.tag }}-run${{ matrix.run }}
          path: ${{ runner.temp }}/expb-metrics-${{ matrix.tag }}-run${{ matrix.run }}/metrics.env
          retention-days: 30

      - name: Upload memory samples artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expb-memory-${{ matrix.tag }}-run${{ matrix.run }}
          path: |
            ${{ runner.temp }}/mem-samples-${{ matrix.tag }}-run${{ matrix.run }}.csv
            ${{ runner.temp }}/mem-sampler-${{ matrix.tag }}-run${{ matrix.run }}.out
          retention-days: 30
          if-no-files-found: ignore

      - name: Enforce run quality gates
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.run-expb.outcome }}" != "success" ]]; then
            echo "expb execute-scenarios did not finish successfully for ${{ matrix.tag }} run ${{ matrix.run }}."
            echo "Continuing multi-image run (fail-fast is disabled)."
          fi
          if [[ "${{ steps.analyze.outputs.exception_found }}" == "true" ]]; then
            echo "Exceptions were detected for ${{ matrix.tag }} run ${{ matrix.run }}."
          fi
          if [[ "${{ steps.analyze.outputs.invalid_block_found }}" == "true" ]]; then
            echo "Invalid block lines were detected for ${{ matrix.tag }} run ${{ matrix.run }}."
          fi

      - name: Collect and upload dotTrace snapshots
        if: always() && needs.resolve.outputs.dottrace == 'true'
        shell: bash
        env:
          ARCHIVE: ${{ runner.temp }}/dottrace-${{ matrix.tag }}-run${{ matrix.run }}.zip
          MARKER: ${{ runner.temp }}/.expb-run-marker
        run: |
          set -euo pipefail

          mapfile -t dottrace_dirs < <(find "${EXPB_DATA_DIR}/outputs" -type d -name 'dottrace' -newer "${MARKER}" 2>/dev/null)
          if [[ "${#dottrace_dirs[@]}" -eq 0 ]]; then
            echo "No dottrace output directories found for this run."
            exit 0
          fi

          echo "Collecting from ${#dottrace_dirs[@]} dottrace director(ies):"
          printf '  %s\n' "${dottrace_dirs[@]}"

          file_count=0
          for d in "${dottrace_dirs[@]}"; do
            file_count=$(( file_count + $(find "${d}" -type f | wc -l) ))
          done
          if [[ "${file_count}" -eq 0 ]]; then
            echo "Dottrace directories are empty, skipping zip."
            exit 0
          fi

          zip -9r "${ARCHIVE}" "${dottrace_dirs[@]}"

      - name: Upload dotTrace artifact
        if: always() && needs.resolve.outputs.dottrace == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dottrace-${{ matrix.tag }}-run${{ matrix.run }}
          path: ${{ runner.temp }}/dottrace-${{ matrix.tag }}-run${{ matrix.run }}.zip
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup rendered config
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ runner.temp }}/rendered-expb-config-${{ matrix.tag }}-run${{ matrix.run }}.yaml" || true
          rendered_config_file="${{ steps.render-config.outputs.rendered_config_file }}"
          if [[ -n "${rendered_config_file}" ]]; then
            rm -f "${rendered_config_file}" || true
          fi

  summary:
    needs: [resolve, resolve-images, benchmark-multi]
    if: always() && needs.resolve.outputs.mode == 'multi'
    runs-on: ubuntu-latest
    steps:
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/all-metrics
          pattern: expb-metrics-*

      - name: Build comparison table
        shell: bash
        env:
          METRICS_DIR: ${{ runner.temp }}/all-metrics
          ORDERED_TAGS: ${{ needs.resolve-images.outputs.ordered_tags }}
          RUN_COUNT: ${{ needs.resolve.outputs.run_count }}
        run: |
          set -euo pipefail

          summary_file="${RUNNER_TEMP}/multi-image-summary.md"
          run_count="${RUN_COUNT:-1}"

          # Parse ordered tags JSON (unique tags, not expanded by run)
          mapfile -t tags < <(echo "${ORDERED_TAGS}" | jq -r '.[].tag')
          mapfile -t dates < <(echo "${ORDERED_TAGS}" | jq -r '.[].date')

          load_metric() {
            local file="$1"
            local key="$2"
            if [[ -f "${file}" ]]; then
              grep -E "^${key}=" "${file}" | head -n 1 | cut -d'=' -f2- || true
            fi
          }

          percentage_delta() {
            local current="$1"
            local baseline="$2"
            if [[ -z "${current}" || -z "${baseline}" ]]; then
              echo "n/a"
              return
            fi
            awk -v c="${current}" -v b="${baseline}" 'BEGIN {
              if (b == 0) { print "n/a"; }
              else { printf "%+.2f%%", ((c - b) / b) * 100; }
            }'
          }

          # Build header — add Run column if run_count > 1
          if [[ "${run_count}" -gt 1 ]]; then
            header="| # | Image Tag | Run | Date | Source | AVG (ms) | Median (ms) | P90 (ms) | P95 (ms) | P99 (ms) | Min (ms) | Max (ms) | AVG Delta vs First |"
            separator="|---|-----------|-----|------|--------|----------|-------------|----------|----------|----------|----------|----------|---------------------|"
          else
            header="| # | Image Tag | Date | Source | AVG (ms) | Median (ms) | P90 (ms) | P95 (ms) | P99 (ms) | Min (ms) | Max (ms) | AVG Delta vs First |"
            separator="|---|-----------|------|--------|----------|-------------|----------|----------|----------|----------|----------|---------------------|"
          fi

          total_runs=$(( ${#tags[@]} * run_count ))
          {
            echo "## EXPB Multi-Image Benchmark Results"
            echo ""
            echo "Benchmarked ${#tags[@]} Docker images${run_count:+, ${run_count} run(s) each}."
            echo ""
            echo "${header}"
            echo "${separator}"
          } > "${summary_file}"

          baseline_avg=""
          row_idx=0

          for i in "${!tags[@]}"; do
            tag="${tags[$i]}"
            date="${dates[$i]}"

            for (( r=1; r<=run_count; r++ )); do
              row_idx=$(( row_idx + 1 ))
              metrics_file="${METRICS_DIR}/expb-metrics-${tag}-run${r}/metrics.env"

              # Build the tag+run prefix columns
              if [[ "${run_count}" -gt 1 ]]; then
                prefix="| ${row_idx} | \`${tag}\` | ${r} | ${date}"
              else
                prefix="| ${row_idx} | \`${tag}\` | ${date}"
              fi

              if [[ ! -f "${metrics_file}" ]]; then
                echo "${prefix} | - | - | - | - | - | - | - | - | no data |" >> "${summary_file}"
                continue
              fi

              error=$(load_metric "${metrics_file}" "ERROR")
              if [[ -n "${error}" ]]; then
                exception=$(load_metric "${metrics_file}" "EXCEPTION_FOUND")
                invalid=$(load_metric "${metrics_file}" "INVALID_BLOCK_FOUND")
                status="${error}"
                if [[ "${exception}" == "true" ]]; then
                  status="${status} :warning: exceptions"
                fi
                if [[ "${invalid}" == "true" ]]; then
                  status="${status} :warning: invalid blocks"
                fi
                echo "${prefix} | - | - | - | - | - | - | - | - | ${status} |" >> "${summary_file}"
                continue
              fi

              # Detect metrics source
              ttfb_avg=$(load_metric "${metrics_file}" "TTFB_AVG")
              if [[ -n "${ttfb_avg}" ]]; then
                source="SSE"
              else
                source="TTFB"
              fi

              avg=$(load_metric "${metrics_file}" "AVG")
              median=$(load_metric "${metrics_file}" "MEDIAN")
              p90=$(load_metric "${metrics_file}" "P90")
              p95=$(load_metric "${metrics_file}" "P95")
              p99=$(load_metric "${metrics_file}" "P99")
              min_val=$(load_metric "${metrics_file}" "MIN")
              max_val=$(load_metric "${metrics_file}" "MAX")
              exception=$(load_metric "${metrics_file}" "EXCEPTION_FOUND")
              invalid=$(load_metric "${metrics_file}" "INVALID_BLOCK_FOUND")

              if [[ -z "${baseline_avg}" && -n "${avg}" ]]; then
                baseline_avg="${avg}"
              fi

              delta=$(percentage_delta "${avg}" "${baseline_avg}")

              warnings=""
              if [[ "${exception}" == "true" ]]; then
                warnings=" :warning:"
              fi
              if [[ "${invalid}" == "true" ]]; then
                warnings="${warnings} :no_entry:"
              fi

              echo "${prefix} | ${source} | ${avg} | ${median} | ${p90} | ${p95} | ${p99} | ${min_val} | ${max_val} | ${delta}${warnings} |" >> "${summary_file}"
            done
          done

          {
            echo ""
            echo "**Legend:** :warning: = exceptions detected, :no_entry: = invalid blocks detected"
            echo ""
            echo "**Source:** SSE = client-side processing time from Nethermind's SSE data feed, TTFB = K6 HTTP time-to-first-byte (fallback)"
            echo ""
            echo "**Delta vs First** shows the percentage change in AVG processing time compared to the first image in the list."
          } >> "${summary_file}"

          # Memory (container) — leak / OOM watch per image (bisection view)
          {
            echo ""
            echo "### Memory (container)"
            echo ""
            echo "Anonymous working set (managed heap + native allocs + RocksDB block cache; excludes reclaimable page cache when Src=anon). A rising post-warmup floor => a footprint that never clears."
            echo ""
            if [[ "${run_count}" -gt 1 ]]; then
              echo "| # | Image Tag | Run | Date | Src | Peak (MiB) | Peak % | Baseline (MiB) | End floor (MiB) | Floor Δ (MiB) | Floor Δ % | Trend MiB/min | Floor shape | Verdict |"
              echo "|---|-----------|-----|------|-----|-----------:|-------:|---------------:|----------------:|--------------:|----------:|--------------:|:--|:--|"
            else
              echo "| # | Image Tag | Date | Src | Peak (MiB) | Peak % | Baseline (MiB) | End floor (MiB) | Floor Δ (MiB) | Floor Δ % | Trend MiB/min | Floor shape | Verdict |"
              echo "|---|-----------|------|-----|-----------:|-------:|---------------:|----------------:|--------------:|----------:|--------------:|:--|:--|"
            fi
          } >> "${summary_file}"

          midx=0
          for i in "${!tags[@]}"; do
            mtag="${tags[$i]}"; mdate="${dates[$i]}"
            for (( r=1; r<=run_count; r++ )); do
              midx=$(( midx + 1 ))
              mf="${METRICS_DIR}/expb-metrics-${mtag}-run${r}/metrics.env"
              if [[ "${run_count}" -gt 1 ]]; then mprefix="| ${midx} | \`${mtag}\` | ${r} | ${mdate}"; else mprefix="| ${midx} | \`${mtag}\` | ${mdate}"; fi
              msamp="$(load_metric "${mf}" "MEM_SAMPLES")"
              mverdict="$(load_metric "${mf}" "MEM_VERDICT")"
              if [[ -z "${msamp}" ]]; then
                echo "${mprefix} | - | - | - | - | - | - | - | - | - | no data |" >> "${summary_file}"
                continue
              fi
              mpeak="$(load_metric "${mf}" "MEM_PEAK_MB")"
              if [[ -z "${mpeak}" ]]; then
                echo "${mprefix} | $(load_metric "${mf}" "MEM_SOURCE") | - | - | - | - | - | - | - | - | ${mverdict} |" >> "${summary_file}"
                continue
              fi
              echo "${mprefix} | $(load_metric "${mf}" "MEM_SOURCE") | ${mpeak} | $(load_metric "${mf}" "MEM_PEAK_PERC") | $(load_metric "${mf}" "MEM_BASELINE_MB") | $(load_metric "${mf}" "MEM_END_FLOOR_MB") | $(load_metric "${mf}" "MEM_FLOOR_GROWTH_MB") | $(load_metric "${mf}" "MEM_FLOOR_GROWTH_PCT") | $(load_metric "${mf}" "MEM_FLOOR_SLOPE_MB_PER_MIN") | $(load_metric "${mf}" "MEM_SPARK_FLOOR") | ${mverdict} |" >> "${summary_file}"
            done
          done

          echo "--- Multi-Image Summary ---"
          cat "${summary_file}"

          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # dotTrace XML report generation (Windows-only Reporter.exe)
  # ---------------------------------------------------------------------------

  generate-dottrace-reports:
    needs: [resolve, benchmark, benchmark-multi]
    if: >-
      always()
      && needs.resolve.outputs.dottrace == 'true'
      && needs.resolve.outputs.should_run == 'true'
      && (needs.benchmark.result == 'success' || needs.benchmark-multi.result == 'success')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Download snapshot artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dottrace-*
          path: snapshots/
          merge-multiple: true

      - name: Install dotTrace Reporter
        shell: pwsh
        run: |
          $url = 'https://www.nuget.org/api/v2/package/JetBrains.dotTrace.CommandLineTools.windows-x64/2026.1.0.1'
          Write-Host "Downloading dotTrace CommandLineTools from NuGet..."
          Invoke-WebRequest -Uri $url -OutFile dottrace-clt.zip
          Expand-Archive -Path dottrace-clt.zip -DestinationPath dottrace-clt
          $reporter = Get-ChildItem -Path dottrace-clt -Recurse -Filter 'Reporter.exe' | Select-Object -First 1
          if (-not $reporter) {
            Write-Error "Reporter.exe not found in package"
            exit 1
          }
          Write-Host "Found Reporter.exe at $($reporter.FullName)"
          echo "REPORTER=$($reporter.FullName)" >> $env:GITHUB_ENV

      - name: Generate XML reports
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path reports, extracted | Out-Null

          # Pattern file: match all methods, include full call stacks
          $patternFile = 'pattern.xml'
          @'
          <Patterns>
            <Pattern PrintCallstacks="Full">.*</Pattern>
          </Patterns>
          '@ | Set-Content -Path $patternFile

          # Extract all snapshot zips
          Get-ChildItem -Path snapshots -Filter '*.zip' | ForEach-Object {
            $dest = Join-Path extracted $_.BaseName
            Write-Host "Extracting $($_.Name) -> $dest"
            Expand-Archive -Path $_.FullName -DestinationPath $dest
          }

          # Find .dtp files (exact extension, not .dtp.0000 chunks)
          $snapshots = Get-ChildItem -Path extracted -Recurse | Where-Object { $_.Extension -eq '.dtp' }

          if ($snapshots.Count -eq 0) {
            Write-Host "No .dtp snapshot files found after extraction."
            exit 0
          }

          foreach ($dtp in $snapshots) {
            $name = $dtp.BaseName
            $outFile = "reports/${name}-report.xml"
            Write-Host "::group::Generating report for $name"
            Write-Host "  $($dtp.FullName) -> $outFile"
            & $env:REPORTER report $dtp.FullName --pattern=$patternFile --save-to=$outFile
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Reporter failed for $name with exit code $LASTEXITCODE"
            }
            Write-Host "::endgroup::"
          }

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dottrace-reports
          path: reports/
          retention-days: 30
          if-no-files-found: ignore
