name: Sync Supported Chains

on:
  workflow_run:
    workflows: ["Publish Docker image"]
    branches: [release/*]
    types:
      - completed

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      nethermind_image:
        description: "Docker image to be used by action"
        default: ""
        required: false
      mode:
        description: "Sync mode to run"
        type: choice
        options:
          - HalfPath
          - Flat
        default: HalfPath
        required: true
      network_filter:
        description: "Filter networks"
        default: ""
        required: false
      nethermind_args:
        description: "Additional Nethermind args"
        default: ""
        required: false

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: "1"
  TERM: xterm

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: nethermind
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name || 'master' }}

      - id: set-matrix
        run: |
          matrix=$(cat nethermind/scripts/config/testnet-matrix.json)

          if [ -n "${{ github.event.inputs.network_filter }}" ]; then
            matrix=$(echo "$matrix" | jq --arg filter "${{ github.event.inputs.network_filter }}" '[.[] | select(.network | contains($filter))]')
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ github.event.inputs.mode }}"
          else
            mode="HalfPath"
          fi

          matrix=$(echo "$matrix" | jq --arg mode "$mode" '
            map(
              . + {
                mode: $mode,
                runner_label: (
                  (if $mode == "Flat" then "f-" else "hp-" end)
                  + env.GITHUB_RUN_ID + "-" + .network
                )
              }
            )
          ')

          echo "matrix=$(echo "$matrix" | jq -c .)" >> $GITHUB_OUTPUT

  create_a_runner:
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    runs-on: ubuntu-latest

    steps:
      - run: sudo apt-get update && sudo apt-get install -y sshpass

      - id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}

      - name: Create Runner
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "create"
          runner_label: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          machine_type: ${{ matrix.config.agent }}
          image: "linode/ubuntu24.04"
          tags: "core, self-hosted, dynamic"
          organization: "NethermindEth"
          repo_name: "nethermind"

  sync-chain:
    needs: [setup-matrix, create_a_runner]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    name: "Run sync of ${{ matrix.config.network }} (${{ matrix.config.mode }})"
    runs-on: ${{ matrix.config.runner_label }}
    timeout-minutes: ${{ matrix.config.timeout }}

    steps:
      - name: Basic info
        run: |
          echo "Network: ${{ matrix.config.network }}"
          echo "Mode: ${{ matrix.config.mode }}"
          echo "Runner: ${{ matrix.config.runner_label }}"

      # 🔽 KEEP ALL YOUR EXISTING STEPS HERE UNCHANGED 🔽
      # (Sedge install, generate, run, wait-for-sync, logs, etc.)

      - name: Destroy VM (async)
        if: always()
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ secrets.REPOSITORY_DISPATCH_TOKEN }}"
          action: "destroy-machine-async"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"

  destroy_runner:
    needs: [setup-matrix, create_a_runner, sync-chain]
    if: always()

    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    runs-on: ubuntu-latest

    steps:
      - id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}

      - name: Ensure VM is gone
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        continue-on-error: true
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "destroy-machine"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"

      - name: Remove runner from GitHub
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "destroy-runner"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"

  trigger_tests:
    needs: [setup-matrix, create_a_runner, sync-chain, destroy_runner]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "nethermind,post-merge-smoke-tests"

      - name: Trigger tests
        if: startsWith(github.event.workflow_run.head_branch, 'release/')
        continue-on-error: true
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: receive-push-notification.yml
          repo: NethermindEth/post-merge-smoke-tests
          ref: "main"
          token: "${{ steps.gh-app.outputs.token }}"
          inputs: '{
            "nethermind_branch": "refs/heads/${{ github.event.workflow_run.head_branch }}"
          }'
