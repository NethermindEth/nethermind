name: Collect PGO Profile

on:
  workflow_dispatch:
    inputs:
      state_layout:
        description: State layout mode
        required: true
        type: choice
        options:
          - flat
          - halfpath
        default: flat
      payload_set:
        description: Payload set mode
        required: true
        type: choice
        options:
          - realblocks
          - superblocks
        default: realblocks
  schedule:
    # Weekly on Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

env:
  EXPB_DATA_DIR: /mnt/sda/expb-data
  PGO_TAG: pgo-${{ github.run_id }}

jobs:
  build-pgo-image:
    name: Build PGO collection image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Trigger publish-docker.yml with Dockerfile.pgo
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish-docker.yml
          ref: ${{ github.ref }}
          token: ${{ github.token }}
          inputs: '{
            "image-name": "nethermind",
            "tag": "${{ env.PGO_TAG }}",
            "dockerfile": "Dockerfile.pgo",
            "build-config": "release"
            }'

      - name: Trigger publish-docker.yml with Dockerfile.pgo-sampling
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish-docker.yml
          ref: ${{ github.ref }}
          token: ${{ github.token }}
          inputs: '{
            "image-name": "nethermind",
            "tag": "${{ env.PGO_TAG }}-sampling",
            "dockerfile": "Dockerfile.pgo-sampling",
            "build-config": "release"
            }'

      - name: Wait for publish-docker.yml builds to complete
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for publish-docker.yml runs to start and complete..."

          max_discovery=300
          poll=15
          max_completion=7200
          head_sha="${{ github.sha }}"

          # Phase 1: discover both runs (two dispatches for pgo + pgo-sampling)
          elapsed=0
          run_ids=()
          while [[ "${#run_ids[@]}" -lt 2 ]]; do
            response=$(gh api "repos/${{ github.repository }}/actions/workflows/publish-docker.yml/runs?per_page=10&branch=${{ github.ref_name }}&head_sha=${head_sha}" 2>/dev/null || echo '{"workflow_runs":[]}')
            mapfile -t run_ids < <(echo "${response}" | jq -r '.workflow_runs[].id // empty' | head -2)

            if [[ "${#run_ids[@]}" -ge 2 ]]; then
              echo "Found ${#run_ids[@]} publish-docker runs: ${run_ids[*]}"
              break
            fi

            elapsed=$((elapsed + poll))
            if [[ "${elapsed}" -ge "${max_discovery}" ]]; then
              echo "Found ${#run_ids[@]}/2 publish-docker.yml runs within ${max_discovery}s."
              if [[ "${#run_ids[@]}" -eq 0 ]]; then
                exit 1
              fi
              echo "Proceeding with ${#run_ids[@]} run(s)."
              break
            fi
            echo "Waiting for runs to appear... (${#run_ids[@]}/2 found, ${elapsed}/${max_discovery}s)"
            sleep "${poll}"
          done

          # Phase 2: wait for all discovered runs to complete
          for run_id in "${run_ids[@]}"; do
            echo "Waiting for run ${run_id}..."
            elapsed=0
            while true; do
              run_data=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}" 2>/dev/null || echo '{}')
              status=$(echo "${run_data}" | jq -r '.status // "unknown"')
              conclusion=$(echo "${run_data}" | jq -r '.conclusion // empty')

              if [[ "${status}" == "completed" ]]; then
                if [[ "${conclusion}" == "success" ]]; then
                  echo "Run ${run_id} completed successfully."
                  break
                else
                  echo "Run ${run_id} finished with conclusion: ${conclusion}"
                  exit 1
                fi
              fi

              elapsed=$((elapsed + poll))
              if [[ "${elapsed}" -ge "${max_completion}" ]]; then
                echo "Timeout waiting for run ${run_id} (${max_completion}s)."
                exit 1
              fi
              echo "Run ${run_id}: ${status} — waiting... (${elapsed}/${max_completion}s)"
              sleep "${poll}"
            done
          done

  collect:
    name: Collect PGO profile via EXPB
    needs: [build-pgo-image]
    runs-on: [self-hosted, reproducible-benchmarks]
    timeout-minutes: 720
    steps:
      - name: Kill stale containers and networks
        if: always()
        shell: bash
        run: |
          # Force kill everything to recover from stuck state
          docker ps -aq --filter "name=expb-executor" 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
          docker ps -aq --filter "ancestor=nethermindeth/nethermind" 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
          docker network ls --filter "name=expb-executor" -q 2>/dev/null | xargs -r docker network rm 2>/dev/null || true
          # Unmount stale overlay mounts from previous EXPB runs
          mount | grep "expb-data/work" | awk '{print $3}' | xargs -r sudo umount 2>/dev/null || true
          rm -f /tmp/expb.lock

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve config file
        id: resolve
        shell: bash
        env:
          STATE_LAYOUT: ${{ inputs.state_layout || 'flat' }}
          PAYLOAD_SET: ${{ inputs.payload_set || 'realblocks' }}
        run: |
          set -euo pipefail
          if [[ "${STATE_LAYOUT}" == "flat" && "${PAYLOAD_SET}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet-flat.yaml"
          elif [[ "${STATE_LAYOUT}" == "flat" && "${PAYLOAD_SET}" == "realblocks" ]]; then
            config_file="github-action-mainnet-flat.yaml"
          elif [[ "${STATE_LAYOUT}" == "halfpath" && "${PAYLOAD_SET}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet.yaml"
          else
            config_file="github-action-mainnet.yaml"
          fi
          echo "config_file=${config_file}" >> "${GITHUB_OUTPUT}"

      - name: Render benchmark config
        id: render-config
        shell: bash
        env:
          CONFIG_FILE: ${{ steps.resolve.outputs.config_file }}
        run: |
          set -euo pipefail
          rendered="${RUNNER_TEMP}/rendered-pgo-config.yaml"
          sed \
            -e 's#<<DOCKER_TAG>>#${{ env.PGO_TAG }}#g' \
            -e 's#<<DELAY>>#0#g' \
            -e 's#^\([[:space:]]*\)nethermind:#\1nethermind-pgo-collect:#g' \
            "${EXPB_DATA_DIR}/${CONFIG_FILE}" \
            > "${rendered}"
          # Inject a writable pgo volume so EventPipe/PGO data survives container removal
          # EXPB stores extra_volumes under {outputs_dir}/{scenario}/volumes/{name}/
          sed -i '/^[[:space:]]*mode: r$/{
            a\      pgo:
            a\        bind: /nethermind/pgo
            a\        mode: rw
          }' "${rendered}"
          echo "rendered_config_file=${rendered}" >> "${GITHUB_OUTPUT}"
          echo "Rendered config:"
          cat "${rendered}"

      - name: Install or upgrade expb
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v uv >/dev/null 2>&1; then
            echo "uv is required but not found in PATH."
            exit 1
          fi
          uv tool install --force --from "git+https://github.com/NethermindEth/execution-payloads-benchmarks@feat/security-opt-support" expb
          echo "$(uv tool dir --bin)" >> "${GITHUB_PATH}"

      - name: Run EXPB for PGO collection
        id: run-expb
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.EXPB_DATA_DIR }}
        run: |
          set -euo pipefail

          # Background: tail Nethermind container logs for visibility
          log_tail_pid=""
          (
            sleep 5
            for i in $(seq 1 60); do
              cid=$(docker ps --filter "ancestor=nethermindeth/nethermind:${{ env.PGO_TAG }}" \
                --format '{{.ID}}' 2>/dev/null | head -1)
              if [[ -n "${cid}" ]]; then
                echo "=== Tailing Nethermind container ${cid} logs ==="
                exec docker logs -f "${cid}" 2>&1 | sed 's/^/[nethermind] /'
              fi
              sleep 2
            done
          ) &
          log_tail_pid=$!

          expb execute-scenarios \
            --config-file "${{ steps.render-config.outputs.rendered_config_file }}" \
            --per-payload-metrics \
            --print-logs \
            2>&1 | tee "${RUNNER_TEMP}/expb-pgo-run.log"
          expb_exit=$?

          # Kill the entire process group to ensure docker logs is terminated
          kill -- -"${log_tail_pid}" 2>/dev/null || kill "${log_tail_pid}" 2>/dev/null || true
          exit "${expb_exit}"

      - name: Extract PGO data from EXPB output
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/pgo-data"
          mkdir -p "${RUNNER_TEMP}/pgo-data"

          # EXPB stores extra_volumes under {outputs_dir}/{scenario}/volumes/{name}/
          # Find the pgo volume directory from the latest EXPB run
          expb_outputs="${EXPB_DATA_DIR}/outputs"
          pgo_vol_dir=$(find "${expb_outputs}" -maxdepth 3 -type d -name "pgo" -path "*/volumes/pgo" \
            -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2- || true)

          if [[ -n "${pgo_vol_dir}" ]]; then
            echo "Found PGO volume at: ${pgo_vol_dir}"
            ls -la "${pgo_vol_dir}/"
            cp -a "${pgo_vol_dir}/." "${RUNNER_TEMP}/pgo-data/"
          else
            echo "No EXPB pgo volume found, trying container fallback..."
            container_id=$(docker ps -a --filter "ancestor=nethermindeth/nethermind:${{ env.PGO_TAG }}" \
              --format '{{.ID}}' | head -1)
            if [[ -n "${container_id}" ]]; then
              echo "Extracting from container ${container_id}..."
              docker cp "${container_id}:/nethermind/pgo/" "${RUNNER_TEMP}/pgo-data/" 2>/dev/null || true
            else
              echo "No container found either."
            fi
          fi

          echo "=== .nettrace files (EventPipe method traces) ==="
          find "${RUNNER_TEMP}/pgo-data" -name "*.nettrace" -type f -ls 2>/dev/null || true
          echo "=== .jit files (edge/block profiling data) ==="
          find "${RUNNER_TEMP}/pgo-data" -name "*.jit" -type f -ls 2>/dev/null || true

      - name: Run CPU sampling pass
        shell: bash
        run: |
          set -euo pipefail
          sampling_tag="${{ env.PGO_TAG }}-sampling"

          # Allow perf_event_open inside containers (host-level sysctl)
          sudo sysctl -w kernel.perf_event_paranoid=-1 || true

          # Clean up containers/networks left by the main PGO collection step
          docker ps -aq --filter "name=expb-executor" 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
          docker ps -aq --filter "ancestor=nethermindeth/nethermind" 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
          docker network ls --filter "name=expb-executor" -q 2>/dev/null | xargs -r docker network rm 2>/dev/null || true
          rm -f /tmp/expb.lock

          echo "Rendering sampling config..."
          sampling_config="${RUNNER_TEMP}/rendered-sampling-config.yaml"
          sed \
            -e "s#${{ env.PGO_TAG }}#${sampling_tag}#g" \
            -e 's#nethermind-pgo-collect:#nethermind-pgo-sampling:#g' \
            "${{ steps.render-config.outputs.rendered_config_file }}" \
            > "${sampling_config}"
          # Add seccomp=unconfined so perfcollect can call perf_event_open inside the container
          python3 -c "import yaml,sys;p=sys.argv[1];c=yaml.safe_load(open(p));[s.update({'security_opt':['seccomp=unconfined']}) for s in c.get('scenarios',{}).values()];yaml.safe_dump(c,open(p,'w'),default_flow_style=False,sort_keys=False)" "${sampling_config}"
          echo "Rendered sampling config:"
          cat "${sampling_config}"

          echo "Running CPU sampling pass via EXPB..."
          expb execute-scenarios \
            --config-file "${sampling_config}" \
            --per-payload-metrics \
            --print-logs \
            2>&1 | tee "${RUNNER_TEMP}/expb-sampling-run.log" || true

          # Extract sampling trace (perfcollect produces sampling.trace.zip)
          expb_outputs="${EXPB_DATA_DIR}/outputs"
          sampling_vol=$(find "${expb_outputs}" -maxdepth 3 -type d -name "pgo" -path "*/volumes/pgo" \
            -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2- || true)
          if [[ -n "${sampling_vol}" ]]; then
            echo "Sampling volume contents:"
            ls -la "${sampling_vol}/" 2>/dev/null || true
            # Copy perfcollect.log for debugging
            cp "${sampling_vol}/perfcollect.log" "${RUNNER_TEMP}/pgo-data/" 2>/dev/null || true
            # perfcollect produces sampling.trace.zip (perf + LTTng bundle)
            sampling_file=$(find "${sampling_vol}" -name "sampling.trace.zip" -type f | head -1 || true)
            if [[ -n "${sampling_file}" ]]; then
              # Repack zip with paths relative to the trace root.
              # perfcollect inside Docker produces paths like nethermind/pgo/sampling.trace/...
              # but CtfTraceEventSource expects lttngTrace/... and perf.data.txt at the root.
              repack_dir="${RUNNER_TEMP}/sampling-repack"
              mkdir -p "${repack_dir}"
              cd "${repack_dir}"
              unzip -q "${sampling_file}"
              trace_root=$(find . -name "lttngTrace" -type d | head -1 | xargs dirname)
              if [[ -n "${trace_root}" && "${trace_root}" != "." ]]; then
                echo "Repacking zip: stripping prefix ${trace_root}/"
                cd "${trace_root}"
              fi
              zip -qr "${RUNNER_TEMP}/pgo-data/sampling.trace.zip" .
              cd "${RUNNER_TEMP}"
              rm -rf "${repack_dir}"
            fi
          fi

          if [[ -f "${RUNNER_TEMP}/pgo-data/sampling.trace.zip" ]]; then
            echo "CPU sampling trace collected:"
            ls -lh "${RUNNER_TEMP}/pgo-data/sampling.trace.zip"
            echo "Zip contents:"
            unzip -l "${RUNNER_TEMP}/pgo-data/sampling.trace.zip" | head -20
          else
            echo "No sampling trace found — call graph data will not be available."
          fi

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: false

      - name: Process traces with PgoTrim
        id: pgotrim
        shell: bash
        run: |
          set -euo pipefail
          pgo_dir="${RUNNER_TEMP}/pgo-data"

          # Convert sampling .trace.zip to .etlx (injects MethodDetails CTF mapping)
          sampling_trace="${pgo_dir}/sampling.trace.zip"
          sampling_etlx="${RUNNER_TEMP}/sampling-converted.etlx"
          if [[ -f "${sampling_trace}" ]]; then
            echo "Converting sampling trace (injecting MethodDetails CTF mapping)..."
            dotnet run --project "${GITHUB_WORKSPACE}/tools/PgoTrim" -c Release -- \
              convert-trace "${sampling_trace}" "${sampling_etlx}" || true

            # Extract perf sample IPs for SPGO — placed alongside .etlx so
            # dotnet-pgo finds it via Path.ChangeExtension(etlx, ".spgo")
            echo "Extracting perf sample IPs for SPGO..."
            dotnet run --project "${GITHUB_WORKSPACE}/tools/PgoTrim" -c Release -- \
              extract-spgo "${sampling_trace}" "${sampling_etlx%.etlx}.spgo" || true
          fi

          # Compress .jit edge/block profiling data for runtime PGO
          jit_file=$(find "${pgo_dir}" -name "*.jit" -type f -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2- || true)
          jit_gz="${RUNNER_TEMP}/nethermind.jit.gz"
          if [[ -n "${jit_file}" ]]; then
            echo "Compressing ${jit_file} with PgoTrim..."
            dotnet run --project "${GITHUB_WORKSPACE}/tools/PgoTrim" -c Release -- \
              "${jit_file}" "${jit_gz}" --min-block 0 --min-edge 0
            echo "jit_gz=${jit_gz}" >> "${GITHUB_OUTPUT}"
          else
            echo "No .jit file found — skipping edge profiling."
          fi

      - name: Build dotnet-pgo from source
        shell: bash
        run: |
          set -euo pipefail
          # Pin to v10.0.5 — matches the SDK/runtime in our Docker base images
          git clone --depth 1 --branch v10.0.5 \
            https://github.com/dotnet/runtime.git "${RUNNER_TEMP}/dotnet-runtime"
          cd "${RUNNER_TEMP}/dotnet-runtime"

          # Build TraceEvent from our PerfView PR branch which has the MethodDetails
          # CTF mapping fix. This lets dotnet-pgo read perfcollect .trace.zip directly
          # (both LTTng CLR events AND perf CPU samples).
          git clone --depth 1 --branch fix/add-methoddetails-ctf-mapping \
            https://github.com/benaadams/perfview.git "${RUNNER_TEMP}/perfview"
          # Strip SupportFiles package ref and its file copy entries (private feed).
          # Keep Dia2Lib.dll and TraceReloggerLib.dll as compile refs from the NuGet cache.
          python3 -c "
          import re, sys
          p = sys.argv[1]
          with open(p) as f: xml = f.read()
          xml = re.sub(r'<PackageReference Include=\"Microsoft\.Diagnostics\.Tracing\.TraceEvent\.SupportFiles\"[^/]*/>', '', xml)
          xml = re.sub(r'<None Include=\"\\\$\(TraceEventSupportFilesBase\)[^>]*>.*?</None>', '', xml, flags=re.DOTALL)
          with open(p, 'w') as f: f.write(xml)
          " "${RUNNER_TEMP}/perfview/src/TraceEvent/TraceEvent.csproj"
          # Copy compile-time reference DLLs from the NuGet TraceEvent 3.1.30 package
          # (Dia2Lib.dll and TraceReloggerLib.dll provide Windows COM interop types)
          nuget_te=$(find ~/.nuget/packages/microsoft.diagnostics.tracing.traceevent/3.1.* -name "Dia2Lib.dll" -path "*/netstandard*" 2>/dev/null | head -1 | xargs dirname)
          if [[ -n "${nuget_te}" ]]; then
            cp "${nuget_te}/Dia2Lib.dll" "${nuget_te}/TraceReloggerLib.dll" \
              "${RUNNER_TEMP}/perfview/src/TraceEvent/" 2>/dev/null || true
            # Add as compile references
            sed -i '/<\/ItemGroup>/i\    <Reference Include="Dia2Lib"><HintPath>Dia2Lib.dll<\/HintPath><\/Reference>\n    <Reference Include="TraceReloggerLib"><HintPath>TraceReloggerLib.dll<\/HintPath><\/Reference>' \
              "${RUNNER_TEMP}/perfview/src/TraceEvent/TraceEvent.csproj"
          fi
          # Replace NuGet TraceEvent reference with project reference to our patched source
          pgo_csproj="src/coreclr/tools/dotnet-pgo/dotnet-pgo.csproj"
          sed -i 's|<PackageReference Include="Microsoft.Diagnostics.Tracing.TraceEvent" Version="$(TraceEventVersion)" />|<ProjectReference Include="'"${RUNNER_TEMP}"'/perfview/src/TraceEvent/TraceEvent.csproj" />\n    <ProjectReference Include="'"${RUNNER_TEMP}"'/perfview/src/FastSerialization/FastSerialization.csproj" />|' "${pgo_csproj}"
          # Patch dotnet-pgo to read supplementary .spgo file (perf sample IPs from PgoTrim)
          # alongside the .etlx for SPGO block count attribution
          pgo_program="src/coreclr/tools/dotnet-pgo/Program.cs"
          sed -i '/PrintOutput(\$"Samples outside managed code: {correlator.SamplesOutsideManagedCode}");/i\
                        // Read supplementary perf samples from PgoTrim .spgo file\
                        string spgoFile = Path.ChangeExtension(etlFileName, ".spgo");\
                        if (File.Exists(spgoFile))\
                        {\
                            int spgoCount = 0;\
                            foreach (string line in File.ReadLines(spgoFile))\
                            {\
                                if (ulong.TryParse(line.Trim(), System.Globalization.NumberStyles.HexNumber, null, out ulong ip))\
                                {\
                                    correlator.AttributeSamplesToIP(ip, 1);\
                                    spgoCount++;\
                                }\
                            }\
                            PrintOutput(\$"Supplementary .spgo samples loaded: {spgoCount}");\
                        }' "${pgo_program}"
          # Patch: FlowSmoothing.MakeGraphFeasible crashes with "Stack empty" for some
          # methods with disconnected flow graphs. Wrap SmoothFlow in try-catch so one
          # bad method doesn't kill the entire SPGO pass.
          sed -i 's|pmi.Profile.SmoothFlow();|try { pmi.Profile.SmoothFlow(); } catch (Exception ex) { Console.Error.WriteLine(\$"Warning: SmoothFlow failed for method: {ex.Message}"); }|' \
            "src/coreclr/tools/dotnet-pgo/SPGO/SampleCorrelator.cs"
          # Build only dotnet-pgo (--projects bypasses subset traversal, avoids ILCompiler)
          ./build.sh -c Release \
            --projects "$(pwd)/src/coreclr/tools/dotnet-pgo/dotnet-pgo.csproj"

          dotnet_pgo_dir=$(find "${RUNNER_TEMP}/dotnet-runtime/artifacts" -type d -name "dotnet-pgo" -path "*/bin/*" | head -1)
          if [[ -z "${dotnet_pgo_dir}" ]] || [[ ! -f "${dotnet_pgo_dir}/dotnet-pgo.dll" ]]; then
            echo "dotnet-pgo was not produced under artifacts/"
            exit 1
          fi

          cp -a "${dotnet_pgo_dir}" "${RUNNER_TEMP}/dotnet-pgo-bin"
          # Add a wrapper script so dotnet-pgo is callable by name
          cat > "${RUNNER_TEMP}/dotnet-pgo-bin/dotnet-pgo" <<'WRAPPER'
          #!/usr/bin/env bash
          set -euo pipefail
          script_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec dotnet "${script_dir}/dotnet-pgo.dll" "$@"
          WRAPPER
          chmod +x "${RUNNER_TEMP}/dotnet-pgo-bin/dotnet-pgo"
          echo "${RUNNER_TEMP}/dotnet-pgo-bin" >> "${GITHUB_PATH}"

      - name: Convert traces to .mibc and merge with edge profiling
        id: convert
        shell: bash
        run: |
          set -euo pipefail
          mibc_file="${RUNNER_TEMP}/nethermind.mibc"
          pgo_dir="${RUNNER_TEMP}/pgo-data"

          if [[ ! -d "${pgo_dir}" ]] || [[ -z "$(ls -A "${pgo_dir}" 2>/dev/null)" ]]; then
            echo "No PGO data found in ${pgo_dir}."
            exit 1
          fi

          # Step 1: Create .mibc from EventPipe trace (method-level hot/cold)
          trace_file=$(find "${pgo_dir}" -name "*.nettrace" -not -name "sampling*" -type f -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2- || true)
          if [[ -z "${trace_file}" ]]; then
            echo "No .nettrace file found under: ${pgo_dir}"
            ls -laR "${pgo_dir}"
            exit 1
          fi

          # Extract Nethermind assemblies from the PGO image so dotnet-pgo can resolve
          # generic method signatures against R2R tables
          ref_dir="${RUNNER_TEMP}/nethermind-ref"
          cid=$(docker create "nethermindeth/nethermind:${{ env.PGO_TAG }}" --entrypoint /bin/true 2>/dev/null || true)
          if [[ -n "${cid}" ]]; then
            docker cp "${cid}:/nethermind/" "${ref_dir}/" 2>/dev/null || true
            docker rm "${cid}" >/dev/null 2>&1 || true
          fi

          echo "Converting ${trace_file} to .mibc..."
          trace_mibc="${RUNNER_TEMP}/trace.mibc"
          create_mibc_args=(
            --trace "${trace_file}"
            --output "${trace_mibc}"
          )
          if [[ -d "${ref_dir}" ]]; then
            for dll in "${ref_dir}"/*.dll; do
              create_mibc_args+=(--reference "${dll}")
            done
          fi
          dotnet-pgo create-mibc "${create_mibc_args[@]}"

          # Step 1b: If CPU sampling trace exists, convert and merge for call graph data
          sampling_trace="${pgo_dir}/sampling.trace.zip"
          if [[ -f "${sampling_trace}" ]]; then
            echo "Converting CPU sampling trace to .mibc..."
            sampling_mibc="${RUNNER_TEMP}/sampling.mibc"
            # Use PgoTrim-converted .etlx (has MethodDetails) with .spgo alongside
            # (perf sample IPs that dotnet-pgo's patched SPGO code reads)
            sampling_etlx="${RUNNER_TEMP}/sampling-converted.etlx"
            sampling_input="${sampling_trace}"
            if [[ -f "${sampling_etlx}" ]]; then
              sampling_input="${sampling_etlx}"
              echo "Using converted .etlx with .spgo samples"
            fi
            sampling_args=(
              --trace "${sampling_input}"
              --output "${sampling_mibc}"
            )
            if [[ -d "${ref_dir}" ]]; then
              for dll in "${ref_dir}"/*.dll; do
                sampling_args+=(--reference "${dll}")
              done
            fi
            dotnet-pgo create-mibc --spgo --spgo-min-samples 20 "${sampling_args[@]}" || true

            if [[ -f "${sampling_mibc}" ]]; then
              main_size=$(stat -c%s "${trace_mibc}" 2>/dev/null || echo 0)
              sampling_size=$(stat -c%s "${sampling_mibc}" 2>/dev/null || echo 0)
              echo "Main .mibc: ${main_size} bytes, Sampling .mibc: ${sampling_size} bytes"

              echo "Merging main + sampling .mibc profiles..."
              dotnet-pgo merge \
                --input "${trace_mibc}" \
                --input "${sampling_mibc}" \
                --output "${mibc_file}"
              echo "Merged .mibc profile:"
              ls -lh "${mibc_file}"
            else
              echo "Sampling .mibc creation failed — using main trace only."
              cp "${trace_mibc}" "${mibc_file}"
            fi
          else
            echo "No sampling trace — using main trace only."
            cp "${trace_mibc}" "${mibc_file}"
          fi

          echo "Final .mibc profile:"
          ls -lh "${mibc_file}"
          echo "mibc_file=${mibc_file}" >> "${GITHUB_OUTPUT}"

          # .jit compression is handled by the "Process traces with PgoTrim" step above

      - name: Upload .mibc artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nethermind-pgo-profile
          path: ${{ steps.convert.outputs.mibc_file }}
          retention-days: 90

      - name: Upload compressed .jit.gz artifact
        if: always() && steps.pgotrim.outputs.jit_gz != ''
        uses: actions/upload-artifact@v7
        with:
          name: nethermind-pgo-jit
          path: ${{ steps.pgotrim.outputs.jit_gz }}
          retention-days: 90

      - name: Upload raw PGO data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nethermind-pgo-raw-data
          path: ${{ runner.temp }}/pgo-data/
          if-no-files-found: warn
          retention-days: 30

      - name: Clean up Docker resources
        if: always()
        shell: bash
        run: |
          echo "Disk usage before cleanup:"
          df -h / | tail -1
          # Stop and remove all EXPB containers + networks
          docker ps -aq --filter "name=expb-executor" 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
          docker ps -aq --filter "ancestor=nethermindeth/nethermind" 2>/dev/null | xargs -r docker rm -f 2>/dev/null || true
          docker network ls --filter "name=expb-executor" -q 2>/dev/null | xargs -r docker network rm 2>/dev/null || true
          rm -f /tmp/expb.lock
          # Remove all stopped containers
          docker container prune -f 2>/dev/null || true
          # Remove old images (keep base images needed by other workflows)
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' 2>/dev/null | \
            grep -E "nethermindeth/nethermind:pgo-|grafana/alloy|grafana/k6" | \
            awk '{print $2}' | sort -u | \
            xargs -r docker rmi -f 2>/dev/null || true
          # Remove dangling images and all build cache
          docker image prune -f 2>/dev/null || true
          docker builder prune -f --keep-storage 4G 2>/dev/null || true
          echo "Disk usage after cleanup:"
          df -h / | tail -1

  update-pgo-profile:
    name: Update PGO profile
    needs: collect
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download .mibc artifact
        uses: actions/download-artifact@v7
        with:
          name: nethermind-pgo-profile
          path: src/Nethermind/Nethermind.Runner/pgo/

      - name: Download .jit.gz artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: nethermind-pgo-jit
          path: src/Nethermind/Nethermind.Runner/pgo/

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/Nethermind/Nethermind.Runner/pgo/; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No changes to PGO profile."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "PGO profile has changed."
          fi

      - name: Commit to branch (non-master)
        if: steps.diff.outputs.changed == 'true' && github.ref != 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Nethermind/Nethermind.Runner/pgo/nethermind.mibc
          git add src/Nethermind/Nethermind.Runner/pgo/nethermind.jit.gz 2>/dev/null || true
          git commit -m "chore(pgo): update PGO profile"
          git push

      - name: Create pull request (master)
        if: steps.diff.outputs.changed == 'true' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="chore/update-pgo-profile-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add src/Nethermind/Nethermind.Runner/pgo/nethermind.mibc
          git add src/Nethermind/Nethermind.Runner/pgo/nethermind.jit.gz 2>/dev/null || true
          git commit -m "chore(pgo): update PGO profile from weekly collection"
          git push -u origin "${branch}"
          gh pr create \
            --title "chore(pgo): update PGO profile" \
            --body "$(cat <<'EOF'
          ## Summary
          - Weekly automated update of the PGO (.mibc) profile used for R2R compilation
          - Updated edge/block profiling data (.jit.gz) for runtime branch optimization
          - Generated from 5000 mainnet blocks via EventPipe profiling

          ## Test plan
          - [ ] CI passes (R2R build uses the updated profile automatically)
          EOF
          )" \
            --base master
