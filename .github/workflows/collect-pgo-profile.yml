name: Collect PGO Profile

on:
  push:
    branches: [ready-to-run]
    paths:
      - .github/workflows/collect-pgo-profile.yml
      - Dockerfile.pgo
  workflow_dispatch:
    inputs:
      state_layout:
        description: State layout mode
        required: true
        type: choice
        options:
          - halfpath
          - flat
        default: halfpath
      payload_set:
        description: Payload set mode
        required: true
        type: choice
        options:
          - realblocks
          - superblocks
        default: realblocks
  schedule:
    # Weekly on Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  EXPB_DATA_DIR: /mnt/sda/expb-data
  PGO_IMAGE: nethermind-pgo:local

jobs:
  collect:
    name: Collect PGO profile via EXPB
    runs-on: [self-hosted, reproducible-benchmarks]
    timeout-minutes: 720
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve config file
        id: resolve
        shell: bash
        env:
          STATE_LAYOUT: ${{ inputs.state_layout || 'halfpath' }}
          PAYLOAD_SET: ${{ inputs.payload_set || 'realblocks' }}
        run: |
          set -euo pipefail
          if [[ "${STATE_LAYOUT}" == "flat" && "${PAYLOAD_SET}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet-flat.yaml"
          elif [[ "${STATE_LAYOUT}" == "flat" && "${PAYLOAD_SET}" == "realblocks" ]]; then
            config_file="github-action-mainnet-flat.yaml"
          elif [[ "${STATE_LAYOUT}" == "halfpath" && "${PAYLOAD_SET}" == "superblocks" ]]; then
            config_file="github-action-compressed-mainnet.yaml"
          else
            config_file="github-action-mainnet.yaml"
          fi
          echo "config_file=${config_file}" >> "${GITHUB_OUTPUT}"

      - name: Build PGO collection Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f Dockerfile.pgo \
            -t "${PGO_IMAGE}" \
            --build-arg COMMIT_HASH=$(git rev-parse HEAD) \
            .

      - name: Install or upgrade expb
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v uv >/dev/null 2>&1; then
            echo "uv is required but not found in PATH."
            exit 1
          fi
          uv tool install --force --from "git+https://github.com/NethermindEth/execution-payloads-benchmarks" expb
          echo "$(uv tool dir --bin)" >> "${GITHUB_PATH}"

      - name: Render benchmark config for local PGO image
        id: render-config
        shell: bash
        env:
          CONFIG_FILE: ${{ steps.resolve.outputs.config_file }}
        run: |
          set -euo pipefail
          rendered="${RUNNER_TEMP}/rendered-pgo-config.yaml"

          # Replace docker image reference with local image name and disable pull
          sed \
            -e 's#<<DOCKER_TAG>>#local#g' \
            -e 's#<<DELAY>>#0#g' \
            -e 's#^\([[:space:]]*\)nethermind:#\1nethermind-pgo-collect:#g' \
            "${EXPB_DATA_DIR}/${CONFIG_FILE}" \
            > "${rendered}"

          # Replace the Docker Hub image with our local image name
          sed -i "s#nethermindeth/nethermind:local#${PGO_IMAGE}#g" "${rendered}"

          # Add pull_policy: never if expb supports it (append after image line)
          sed -i '/docker_image:/a\    pull_policy: never' "${rendered}" 2>/dev/null || true

          echo "rendered_config_file=${rendered}" >> "${GITHUB_OUTPUT}"
          echo "Rendered config:"
          cat "${rendered}"

      - name: Run EXPB for PGO collection
        id: run-expb
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.EXPB_DATA_DIR }}
        run: |
          set -euo pipefail
          expb execute-scenarios \
            --config-file "${{ steps.render-config.outputs.rendered_config_file }}" \
            --per-payload-metrics \
            --print-logs \
            2>&1 | tee "${RUNNER_TEMP}/expb-pgo-run.log"

      - name: Extract .nettrace from container
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/pgo-traces"

          # Find containers from our PGO image (running or stopped)
          container_id=$(docker ps -a --filter "ancestor=${PGO_IMAGE}" \
            --format '{{.ID}}' | head -1)

          if [[ -n "${container_id}" ]]; then
            echo "Extracting traces from container ${container_id}..."
            docker cp "${container_id}:/nethermind/pgo/" "${RUNNER_TEMP}/pgo-traces/" 2>/dev/null || true
            # EventPipe may write to working directory
            docker cp "${container_id}:/nethermind/" "${RUNNER_TEMP}/pgo-workdir/" 2>/dev/null || true
          fi

          # Search everywhere for .nettrace files
          echo "Looking for .nettrace files..."
          find "${RUNNER_TEMP}" -name "*.nettrace" -type f -ls 2>/dev/null || true
          find /tmp -name "*.nettrace" -type f -ls 2>/dev/null || true

      - name: Set up .NET for dotnet-pgo
        if: always()
        uses: actions/setup-dotnet@v5
        with:
          cache: false

      - name: Install dotnet-pgo tool
        if: always()
        run: dotnet tool install -g dotnet-pgo

      - name: Convert .nettrace to .mibc
        id: convert
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          trace_file=$(find "${RUNNER_TEMP}" /tmp -name "*.nettrace" -type f 2>/dev/null | head -1)

          if [[ -z "${trace_file}" ]]; then
            echo "No .nettrace file found."
            exit 1
          fi

          echo "Converting ${trace_file} to .mibc..."
          mibc_file="${RUNNER_TEMP}/nethermind.mibc"

          dotnet-pgo create-mibc \
            --trace "${trace_file}" \
            --output "${mibc_file}"

          echo "Generated .mibc profile:"
          ls -lh "${mibc_file}"
          echo "mibc_file=${mibc_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload .mibc artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nethermind-pgo-profile
          path: ${{ steps.convert.outputs.mibc_file }}
          retention-days: 90

      - name: Upload raw trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nethermind-pgo-nettrace
          path: |
            ${{ runner.temp }}/pgo-traces/
            ${{ runner.temp }}/pgo-workdir/**/*.nettrace
          if-no-files-found: warn
          retention-days: 30

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          docker rmi "${PGO_IMAGE}" 2>/dev/null || true
