# NOTE: Requires repository secret SLACK_SYNC_WEBHOOK_URL for failure notifications.
# Create a Slack incoming webhook and add it as a repo secret.

name: Sync Master Validation

on:
  workflow_run:
    workflows: ["Publish Docker image"]
    branches: [master]
    types:
      - completed

  workflow_dispatch:
    inputs:
      nethermind_image:
        description: "Docker image tag to test (e.g. nethermindeth/nethermind:master)"
        default: ""
        required: false
      mode:
        description: "Sync mode"
        type: choice
        options:
          - Both
          - HalfPath
          - Flat
        default: Both
        required: true
      chain_filter:
        description: "Run specific chain(s) only (partial name match, e.g. 'mainnet')"
        default: ""
        required: false

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: "1"
  TERM: xterm

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      docker_image: ${{ steps.set-image.outputs.docker_image }}
    steps:
      - name: Determine docker image
        id: set-image
        env:
          IMAGE_INPUT: ${{ github.event.inputs.nethermind_image }}
        run: |
          if [ -n "$IMAGE_INPUT" ]; then
            echo "docker_image=$IMAGE_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "docker_image=nethermindeth/nethermind:master" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/config
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name || 'master' }}

      - name: Set Matrix
        id: set-matrix
        env:
          MODE_INPUT: ${{ github.event.inputs.mode }}
          CHAIN_FILTER: ${{ github.event.inputs.chain_filter }}
        run: |
          requested_mode="${MODE_INPUT:-Both}"
          requested_mode=$(echo "$requested_mode" | tr '[:upper:]' '[:lower:]')

          case "$requested_mode" in
            both)     modes='["HalfPath","Flat"]' ;;
            halfpath) modes='["HalfPath"]' ;;
            flat)     modes='["Flat"]' ;;
            *)
              echo "Unsupported mode '$requested_mode'. Expected 'Both', 'HalfPath', or 'Flat'."
              exit 1
              ;;
          esac

          # Filter testnet-matrix.json to master-validation chains only
          MASTER_CHAINS='["mainnet","gnosis","op-mainnet"]'

          matrix=$(cat scripts/config/testnet-matrix.json | jq \
            --argjson chains "$MASTER_CHAINS" \
            --argjson modes "$modes" \
            --arg run_id "$GITHUB_RUN_ID" \
            '[.[] | select(.network as $n | $chains | index($n)) ] |
             [.[] as $config
              | $modes[] as $mode
              | $config + {
                  mode: $mode,
                  runner_label: (
                    (if $mode == "Flat" then "f-" else "hp-" end)
                    + $run_id + "-master-" + $config.network
                  )
                }]')

          # Apply chain_filter if provided
          if [ -n "$CHAIN_FILTER" ]; then
            matrix=$(echo "$matrix" | jq --arg filter "$CHAIN_FILTER" '[.[] | select(.network | contains($filter))]')
          fi

          echo "matrix=$(echo "$matrix" | jq -c .)" >> "$GITHUB_OUTPUT"

  create_a_runner:
    needs: [setup-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}

      - name: Create a Runner
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "create"
          runner_label: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          machine_type: "${{ matrix.config.agent }}"
          image: "linode/ubuntu24.04"
          tags: "core, self-hosted, dynamic"
          organization: "NethermindEth"
          repo_name: "nethermind"
          blocked_ports: "8545,8546,8547,8551,8552,8553"

  sync-chain:
    needs: [setup-matrix, create_a_runner]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    name: "Sync ${{ matrix.config.network }} (${{ matrix.config.mode }})"
    runs-on: ${{ matrix.config.runner_label }}
    timeout-minutes: ${{ matrix.config.timeout }}

    steps:
      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "nethermind,post-merge-smoke-tests"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: true
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name || 'master' }}

      - name: Checkout tests repository
        uses: actions/checkout@v6
        with:
          repository: NethermindEth/post-merge-smoke-tests
          path: tests
          token: ${{ steps.gh-app.outputs.token }}
          clean: true

      - name: Installing requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y make build-essential jq screen lshw dmidecode fio zip

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.X"

      - name: Install Sedge environment
        run: |
          git clone https://github.com/NethermindEth/sedge.git sedge --branch core --single-branch
          cd sedge
          make compile

      - name: Run Sedge
        working-directory: sedge
        env:
          DOCKER_IMAGE: ${{ needs.setup-matrix.outputs.docker_image }}
          NETWORK: ${{ matrix.config.network }}
          SYNC_MODE: ${{ matrix.config.mode }}
          CL_CLIENT: ${{ matrix.config.cl }}
          CL_IMAGE: ${{ matrix.config.cl_image }}
          CHECKPOINT_URL: ${{ matrix.config.checkpoint-sync-url }}
          SEQ_API_KEY: ${{ secrets.SEQ_API_KEY }}
          GRAFANA_URL: ${{ secrets.GRAFANA_CONNECTION_STRING }}
          MAINNET_CONSENSUS_URL: ${{ secrets.MAINNET_CONSENSUS_URL }}
          MAINNET_EXECUTION_URL: ${{ secrets.MAINNET_EXECUTION_URL }}
        run: |
          case "${SYNC_MODE,,}" in
            halfpath) flatdb_enabled=false ;;
            flat)     flatdb_enabled=true ;;
          esac

          node_name="SyncMasterValidation-${NETWORK}-${SYNC_MODE}-${GITHUB_RUN_ID}"

          ./build/sedge deps install

          GENERIC_METRICS_FLAGS=(
            --el-extra-flag "Metrics.NodeName=${node_name}"
            --el-extra-flag Metrics.Enabled=true
            --el-extra-flag "Seq.ServerUrl=https://seq.nethermind.io"
            --el-extra-flag "Seq.ApiKey=${SEQ_API_KEY}"
            --el-extra-flag Seq.MinLevel=Info
            --el-extra-flag "Init.LogRules=Synchronization.Peers.SyncPeersReport:Debug"
            --el-extra-flag "Metrics.PushGatewayUrl=${GRAFANA_URL}"
          )

          OP_METRICS_FLAGS=(
            --el-op-extra-flag "Metrics.NodeName=${node_name}"
            --el-op-extra-flag Metrics.Enabled=true
            --el-op-extra-flag "Seq.ServerUrl=https://seq.nethermind.io"
            --el-op-extra-flag "Seq.ApiKey=${SEQ_API_KEY}"
            --el-op-extra-flag Seq.MinLevel=Info
            --el-op-extra-flag "Init.LogRules=Synchronization.Peers.SyncPeersReport:Debug"
            --el-op-extra-flag "Metrics.PushGatewayUrl=${GRAFANA_URL}"
          )

          if [[ "$NETWORK" == op-* ]]; then
            mkdir -p execution-data-op/logs/configs
            mv ../tests/predefined_configs/customNLog.config execution-data-op/logs/configs/customNLog.config

            ./build/sedge generate \
              --logging none \
              -p $GITHUB_WORKSPACE/sedge \
              op-full-node \
              --op-execution opnethermind:$DOCKER_IMAGE \
              --op-image op-node:us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:latest \
              --map-all \
              --network mainnet \
              --consensus-url $MAINNET_CONSENSUS_URL \
              --execution-api-url $MAINNET_EXECUTION_URL \
              --el-op-extra-flag FlatDb.Enabled=$flatdb_enabled \
              --el-op-extra-flag Sync.NonValidatorNode=true \
              --el-op-extra-flag Sync.DownloadBodiesInFastSync=false \
              --el-op-extra-flag Sync.DownloadReceiptsInFastSync=false \
              --el-op-extra-flag loggerConfigSource=/nethermind/data/logs/configs/customNLog.config \
              --el-op-extra-flag Sync.VerifyTrieOnStateSyncFinished=true \
              "${OP_METRICS_FLAGS[@]}"
          else
            mkdir -p execution-data/logs/configs
            mv ../tests/predefined_configs/customNLog.config execution-data/logs/configs/customNLog.config

            ./build/sedge generate \
              --logging none \
              -p $GITHUB_WORKSPACE/sedge \
              full-node \
              -c ${CL_CLIENT}:${CL_IMAGE} \
              -e nethermind:$DOCKER_IMAGE \
              --map-all \
              --no-mev-boost \
              --no-validator \
              --network $NETWORK \
              --el-extra-flag FlatDb.Enabled=$flatdb_enabled \
              --el-extra-flag Sync.NonValidatorNode=true \
              --el-extra-flag Sync.DownloadBodiesInFastSync=false \
              --el-extra-flag Sync.DownloadReceiptsInFastSync=false \
              --el-extra-flag JsonRpc.EnabledModules=[Eth,Subscribe,Trace,TxPool,Web3,Personal,Proof,Net,Parity,Health,Rpc,Debug] \
              --el-extra-flag Sync.VerifyTrieOnStateSyncFinished=true \
              --el-extra-flag loggerConfigSource=/nethermind/data/logs/configs/customNLog.config \
              --el-extra-flag Sync.SnapSync=true \
              "${GENERIC_METRICS_FLAGS[@]}" \
              --checkpoint-sync-url=${CHECKPOINT_URL}
          fi

          ./build/sedge run -p $GITHUB_WORKSPACE/sedge

      - name: Wait for sync
        env:
          NETWORK: ${{ matrix.config.network }}
          SYNC_MODE: ${{ matrix.config.mode }}
        run: python scripts/wait-for-sync.py

      - name: Get Nethermind Debug Logs
        if: failure() || cancelled()
        env:
          NETWORK: ${{ matrix.config.network }}
          SYNC_MODE: ${{ matrix.config.mode }}
        run: |
          target_dir=$(find . -type d -name "*execution-data*" | head -n 1)
          cd "$target_dir/logs"
          log_file=$(find . -type f -name "*.log" | head -n 1)
          artifact_name=$(basename "$log_file")-${NETWORK}-${SYNC_MODE}-${{ github.run_id }}
          zip "${artifact_name}.zip" "$log_file"
          echo "artifact_name=$artifact_name" >> $GITHUB_ENV
          echo "artifact_path=$(pwd)/${artifact_name}.zip" >> $GITHUB_ENV

      - name: Upload Nethermind Debug logs artifact
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: ${{ env.artifact_path }}
          retention-days: 7

      - name: Get Consensus Logs
        if: always() && matrix.config.network != 'op-mainnet'
        run: docker logs sedge-consensus-client

      - name: Get OP Consensus Logs
        if: always() && matrix.config.network == 'op-mainnet'
        run: docker logs sedge-consensus-op-l2-client

      - name: Check size of DB
        if: always()
        run: du -h $GITHUB_WORKSPACE/sedge

  destroy_runner:
    needs: [setup-matrix, create_a_runner, sync-chain]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ADMIN_APP_ID }}
          private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}

      - name: Destroy VM (make sure is removed)
        continue-on-error: true
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "destroy-machine"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"

      - name: Destroy Runner
        uses: kamilchodola/linode-github-runner/.github/actions/linode-machine-manager@main
        with:
          linode_token: ${{ secrets.LINODE_TOKEN }}
          github_token: "${{ steps.gh-app.outputs.token }}"
          action: "destroy-runner"
          runner_label: ${{ matrix.config.runner_label }}
          search_phrase: ${{ matrix.config.runner_label }}
          root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}
          organization: "NethermindEth"
          repo_name: "nethermind"

  notify-on-failure:
    needs: [sync-chain]
    if: ${{ contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Collect failed jobs
        id: failures
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          failed=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --paginate -q '.jobs[] | select(.conclusion == "failure") | select(.name | startswith("Sync ")) | .name' \
            | tr '\n' ', ' | sed 's/,$//')
          if [ -z "$failed" ]; then
            failed="(check run for details)"
          fi
          echo "failed_jobs=$failed" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        env:
          FAILED_JOBS: ${{ steps.failures.outputs.failed_jobs }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          webhook: ${{ secrets.SLACK_SYNC_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Sync validation failed after merge to master",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Sync Failure on Master*\n*Failed:* ${{ env.FAILED_JOBS }}\n*Commit:* `${{ env.COMMIT_SHA }}`\n*Run:* ${{ env.RUN_URL }}"
                  }
                }
              ]
            }
