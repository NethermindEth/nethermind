name: Hive - Invalid Missing Ancestor tests

on:
  push:
    branches: ['test/hive-invalid-missing-ancestor']
  workflow_dispatch:

jobs:
  test:
    name: Run Invalid Missing Ancestor Hive tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out Nethermind repository
        uses: actions/checkout@v6
        with:
          path: nethermind

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: nethermind
          file: nethermind/Dockerfile
          tags: nethermind:test-${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Check out Hive repository
        uses: actions/checkout@v6
        with:
          repository: ethereum/hive
          ref: master
          path: hive

      - name: Patch Hive Dockerfile
        run: sed -i 's#FROM $baseimage:$tag#FROM nethermind:test-${{ github.sha }}#g' hive/clients/nethermind/Dockerfile

      - name: Build Hive
        working-directory: hive
        run: go build .

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Hive
        continue-on-error: true
        working-directory: hive
        run: |
          ./hive \
            --client nethermind \
            --sim ethereum/engine \
            --sim.loglevel 3 \
            --sim.parallelism 4 \
            --sim.limit "Invalid Missing Ancestor Syncing ReOrg"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_number }}-${{ github.run_attempt }}
          path: hive/workspace
          retention-days: 7

      - name: Print results
        run: |
          rm -f hive/workspace/logs/hive.json
          nethermind/scripts/hive-results.sh "hive/workspace/logs/*.json"
