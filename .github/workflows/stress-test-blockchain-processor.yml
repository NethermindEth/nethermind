name: Stress test BlockchainProcessorTests

on:
  workflow_dispatch:

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm

defaults:
  run:
    shell: bash

jobs:
  stress:
    name: "BlockchainProcessorTests [no-intrinsics] run ${{ matrix.run }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Run BlockchainProcessorTests (no-intrinsics)
        working-directory: src/Nethermind/Nethermind.Blockchain.Test
        env:
          DOTNET_EnableHWIntrinsic: "0"
        run: |
          dotnet test --project Nethermind.Blockchain.Test.csproj -c release \
            --filter "FullyQualifiedName~BlockchainProcessorTests"
