name: Stress test BlockchainProcessorTests

on:
  push:
    branches:
      - fix/flaky-blockchain-processor-stress
  workflow_dispatch:

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm

defaults:
  run:
    shell: bash

jobs:
  stress:
    name: "BlockchainProcessorTests [no-intrinsics] run ${{ matrix.run }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 4]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build once
        working-directory: src/Nethermind/Nethermind.Blockchain.Test
        run: dotnet build Nethermind.Blockchain.Test.csproj -c release

      - name: Run BlockchainProcessorTests with contention (no-intrinsics)
        working-directory: src/Nethermind/Nethermind.Blockchain.Test
        env:
          DOTNET_EnableHWIntrinsic: "0"
        run: |
          failures=0
          total=8
          for i in $(seq 1 $total); do
            echo "=== Iteration $i ==="
            dotnet test --project Nethermind.Blockchain.Test.csproj -c release --no-build \
              --filter "FullyQualifiedName~BlockchainProcessorTests" &
          done
          # Wait for all background jobs and count failures
          for job in $(jobs -p); do
            wait "$job" || failures=$((failures + 1))
          done
          echo "=== Results: $((total - failures))/$total passed, $failures failed ==="
          if [ "$failures" -gt 0 ]; then
            echo "FLAKY: $failures out of $total runs failed"
            exit 1
          fi
