# Claude Council Review workflow
#
# On-demand, multi-model review. A trusted maintainer comments "@claude council-review"
# on a PR; this runs the `council-review` skill, which gathers an independent review from
# Claude AND from Codex (OpenAI) on the same diff, then synthesizes one consensus report
# (agreements / disagreements / prioritized findings) and posts it as a PR comment.
#
# This is a heavier, opt-in review (two models ≈ 2x tokens) — it is NOT auto-triggered and
# does NOT post a merge-gating commit status. The single-model gate stays in claude-review.yml.
#
# NOTE: "@claude council-review" contains the substring "review", so claude-review.yml would
# also match it — that workflow now excludes comments containing "council", so a single
# "@claude council-review" fires only this council workflow.

name: Claude Council Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  council:
    # Trigger only on an explicit "@claude council-review" from a trusted author.
    #
    # The author_association guard is a security boundary, identical to claude-review.yml:
    # comment events run in the base-repo context with full secret access even for comments
    # on fork PRs, so without this an external contributor could spend the Claude seat +
    # OpenAI key by commenting on their own PR.
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') && contains(github.event.comment.body, 'council') &&
        contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') && contains(github.event.comment.body, 'council') &&
        contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') && contains(github.event.review.body, 'council') &&
        contains(fromJSON('["MEMBER","COLLABORATOR","OWNER"]'), github.event.review.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write # post the council report as a PR comment
      issues: write
      id-token: write # required by claude-code-action for OIDC auth
      actions: read
    env:
      # Codex authenticates headless via API key (no interactive `codex login` in CI).
      # This also lifts the ChatGPT-account model restriction, so the skill's `codex exec`
      # uses the default model with no `-m` override needed.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      # fetch-depth: 0 so `git merge-base HEAD origin/<base>` resolves the true PR diff base
      # (the council skill diffs against the merge base, not the branch tip).
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The council skill shells out to the Codex CLI; the plugin only wraps it, so in CI we
      # install the CLI directly. Node is used to install it and by the SDK's bundled runtime.
      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Claude Council Review
        uses: anthropics/claude-code-action@v1
        with:
          # Same subscription-seat auth as claude-review.yml (an OAuth token from
          # `claude setup-token`), not an Anthropic API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}

            /council-review

            Review the PR above. After synthesizing the consensus report, post it as a
            top-level PR comment with `gh pr comment`.
          claude_args: |
            --model opus
            --allowedTools "Bash(git:*),Bash(codex:*),Bash(gh:*),Read,Grep,Glob,WebFetch,mcp__github_inline_comment__create_inline_comment"
