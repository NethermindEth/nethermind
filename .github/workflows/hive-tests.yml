name: Hive tests

on:
  push:
    tags: ['*']
    branches: [master, release/*]
  workflow_dispatch:
    inputs:
      test-suite:
        description: Test suite
        type: choice
        options:
          - 'all'
          - devp2p
          - ethereum/consensus
          - ethereum/eest
          - ethereum/engine
          - ethereum/graphql
          - ethereum/rpc-compat
          - ethereum/sync
      limit:
        description: Limit (ignored for the consensus suite)
        required: false
        type: string
      log-level:
        description: Log level
        required: true
        default: '3'
        type: choice
        options: ['0', '1', '2', '3', '4', '5']
      parallelism:
        description: Hive parallelism (--sim.parallelism)
        required: true
        default: 4
        type: number
      buildarg:
        description: Docker build arguments
        required: false
        type: string
      hive-repo:
        description: Hive repo
        required: true
        default: ethereum/hive
        type: string
      hive-branch:
        description: Hive branch
        required: false
        default: master
        type: string
      max-parallel:
        description: Maximum concurrent matrix jobs (blank = no cap)
        required: false
        type: number
      shard-count:
        description: Maximum number of consensus matrix shards
        required: false
        default: 256
        type: number
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_PARALLELISM: 4

jobs:
  setup:
    name: Set up test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Compute scope
        id: scope
        run: |
          event="${{ github.event_name }}"
          ref="${{ github.ref }}"
          suite='${{ github.event.inputs.test-suite }}'

          need_static=false
          need_consensus=false

          if [[ "$event" == "push" ]]; then
            if [[ "$ref" == "refs/heads/master" || "$ref" == refs/tags/* ]]; then
              need_static=true
            elif [[ "$ref" == refs/heads/release/* ]]; then
              need_consensus=true
            fi
          elif [[ "$event" == "workflow_call" ]]; then
            need_static=true
          elif [[ "$event" == "workflow_dispatch" ]]; then
            case "$suite" in
              all)
                need_static=true
                need_consensus=true
                ;;
              ethereum/consensus)
                need_consensus=true
                ;;
              *)
                need_static=true
                ;;
            esac
          fi

          echo "need_static=$need_static" >> "$GITHUB_OUTPUT"
          echo "need_consensus=$need_consensus" >> "$GITHUB_OUTPUT"

      - name: Check out Nethermind repository
        if: steps.scope.outputs.need_consensus == 'true'
        uses: actions/checkout@v6
        with:
          path: nethermind
          submodules: recursive

      - name: Set up .NET
        if: steps.scope.outputs.need_consensus == 'true'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: nethermind/global.json

      - name: Build matrix
        id: matrix
        run: |
          event="${{ github.event_name }}"
          suite_input='${{ github.event.inputs.test-suite }}'
          limit_input='${{ github.event.inputs.limit }}'
          parallelism='${{ github.event.inputs.parallelism || env.DEFAULT_PARALLELISM }}'
          shard_count='${{ github.event.inputs.shard-count || '256' }}'

          static_matrix='[]'
          consensus_matrix='[]'

          if [[ "${{ steps.scope.outputs.need_static }}" == "true" ]]; then
            if [[ "$event" == "workflow_dispatch" && "$suite_input" != "all" ]]; then
              static_matrix=$(jq -cn \
                --arg suite "$suite_input" \
                --arg limit "$limit_input" \
                --argjson p "$parallelism" \
                '[{suite:$suite, limits:$limit, parallelism:$p, name:$suite}]')
            else
              # engine-withdrawals at parallelism 2: the 128-block primary build takes
              # ~5 min on shared CI runners at parallelism 4, consuming the entire 300 s
              # test timeout before the syncing client starts.
              # engine-cancun and engine-api split into two runners each (I* vs non-I*)
              # to reduce contention.
              # engine-[^acw] catches exchange-capabilities and any future engine suites.
              static_matrix='[
                {"suite":"ethereum/engine",     "limits":"engine-cancun/^I",    "parallelism":3, "name":"engine-cancun-i"},
                {"suite":"ethereum/engine",     "limits":"engine-cancun/^[^I]", "parallelism":3, "name":"engine-cancun-other"},
                {"suite":"ethereum/engine",     "limits":"engine-api/^I",       "parallelism":3, "name":"engine-api-i"},
                {"suite":"ethereum/engine",     "limits":"engine-api/^[^I]",    "parallelism":3, "name":"engine-api-other"},
                {"suite":"ethereum/engine",     "limits":"engine-withdrawals",  "parallelism":2, "name":"engine-withdrawals"},
                {"suite":"ethereum/engine",     "limits":"engine-auth",         "parallelism":2, "name":"engine-auth"},
                {"suite":"ethereum/engine",     "limits":"engine-[^acw]",       "parallelism":2, "name":"engine-other"},
                {"suite":"ethereum/graphql",    "limits":"", "parallelism":4, "name":"graphql"},
                {"suite":"ethereum/rpc-compat", "limits":"", "parallelism":4, "name":"rpc-compat"},
                {"suite":"ethereum/sync",       "limits":"", "parallelism":4, "name":"sync"}
              ]'
            fi
          fi

          if [[ "${{ steps.scope.outputs.need_consensus }}" == "true" ]]; then
            (
              cd nethermind/tools/HiveConsensusWorkflowGenerator
              dotnet run -- src/tests "$shard_count"
            )
            consensus_matrix=$(jq -c \
              --argjson p "$parallelism" \
              'to_entries | map({
                suite: "ethereum/consensus",
                limits: ((.value.testNames // []) | map("/" + .) | join("|")),
                parallelism: $p,
                name: ("consensus-shard-" + (.key | tostring))
              })' \
              nethermind/tools/HiveConsensusWorkflowGenerator/matrix.json)
          fi

          combined=$(jq -cn --argjson s "$static_matrix" --argjson c "$consensus_matrix" '$s + $c')
          {
            echo "matrix<<MATRIX_END"
            echo "$combined"
            echo "MATRIX_END"
          } >> "$GITHUB_OUTPUT"

  build-image:
    name: Build Nethermind image
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Nethermind repository
        uses: actions/checkout@v6
        with:
          path: nethermind

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: nethermind
          file: nethermind/Dockerfile
          tags: nethermind:test-${{ github.sha }}
          outputs: type=docker,dest=${{ github.workspace }}/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: nethermind-image-${{ github.run_id }}
          path: image.tar
          retention-days: 1

  test:
    name: Run Hive (${{ matrix.name || matrix.suite }})
    needs: [setup, build-image]
    if: needs.setup.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max-parallel || '256') }}
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      LOG_LEVEL: ${{ github.event.inputs.log-level || '3' }}
      BUILDARG: ${{ github.event.inputs.buildarg || '' }}
      HIVE_REPO: ${{ github.event.inputs.hive-repo || 'ethereum/hive' }}
      HIVE_BRANCH: ${{ github.event.inputs.hive-branch || 'master' }}
    steps:
      - name: Check out Nethermind repository
        uses: actions/checkout@v6
        with:
          path: nethermind

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: nethermind-image-${{ github.run_id }}

      - name: Load Docker image
        run: docker load --input image.tar

      - name: Check out Hive repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HIVE_REPO }}
          ref: ${{ env.HIVE_BRANCH }}
          path: hive

      - name: Patch Hive Dockerfile
        run: sed -i 's#FROM $baseimage:$tag#FROM nethermind:test-${{ github.sha }}#g' hive/clients/nethermind/Dockerfile

      - name: Build Hive
        working-directory: hive
        run: go build .

      - name: Run Hive
        continue-on-error: true
        working-directory: hive
        env:
          LIMITS: ${{ matrix.limits }}
        run: |
          BASE_ARGS="--client nethermind
            --sim ${{ matrix.suite }}
            --sim.loglevel $LOG_LEVEL
            --sim.parallelism ${{ matrix.parallelism || env.DEFAULT_PARALLELISM }}"
          [[ -n "$BUILDARG" ]] && BASE_ARGS+=" --sim.buildarg \"$BUILDARG\""

          if [[ -z "$LIMITS" ]]; then
            ./hive $BASE_ARGS
          else
            IFS='|' read -ra LIMS <<< "$LIMITS"
            for lim in "${LIMS[@]}"; do
              [[ -z "$lim" ]] && continue
              ./hive $BASE_ARGS --sim.limit "$lim"
            done
          fi

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ strategy.job-index }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: hive/workspace
          retention-days: 7

      - name: Print results
        run: |
          rm -f hive/workspace/logs/hive.json
          nethermind/scripts/hive-results.sh "hive/workspace/logs/*.json"
