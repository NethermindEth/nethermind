name: Stateless R2 devnet tests

on:
  push:
    branches: [feature/stateless-devnet-tests]
  workflow_dispatch:
    inputs:
      catalog_url:
        description: Public R2 catalog root, index.html URL, or manifest.json URL
        required: false
        default: https://pub-5345007fbd06486bbb7cbbe9f3112c45.r2.dev/devnets/glamsterdam-devnet-5
        type: string
      batch_count:
        description: Number of latest complete batches to run, or all
        required: false
        default: all
        type: string
      timeout_minutes:
        description: Timeout per batch job
        required: false
        default: "90"
        type: string
      all_timeout_minutes:
        description: Timeout per batch job when batch_count is all
        required: false
        default: "360"
        type: string
      max_parallel:
        description: Maximum batch jobs to run in parallel
        required: false
        default: "8"
        type: string
  schedule:
    - cron: "23 */2 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Nethermind
        working-directory: src/Nethermind/Nethermind.Stateless.ZiskGuest
        run: make build

      - name: Upload guest binary
        uses: actions/upload-artifact@v7
        with:
          name: nethermind
          path: src/Nethermind/Nethermind.Stateless.ZiskGuest/bin/nethermind
          if-no-files-found: error
          retention-days: 1

  select-batches:
    name: Select batches
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      selected_count: ${{ steps.select.outputs.selected_count }}
      selection_label: ${{ steps.select.outputs.selection_label }}
      timeout_minutes: ${{ steps.select.outputs.timeout_minutes }}
      max_parallel: ${{ steps.select.outputs.max_parallel }}
    env:
      CATALOG_URL: ${{ github.event.inputs.catalog_url || 'https://pub-5345007fbd06486bbb7cbbe9f3112c45.r2.dev/devnets/glamsterdam-devnet-5' }}
      BATCH_COUNT: ${{ github.event.inputs.batch_count || 'all' }}
      SUMMARY_DIR: /tmp/stateless-r2
      DEFAULT_TIMEOUT_MINUTES: ${{ github.event.inputs.timeout_minutes || '90' }}
      ALL_TIMEOUT_MINUTES: ${{ github.event.inputs.all_timeout_minutes || '360' }}
      MAX_PARALLEL: ${{ github.event.inputs.max_parallel || '8' }}
    steps:
      - name: Select R2 batches
        id: select
        shell: bash
        run: |
          set -euo pipefail

          for value_name in DEFAULT_TIMEOUT_MINUTES ALL_TIMEOUT_MINUTES MAX_PARALLEL; do
            value="${!value_name}"
            if ! [[ "$value" =~ ^[1-9][0-9]*$ ]]; then
              echo "$value_name must be a positive integer, got: $value"
              exit 1
            fi
          done

          catalog="${CATALOG_URL%/}"
          catalog="${catalog%/index.html}"
          catalog="${catalog%/manifest.json}"

          rm -rf "$SUMMARY_DIR"
          mkdir -p "$SUMMARY_DIR"

          curl -fsSL "$catalog/batches.jsonl" -o "$SUMMARY_DIR/batches.jsonl"

          python3 - "$SUMMARY_DIR/batches.jsonl" "$BATCH_COUNT" "$DEFAULT_TIMEOUT_MINUTES" "$ALL_TIMEOUT_MINUTES" > "$SUMMARY_DIR/selection.json" <<'PY'
          import json
          import sys

          batches_path, batch_count, default_timeout, all_timeout = sys.argv[1:]
          with open(batches_path, encoding="utf-8") as file:
              batches = [json.loads(line) for line in file if line.strip()]

          if batch_count.lower() == "all":
              selected = batches
              timeout = all_timeout
              selection_label = "all available batches"
          else:
              if not batch_count.isdigit() or int(batch_count) < 1:
                  raise SystemExit(f"batch_count must be a positive integer or 'all', got: {batch_count}")

              requested = int(batch_count)
              selected = batches[-requested:]
              timeout = default_timeout
              selection_label = f"latest {len(selected)} batch(es)"

          matrix = {
              "include": [
                  {
                      "range": f"{batch['batchStartBlock']}-{batch['batchEndBlock']}",
                      "path": batch["path"],
                      "sha256": batch["sha256"],
                  }
                  for batch in selected
              ]
          }

          print(json.dumps({
              "matrix": matrix,
              "selected_count": len(selected),
              "selection_label": selection_label,
              "timeout_minutes": timeout,
          }))
          PY

          python3 - "$SUMMARY_DIR/selection.json" "$GITHUB_OUTPUT" "$MAX_PARALLEL" <<'PY'
          import json
          import sys

          selection_path, output_path, max_parallel = sys.argv[1:]
          with open(selection_path, encoding="utf-8") as file:
              selection = json.load(file)

          outputs = {
              "matrix": json.dumps(selection["matrix"], separators=(",", ":")),
              "selected_count": str(selection["selected_count"]),
              "selection_label": selection["selection_label"],
              "timeout_minutes": str(selection["timeout_minutes"]),
              "max_parallel": max_parallel,
          }

          with open(output_path, "a", encoding="utf-8") as file:
              for name, value in outputs.items():
                  file.write(f"{name}={value}\n")
          PY

  test:
    name: Run R2 batch ${{ matrix.range }}
    needs: [build, select-batches]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(needs.select-batches.outputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.select-batches.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.select-batches.outputs.matrix) }}
    env:
      CATALOG_URL: ${{ github.event.inputs.catalog_url || 'https://pub-5345007fbd06486bbb7cbbe9f3112c45.r2.dev/devnets/glamsterdam-devnet-5' }}
      SUMMARY_DIR: /tmp/stateless-r2-${{ matrix.range }}
      SELECTED_BATCHES: ${{ needs.select-batches.outputs.selection_label }}
      SELECTED_BATCH_COUNT: ${{ needs.select-batches.outputs.selected_count }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download guest binary
        uses: actions/download-artifact@v8
        with:
          name: nethermind
          path: src/Nethermind/Nethermind.Stateless.ZiskGuest/bin

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zstd

      - name: Run R2 batch
        shell: bash
        run: |
          set -euo pipefail

          guest_dir="src/Nethermind/Nethermind.Stateless.ZiskGuest"

          catalog="${CATALOG_URL%/}"
          catalog="${catalog%/index.html}"
          catalog="${catalog%/manifest.json}"

          rm -rf "$SUMMARY_DIR"
          mkdir -p "$SUMMARY_DIR"/{archives,extracted,logs}
          summary="$SUMMARY_DIR/summary.md"

          curl -fsSL "$catalog/manifest.json" -o "$SUMMARY_DIR/manifest.json"

          network="$(jq -r '.network' "$SUMMARY_DIR/manifest.json")"
          artifact_count="$(jq -r '.batches.artifactCount' "$SUMMARY_DIR/manifest.json")"
          batch_total="$(jq -r '.batches.count' "$SUMMARY_DIR/manifest.json")"

          {
            echo "# Stateless R2 devnet tests"
            echo
            echo "- Catalog: $catalog"
            echo "- Network: $network"
            echo "- Available batches: $batch_total"
            echo "- Available block artifacts: $artifact_count"
            echo "- Selected batches: $SELECTED_BATCHES"
            echo "- Matrix batches: $SELECTED_BATCH_COUNT"
            echo "- Current batch: ${{ matrix.range }}"
            echo
            echo "| Block | Hash | Result |"
            echo "| --- | --- | --- |"
          } > "$summary"

          chmod +x "$guest_dir/bin/nethermind"

          passed=0
          failed=0

          record_failure() {
            local block_number="$1"
            local block_hash="$2"
            local reason="$3"

            echo "::error title=Stateless R2 block failed::Block $block_number ($block_hash): $reason"
            echo "| $block_number | \`$block_hash\` | failed: $reason |" >> "$summary"
            failed=$((failed + 1))
          }

          archive_path="${{ matrix.path }}"
          archive_sha="$(echo "${{ matrix.sha256 }}" | sed 's/^0x//')"
          archive_name="$(basename "$archive_path")"
          archive="$SUMMARY_DIR/archives/$archive_name"
          batch_dir="$SUMMARY_DIR/extracted/${archive_name%.tar.zst}"

          echo "Downloading $archive_path"
          curl -fsSL "$catalog/$archive_path" -o "$archive"
          echo "$archive_sha  $archive" | sha256sum --check --status

          mkdir -p "$batch_dir"
          tar --zstd -xf "$archive" -C "$batch_dir"

          while IFS= read -r artifact; do
            block_number="$(jq -r '.blockNumber' <<< "$artifact")"
            block_hash="$(jq -r '.blockHash' <<< "$artifact")"
            input_sha="$(jq -r '.statelessInputSha256' <<< "$artifact" | sed 's/^0x//')"
            artifact_path="$(jq -r '.archivePath' <<< "$artifact")"
            block_json="$SUMMARY_DIR/block-$block_number.json"
            input_hex_file="$SUMMARY_DIR/block-$block_number.hex"
            raw_input_file="$SUMMARY_DIR/block-$block_number.raw.ssz"
            input_file="$guest_dir/bin/$block_number.ssz"
            log_file="$SUMMARY_DIR/logs/$block_number.log"

            if ! zstd -dc "$batch_dir/$artifact_path" > "$block_json"; then
              record_failure "$block_number" "$block_hash" "failed to decompress block artifact"
              continue
            fi

            if ! jq -r '.statelessInputBytes // .stateless_input_bytes // empty' "$block_json" > "$input_hex_file"; then
              record_failure "$block_number" "$block_hash" "failed to read statelessInputBytes"
              continue
            fi

            if [ ! -s "$input_hex_file" ]; then
              record_failure "$block_number" "$block_hash" "statelessInputBytes is missing"
              continue
            fi

            if ! python3 -c 'import sys; data = sys.stdin.read().strip(); data = data[2:] if data[:2].lower() == "0x" else data; open(sys.argv[1], "wb").write(bytes.fromhex(data))' "$raw_input_file" < "$input_hex_file"; then
              record_failure "$block_number" "$block_hash" "failed to decode statelessInputBytes"
              continue
            fi

            if ! echo "$input_sha  $raw_input_file" | sha256sum --check --status; then
              record_failure "$block_number" "$block_hash" "statelessInputBytes checksum mismatch"
              continue
            fi

            if ! python3 -c 'import struct, sys; data = open(sys.argv[1], "rb").read(); padding = (-len(data)) % 8; open(sys.argv[2], "wb").write(struct.pack("<Q", len(data)) + data + bytes(padding))' "$raw_input_file" "$input_file"; then
              record_failure "$block_number" "$block_hash" "failed to frame statelessInputBytes for Zisk"
              continue
            fi

            echo "Running block $block_number ($block_hash)"
            set +e
            timeout 5m make -C "$guest_dir" run INPUT="$block_number.ssz" 2>&1 | tee "$log_file"
            run_status=${PIPESTATUS[0]}
            set -e

            output_hex="$(grep -Eio '(0x)?[0-9a-f]{66,}' "$log_file" | sed 's/^0x//' | awk 'length($0) >= 66 { value=$0 } END { print value }' || true)"

            if [ "$run_status" -ne 0 ]; then
              record_failure "$block_number" "$block_hash" "guest exited $run_status"
            elif [ -z "$output_hex" ]; then
              record_failure "$block_number" "$block_hash" "no encoded output found"
            elif [ "${output_hex:64:2}" != "01" ]; then
              record_failure "$block_number" "$block_hash" "stateless result was not successful"
            else
              echo "| $block_number | \`$block_hash\` | passed |" >> "$summary"
              passed=$((passed + 1))
            fi

            rm -f "$input_file" "$raw_input_file" "$block_json" "$input_hex_file"
          done < <(jq -c '.artifacts[]' "$batch_dir/manifest.json")

          {
            echo
            echo "- Passed: $passed"
            echo "- Failed: $failed"
          } >> "$summary"

          if [ "$failed" -ne 0 ]; then
            cat "$summary"
            echo "::error title=Stateless R2 devnet tests failed::$failed block(s) failed"
            exit 1
          fi

      - name: Append summary
        if: always()
        run: |
          if [ -f "$SUMMARY_DIR/summary.md" ]; then
            cat "$SUMMARY_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No stateless R2 summary was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stateless-r2-devnet-${{ matrix.range }}-logs
          path: |
            ${{ env.SUMMARY_DIR }}/summary.md
            ${{ env.SUMMARY_DIR }}/manifest.json
            ${{ env.SUMMARY_DIR }}/logs
          if-no-files-found: warn
          retention-days: 7
