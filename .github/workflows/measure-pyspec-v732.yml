name: Measure Pyspec v732

# Reproduces master's exact pyspec NUnit job set (the 16 patricia chunks from
# nethermind-tests.yml + the 112 flat chunks from nethermind-tests-flat.yml =
# 128 jobs) against tests-bal@v7.3.2 (pinned in Constants.cs on this branch),
# so the cost can be measured without also running the ~240 unrelated unit-test
# jobs in those two workflows. Config-variant filters mirror the originals exactly.

on:
  workflow_dispatch:

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm

defaults:
  run:
    shell: bash

jobs:
  pyspec:
    name: Pyspec ${{ matrix.variant.label }} (${{ matrix.chunk }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOTNET_GCConserveMemory: 9
    strategy:
      fail-fast: false
      matrix:
        chunk: [1of16, 2of16, 3of16, 4of16, 5of16, 6of16, 7of16, 8of16, 9of16, 10of16, 11of16, 12of16, 13of16, 14of16, 15of16, 16of16]
        variant:
          # patricia (nethermind-tests.yml): unfiltered, default layout — runs every class incl. variants
          - { label: PatriciaSeq, flat: '', filter: '' }
          # flat (nethermind-tests-flat.yml): Sequential excludes the variant classes
          - { label: FlatSeq, flat: '1', filter: 'FullyQualifiedName!~AmsterdamParallel&FullyQualifiedName!~AmsterdamBatchRead' }
          - { label: Parallel, flat: '1', filter: 'FullyQualifiedName~AmsterdamParallelBlockchainTests' }
          - { label: BatchRead, flat: '1', filter: 'FullyQualifiedName~AmsterdamBatchReadBlockchainTests' }
          - { label: ParallelFull, flat: '1', filter: 'FullyQualifiedName~AmsterdamParallelFullBlockchainTests' }
          - { label: ParallelEngine, flat: '1', filter: 'FullyQualifiedName~AmsterdamParallelEngineBlockchainTests' }
          - { label: BatchReadEngine, flat: '1', filter: 'FullyQualifiedName~AmsterdamBatchReadEngineBlockchainTests' }
          - { label: ParallelFullEngine, flat: '1', filter: 'FullyQualifiedName~AmsterdamParallelFullEngineBlockchainTests' }
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false
          tool-cache: false
          swap-storage: false

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Pyspec ${{ matrix.variant.label }} (${{ matrix.chunk }})
        working-directory: src/Nethermind/Ethereum.Blockchain.Pyspec.Test
        env:
          TEST_CHUNK: ${{ matrix.chunk }}
          TEST_USE_FLAT: ${{ matrix.variant.flat }}
        run: |
          dotnet build Ethereum.Blockchain.Pyspec.Test.csproj -c release
          if [ -n "${{ matrix.variant.filter }}" ]; then
            dotnet test --project Ethereum.Blockchain.Pyspec.Test.csproj -c release --no-build --no-restore --filter "${{ matrix.variant.filter }}"
          else
            dotnet test --project Ethereum.Blockchain.Pyspec.Test.csproj -c release --no-build --no-restore
          fi
