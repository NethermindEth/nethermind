name: "Run a Geth node with selected configuration"

on:
  workflow_call:
    inputs:
      custom_run_id:
        description: "Run ID used for artifacts save"
        default: ""
        required: false
        type: string
      network:
        description: "Select a network on which You want to run a node"
        default: "mainnet"
        required: false
        type: string
      cl_client:
        description: "Select Consensus Layer Client to run node against"
        default: "lighthouse"
        required: false
        type: string
      additional_options:
        type: string
        description: "A Json property which allows to customize node even more"
        default: '{"timeout":"24", "ssh_keys":"", "allowed_ips":"", "custom_machine_type": ""}'
        required: false
    outputs:
      base_tag:
        description: ""
        value: ${{ jobs.create_docker_image.outputs.base_tag }}
      run_id:
        description: ""
        value: ${{ jobs.trigger_node_and_vm_creation.outputs.run_id }}

jobs:
  create_docker_image:
    runs-on: ubuntu-latest
    outputs:
      base_tag: ${{ steps.set-base-tag.outputs.base_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prepare docker tag
        id: prepare_ref
        run: |
          REF_NAME=${{ github.ref }}
          CLEAN_REF=geth-$(echo "${REF_NAME/refs\/heads\//}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "CLEAN_REF=$CLEAN_REF" >> $GITHUB_ENV

      - name: Set BASE_TAG
        id: set-base-tag
        run: |
          # Short, letter-prefixed, low-collision tag mixing the run ID with entropy
          # (kept brief because smoke-tests node/Terraform names derive from it).
          BASE_TAG="g$(echo "${GITHUB_RUN_ID}-$(shuf -i 100000-999999 -n 1)" | sha256sum | head -c 8)"
          echo "BASE_TAG=$BASE_TAG" >> $GITHUB_ENV
          echo "base_tag=$BASE_TAG" >> $GITHUB_OUTPUT

      # Geth uses the prebuilt ethereum/client-go image, so (unlike the Nethermind
      # workflow) no publish-docker build is triggered here.

  trigger_node_and_vm_creation:
    needs: create_docker_image
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.wait.outputs.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "nethermind,post-merge-smoke-tests"

      - name: Prepare ref
        id: prepare_ref
        run: |
          REF_NAME=${{ github.ref }}
          # Geth-prefixed so its rpc-url artifact never collides with the Nethermind one.
          CLEAN_REF=geth-$(echo "${REF_NAME/refs\/heads\//}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "CLEAN_REF=$CLEAN_REF" >> $GITHUB_ENV

      - name: Extract Variables
        id: extract_variables
        run: |
          echo "BASE_TAG=${{ needs.create_docker_image.outputs.base_tag }}" >> $GITHUB_ENV
          echo "timeout=$(echo '${{ inputs.additional_options }}' | jq -r .timeout)" >> $GITHUB_OUTPUT
          echo "allowed_ips=$(echo '${{ inputs.additional_options }}' | jq -r .allowed_ips)" >> $GITHUB_OUTPUT
          echo "custom_machine_type=$(echo '${{ inputs.additional_options }}' | jq -r .custom_machine_type)" >> $GITHUB_OUTPUT

      - name: Trigger Node creation Repo Action
        env:
          GH_TOKEN: ${{ steps.gh-app.outputs.token }}
          NETWORK: ${{ inputs.network }}
          CL_CLIENT: ${{ inputs.cl_client }}
          ALLOWED_IPS: ${{ steps.extract_variables.outputs.allowed_ips }}
          MACHINE_TYPE: ${{ steps.extract_variables.outputs.custom_machine_type }}
          TIMEOUT: ${{ steps.extract_variables.outputs.timeout }}
        run: |
          set -euo pipefail
          [ "$ALLOWED_IPS" == "null" ] && ALLOWED_IPS=""
          [ "$MACHINE_TYPE" == "null" ] && MACHINE_TYPE=""
          [ -z "$MACHINE_TYPE" ] && MACHINE_TYPE="g6-standard-16"

          case "$NETWORK" in
            mainnet) CHECKPOINT_URL="https://mainnet-checkpoint-sync.attestant.io" ;;
            sepolia) CHECKPOINT_URL="https://sepolia.beaconstate.info" ;;
            holesky) CHECKPOINT_URL="https://holesky.beaconstate.info" ;;
            hoodi)   CHECKPOINT_URL="https://hoodi.beaconstate.info" ;;
            *)       CHECKPOINT_URL="" ;;
          esac

          config_json=$(jq -cn --arg net "$NETWORK" --arg cl "$CL_CLIENT" --arg mt "$MACHINE_TYPE" --arg cp "$CHECKPOINT_URL" '{
            node_name_prefix: "RpcCmp-geth",
            el: [{client: "geth", image: "ethereum/client-go:stable", alias: "", convert_to_paprika: "false"}],
            el_extra_flags: {geth: ["syncmode=snap", "gcmode=full", "history.transactions=128", "history.state=128" , "history.chain=postprague"]},
            metrics_collection: false,
            cl: [{client: $cl, image: ""}],
            cl_extra_flags: {($cl): (if $cp != "" then ["checkpoint-sync-url=" + $cp] else [] end)},
            networks: [$net],
            branch: ["core"],
            fee_recipient: ["0x0000000000000000000000000000000000000000"],
            node_custom_types: {("geth_" + $net): $mt},
            tests_config: {categories: "", branch: ""}
          }')

          gh workflow run run-smoketests.yml \
            --repo NethermindEth/post-merge-smoke-tests --ref main \
            -f github_username="${{ github.actor }}" \
            -f base_tag="${{ env.BASE_TAG }}" \
            -f tags="rpc-comparison" \
            -f firewall_ips="$ALLOWED_IPS" \
            -f config_json="$config_json" \
            -f tests_active="0" \
            -f monitor_enabled="false" \
            -f timeout="$TIMEOUT"

      - name: Wait for creation of node
        id: wait
        env:
          GITHUB_TOKEN: ${{ steps.gh-app.outputs.token }}
          WORKFLOW_ID: "run-smoketests.yml"
          MAX_WAIT_MINUTES: "5"
          INTERVAL: "5"
          TIMEOUT: "30"
          ORG_NAME: "NethermindEth"
          REPO_NAME: "post-merge-smoke-tests"
          NAME_FILTER: ${{ env.BASE_TAG }}
          REF: "main"
        run: |
          chmod +x scripts/wait-for-workflow.sh
          ./scripts/wait-for-workflow.sh | tee script-output.txt
          run_id=$(grep -oP 'Run ID: \K\d+' script-output.txt)
          echo "Run ID extracted is: $run_id"
          echo "RUN_ID=$run_id" >> $GITHUB_ENV
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
        working-directory: ${{ github.workspace }}

      - name: Download machine specs artifact
        env:
          GH_APP_TOKEN: ${{ steps.gh-app.outputs.token }}
        run: |
          # wait-for-workflow.sh already blocks until the run completes, so the artifact
          # exists; this short retry only absorbs brief artifact-API listing lag.
          ARTIFACT_ID=""
          for attempt in $(seq 1 10); do
            ARTIFACT_ID=$(curl -s -H "Accept: application/vnd.github.v3+json" -H "Authorization: token $GH_APP_TOKEN" \
              "https://api.github.com/repos/NethermindEth/post-merge-smoke-tests/actions/runs/${{ env.RUN_ID }}/artifacts" | jq -r '.artifacts[0].id // empty')
            [ -n "$ARTIFACT_ID" ] && break
            echo "Artifact not listed yet (attempt $attempt/10); retrying in 15s..."
            sleep 15
          done
          if [ -z "$ARTIFACT_ID" ]; then
            echo "No machine-details artifact found for run ${{ env.RUN_ID }}."
            exit 1
          fi
          curl -L -H "Accept: application/vnd.github.v3+json" -H "Authorization: token $GH_APP_TOKEN" -o artifact.zip "https://api.github.com/repos/NethermindEth/post-merge-smoke-tests/actions/artifacts/$ARTIFACT_ID/zip"
          unzip artifact.zip -d ./downloaded-artifacts/

      - name: Display machine specs content
        run: |
          FILE=$(ls downloaded-artifacts/machine-details | head -n 1)
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Details of spawned Geth node</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat "downloaded-artifacts/machine-details/$FILE" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          cat "downloaded-artifacts/machine-details/$FILE" | tee spec-output.txt
          rpc_url=$(grep -oP '\s{2,3}RPC URL: \K.+' spec-output.txt)
          echo "RPC URL extracted is: $rpc_url"
          echo "RPC_URL=$rpc_url" >> $GITHUB_ENV

      - name: Save RPC URL to file
        if: inputs.custom_run_id != ''
        run: |
          echo "${{ env.RPC_URL }}" > rpc_url%${{ env.CLEAN_REF }}%${{ inputs.custom_run_id }}.txt

      - name: Upload RPC URL
        uses: actions/upload-artifact@v7
        if: inputs.custom_run_id != ''
        with:
          name: rpc-url___${{ env.CLEAN_REF }}___${{ inputs.custom_run_id }}
          path: rpc_url%${{ env.CLEAN_REF }}%${{ inputs.custom_run_id }}.txt
