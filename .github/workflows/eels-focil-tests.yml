name: EELS FOCIL tests (EIP-7805)

# Runs the EELS-derived Amsterdam blockchain fixtures, with the option to point at a
# custom execution-specs release containing the FOCIL fixtures from PR #2643 before
# they land in the default archive. Once a tests-* release tag includes
# tests/amsterdam/eip7805_focil/, bump src/Nethermind/Ethereum.Blockchain.Pyspec.Test/Constants.cs
# and drop this workflow in favor of the nightly nethermind-tests job.

on:
  workflow_dispatch:
    inputs:
      archive-version:
        description: 'execution-specs release tag containing FOCIL fixtures (PR #2643). Overrides Constants.DEFAULT_ARCHIVE_VERSION.'
        required: false
        type: string
      archive-name:
        description: 'Archive filename inside the release (overrides Constants.DEFAULT_ARCHIVE_NAME).'
        required: false
        type: string
      filter:
        description: 'NUnit test filter (defaults to all Amsterdam fixtures, which now include eip7805_focil).'
        required: false
        default: 'TestCategory!=Heavy & FullyQualifiedName~Amsterdam'
        type: string

jobs:
  test:
    name: EELS FOCIL (Amsterdam fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: src/Nethermind/global.json

      - name: Run Amsterdam blockchain tests (includes eip7805_focil when archive contains them)
        working-directory: src/Nethermind
        env:
          PYSPEC_ARCHIVE_VERSION: ${{ github.event.inputs.archive-version }}
          PYSPEC_ARCHIVE_NAME: ${{ github.event.inputs.archive-name }}
        run: |
          dotnet test Ethereum.Blockchain.Pyspec.Test/Ethereum.Blockchain.Pyspec.Test.csproj \
            --configuration Release \
            --filter "${{ github.event.inputs.filter }}" \
            --logger "trx;LogFileName=eels-focil-results.trx" \
            -- NUnit.NumberOfTestWorkers=4

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eels-focil-results-${{ github.run_number }}
          path: src/Nethermind/Ethereum.Blockchain.Pyspec.Test/TestResults/eels-focil-results.trx
          retention-days: 7
