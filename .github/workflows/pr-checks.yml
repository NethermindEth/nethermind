name: PR checks

on:
  pull_request:
    branches: [master]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  security-events: write

jobs:
  paths:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      taiko: ${{ steps.filter.outputs.taiko }}
      evm: ${{ steps.filter.outputs.evm }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            taiko:
              - 'src/Nethermind/Nethermind.Taiko/**'
              - '.github/workflows/_taiko-integration.yml'
            evm:
              - 'src/Nethermind/Nethermind.Evm/**'
              - 'Directory.Packages.props'
              - '.github/workflows/evm-opcode-benchmark-diff.yml'
              - 'scripts/evm_benchmark_utils.py'

  build-solutions:
    name: Build solutions
    uses: ./.github/workflows/build-solutions.yml

  build-tools:
    name: Build tools
    uses: ./.github/workflows/build-tools.yml

  nethermind-tests:
    name: Nethermind/Ethereum tests
    uses: ./.github/workflows/nethermind-tests.yml
    secrets: inherit

  nethermind-tests-checked:
    name: Nethermind extra test variants
    uses: ./.github/workflows/nethermind-tests-checked.yml

  nethermind-tests-flat:
    name: Nethermind tests (Flat DB)
    uses: ./.github/workflows/nethermind-tests-flat.yml

  code-quality:
    name: Code quality
    uses: ./.github/workflows/_code-quality.yml

  security-scans:
    name: Security scans
    uses: ./.github/workflows/_security-scans.yml
    with:
      scans: 'trivy,dependency-review'

  stateless-tests:
    name: Stateless execution tests
    uses: ./.github/workflows/stateless-tests.yml

  sync-pr-gate:
    name: Sync PR Gate (Hoodi)
    uses: ./.github/workflows/sync-pr-gate.yml
    secrets: inherit

  evm-opcode-benchmark-diff:
    name: EVM Opcode Benchmark Diff
    needs: paths
    if: needs.paths.outputs.evm == 'true'
    uses: ./.github/workflows/evm-opcode-benchmark-diff.yml

  taiko-integration:
    name: Taiko integration
    needs: paths
    if: needs.paths.outputs.taiko == 'true'
    uses: ./.github/workflows/_taiko-integration.yml
    secrets: inherit
