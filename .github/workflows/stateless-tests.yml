name: Stateless execution tests

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Nethermind
        working-directory: src/Nethermind/Nethermind.Stateless.ZiskGuest
        run: make build

      - name: Upload guest binary
        uses: actions/upload-artifact@v7
        with:
          name: nethermind
          path: src/Nethermind/Nethermind.Stateless.ZiskGuest/bin/nethermind
          if-no-files-found: error
          retention-days: 1

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        input:
          - 150026.bin
          - 24721542.bin
          - 24723632.bin
          - 24723668.bin
          - 24772857.bin
          - 24777027.bin
          - 24777988.bin
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download guest binary
        uses: actions/download-artifact@v8
        with:
          name: nethermind
          path: src/Nethermind/Nethermind.Stateless.ZiskGuest/bin

      - name: Download input
        working-directory: src/Nethermind/Nethermind.Stateless.ZiskGuest/bin
        run: |
          curl -sSL "https://us-southeast-1.linodeobjects.com/zktests/${{ matrix.input }}" \
            -o "${{ matrix.input }}"

      - name: Test Nethermind guest
        timeout-minutes: 5
        working-directory: src/Nethermind/Nethermind.Stateless.ZiskGuest
        run: |
          set -o pipefail
          make run INPUT="${{ matrix.input }}"
