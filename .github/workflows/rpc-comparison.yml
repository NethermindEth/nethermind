name: Compare JSON-RPC between clients and versions

on:
  workflow_dispatch:
    inputs:
      node_type:
        type: choice
        description: "Node type under test. Maps to the rpc_int flag: archive -> --archive, pruned -> --pruned, full -> (none)."
        default: "full"
        required: true
        options:
          - full
          - pruned
          - archive
      nethermind_ip:
        type: string
        description: "IP of an already-synced Nethermind node, used as the daemon under test (-H) when node_type is 'full' or 'archive'. Ignored for 'pruned' (a node is spawned instead)."
        default: ""
        required: false
      reference_url:
        type: string
        description: "RPC URL of any reference node (Geth, another Nethermind, reth, ...) used as the rpc_int -e reference. Ignored when 'spawn_geth' is true or 'reference_ref' is set."
        default: ""
        required: false
      reference_ref:
        type: string
        description: "Git ref (branch/tag/SHA) of a second Nethermind to spawn and snap-sync as the reference node (NM-vs-NM). Leave empty to use 'reference_url' or 'spawn_geth' instead. Ignored when 'spawn_geth' is true."
        default: ""
        required: false
      spawn_geth:
        type: boolean
        description: "Spawn a fresh pruned Geth node (snap sync) and use it as the rpc_int -e reference, instead of 'reference_url'."
        default: false
        required: false
      network:
        type: string
        description: "Network whose fixtures rpc_int runs (passed as -b); also the network a spawned node syncs."
        default: "mainnet"
        required: false
      exclude_apis:
        type: string
        description: "APIs to exclude from rpc_int (-x), comma-separated. Empty to exclude nothing."
        default: "erigon_,bor_,ots_,parity_"
        required: false
      max_failures:
        type: string
        description: "Stop rpc_int after this many failures (-M); 0 = unlimited."
        default: "0"
        required: false
      ignore_error_messages:
        type: boolean
        description: "When comparing against a reference node, compare only error codes and ignore error messages (rpc_int -E) — avoids failures on error.message wording differences. Has no effect in regression mode (no reference), where code AND message are always checked against the fixtures."
        default: true
        required: false
      allowed_ips:
        type: string
        description: "A comma-separated list of ips allowed to connect to a spawned node"
        default: ''
        required: false
      convert_to_paprika:
        type: boolean
        description: "When checked, attempts to convert a spawned node to paprika"
        default: false
        required: false
      timeout:
        type: string
        description: "How long should a spawned node be kept alive (hours)"
        default: "24"
        required: false

jobs:
  verify_correctness_of_setup:
    name: Verify inputs and resolve node mode
    runs-on: ubuntu-latest
    outputs:
      custom_machine_type: ${{ steps.compute_machine_type.outputs.custom_machine_type }}
      rpc_flag: ${{ steps.resolve.outputs.rpc_flag }}
      spawn_nm: ${{ steps.resolve.outputs.spawn_nm }}
    steps:
      - name: Resolve node_type to rpc_int flag and validate inputs
        id: resolve
        env:
          NODE_TYPE: ${{ inputs.node_type }}
          NETHERMIND_IP: ${{ inputs.nethermind_ip }}
          CONVERT_TO_PAPRIKA: ${{ inputs.convert_to_paprika }}
          SPAWN_GETH: ${{ inputs.spawn_geth }}
          REFERENCE_REF: ${{ inputs.reference_ref }}
          REFERENCE_URL: ${{ inputs.reference_url }}
        run: |
          set -euo pipefail
          # Map node_type to the rpc_int flag and decide whether to spawn a node.
          #   archive -> --archive : include @archive historic-state tests
          #   pruned  -> --pruned  : skip @pruned historic tests a pruned node can't serve
          #   full    -> (none)    : skip @archive state tests, keep @pruned historic tests
          case "$NODE_TYPE" in
            pruned)
              echo "spawn_nm=true" >> "$GITHUB_OUTPUT"
              echo "rpc_flag=--pruned" >> "$GITHUB_OUTPUT"
              ;;
            archive)
              echo "spawn_nm=false" >> "$GITHUB_OUTPUT"
              echo "rpc_flag=--archive" >> "$GITHUB_OUTPUT"
              ;;
            full)
              echo "spawn_nm=false" >> "$GITHUB_OUTPUT"
              echo "rpc_flag=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Error: unknown node_type '$NODE_TYPE' (expected full|pruned|archive)."
              exit 1
              ;;
          esac

          # full/archive use an already-synced node addressed by IP; pruned is spawned.
          if [ "$NODE_TYPE" != "pruned" ] && [ -z "$NETHERMIND_IP" ]; then
            echo "Error: 'nethermind_ip' must be provided when node_type is 'full' or 'archive'."
            exit 1
          fi

          if [ "$CONVERT_TO_PAPRIKA" == "true" ] && [ "$NODE_TYPE" != "pruned" ]; then
            echo "Error: 'convert_to_paprika' only applies when node_type is 'pruned' (a node is spawned)."
            exit 1
          fi

          # At most one reference source: spawned Geth, spawned reference Nethermind, or a provided URL.
          # (Leaving all three empty runs rpc_int in regression mode against the committed fixtures.)
          reference_sources=0
          [ "$SPAWN_GETH" == "true" ] && reference_sources=$((reference_sources + 1))
          [ -n "$REFERENCE_REF" ] && reference_sources=$((reference_sources + 1))
          [ -n "$REFERENCE_URL" ] && reference_sources=$((reference_sources + 1))
          if [ "$reference_sources" -gt 1 ]; then
            echo "Error: set at most one reference source — 'spawn_geth', 'reference_ref', or 'reference_url'."
            exit 1
          fi

      - name: Compute Machine Type
        id: compute_machine_type
        run: |
          convert_to_paprika="${{ inputs.convert_to_paprika }}"
          machine_type=""
          if [[ "$convert_to_paprika" == 'true' ]]; then
            machine_type="g6-standard-8"
          fi
          echo "custom_machine_type=$machine_type" >> $GITHUB_OUTPUT

  create_main_node:
    name: Spawn Nethermind from current branch (snap sync)
    uses: ./.github/workflows/run-a-single-node-from-branch.yml
    needs: [verify_correctness_of_setup]
    if: needs.verify_correctness_of_setup.outputs.spawn_nm == 'true'
    secrets: inherit
    with:
      additional_options: >-
        {
          "timeout": "${{ inputs.timeout }}",
          "default_dockerfile": "Dockerfile",
          "default_dockerfile_build_type": "release",
          "ssh_keys": "",
          "allowed_ips": "${{ inputs.allowed_ips }}",
          "custom_machine_type": "${{ needs.verify_correctness_of_setup.outputs.custom_machine_type }}"
        }
      non_validator_mode: true
      additional_nethermind_flags: Sync.SnapSync=true JsonRpc.EnabledModules=[Eth,Subscribe,Trace,TxPool,Web3,Personal,Proof,Net,Parity,Health,Rpc,Debug,Admin] JsonRpc.Timeout=3600000 log=INFO
      nethermind_repo_ref: ${{ github.ref }}
      custom_run_id: ${{ github.run_id }}
      network: ${{ inputs.network }}
      convert_to_paprika: "${{ inputs.convert_to_paprika }}"

  # Spawn a pruned Geth node via the smoke-tests framework
  create_geth_node:
    name: Spawn pruned Geth node
    uses: ./.github/workflows/run-a-geth-node.yml
    needs: [verify_correctness_of_setup]
    if: inputs.spawn_geth
    secrets: inherit
    with:
      additional_options: >-
        {
          "timeout": "${{ inputs.timeout }}",
          "ssh_keys": "",
          "allowed_ips": "${{ inputs.allowed_ips }}",
          "custom_machine_type": "${{ needs.verify_correctness_of_setup.outputs.custom_machine_type }}"
        }
      network: ${{ inputs.network }}
      custom_run_id: ${{ github.run_id }}
      cl_client: lighthouse

  # Spawn a second Nethermind (at reference_ref) to act as the rpc_int -e reference (NM-vs-NM).
  create_reference_node:
    name: Spawn Nethermind reference node (NM-vs-NM)
    uses: ./.github/workflows/run-a-single-node-from-branch.yml
    needs: [verify_correctness_of_setup]
    if: inputs.reference_ref != ''
    secrets: inherit
    with:
      additional_options: >-
        {
          "timeout": "${{ inputs.timeout }}",
          "default_dockerfile": "Dockerfile",
          "default_dockerfile_build_type": "release",
          "ssh_keys": "",
          "allowed_ips": "${{ inputs.allowed_ips }}",
          "custom_machine_type": "${{ needs.verify_correctness_of_setup.outputs.custom_machine_type }}"
        }
      non_validator_mode: true
      additional_nethermind_flags: Sync.SnapSync=true JsonRpc.EnabledModules=[Eth,Subscribe,Trace,TxPool,Web3,Personal,Proof,Net,Parity,Health,Rpc,Debug,Admin] JsonRpc.Timeout=3600000 log=INFO
      nethermind_repo_ref: ${{ inputs.reference_ref }}
      custom_run_id: ${{ github.run_id }}-ref
      network: ${{ inputs.network }}
      convert_to_paprika: "${{ inputs.convert_to_paprika }}"

  resolve_urls:
    name: Resolve Nethermind and reference RPC URLs
    runs-on: ubuntu-latest
    needs: [verify_correctness_of_setup, create_main_node, create_geth_node, create_reference_node]
    if: always() && needs.verify_correctness_of_setup.result == 'success' && (needs.create_main_node.result == 'success' || needs.create_main_node.result == 'skipped') && (needs.create_geth_node.result == 'success' || needs.create_geth_node.result == 'skipped') && (needs.create_reference_node.result == 'success' || needs.create_reference_node.result == 'skipped')
    outputs:
      nm_url: ${{ steps.resolve.outputs.nm_url }}
      reference_url: ${{ steps.resolve.outputs.reference_url }}
    steps:
      - name: Prepare clean refs
        id: prepare_refs
        env:
          GITHUB_REF_RAW: ${{ github.ref }}
          REFERENCE_REF: ${{ inputs.reference_ref }}
        run: |
          CLEAN_REF=$(echo "${GITHUB_REF_RAW/refs\/heads\//}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "CLEAN_MAIN_REF=$CLEAN_REF" >> $GITHUB_ENV
          echo "CLEAN_GETH_REF=geth-$CLEAN_REF" >> $GITHUB_ENV
          CLEAN_REFERENCE_REF=$(echo "${REFERENCE_REF/refs\/heads\//}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "CLEAN_REFERENCE_REF=$CLEAN_REFERENCE_REF" >> $GITHUB_ENV

      - name: Download RPC Artifact for current branch
        if: needs.verify_correctness_of_setup.outputs.spawn_nm == 'true'
        uses: actions/download-artifact@v8
        with:
          name: rpc-url___${{ env.CLEAN_MAIN_REF }}___${{ github.run_id }}
          path: artifacts

      - name: Download RPC Artifact for Geth
        if: inputs.spawn_geth
        uses: actions/download-artifact@v8
        with:
          name: rpc-url___${{ env.CLEAN_GETH_REF }}___${{ github.run_id }}
          path: artifacts

      - name: Download RPC Artifact for reference Nethermind
        if: inputs.reference_ref != ''
        uses: actions/download-artifact@v8
        with:
          name: rpc-url___${{ env.CLEAN_REFERENCE_REF }}___${{ github.run_id }}-ref
          path: artifacts

      - name: Assemble URLs
        id: resolve
        env:
          SPAWN_NM: ${{ needs.verify_correctness_of_setup.outputs.spawn_nm }}
          SPAWN_GETH: ${{ inputs.spawn_geth }}
          NETHERMIND_IP: ${{ inputs.nethermind_ip }}
          REFERENCE_URL_INPUT: ${{ inputs.reference_url }}
          REFERENCE_REF: ${{ inputs.reference_ref }}
        run: |
          # Nethermind: spawned -> read its uploaded rpc-url artifact; else use the IP.
          if [ "$SPAWN_NM" == "true" ]; then
            main_branch_file="rpc_url%${{ env.CLEAN_MAIN_REF }}%${{ github.run_id }}.txt"
            if [ ! -f "artifacts/$main_branch_file" ]; then
              echo "Error: spawned Nethermind RPC URL artifact not found (artifacts/$main_branch_file)."
              exit 1
            fi
            nm_url=$(cat "artifacts/$main_branch_file")
            if [ -z "$nm_url" ]; then
              echo "Error: spawned Nethermind node did not report an RPC URL."
              exit 1
            fi
          else
            nm_url="http://${NETHERMIND_IP}:8545"
          fi
          echo "Nethermind URL: $nm_url"
          echo "nm_url=$nm_url" >> "$GITHUB_OUTPUT"

          # Reference precedence: spawned Geth -> spawned reference Nethermind -> provided URL.
          if [ "$SPAWN_GETH" == "true" ]; then
            geth_file="rpc_url%${{ env.CLEAN_GETH_REF }}%${{ github.run_id }}.txt"
            if [ ! -f "artifacts/$geth_file" ]; then
              echo "Error: spawned Geth RPC URL artifact not found (artifacts/$geth_file)."
              exit 1
            fi
            reference_url=$(cat "artifacts/$geth_file")
            if [ -z "$reference_url" ]; then
              echo "Error: spawned Geth node did not report an RPC URL."
              exit 1
            fi
          elif [ -n "$REFERENCE_REF" ]; then
            reference_file="rpc_url%${{ env.CLEAN_REFERENCE_REF }}%${{ github.run_id }}-ref.txt"
            if [ ! -f "artifacts/$reference_file" ]; then
              echo "Error: spawned reference Nethermind RPC URL artifact not found (artifacts/$reference_file)."
              exit 1
            fi
            reference_url=$(cat "artifacts/$reference_file")
            if [ -z "$reference_url" ]; then
              echo "Error: spawned reference Nethermind node did not report an RPC URL."
              exit 1
            fi
          else
            reference_url="$REFERENCE_URL_INPUT"
          fi
          echo "Reference URL: ${reference_url:-<none>}"
          echo "reference_url=$reference_url" >> "$GITHUB_OUTPUT"

  wait_for_node_to_sync:
    name: Wait for spawned nodes to finish syncing
    runs-on: [vpn]
    needs: [verify_correctness_of_setup, resolve_urls, create_geth_node, create_reference_node]
    if: always() && needs.resolve_urls.result == 'success' && (needs.verify_correctness_of_setup.outputs.spawn_nm == 'true' || inputs.spawn_geth || inputs.reference_ref != '')
    timeout-minutes: 1440
    steps:
      - name: Wait for the nodes to sync
        timeout-minutes: 1440
        env:
          SPAWN_NM: ${{ needs.verify_correctness_of_setup.outputs.spawn_nm }}
          NM_URL: ${{ needs.resolve_urls.outputs.nm_url }}
          SPAWN_GETH: ${{ inputs.spawn_geth }}
          GETH_URL: ${{ needs.resolve_urls.outputs.reference_url }}
          REFERENCE_REF: ${{ inputs.reference_ref }}
          REFERENCE_NM_URL: ${{ needs.resolve_urls.outputs.reference_url }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        shell: bash
        run: |
          # -u for nounset safety; intentionally NOT -e: this is a polling loop that
          # tolerates transient curl/jq failures and retries (errexit would abort the
          # multi-hour wait on a momentary hiccup).
          set -uo pipefail

          # Wait only on nodes this workflow spawned; IP/url nodes are assumed synced.
          # Nethermind gets the snap-sync-stage gate; Geth gets eth_syncing only.
          nm_urls=()
          geth_urls=()
          [ "$SPAWN_NM" == "true" ] && [ -n "$NM_URL" ] && nm_urls+=("$NM_URL")
          # The spawned reference Nethermind is an NM too -> wait on it via the NM sync checks.
          [ -n "$REFERENCE_REF" ] && [ -n "$REFERENCE_NM_URL" ] && nm_urls+=("$REFERENCE_NM_URL")
          [ "$SPAWN_GETH" == "true" ] && [ -n "$GETH_URL" ] && geth_urls=("$GETH_URL")

          # ------------------------------------------------------------
          # Helper: guarded curl POST with timeouts/retries and JSON header
          # ------------------------------------------------------------
          rpc_post() {
            local url="$1"
            local payload="$2"
            # -sS: silent but show errors; -m 10: overall timeout; --connect-timeout 5
            # --retry 5 with --retry-all-errors/--retry-connrefused to handle brief restarts
            curl -sS \
                 -m 10 --connect-timeout 5 \
                 --retry 5 --retry-all-errors --retry-connrefused \
                 -H 'Content-Type: application/json' \
                 -X POST --data "$payload" "$url"
          }

          # ------------------------------------------------------------
          # Function: wait until debug_getSyncStage shows SnapSync or StateNodes
          # (Option A guard on curl + extra hardening)
          # ------------------------------------------------------------
          check_sync_stage() {
            local rpc_url="$1"
            echo "Waiting for SnapSync/StateNodes at $rpc_url ..."
            while true; do
              response="$(rpc_post "$rpc_url" '{"jsonrpc":"2.0","method":"debug_getSyncStage","params":[],"id":0}')" \
                || { echo "RPC unreachable at $rpc_url; retrying in 60s"; sleep 60; continue; }

              # Ensure we got JSON we can parse
              if ! echo "$response" | jq -e . >/dev/null 2>&1; then
                echo "Invalid JSON from $rpc_url (debug_getSyncStage): $response"
                echo "Retrying in 60s..."
                sleep 60
                continue
              fi

              current_stage="$(echo "$response" | jq -r '.result.currentStage // empty')"
              if [[ -z "$current_stage" || "$current_stage" == "null" ]]; then
                echo "Current stage not available yet from $rpc_url; retrying in 60s..."
                sleep 60
                continue
              fi

              if echo "$current_stage" | grep -Eq 'SnapSync|StateNodes'; then
                echo "SnapSync/StateNodes stage reached at $rpc_url (currentStage: $current_stage)."
                break
              else
                echo "Current stage at $rpc_url: $current_stage (not SnapSync/StateNodes). Retrying in 60s..."
                sleep 60
              fi
            done
          }

          # ------------------------------------------------------------
          # Function: wait until eth_syncing == false (fully synced)
          # (Option A guard on curl + extra hardening)
          # ------------------------------------------------------------
          check_eth_syncing() {
            local rpc_url="$1"
            echo "Waiting for node to report eth_syncing=false at $rpc_url ..."
            while true; do
              response="$(rpc_post "$rpc_url" '{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}')" \
                || { echo "RPC unreachable at $rpc_url; retrying in 60s"; sleep 60; continue; }

              if ! echo "$response" | jq -e . >/dev/null 2>&1; then
                echo "Invalid JSON from $rpc_url (eth_syncing): $response"
                echo "Retrying in 60s..."
                sleep 60
                continue
              fi

              if echo "$response" | jq -e '.result == false' >/dev/null 2>&1; then
                # eth_syncing=false is ambiguous post-merge: it also means "idle at genesis"
                # (an EL not yet driven by the CL), not "synced". Require a non-genesis,
                # recent head before declaring the node synced, else keep waiting.
                head="$(rpc_post "$rpc_url" '{"jsonrpc":"2.0","method":"eth_getBlockByNumber","params":["latest",false],"id":1}')" || head=""
                head_hex="$(echo "$head" | jq -r '.result.number // empty' 2>/dev/null)"
                head_ts_hex="$(echo "$head" | jq -r '.result.timestamp // empty' 2>/dev/null)"
                if [ -z "$head_hex" ] || [ "$head_hex" = "0x0" ]; then
                  echo "eth_syncing=false but still at genesis (block ${head_hex:-?}) at $rpc_url — CL not driving yet. Retrying in 60s..."
                  sleep 60
                  continue
                fi
                if [[ "$head_ts_hex" =~ ^0x[0-9a-fA-F]+$ ]] && [ "$(( $(date +%s) - $(( head_ts_hex )) ))" -gt 600 ]; then
                  echo "eth_syncing=false at block $head_hex but head is stale (>600s old) at $rpc_url — not at tip yet. Retrying in 60s..."
                  sleep 60
                  continue
                fi
                echo "Node at $rpc_url reports synced (eth_syncing=false, head $head_hex)."
                break
              else
                # When syncing, .result is an object; show a short summary if available
                syncing_summary="$(echo "$response" | jq -c '.result | {startingBlock, currentBlock, highestBlock} // {}' 2>/dev/null)"
                echo "Still syncing at $rpc_url. Details: ${syncing_summary:-unknown}. Retrying in 60s..."
                sleep 60
              fi
            done
          }

          # ------------------------------------------------------------
          # Function: detect a brief downtime/restart and then confirm JSON-RPC is back
          # (already guarded; add headers/timeouts)
          # ------------------------------------------------------------
          check_jsonrpc_responding() {
            local rpc_url="$1"
            echo "Checking if JsonRPC restarts and responds at $rpc_url."

            local has_failed_before=false

            while true; do
              response="$(curl -sS \
                               -m 10 --connect-timeout 5 \
                               --retry 3 --retry-all-errors --retry-connrefused \
                               -H 'Content-Type: application/json' \
                               -X POST --data '{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}' \
                               "$rpc_url" 2>/dev/null)" || response="curl_failed"

              if [[ "$response" == "curl_failed" || -z "$response" ]]; then
                echo "JsonRPC not responding at $rpc_url (expected during migration/restart)."
                has_failed_before=true
              else
                if [[ "$has_failed_before" == true ]]; then
                  echo "JsonRPC responded at $rpc_url after a failure; node likely restarted."
                  break
                else
                  echo "JsonRPC currently responding at $rpc_url; waiting to observe at least one failure before confirming restart."
                fi
              fi
              sleep 60
            done
          }

          # ------------------------------------------------------------
          # Function: compare node head vs Etherscan (optional)
          # (extra guards for null/empty and missing API key)
          # ------------------------------------------------------------
          check_chain_head() {
            local rpc_url="$1"
            local etherscan_api_key="${ETHERSCAN_API_KEY:-}"
            local etherscan_api_url="https://api.etherscan.io/api"

            if [[ -z "$etherscan_api_key" ]]; then
              echo "ETHERSCAN_API_KEY not provided; skipping head comparison."
              return 0
            fi

            echo "Comparing chain head of $rpc_url vs Etherscan ..."

            while true; do
              # Node head
              node_resp="$(rpc_post "$rpc_url" '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}')" \
                || { echo "RPC unreachable at $rpc_url; retrying in 30s"; sleep 30; continue; }

              node_head_hex="$(echo "$node_resp" | jq -r '.result // empty' 2>/dev/null)"
              if [[ -z "$node_head_hex" || "$node_head_hex" == "null" ]]; then
                echo "No blockNumber yet from $rpc_url; retrying in 30s..."
                sleep 30
                continue
              fi
              # hex -> dec (strip 0x)
              node_head_decimal=$((16#${node_head_hex#0x}))
              echo "Current chain head at $rpc_url: $node_head_decimal"

              # Etherscan head
              etherscan_response="$(curl -sS -m 10 --connect-timeout 5 \
                                       --retry 5 --retry-all-errors --retry-connrefused \
                                       "$etherscan_api_url?module=proxy&action=eth_blockNumber&apikey=$etherscan_api_key")" \
                || { echo "Etherscan unreachable; retrying in 30s"; sleep 30; continue; }

              if ! echo "$etherscan_response" | jq -e . >/dev/null 2>&1; then
                echo "Invalid JSON from Etherscan: $etherscan_response"
                echo "Retrying in 30s..."
                sleep 30
                continue
              fi

              etherscan_head_hex="$(echo "$etherscan_response" | jq -r '.result // empty')"
              if [[ -z "$etherscan_head_hex" || "$etherscan_head_hex" == "null" ]]; then
                echo "Etherscan did not return a blockNumber; retrying in 30s..."
                sleep 30
                continue
              fi
              etherscan_head_decimal=$((16#${etherscan_head_hex#0x}))
              echo "Current chain head at Etherscan: $etherscan_head_decimal"

              # Compare heads
              if (( node_head_decimal >= etherscan_head_decimal )); then
                echo "Node at $rpc_url has caught up with the chain."
                break
              else
                echo "Node at $rpc_url has not caught up yet. Node: $node_head_decimal, Etherscan: $etherscan_head_decimal"
                echo "Waiting for 30 seconds before rechecking..."
                sleep 30
              fi
            done
          }

          # -----------------------------
          # Warmup (avoid transient boot noise)
          # -----------------------------
          echo "Initial warmup sleep (60s)..."
          sleep 60

          # -----------------------------
          # Nethermind: SnapSync/StateNodes stage gate, then eth_syncing.
          # -----------------------------
          for url in "${nm_urls[@]}"; do
            check_sync_stage "$url"
          done
          for url in "${nm_urls[@]}"; do
            check_eth_syncing "$url"
          done

          # -----------------------------
          # Geth: eth_syncing only (no debug_getSyncStage).
          # -----------------------------
          for url in "${geth_urls[@]}"; do
            check_eth_syncing "$url"
          done

          # -----------------------------
          # Optional: Paprika import wait and head comparison (Nethermind only)
          # -----------------------------
          if [[ "${{ inputs.convert_to_paprika }}" == "true" && ${#nm_urls[@]} -gt 0 ]]; then
            url="${nm_urls[0]}"
            check_jsonrpc_responding "$url"
            check_chain_head "$url"
          fi

          # -----------------------------
          # Extra wait for ~96 blocks after StateHealing (Nethermind)
          # (128 - 32) * 12s = 1152s
          # -----------------------------
          if [[ ${#nm_urls[@]} -gt 0 ]]; then
            echo "Waiting for (128 - 32) Ethereum blocks ≈ 1152 seconds..."
            sleep 1152
          fi

  compare:
    name: Run rpc_int against the Nethermind node
    runs-on: [vpn]
    needs: [verify_correctness_of_setup, resolve_urls, wait_for_node_to_sync, create_geth_node]
    if: always() && needs.resolve_urls.result == 'success' && (needs.wait_for_node_to_sync.result == 'success' || needs.wait_for_node_to_sync.result == 'skipped') && (needs.create_geth_node.result == 'success' || needs.create_geth_node.result == 'skipped')
    steps:
      - name: Checkout rpc-tests
        uses: actions/checkout@v6
        with:
          repository: NethermindEth/rpc-tests
          ref: main

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
          cache: true

      - name: Build rpc_int
        run: make rpc_int

      - name: Run rpc_int
        env:
          NM_URL: ${{ needs.resolve_urls.outputs.nm_url }}
          # Resolved reference: spawned Geth / spawned reference Nethermind / provided URL.
          REFERENCE_URL: ${{ needs.resolve_urls.outputs.reference_url }}
          RPC_FLAG: ${{ needs.verify_correctness_of_setup.outputs.rpc_flag }}
          NETWORK: ${{ inputs.network }}
          EXCLUDE_APIS: ${{ inputs.exclude_apis }}
          MAX_FAILURES: ${{ inputs.max_failures }}
          IGNORE_ERROR_MESSAGES: ${{ inputs.ignore_error_messages }}
        run: |
          set -euo pipefail
          mkdir -p rpc-results

          # Nethermind is the daemon under test; parse host:port from its URL.
          hostport="${NM_URL#*://}"   # strip scheme
          hostport="${hostport%%/*}"  # strip any path
          host="${hostport%%:*}"
          port="${hostport##*:}"
          [ "$port" == "$host" ] && port=8545

          ext=()
          [ -n "$REFERENCE_URL" ] && ext=(-e "$REFERENCE_URL")

          # Exclude APIs only when a non-empty list is provided.
          exclude=()
          [ -n "$EXCLUDE_APIS" ] && exclude=(-x "$EXCLUDE_APIS")

          # Ignore error-message text only when comparing against a live reference node.
          # Regression mode (no reference, comparing against the committed fixtures) always
          # checks code AND message, since we authored both — so -E never applies there.
          err_opt=()
          [ -n "$REFERENCE_URL" ] && [ "$IGNORE_ERROR_MESSAGES" == "true" ] && err_opt=(-E)

          set +e
          ./build/bin/rpc_int -b "$NETWORK" -H "$host" -p "$port" $RPC_FLAG "${ext[@]}" \
            "${exclude[@]}" "${err_opt[@]}" -M "$MAX_FAILURES" -c -f -R rpc-results/report.csv | tee rpc-results/output.txt
          rc=${PIPESTATUS[0]}
          set -e
          echo "rpc_int exit code: $rc"
          exit $rc

      - name: Upload rpc_int results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rpc-int-results
          # rpc-results/ = summary (report.csv + captured stdout);
          # integration/<network>/results/ = rpc_int's per-test diffs/responses.
          path: |
            rpc-results/
            integration/*/results/
          if-no-files-found: warn

  cleanup_spawned_nodes:
    name: Destroy spawned nodes
    runs-on: ubuntu-latest
    needs: [create_main_node, create_geth_node, compare]
    if: always() && (needs.create_main_node.outputs.run_id != '' || needs.create_geth_node.outputs.run_id != '')
    steps:
      - name: Authenticate App
        id: gh-app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "nethermind,post-merge-smoke-tests"

      - name: Destroy Nethermind node
        if: needs.create_main_node.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ steps.gh-app.outputs.token }}
        run: |
          gh workflow run manual-destroy-smoketests.yml \
            --repo NethermindEth/post-merge-smoke-tests --ref main \
            -f workflow_run_id="${{ needs.create_main_node.outputs.run_id }}" \
            -f timeout="0"

      - name: Destroy Geth node
        if: needs.create_geth_node.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ steps.gh-app.outputs.token }}
        run: |
          gh workflow run manual-destroy-smoketests.yml \
            --repo NethermindEth/post-merge-smoke-tests --ref main \
            -f workflow_run_id="${{ needs.create_geth_node.outputs.run_id }}" \
            -f timeout="0"
