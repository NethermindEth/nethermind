name: Nethermind tests (Flat DB)

on:
  workflow_call:

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm
  TEST_USE_FLAT: 1

jobs:
  tests:
    name: Run ${{ matrix.project }}${{ matrix.label && format(' [{0}]', matrix.label) || '' }}${{ matrix.chunk && format(' ({0})', matrix.chunk) || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOTNET_GCConserveMemory: 9
    strategy:
      fail-fast: false
      matrix:
        project:
          - Ethereum.Abi.Test
          - Ethereum.Basic.Test
          - Ethereum.Blockchain.Block.Test
          - Ethereum.Difficulty.Test
          - Ethereum.HexPrefix.Test
          - Ethereum.KeyAddress.Test
          - Ethereum.KeyStore.Test
          - Ethereum.Legacy.Blockchain.Block.Test
          - Ethereum.Legacy.Transition.Test
          - Ethereum.Legacy.VM.Test
          - Ethereum.PoW.Test
          - Ethereum.Rlp.Test
          - Ethereum.Transaction.Test
          - Ethereum.Trie.Test
          - Nethermind.Consensus.Test
          - Nethermind.Core.Test
          - Nethermind.Db.Test
          - Nethermind.Merge.Plugin.Test
          - Nethermind.Runner.Test
        chunk: ['']
        include:
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 1of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 2of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 3of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 4of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 5of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 6of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 7of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 8of8
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 1of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 2of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 3of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 4of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 5of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 6of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 7of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 8of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 9of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 10of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 11of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 12of16
