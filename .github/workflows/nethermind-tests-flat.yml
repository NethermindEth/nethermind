name: Nethermind tests (Flat DB)

on:
  workflow_call:
    inputs:
      include_amsterdam:
        description: >-
          When true (default), run the Amsterdam parallel-execution variants
          (~96 jobs across 6 variants × 16 Pyspec chunks). Set false to skip
          them on PRs that don't touch Evm/State/Specs/Blockchain.
        required: false
        type: boolean
        default: true

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm
  TEST_USE_FLAT: 1

jobs:
  tests:
    name: Run ${{ matrix.project }}${{ matrix.label && format(' [{0}]', matrix.label) || '' }}${{ matrix.chunk && format(' ({0})', matrix.chunk) || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project:
          - Ethereum.Abi.Test
          - Ethereum.Basic.Test
          - Ethereum.Blockchain.Block.Test
          - Ethereum.Difficulty.Test
          - Ethereum.HexPrefix.Test
          - Ethereum.KeyAddress.Test
          - Ethereum.KeyStore.Test
          - Ethereum.Legacy.Blockchain.Block.Test
          - Ethereum.Legacy.Transition.Test
          - Ethereum.Legacy.VM.Test
          - Ethereum.PoW.Test
          - Ethereum.Rlp.Test
          - Ethereum.Transaction.Test
          - Ethereum.Trie.Test
          - Nethermind.Consensus.Test
          - Nethermind.Core.Test
          - Nethermind.Db.Test
          - Nethermind.Merge.Plugin.Test
          - Nethermind.Runner.Test
        chunk: ['']
        include:
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 1of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 2of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 3of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 4of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 5of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 6of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 7of8
          - project: Ethereum.Legacy.Blockchain.Test
            chunk: 8of8
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 1of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 2of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 3of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 4of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 5of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 6of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 7of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 8of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 9of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 10of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 11of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 12of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 13of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 14of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 15of16
            label: Sequential
          - project: Ethereum.Blockchain.Pyspec.Test
            chunk: 16of16
            label: Sequential
    steps:
      - name: Free up disk space
        if: startsWith(matrix.project, 'Ethereum.Blockchain.Pyspec')
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false
          tool-cache: false
          swap-storage: false

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ startsWith(matrix.project, 'Ethereum.Blockchain.Pyspec') && 'false' || 'recursive' }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: ${{ matrix.project }}
        id: test
        working-directory: src/Nethermind/${{ matrix.project }}
        env:
          TEST_CHUNK: ${{ matrix.chunk }}
          IS_PYSPEC: ${{ startsWith(matrix.project, 'Ethereum.Blockchain.Pyspec') }}
        run: |
          monitor_pid=""
          stop_pyspec_monitor() {
            if [ -n "$monitor_pid" ]; then
              kill "$monitor_pid" 2>/dev/null || true
              wait "$monitor_pid" 2>/dev/null || true
            fi
          }

          if [ "$IS_PYSPEC" = "true" ]; then
            (
              while true; do
                echo "::group::Pyspec resources $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                free -h
                df -h /
                if [ -r /sys/fs/cgroup/memory.current ]; then
                  echo "cgroup memory.current bytes: $(cat /sys/fs/cgroup/memory.current)"
                fi
                if [ -r /sys/fs/cgroup/memory.max ]; then
                  echo "cgroup memory.max bytes: $(cat /sys/fs/cgroup/memory.max)"
                fi
                ps -eo pid,ppid,rss,vsz,pcpu,pmem,comm --sort=-rss | head -n 12
                echo "::endgroup::"
                sleep 60
              done
            ) &
            monitor_pid=$!
            trap stop_pyspec_monitor EXIT
          fi

          # Default Pyspec chunks exclude the Amsterdam variant fixture classes by name; the
          # variant entries in the tests-amsterdam job re-add them with --filter scoping.
          dotnet build ${{ matrix.project }}.csproj -c release
          dotnet build-server shutdown || true  # macOS VB/C# server sometimes fails to shut down; harmless
          if [ "${{ matrix.project }}" = "Ethereum.Blockchain.Pyspec.Test" ] && [ -n "${{ matrix.chunk }}" ]; then
            dotnet test --project ${{ matrix.project }}.csproj -c release --no-build --no-restore \
              --filter "FullyQualifiedName!~AmsterdamParallel&FullyQualifiedName!~AmsterdamBatchRead"
          else
            dotnet test --project ${{ matrix.project }}.csproj -c release --no-build --no-restore
          fi

  tests-amsterdam:
    name: Run Pyspec Amsterdam [${{ matrix.variant.label }}] (${{ matrix.chunk }})
    if: inputs.include_amsterdam
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Amsterdam parallel-execution / batch-read variants — Linux x64 only via the
      # CiRunnerGuard. 16 chunks per variant mirrors the default Pyspec chunking
      # density (~213 tests/shard). See nethermind-tests-flat.yml's tests job for
      # the default Pyspec chunks that exclude these fixtures by name.
      matrix:
        variant:
          - { label: Parallel, filter: 'FullyQualifiedName~AmsterdamParallelBlockchainTests' }
          - { label: BatchRead, filter: 'FullyQualifiedName~AmsterdamBatchReadBlockchainTests' }
          - { label: ParallelFull, filter: 'FullyQualifiedName~AmsterdamParallelFullBlockchainTests' }
          - { label: ParallelEngine, filter: 'FullyQualifiedName~AmsterdamParallelEngineBlockchainTests' }
          - { label: BatchReadEngine, filter: 'FullyQualifiedName~AmsterdamBatchReadEngineBlockchainTests' }
          - { label: ParallelFullEngine, filter: 'FullyQualifiedName~AmsterdamParallelFullEngineBlockchainTests' }
        chunk:
          - 1of16
          - 2of16
          - 3of16
          - 4of16
          - 5of16
          - 6of16
          - 7of16
          - 8of16
          - 9of16
          - 10of16
          - 11of16
          - 12of16
          - 13of16
          - 14of16
          - 15of16
          - 16of16
    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false
          tool-cache: false
          swap-storage: false

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Ethereum.Blockchain.Pyspec.Test [${{ matrix.variant.label }}] (${{ matrix.chunk }})
        id: test
        working-directory: src/Nethermind/Ethereum.Blockchain.Pyspec.Test
        env:
          TEST_CHUNK: ${{ matrix.chunk }}
          IS_PYSPEC: 'true'
        run: |
          monitor_pid=""
          stop_pyspec_monitor() {
            if [ -n "$monitor_pid" ]; then
              kill "$monitor_pid" 2>/dev/null || true
              wait "$monitor_pid" 2>/dev/null || true
            fi
          }

          (
            while true; do
              echo "::group::Pyspec resources $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              free -h
              df -h /
              if [ -r /sys/fs/cgroup/memory.current ]; then
                echo "cgroup memory.current bytes: $(cat /sys/fs/cgroup/memory.current)"
              fi
              if [ -r /sys/fs/cgroup/memory.max ]; then
                echo "cgroup memory.max bytes: $(cat /sys/fs/cgroup/memory.max)"
              fi
              ps -eo pid,ppid,rss,vsz,pcpu,pmem,comm --sort=-rss | head -n 12
              echo "::endgroup::"
              sleep 60
            done
          ) &
          monitor_pid=$!
          trap stop_pyspec_monitor EXIT

          dotnet build Ethereum.Blockchain.Pyspec.Test.csproj -c release
          dotnet build-server shutdown || true
          dotnet test --project Ethereum.Blockchain.Pyspec.Test.csproj -c release --no-build --no-restore \
            --filter "${{ matrix.variant.filter }}"

  tests-summary:
    name: Tests summary
    needs: [tests, tests-amsterdam]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          for r in "${{ needs.tests.result }}" "${{ needs.tests-amsterdam.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::A required job did not succeed: $r"; exit 1 ;;
            esac
          done
