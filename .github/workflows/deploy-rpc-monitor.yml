name: Deploy RPC Monitor

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy to
        required: true
        type: environment
      chain:
        description: Chain to monitor
        required: true
        default: mainnet
        type: choice
        options:
          - mainnet
          - gnosis
      target_url:
        description: Target node RPC URL
        required: false
        default: 'http://localhost:8545'
        type: string
      reference_url:
        description: Reference node RPC URL
        required: true
        type: string

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish tools/RpcTests/RpcTests.Monitor/RpcTests.Monitor.csproj -c Release -o publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: publish
          file: tools/RpcTests/RpcTests.Monitor/Dockerfile
          push: true
          tags: nethermindeth/rpc-monitor:latest
          platforms: linux/amd64

  deploy:
    name: Deploy to monitor machine
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy Monitor
        uses: appleboy/ssh-action@v1
        env:
          SLACK_BOT_TOKEN: ${{ secrets.RPC_MONITOR_SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.RPC_MONITOR_SLACK_CHANNEL_ID }}
        with:
          host: ${{ secrets.RPC_MONITOR_SSH_HOST }}
          username: ${{ secrets.RPC_MONITOR_SSH_USER }}
          key: ${{ secrets.RPC_MONITOR_SSH_KEY }}
          envs: SLACK_BOT_TOKEN,SLACK_CHANNEL_ID
          script: |
            docker pull nethermindeth/rpc-monitor:latest
            docker stop rpc-monitor 2>/dev/null || true
            docker rm rpc-monitor 2>/dev/null || true
            docker run -d \
              --name rpc-monitor \
              --restart unless-stopped \
              --network host \
              -e RPC_MONITOR_BOT_TOKEN="$SLACK_BOT_TOKEN" \
              -e RPC_MONITOR_CHANNEL_ID="$SLACK_CHANNEL_ID" \
              nethermindeth/rpc-monitor:latest \
              --target "${{ inputs.target_url }}" \
              --reference "${{ inputs.reference_url }}" \
              --tests "${{ inputs.chain }}/**/*"
