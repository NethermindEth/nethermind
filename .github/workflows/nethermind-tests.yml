name: Nethermind/Ethereum tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [master, feature/eest-zkevm-v0.5.0]
  workflow_dispatch:
    inputs:
      coverage:
        default: false
        description: Collect coverage
        required: false
        type: boolean

env:
  COLLECT_COVERAGE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event.inputs.coverage }}
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm

defaults:
  run:
    shell: bash

jobs:
  #

  tests-chunked:
    name: Run ${{ matrix.test.project }}${{ matrix.test.label && format(' [{0}]', matrix.test.label) || '' }} (${{ matrix.test.chunk }}) (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 1of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 2of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 3of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 4of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 5of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 6of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 7of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 8of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 9of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 10of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 11of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 12of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 13of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 14of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 15of16,
                  label: Sequential
                }
            }
          - {
              runner: ubuntu-latest,
              test:
                {
                  project: Ethereum.Blockchain.Pyspec.Test,
                  chunk: 16of16,
                  label: Sequential
                }
            }
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Fetch submodules
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: ${{ startsWith(matrix.test.project, 'Ethereum.Blockchain.Pyspec') && 'false' || 'recursive' }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: ${{ matrix.test.project }} (${{ matrix.test.chunk }})
        id: test
        working-directory: src/Nethermind/${{ matrix.test.project }}
        env:
          TEST_CHUNK: ${{ matrix.test.chunk }}
        run: |
          dotnet build ${{ matrix.test.project }}.csproj -c release
          dotnet build-server shutdown || true  # macOS VB/C# server sometimes fails to shut down; harmless
          test_args=(--no-build --no-restore)

          dotnet test --project ${{ matrix.test.project }}.csproj -c release "${test_args[@]}" -- --filter FullyQualifiedName~Ethereum.Blockchain.Pyspec.Test.ZkEvmPreview.ZkEvmBlockchainTests

  tests-summary:
    name: Tests summary
    needs: [tests-chunked]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          [[ \
            "${{ needs.tests-chunked.result }}" == "success" \
          ]]
