name: Nethermind/Ethereum tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      coverage:
        default: false
        description: Collect coverage
        required: false
        type: boolean

env:
  COLLECT_COVERAGE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event.inputs.coverage }}
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm
  # Flat is the production default; this suite is the patricia baseline (the flat layout
  # runs from nethermind-tests-flat.yml). Does not propagate into the called run-nethtest.yml.
  TEST_USE_TRIE: 1

defaults:
  run:
    shell: bash

jobs:
  # Build the test binaries once per Linux RID and share as an artifact. Windows/macOS
  # are excluded — their artifacts can't be deduped cheaply, so building in-job is faster.
  build:
    uses: ./.github/workflows/build-test-artifacts.yml
    with:
      matrix: '{"include":[{"rid":"linux-x64","os":"ubuntu-latest","variant":"release","build_args":""},{"rid":"linux-arm64","os":"ubuntu-24.04-arm","variant":"release","build_args":""}]}'

  tests:
    name: Run ${{ matrix.project }}${{ matrix.chunk && format(' ({0})', matrix.chunk) || '' }} (${{ matrix.runner }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    outputs:
      collect_coverage: ${{ env.COLLECT_COVERAGE }}
    env:
      DOTNET_GCConserveMemory: 9
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
        project:
          - Nethermind.Abi.Test
          - Nethermind.Api.Test
          - Nethermind.AuRa.Test
          - Nethermind.Blockchain.Test
          - Nethermind.Clique.Test
          - Nethermind.Config.Test
          - Nethermind.Consensus.Test
          - Nethermind.Core.Test
          - Nethermind.Db.Test
          - Nethermind.Era1.Test
          - Nethermind.EraE.Test
          - Nethermind.Ethash.Test
          - Nethermind.EthStats.Test
          - Nethermind.Evm.Test
          - Nethermind.Facade.Test
          - Nethermind.Flashbots.Test
          - Nethermind.HealthChecks.Test
          - Nethermind.History.Test
          - Nethermind.Hive.Test
          - Nethermind.JsonRpc.Test
          - Nethermind.JsonRpc.TraceStore.Test
          - Nethermind.KeyStore.Test
          - Nethermind.Logging.NLog.Test
          - Nethermind.Merge.AuRa.Test
          - Nethermind.Merge.Plugin.Test
          - Nethermind.Mining.Test
          - Nethermind.Monitoring.Test
          - Nethermind.Network.Discovery.Test
          - Nethermind.Network.Dns.Test
          - Nethermind.Network.Enr.Test
          - Nethermind.Network.Test
          - Nethermind.Optimism.Test
          - Nethermind.Runner.Test
          - Nethermind.Serialization.Ssz.Test
          - Nethermind.Shutter.Test
          - Nethermind.Sockets.Test
          - Nethermind.Specs.Test
          - Nethermind.State.Test
          - Nethermind.State.Test.Runner.Test
          - Nethermind.Synchronization.Test
          - Nethermind.Taiko.Test
          - Nethermind.Trie.Test
          - Nethermind.TxPool.Test
          - Nethermind.Wallet.Test
          - Nethermind.Xdc.Test
        chunk: ['']
        exclude: # On ARM/Windows these are chunked (see include block) — their unchunked variants hit the 15-min wall (worse under flat).
          - runner: ubuntu-24.04-arm
            project: Nethermind.Synchronization.Test
            chunk: ''
          - runner: ubuntu-24.04-arm
            project: Nethermind.Merge.Plugin.Test
            chunk: ''
          - runner: ubuntu-24.04-arm
            project: Nethermind.Merge.AuRa.Test
            chunk: ''
          - runner: windows-latest
            project: Nethermind.Merge.Plugin.Test
            chunk: ''
          - runner: windows-latest
            project: Nethermind.Merge.AuRa.Test
            chunk: ''
        include: # macOS only for OS-sensitive tests (I/O, networking, sockets)
          - { runner: macos-latest, project: Nethermind.Db.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.JsonRpc.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.KeyStore.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Network.Discovery.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Network.Dns.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Network.Enr.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Network.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Runner.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Sockets.Test, chunk: '' }
          - { runner: macos-latest, project: Nethermind.Synchronization.Test, chunk: 1of4 }
          - { runner: macos-latest, project: Nethermind.Synchronization.Test, chunk: 2of4 }
          - { runner: macos-latest, project: Nethermind.Synchronization.Test, chunk: 3of4 }
          - { runner: macos-latest, project: Nethermind.Synchronization.Test, chunk: 4of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Synchronization.Test, chunk: 1of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Synchronization.Test, chunk: 2of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Synchronization.Test, chunk: 3of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Synchronization.Test, chunk: 4of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.Plugin.Test, chunk: 1of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.Plugin.Test, chunk: 2of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.Plugin.Test, chunk: 3of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.Plugin.Test, chunk: 4of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.AuRa.Test, chunk: 1of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.AuRa.Test, chunk: 2of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.AuRa.Test, chunk: 3of4 }
          - { runner: ubuntu-24.04-arm, project: Nethermind.Merge.AuRa.Test, chunk: 4of4 }
          - { runner: windows-latest, project: Nethermind.Merge.Plugin.Test, chunk: 1of4 }
          - { runner: windows-latest, project: Nethermind.Merge.Plugin.Test, chunk: 2of4 }
          - { runner: windows-latest, project: Nethermind.Merge.Plugin.Test, chunk: 3of4 }
          - { runner: windows-latest, project: Nethermind.Merge.Plugin.Test, chunk: 4of4 }
          - { runner: windows-latest, project: Nethermind.Merge.AuRa.Test, chunk: 1of4 }
          - { runner: windows-latest, project: Nethermind.Merge.AuRa.Test, chunk: 2of4 }
          - { runner: windows-latest, project: Nethermind.Merge.AuRa.Test, chunk: 3of4 }
          - { runner: windows-latest, project: Nethermind.Merge.AuRa.Test, chunk: 4of4 }
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: src/Nethermind/Nethermind.Runner/packages.lock.json

      - name: Download test binaries
        if: runner.os == 'Linux'
        uses: ./.github/actions/download-test-artifacts
        with:
          variant: release

      - name: ${{ matrix.project }}${{ matrix.chunk && format(' ({0})', matrix.chunk) || '' }}
        id: test
        working-directory: src/Nethermind/${{ matrix.project }}
        env:
          TEST_CHUNK: ${{ matrix.chunk }}
        run: |
          flags="${{ matrix.runner == 'ubuntu-latest' && env.COLLECT_COVERAGE == 'true' && '--coverage --coverage-output-format cobertura --coverage-settings ../codecoverage.json' || '' }}"
          if [ "$RUNNER_OS" = "Linux" ]; then
            dotnet restore ${{ matrix.project }}.csproj          # binaries from the shared Linux artifact
          else
            dotnet build ${{ matrix.project }}.csproj -c release  # Windows/macOS: no artifact, build in-job
          fi
          dotnet build-server shutdown || true  # macOS VB/C# server sometimes fails to shut down; harmless
          test_args=(--no-build --no-restore)

          set +e
          dotnet test --project ${{ matrix.project }}.csproj -c release "${test_args[@]}" $flags
          rc=$?
          set -e
          if [[ $rc -eq 0 ]]; then
            exit 0
          elif [[ $rc -eq 1 ]]; then
            exit 1
          else
            echo "::warning::Test process crashed (exit code $rc), retrying..."
            dotnet test --project ${{ matrix.project }}.csproj -c release "${test_args[@]}" $flags
          fi

      - name: Upload coverage report
        if: matrix.runner == 'ubuntu-latest' && env.COLLECT_COVERAGE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}${{ matrix.chunk && format('-{0}', matrix.chunk) || '' }}-coverage
          path: src/Nethermind/artifacts/bin/${{ matrix.project }}/release/TestResults/*.cobertura.xml
          retention-days: 1

  tests-spec:
    name: Run ${{ matrix.project }}${{ matrix.chunk && format(' ({0})', matrix.chunk) || '' }} (${{ matrix.runner }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    env:
      # Only these EF fixture tests read the src/tests submodule at runtime.
      FIXTURE_PROJECTS: '["Ethereum.Blockchain.Block.Test","Ethereum.Legacy.Blockchain.Block.Test","Ethereum.Legacy.Blockchain.Test","Ethereum.Legacy.Transition.Test","Ethereum.Legacy.VM.Test"]'
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
        project:
          - Ethereum.Abi.Test
          - Ethereum.Basic.Test
          - Ethereum.Blockchain.Block.Test
          - Ethereum.Difficulty.Test
          - Ethereum.HexPrefix.Test
          - Ethereum.KeyAddress.Test
          - Ethereum.KeyStore.Test
          - Ethereum.Legacy.Blockchain.Block.Test
          - Ethereum.Legacy.Transition.Test
          - Ethereum.Legacy.VM.Test
          - Ethereum.PoW.Test
          - Ethereum.Rlp.Test
          - Ethereum.Transaction.Test
          - Ethereum.Trie.Test
        chunk: ['']
        exclude: # Legacy VM unchunked on ubuntu-latest is replaced by 8 chunks below (coverage makes it too slow)
          - runner: ubuntu-latest
            project: Ethereum.Legacy.VM.Test
            chunk: ''
        include:
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 1of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 2of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 3of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 4of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 5of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 6of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 7of8 }
          - { runner: ubuntu-latest, project: Ethereum.Legacy.VM.Test, chunk: 8of8 }
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Fetch submodules
        if: ${{ contains(fromJSON(env.FIXTURE_PROJECTS), matrix.project) }}
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: src/Nethermind/Nethermind.Runner/packages.lock.json

      - name: Download test binaries
        if: runner.os == 'Linux'
        uses: ./.github/actions/download-test-artifacts
        with:
          variant: release

      - name: ${{ matrix.project }}${{ matrix.chunk && format(' ({0})', matrix.chunk) || '' }}
        id: test
        working-directory: src/Nethermind/${{ matrix.project }}
        env:
          TEST_CHUNK: ${{ matrix.chunk }}
        run: |
          flags="${{ matrix.runner == 'ubuntu-latest' && env.COLLECT_COVERAGE == 'true' && '--coverage --coverage-output-format cobertura --coverage-settings ../codecoverage.json' || '' }}"
          if [ "$RUNNER_OS" = "Linux" ]; then
            dotnet restore ${{ matrix.project }}.csproj          # binaries from the shared Linux artifact
          else
            dotnet build ${{ matrix.project }}.csproj -c release  # Windows/macOS: no artifact, build in-job
          fi
          dotnet build-server shutdown || true  # macOS VB/C# server sometimes fails to shut down; harmless
          test_args=(--no-build --no-restore)

          set +e
          dotnet test --project ${{ matrix.project }}.csproj -c release "${test_args[@]}" $flags
          rc=$?
          set -e
          if [[ $rc -eq 0 ]]; then
            exit 0
          elif [[ $rc -eq 1 ]]; then
            exit 1
          else
            echo "::warning::Test process crashed (exit code $rc), retrying..."
            dotnet test --project ${{ matrix.project }}.csproj -c release "${test_args[@]}" $flags
          fi

      - name: Upload coverage report
        if: matrix.runner == 'ubuntu-latest' && env.COLLECT_COVERAGE == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}${{ matrix.chunk && format('-{0}', matrix.chunk) || '' }}-coverage
          path: src/Nethermind/artifacts/bin/${{ matrix.project }}/release/TestResults/*.cobertura.xml
          retention-days: 1

  tests-chunked:
    name: Run ${{ matrix.test.project }}${{ matrix.test.label && format(' [{0}]', matrix.test.label) || '' }} (${{ matrix.test.chunk }}) (${{ matrix.runner }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest
        test:
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 1of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 2of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 3of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 4of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 5of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 6of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 7of8 }
          - { project: Ethereum.Legacy.Blockchain.Test, chunk: 8of8 }
    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Fetch submodules
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: src/Nethermind/Nethermind.Runner/packages.lock.json

      - name: Download test binaries
        if: runner.os == 'Linux'
        uses: ./.github/actions/download-test-artifacts
        with:
          variant: release

      - name: ${{ matrix.test.project }} (${{ matrix.test.chunk }})
        id: test
        working-directory: src/Nethermind/${{ matrix.test.project }}
        env:
          TEST_CHUNK: ${{ matrix.test.chunk }}
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            dotnet restore ${{ matrix.test.project }}.csproj
          else
            dotnet build ${{ matrix.test.project }}.csproj -c release
          fi
          dotnet build-server shutdown || true  # macOS VB/C# server sometimes fails to shut down; harmless
          test_args=(--no-build --no-restore)

          set +e
          dotnet test --project ${{ matrix.test.project }}.csproj -c release "${test_args[@]}"
          rc=$?
          set -e
          if [[ $rc -eq 0 ]]; then
            exit 0
          elif [[ $rc -eq 1 ]]; then
            exit 1
          else
            echo "::warning::Test process crashed (exit code $rc), retrying..."
            dotnet test --project ${{ matrix.test.project }}.csproj -c release "${test_args[@]}"
          fi

  # EEST and zkEVM fixtures (formerly the Ethereum.Blockchain.Pyspec.Test shards) run
  # through the reusable nethtest workflow: same fixture releases, sequential (patricia)
  # configuration plus the Amsterdam variant toggles, all fixture formats. The flat
  # layout runs from nethermind-tests-flat.yml.
  nethtest:
    name: EEST nethtest
    uses: ./.github/workflows/run-nethtest.yml
    with:
      test_types: engineTest,blockTest,stateTest,syncTest,txTest,zkevmTest
      setup_group: sequential

  tests-summary:
    name: Tests summary
    needs: [tests, tests-spec, tests-chunked, nethtest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          [[ \
            "${{ needs.tests.result }}" == "success" && \
            "${{ needs.tests-spec.result }}" == "success" && \
            "${{ needs.tests-chunked.result }}" == "success" && \
            "${{ needs.nethtest.result }}" == "success" \
          ]]

  codecov-upload:
    name: Upload Codecov reports
    needs: [tests, tests-summary]
    if: needs.tests.outputs.collect_coverage == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          path: coverage
          pattern: '*-coverage'

      - name: Merge coverage reports
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet-coverage merge \
            coverage/**/*.cobertura.xml \
            -f cobertura \
            -o coverage.cobertura.xml \
            --remove-input-files

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: codecov-nethermind
          files: coverage.cobertura.xml
          disable_search: true
          fail_ci_if_error: true
