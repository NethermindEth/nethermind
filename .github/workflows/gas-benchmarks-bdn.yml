name: Gas Benchmarks (BDN)

on:
  push:
    branches: [master]
    paths: ['src/Nethermind/**', '.github/workflows/gas-benchmarks-bdn.yml']
  pull_request:
    branches: [master]
    types: [labeled]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Benchmark mode'
        required: false
        default: 'NewPayload'
        type: choice
        options:
          - EVM
          - BlockBuilding
          - NewPayload
          - NewPayloadMeasured
      subset:
        description: 'Scenario subset (quick = ~25% representative, full = all 910)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
      filter:
        description: 'BDN filter pattern (optional, e.g. *MULMOD*)'
        required: false
        default: ''
      warmupCount:
        description: 'BDN warmup iterations'
        required: false
        default: '1'
      iterationCount:
        description: 'BDN measurement iterations'
        required: false
        default: '1'
      launchCount:
        description: 'BDN launch count'
        required: false
        default: '1'

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: "1"
  TERM: xterm

jobs:
  resolve:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'performance is good')
    runs-on: ubuntu-slim
    outputs:
      mode: ${{ steps.check.outputs.mode }}
      subset: ${{ steps.check.outputs.subset }}
      filter: ${{ steps.check.outputs.filter }}
      chunks: ${{ steps.check.outputs.chunks }}
      warmupCount: ${{ steps.check.outputs.warmupCount }}
      iterationCount: ${{ steps.check.outputs.iterationCount }}
      launchCount: ${{ steps.check.outputs.launchCount }}
    steps:
      - name: Resolve inputs
        id: check
        shell: bash
        run: |
          set -euo pipefail

          mode="NewPayload"
          subset="full"
          filter=""
          warmupCount="1"
          iterationCount="1"
          launchCount="1"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.mode }}"
            subset="${{ inputs.subset }}"
            filter="${{ inputs.filter }}"
            warmupCount="${{ inputs.warmupCount }}"
            iterationCount="${{ inputs.iterationCount }}"
            launchCount="${{ inputs.launchCount }}"
          fi

          chunks="[1, 2, 3, 4, 5]"

          {
            echo "mode=${mode}"
            echo "subset=${subset}"
            echo "filter=${filter}"
            echo "chunks=${chunks}"
            echo "warmupCount=${warmupCount}"
            echo "iterationCount=${iterationCount}"
            echo "launchCount=${launchCount}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    if: always() && !cancelled() && needs.resolve.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: true
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build benchmarks
        run: dotnet build src/Nethermind/Nethermind.Evm.Benchmark -c Release

      - name: Upload build + data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-package
          retention-days: 1
          path: |
            src/Nethermind/artifacts/bin/Nethermind.Evm.Benchmark/release/
            tools/gas-benchmarks/
            scripts/benchmarks/quick-subset.txt
            global.json

  benchmark:
    needs: [resolve, build]
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.build.result == 'success'
    runs-on: [self-hosted, benchmark]
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.resolve.outputs.chunks) }}
    timeout-minutes: 240
    steps:
      - name: Download benchmark package
        uses: actions/download-artifact@v4
        with:
          name: benchmark-package
          path: .

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Create .git marker
        run: mkdir -p .git

      - name: Hardware verification
        shell: bash
        run: |
          echo "=== CPU ==="
          lscpu | grep -E 'Model name|Socket|Core|Thread|CPU MHz|CPU max|CPU min|Architecture|Flags'
          echo ""
          echo "=== CPU ID ==="
          cat /proc/cpuinfo | grep -E 'model name|cpu MHz|cache size|physical id|core id|cpu cores' | sort -u
          echo ""
          echo "=== Memory ==="
          free -h
          echo ""
          echo "=== NUMA ==="
          numactl --hardware 2>/dev/null || echo "numactl not available"
          echo ""
          echo "=== Kernel ==="
          uname -a
          echo ""
          echo "=== Runner ==="
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Hostname: $(hostname)"
          echo ""
          echo "=== Disk ==="
          df -h . | head -5

      - name: Tune system for stable benchmarks
        shell: bash
        run: |
          # Disable NMI watchdog (periodic interrupt source)
          echo 0 | sudo tee /proc/sys/kernel/nmi_watchdog || true
          # Set performance governor (no frequency scaling)
          for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            echo performance | sudo tee "$cpu" 2>/dev/null || true
          done
          # Drop page caches for consistent cold start
          sync && echo 3 | sudo tee /proc/sys/vm/drop_caches || true
          # Disable kernel address space randomization for deterministic layout
          echo 0 | sudo tee /proc/sys/kernel/randomize_va_space || true
          # Move all IRQs away from benchmark cores 2-5
          for irq in /proc/irq/*/smp_affinity_list; do
            echo "0-1,6-23" | sudo tee "$irq" 2>/dev/null || true
          done
          # Allow unlimited RT scheduling
          sudo tee /proc/sys/kernel/sched_rt_runtime_us <<< -1 2>/dev/null || true

      - name: Run benchmarks (chunk ${{ matrix.chunk }}/${{ strategy.job-total }})
        shell: bash
        env:
          # Server GC for more deterministic heap management (doesn't apply via BDN WithGcServer in-process)
          DOTNET_gcServer: "1"
          # Retain virtual memory after GC — avoids re-faulting pages between iterations
          DOTNET_GCRetainVM: "1"
        run: |
          MODE="${{ needs.resolve.outputs.mode }}"
          SUBSET="${{ needs.resolve.outputs.subset }}"
          FILTER="${{ needs.resolve.outputs.filter }}"
          WARMUP="${{ needs.resolve.outputs.warmupCount }}"
          ITERATIONS="${{ needs.resolve.outputs.iterationCount }}"
          LAUNCHES="${{ needs.resolve.outputs.launchCount }}"
          CHUNKS="${{ needs.resolve.outputs.chunks }}"
          TOTAL=$(echo "$CHUNKS" | tr -cd ',' | wc -c)
          TOTAL=$((TOTAL + 1))

          ARGS="--inprocess --mode=$MODE --chunk ${{ matrix.chunk }}/$TOTAL"
          if [[ "$SUBSET" == "quick" ]]; then
            ARGS="$ARGS --subset quick"
          fi
          if [[ -n "$FILTER" ]]; then
            ARGS="$ARGS --filter $FILTER"
          fi
          if [[ -n "$WARMUP" ]]; then
            ARGS="$ARGS --warmupCount $WARMUP"
          fi
          if [[ -n "$ITERATIONS" ]]; then
            ARGS="$ARGS --iterationCount $ITERATIONS"
          fi
          if [[ -n "$LAUNCHES" ]]; then
            ARGS="$ARGS --launchCount $LAUNCHES"
          fi

          # Pin to cores 2-5 (IRQ-free), highest priority
          DOTNET_BIN="$(which dotnet)"
          sudo nice -n -20 taskset -c 2-5 \
            "$DOTNET_BIN" src/Nethermind/artifacts/bin/Nethermind.Evm.Benchmark/release/Nethermind.Evm.Benchmark.dll $ARGS

      - name: Rename results for merge safety
        if: always()
        shell: bash
        run: |
          # BDN writes the same filename for every chunk. Rename to include chunk number
          # so merge-multiple doesn't clobber files when flattening into one directory.
          for f in BenchmarkDotNet.Artifacts/results/*-full.json; do
            [ -f "$f" ] || continue
            base=$(basename "$f" -full.json)
            mv "$f" "BenchmarkDotNet.Artifacts/results/${base}-chunk${{ matrix.chunk }}-full.json"
          done

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdn-results-${{ matrix.chunk }}
          path: |
            BenchmarkDotNet.Artifacts/results/*-full.json
            BenchmarkDotNet.Artifacts/results/scenario-index-*.tsv
          retention-days: 90

  collect:
    needs: [resolve, benchmark]
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.benchmark.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: bdn-results-*
          path: results/
          merge-multiple: true

      - name: Merge chunk results
        run: python3 scripts/benchmarks/merge_bdn_results.py results/ pr-results.json

      - name: Merge scenario indices
        run: |
          # Concatenate all per-chunk scenario index files into one, deduplicating the header
          HEADER_WRITTEN=false
          for f in results/scenario-index-*.tsv; do
            [ -f "$f" ] || continue
            if [ "$HEADER_WRITTEN" = false ]; then
              cat "$f"
              HEADER_WRITTEN=true
            else
              tail -n +2 "$f"
            fi
          done > scenario-index-merged.tsv 2>/dev/null || true
          if [ -f scenario-index-merged.tsv ]; then
            LINES=$(wc -l < scenario-index-merged.tsv)
            echo "Merged scenario index: $((LINES - 1)) scenarios"
          fi

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: bdn-results-merged
          path: |
            pr-results.json
            scenario-index-merged.tsv
          retention-days: 90

      # On master push: cache results as baseline for future PR comparisons
      - name: Cache master baseline
        if: github.ref == 'refs/heads/master'
        run: cp pr-results.json baseline.json

      - name: Save master cache
        if: github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: baseline.json
          key: gas-benchmark-bdn-${{ github.sha }}

      # On master push: publish to GitHub Pages for historical tracking
      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Gas Benchmarks (BDN)
          tool: benchmarkdotnet
          output-file-path: pr-results.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false

      # On PR: restore master baseline and compare
      - name: Restore master baseline
        if: github.event_name == 'pull_request'
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: baseline.json
          key: gas-benchmark-bdn-
          restore-keys: gas-benchmark-bdn-

      - name: Compare against master
        if: github.event_name == 'pull_request' && hashFiles('baseline.json') != ''
        run: python3 scripts/benchmarks/compare_bdn_results.py baseline.json pr-results.json > comparison.md

      - name: Post comparison to PR
        if: github.event_name == 'pull_request' && hashFiles('baseline.json') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gas-benchmark-bdn
          path: comparison.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

