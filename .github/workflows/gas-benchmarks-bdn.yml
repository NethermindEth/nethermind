name: Gas Benchmarks (BDN)

on:
  push:
    branches: [master]
    paths: ['src/Nethermind/**', '.github/workflows/gas-benchmarks-bdn.yml']
  pull_request:
    branches: [master]
    types: [labeled]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Benchmark mode'
        required: false
        default: 'NewPayload'
        type: choice
        options:
          - EVM
          - BlockBuilding
          - NewPayload
          - NewPayloadMeasured
      subset:
        description: 'Scenario subset (quick = ~25% representative, full = all 910)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
      filter:
        description: 'BDN filter pattern (optional, e.g. *MULMOD*)'
        required: false
        default: ''
      warmupCount:
        description: 'BDN warmup iterations'
        required: false
        default: '1'
      iterationCount:
        description: 'BDN measurement iterations'
        required: false
        default: '1'
      launchCount:
        description: 'BDN launch count'
        required: false
        default: '1'
      retrospective:
        description: 'Enable retrospective mode: benchmark N historical master commits'
        required: false
        type: boolean
        default: false
      retrospective_commits:
        description: 'Number of recent master commits to scan (retrospective mode)'
        required: false
        default: '100'
      retrospective_step:
        description: 'Sample every Nth commit (retrospective mode)'
        required: false
        default: '10'

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: "1"
  TERM: xterm

jobs:
  resolve:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'performance is good')
    runs-on: ubuntu-slim
    outputs:
      mode: ${{ steps.check.outputs.mode }}
      subset: ${{ steps.check.outputs.subset }}
      filter: ${{ steps.check.outputs.filter }}
      chunks: ${{ steps.check.outputs.chunks }}
      warmupCount: ${{ steps.check.outputs.warmupCount }}
      iterationCount: ${{ steps.check.outputs.iterationCount }}
      launchCount: ${{ steps.check.outputs.launchCount }}
      retrospective: ${{ steps.check.outputs.retrospective }}
      retro_matrix: ${{ steps.retro.outputs.matrix }}
      retro_commits: ${{ steps.check.outputs.retro_commits }}
      retro_step: ${{ steps.check.outputs.retro_step }}
    steps:
      - name: Resolve inputs
        id: check
        shell: bash
        run: |
          set -euo pipefail

          mode="NewPayload"
          subset="full"
          filter=""
          warmupCount="1"
          iterationCount="1"
          launchCount="1"
          retrospective="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.mode }}"
            subset="${{ inputs.subset }}"
            filter="${{ inputs.filter }}"
            warmupCount="${{ inputs.warmupCount }}"
            iterationCount="${{ inputs.iterationCount }}"
            launchCount="${{ inputs.launchCount }}"
            retrospective="${{ inputs.retrospective }}"
          fi

          if [[ "${retrospective}" == "true" ]]; then
            # Retrospective forces quick subset and single chunk for speed
            subset="quick"
            chunks="[1]"
          else
            chunks="[1, 2, 3, 4, 5]"
          fi

          {
            echo "mode=${mode}"
            echo "subset=${subset}"
            echo "filter=${filter}"
            echo "chunks=${chunks}"
            echo "warmupCount=${warmupCount}"
            echo "iterationCount=${iterationCount}"
            echo "launchCount=${launchCount}"
            echo "retrospective=${retrospective}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout for retrospective
        if: steps.check.outputs.retrospective == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate retrospective matrix
        id: retro
        if: steps.check.outputs.retrospective == 'true'
        shell: bash
        run: |
          COMMITS="${{ inputs.retrospective_commits || '100' }}"
          STEP="${{ inputs.retrospective_step || '10' }}"

          # Get recent master commits, pick every Nth
          SHAS=$(git log origin/master --format='%H' -n "${COMMITS}" | awk "NR % ${STEP} == 1")

          # Build JSON array
          MATRIX="["
          first=true
          for sha in $SHAS; do
            if [ "$first" = true ]; then
              first=false
            else
              MATRIX="${MATRIX},"
            fi
            MATRIX="${MATRIX}\"${sha}\""
          done
          MATRIX="${MATRIX}]"

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$SHAS" | wc -w)
          echo "Generated retrospective matrix with ${COUNT} commits (every ${STEP}th of last ${COMMITS})"

  # ─── Normal benchmark flow ─────────────────────────────────────────────

  build:
    needs: resolve
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.resolve.outputs.retrospective != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: true
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build benchmarks
        run: dotnet build src/Nethermind/Nethermind.Evm.Benchmark -c Release

      - name: Upload build + data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-package
          retention-days: 1
          path: |
            src/Nethermind/artifacts/bin/Nethermind.Evm.Benchmark/release/
            tools/gas-benchmarks/
            scripts/benchmarks/quick-subset.txt
            global.json

  benchmark:
    needs: [resolve, build]
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.build.result == 'success'
    runs-on: [self-hosted, benchmark]
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.resolve.outputs.chunks) }}
    timeout-minutes: 240
    steps:
      - name: Download benchmark package
        uses: actions/download-artifact@v4
        with:
          name: benchmark-package
          path: .

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Create .git marker
        run: mkdir -p .git

      - name: Hardware verification
        shell: bash
        run: |
          echo "=== CPU ==="
          lscpu | grep -E 'Model name|Socket|Core|Thread|CPU MHz|CPU max|CPU min|Architecture|Flags'
          echo ""
          echo "=== CPU ID ==="
          cat /proc/cpuinfo | grep -E 'model name|cpu MHz|cache size|physical id|core id|cpu cores' | sort -u
          echo ""
          echo "=== Memory ==="
          free -h
          echo ""
          echo "=== NUMA ==="
          numactl --hardware 2>/dev/null || echo "numactl not available"
          echo ""
          echo "=== Kernel ==="
          uname -a
          echo ""
          echo "=== Runner ==="
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Hostname: $(hostname)"
          echo ""
          echo "=== Disk ==="
          df -h . | head -5

      - name: Run benchmarks (chunk ${{ matrix.chunk }}/${{ strategy.job-total }})
        shell: bash
        run: |
          MODE="${{ needs.resolve.outputs.mode }}"
          SUBSET="${{ needs.resolve.outputs.subset }}"
          FILTER="${{ needs.resolve.outputs.filter }}"
          WARMUP="${{ needs.resolve.outputs.warmupCount }}"
          ITERATIONS="${{ needs.resolve.outputs.iterationCount }}"
          LAUNCHES="${{ needs.resolve.outputs.launchCount }}"
          CHUNKS="${{ needs.resolve.outputs.chunks }}"
          TOTAL=$(echo "$CHUNKS" | tr -cd ',' | wc -c)
          TOTAL=$((TOTAL + 1))

          ARGS="--inprocess --mode=$MODE --chunk ${{ matrix.chunk }}/$TOTAL"
          if [[ "$SUBSET" == "quick" ]]; then
            ARGS="$ARGS --subset quick"
          fi
          if [[ -n "$FILTER" ]]; then
            ARGS="$ARGS --filter $FILTER"
          fi
          if [[ -n "$WARMUP" ]]; then
            ARGS="$ARGS --warmupCount $WARMUP"
          fi
          if [[ -n "$ITERATIONS" ]]; then
            ARGS="$ARGS --iterationCount $ITERATIONS"
          fi
          if [[ -n "$LAUNCHES" ]]; then
            ARGS="$ARGS --launchCount $LAUNCHES"
          fi

          dotnet src/Nethermind/artifacts/bin/Nethermind.Evm.Benchmark/release/Nethermind.Evm.Benchmark.dll $ARGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdn-results-${{ matrix.chunk }}
          path: BenchmarkDotNet.Artifacts/results/*-full.json
          retention-days: 90

  collect:
    needs: [resolve, benchmark]
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.benchmark.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: bdn-results-*
          path: results/
          merge-multiple: true

      - name: Merge chunk results
        run: python3 scripts/benchmarks/merge_bdn_results.py results/ pr-results.json

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: bdn-results-merged
          path: pr-results.json
          retention-days: 90

      # On master push: cache results as baseline for future PR comparisons
      - name: Cache master baseline
        if: github.ref == 'refs/heads/master'
        run: cp pr-results.json baseline.json

      - name: Save master cache
        if: github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: baseline.json
          key: gas-benchmark-bdn-${{ github.sha }}

      # On master push: publish to GitHub Pages for historical tracking
      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Gas Benchmarks (BDN)
          tool: benchmarkdotnet
          output-file-path: pr-results.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false

      # On PR: restore master baseline and compare
      - name: Restore master baseline
        if: github.event_name == 'pull_request'
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: baseline.json
          key: gas-benchmark-bdn-
          restore-keys: gas-benchmark-bdn-

      - name: Compare against master
        if: github.event_name == 'pull_request' && hashFiles('baseline.json') != ''
        run: python3 scripts/benchmarks/compare_bdn_results.py baseline.json pr-results.json > comparison.md

      - name: Post comparison to PR
        if: github.event_name == 'pull_request' && hashFiles('baseline.json') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gas-benchmark-bdn
          path: comparison.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Retrospective mode ────────────────────────────────────────────────
  # Builds and benchmarks multiple historical master commits to detect
  # regressions over time. Uses quick subset for speed.

  retro-benchmark:
    needs: resolve
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.resolve.outputs.retrospective == 'true'
    runs-on: [self-hosted, benchmark]
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        commit: ${{ fromJson(needs.resolve.outputs.retro_matrix || '[]') }}
    timeout-minutes: 60
    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.commit }}
          lfs: true
          submodules: true
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Inject quick-subset.txt from the triggering ref so historical commits
      # that pre-date the subset feature can still use it
      - name: Inject quick-subset.txt
        shell: bash
        run: |
          if [[ ! -f "scripts/benchmarks/quick-subset.txt" ]]; then
            mkdir -p scripts/benchmarks
            git fetch origin ${{ github.sha }} --depth=1
            git show ${{ github.sha }}:scripts/benchmarks/quick-subset.txt > scripts/benchmarks/quick-subset.txt 2>/dev/null || true
          fi

      - name: Build benchmarks
        id: build
        run: dotnet build src/Nethermind/Nethermind.Evm.Benchmark -c Release
        continue-on-error: true

      - name: Run quick benchmarks
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          MODE="${{ needs.resolve.outputs.mode }}"
          WARMUP="${{ needs.resolve.outputs.warmupCount }}"
          ITERATIONS="${{ needs.resolve.outputs.iterationCount }}"
          LAUNCHES="${{ needs.resolve.outputs.launchCount }}"
          SHORT_SHA=$(echo "${{ matrix.commit }}" | head -c 10)

          ARGS="--inprocess --mode=$MODE"

          # --subset is only available in commits that have quick-subset.txt
          if [[ -f "scripts/benchmarks/quick-subset.txt" ]]; then
            ARGS="$ARGS --subset quick"
          fi

          if [[ -n "$WARMUP" ]]; then
            ARGS="$ARGS --warmupCount $WARMUP"
          fi
          if [[ -n "$ITERATIONS" ]]; then
            ARGS="$ARGS --iterationCount $ITERATIONS"
          fi
          if [[ -n "$LAUNCHES" ]]; then
            ARGS="$ARGS --launchCount $LAUNCHES"
          fi

          # Find the DLL — newer commits use artifacts/ layout, older use bin/Release/net*/
          RUNTIMECFG=$(find src/Nethermind -name 'Nethermind.Evm.Benchmark.runtimeconfig.json' 2>/dev/null | head -1)
          if [[ -z "$RUNTIMECFG" ]]; then
            echo "ERROR: Could not find Nethermind.Evm.Benchmark.runtimeconfig.json"
            exit 1
          fi
          DLL_DIR=$(dirname "$RUNTIMECFG")
          DLL="$DLL_DIR/Nethermind.Evm.Benchmark.dll"

          echo "=== Benchmarking commit ${SHORT_SHA} (DLL: $DLL) ==="
          dotnet "$DLL" $ARGS

      - name: Upload results
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: retro-${{ matrix.commit }}
          path: BenchmarkDotNet.Artifacts/results/*-full.json
          retention-days: 30

  retro-collect:
    needs: [resolve, retro-benchmark]
    if: always() && !cancelled() && needs.resolve.result == 'success' && needs.resolve.outputs.retrospective == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all retrospective results
        uses: actions/download-artifact@v4
        with:
          pattern: retro-*
          path: retro-results/

      - name: Generate retrospective reports
        shell: bash
        run: |
          python3 scripts/benchmarks/retrospective_report.py retro-results/ > retrospective.md
          python3 scripts/benchmarks/retrospective_report.py retro-results/ --json > retrospective.json

      - name: Upload retrospective reports
        uses: actions/upload-artifact@v4
        with:
          name: retrospective-report
          path: |
            retrospective.md
            retrospective.json
          retention-days: 90

      - name: Print report
        run: cat retrospective.md
