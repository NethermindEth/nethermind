name: Release guest for ZisK

on:
  push:
    branches: [feature/release-zisk-guest]
  workflow_dispatch:

permissions:
  deployments: write
  packages: write
  contents: write

env:
  PACKAGE_DIR: src/Nethermind/Nethermind.Stateless.ZiskGuest/bin

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Build Nethermind
        working-directory: src/Nethermind/Nethermind.Stateless.ZiskGuest
        run: make build

      - name: Archive and sign
        env:
          GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
          GPG_SECRET_KEY: ${{ secrets.PPA_GPG_SECRET_KEY }}
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          archive_name=nethermind-guest-zisk-r${{ github.run_number }}.tar.gz
          tar -czf "$archive_name" nethermind
          tar -tzf "$archive_name"

          printf '%s' "$GPG_SECRET_KEY" | base64 --decode | gpg --import --no-tty --batch --yes

          gpg --no-tty --batch --yes --pinentry-mode loopback \
            --passphrase-file <(printf '%s' "$GPG_PASSPHRASE") \
            -o "$archive_name.asc" -ab "$archive_name"

      - name: Upload assets
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.PACKAGE_DIR }}/*.tar.gz*
          if-no-files-found: error
          retention-days: 1

  publish-github:
    name: Publish to GitHub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create GitHub app token
        id: gh-app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download assets
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.PACKAGE_DIR }}

      - name: Publish
        env:
          GIT_TAG: zisk-guest-r${{ github.run_number }}
          GITHUB_TOKEN: ${{ steps.gh-app.outputs.token }}
        run: |
          echo "Publishing packages to GitHub"
          if gh release view "$GIT_TAG" >/dev/null 2>&1; then publish=1; else publish=0; fi
          title="Guest for ZisK r${{ github.run_number }}"

          if (( !publish )); then
            echo "Drafting release $GIT_TAG"
            relnotes=$(cat <<'EOF'
          # Release notes

          ### [CONTENT PLACEHOLDER]

          #### Build signatures

          The packages are signed with the following OpenPGP key: `AD12 7976 5093 C675 9CD8 A400 24A7 7461 6F1E 617E`
          EOF
          )
            gh release create "$GIT_TAG" --target "$GITHUB_SHA" -t "$title" -d -p -F <(printf '%s' "$relnotes")
          fi

          cd $PACKAGE_DIR
          echo "Uploading assets"
          gh release upload "$GIT_TAG" *.tar.gz *.tar.gz.asc --clobber

          if (( publish )); then
            echo "Publishing release $GIT_TAG"
            gh release edit "$GIT_TAG" --verify-tag --target "$GITHUB_SHA" -t "$title" --draft=false --prerelease
          fi

          echo "Publishing completed"
