name: Run NewPayload Benchmark

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      backend:
        description: "State backend: Trie or FlatState"
        required: false
        default: "FlatState"
      blocks:
        description: "Number of measured blocks"
        required: false
        default: "50"
      warmup:
        description: "Number of warmup blocks"
        required: false
        default: "20"

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: "1"
  TERM: xterm
  BENCHMARK_PROJECT: src/Nethermind/Nethermind.Evm.Benchmark/Nethermind.Evm.Benchmark.csproj

jobs:
  resolve-inputs:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.action == 'labeled' &&
       startsWith(github.event.label.name, 'NewPayloadBenchmark') &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      backend: ${{ steps.resolve.outputs.backend }}
      blocks: ${{ steps.resolve.outputs.blocks }}
      warmup: ${{ steps.resolve.outputs.warmup }}
    steps:
      - name: Resolve workflow inputs
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABEL_NAME: ${{ github.event.label.name }}
          DISPATCH_BACKEND: ${{ inputs.backend }}
          DISPATCH_BLOCKS: ${{ inputs.blocks }}
          DISPATCH_WARMUP: ${{ inputs.warmup }}
        run: |
          set -euo pipefail

          should_run="true"
          backend="FlatState"
          blocks="50"
          warmup="20"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            backend="${DISPATCH_BACKEND:-FlatState}"
            blocks="${DISPATCH_BLOCKS:-50}"
            warmup="${DISPATCH_WARMUP:-20}"
          elif [[ "${EVENT_NAME}" == "pull_request" ]]; then
            label="${LABEL_NAME:-}"

            if [[ "${label}" == "NewPayloadBenchmark" ]]; then
              backend="FlatState"
            elif [[ "${label}" == "NewPayloadBenchmark-Trie" ]]; then
              backend="Trie"
            elif [[ "${label}" == "NewPayloadBenchmark-FlatState" ]]; then
              backend="FlatState"
            else
              should_run="false"
            fi
          fi

          {
            echo "should_run=${should_run}"
            echo "backend=${backend}"
            echo "blocks=${blocks}"
            echo "warmup=${warmup}"
          } >> "${GITHUB_OUTPUT}"

  benchmark:
    needs: resolve-inputs
    if: needs.resolve-inputs.outputs.should_run == 'true'
    runs-on: benchmark
    timeout-minutes: 60
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: src/Nethermind/Nethermind.Runner/packages.lock.json

      - name: Build PR branch
        run: |
          dotnet restore ${{ env.BENCHMARK_PROJECT }}
          dotnet build ${{ env.BENCHMARK_PROJECT }} -c Release --no-restore

      - name: Run NewPayload benchmark on PR branch (FlatState)
        id: run-pr-flat
        continue-on-error: true
        shell: bash
        env:
          BLOCKS: ${{ needs.resolve-inputs.outputs.blocks }}
          WARMUP: ${{ needs.resolve-inputs.outputs.warmup }}
        run: |
          dotnet run -c Release --no-build \
            --project ${{ env.BENCHMARK_PROJECT }} \
            -- --newpayload \
               --backend FlatState \
               --blocks "${BLOCKS}" \
               --warmup "${WARMUP}" \
            | tee "${RUNNER_TEMP}/newpayload-pr-flat.txt"

      - name: Run NewPayload benchmark on PR branch (Trie)
        id: run-pr-trie
        continue-on-error: true
        shell: bash
        env:
          BLOCKS: ${{ needs.resolve-inputs.outputs.blocks }}
          WARMUP: ${{ needs.resolve-inputs.outputs.warmup }}
        run: |
          dotnet run -c Release --no-build \
            --project ${{ env.BENCHMARK_PROJECT }} \
            -- --newpayload \
               --backend Trie \
               --blocks "${BLOCKS}" \
               --warmup "${WARMUP}" \
            | tee "${RUNNER_TEMP}/newpayload-pr-trie.txt"

      - name: Save PR benchmark files
        run: |
          cp -r src/Nethermind/Nethermind.Evm.Benchmark "${RUNNER_TEMP}/pr-bench-src"
          cp Directory.Packages.props "${RUNNER_TEMP}/pr-Directory.Packages.props"

      - name: Check out base branch (master)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha || 'master' }}
          clean: false

      - name: Overlay PR benchmark files onto base
        run: |
          rm -rf src/Nethermind/Nethermind.Evm.Benchmark
          cp -r "${RUNNER_TEMP}/pr-bench-src" src/Nethermind/Nethermind.Evm.Benchmark
          cp "${RUNNER_TEMP}/pr-Directory.Packages.props" Directory.Packages.props

      - name: Build base branch
        run: |
          dotnet restore ${{ env.BENCHMARK_PROJECT }}
          dotnet build ${{ env.BENCHMARK_PROJECT }} -c Release --no-restore

      - name: Run NewPayload benchmark on base branch (FlatState)
        id: run-base-flat
        continue-on-error: true
        shell: bash
        env:
          BLOCKS: ${{ needs.resolve-inputs.outputs.blocks }}
          WARMUP: ${{ needs.resolve-inputs.outputs.warmup }}
        run: |
          dotnet run -c Release --no-build \
            --project ${{ env.BENCHMARK_PROJECT }} \
            -- --newpayload \
               --backend FlatState \
               --blocks "${BLOCKS}" \
               --warmup "${WARMUP}" \
            | tee "${RUNNER_TEMP}/newpayload-base-flat.txt"

      - name: Run NewPayload benchmark on base branch (Trie)
        id: run-base-trie
        continue-on-error: true
        shell: bash
        env:
          BLOCKS: ${{ needs.resolve-inputs.outputs.blocks }}
          WARMUP: ${{ needs.resolve-inputs.outputs.warmup }}
        run: |
          dotnet run -c Release --no-build \
            --project ${{ env.BENCHMARK_PROJECT }} \
            -- --newpayload \
               --backend Trie \
               --blocks "${BLOCKS}" \
               --warmup "${WARMUP}" \
            | tee "${RUNNER_TEMP}/newpayload-base-trie.txt"

      - name: Compare results and build comment
        id: compare
        if: always()
        shell: bash
        env:
          BASE_FLAT_FILE: ${{ runner.temp }}/newpayload-base-flat.txt
          PR_FLAT_FILE: ${{ runner.temp }}/newpayload-pr-flat.txt
          BASE_TRIE_FILE: ${{ runner.temp }}/newpayload-base-trie.txt
          PR_TRIE_FILE: ${{ runner.temp }}/newpayload-pr-trie.txt
          BASE_SHA: ${{ github.event.pull_request.base.sha || 'master' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BASE_FLAT_OUTCOME: ${{ steps.run-base-flat.outcome }}
          PR_FLAT_OUTCOME: ${{ steps.run-pr-flat.outcome }}
          BASE_TRIE_OUTCOME: ${{ steps.run-base-trie.outcome }}
          PR_TRIE_OUTCOME: ${{ steps.run-pr-trie.outcome }}
        run: |
          set -euo pipefail

          python3 - <<'PYEOF'
          import re, os, sys

          def parse_results(filepath):
              if not os.path.exists(filepath):
                  return None
              with open(filepath) as f:
                  text = f.read()
              results = {}
              for line in text.splitlines():
                  line = line.strip()
                  for key in ["Mean", "Median", "StdDev", "CV", "TrimmedMean", "TrimmedSD",
                              "TrimmedCV", "Min", "Max", "P5", "P95", "P99"]:
                      pattern = rf"^{key}:\s+([\d.]+)\s*(ms|%)"
                      m = re.match(pattern, line)
                      if m:
                          results[key] = float(m.group(1))
                          break
                  m = re.match(r"^Blocks:\s+(\d+)", line)
                  if m:
                      results["Blocks"] = int(m.group(1))
              return results if results else None

          def fmt(val, unit="ms"):
              if unit == "%":
                  return f"{val:.1f}%"
              return f"{val:.2f} ms"

          def delta_pct(pr_val, base_val):
              if base_val == 0:
                  return None
              return ((pr_val - base_val) / base_val) * 100

          def fmt_delta(pct):
              if pct is None:
                  return "n/a"
              sign = "+" if pct >= 0 else ""
              return f"{sign}{pct:.1f}%"

          def indicator(pct):
              if pct is None:
                  return ""
              if pct <= -3:
                  return " :arrow_down:"
              elif pct >= 3:
                  return " :arrow_up_small:"
              return ""

          def build_table(base, pr, backend_name):
              section = []
              section.append(f"#### {backend_name}")
              section.append("")
              section.append("| Metric | Base | PR | Delta |")
              section.append("|--------|-----:|---:|------:|")
              for key in ["TrimmedMean", "Mean", "Median", "P95", "P99", "Min", "Max"]:
                  if key in base and key in pr:
                      d = delta_pct(pr[key], base[key])
                      section.append(
                          f"| {key} "
                          f"| {fmt(base[key])} "
                          f"| {fmt(pr[key])} "
                          f"| {fmt_delta(d)}{indicator(d)} |"
                      )
              for key in ["TrimmedCV", "CV"]:
                  if key in base and key in pr:
                      section.append(f"| {key} | {fmt(base[key], '%')} | {fmt(pr[key], '%')} | |")
              if "Blocks" in base and "Blocks" in pr:
                  section.append(f"| Blocks | {base['Blocks']} | {pr['Blocks']} | |")
              return section

          marker = "<!-- newpayload-benchmark-report -->"
          run_url = os.environ["RUN_URL"]
          base_sha = os.environ["BASE_SHA"][:8]
          head_sha = os.environ["HEAD_SHA"][:8]

          lines = [marker]
          lines.append("### engine_newPayload Benchmark Comparison")
          lines.append("")
          lines.append(f"Run: [View workflow run]({run_url})")
          lines.append(f"Base: `{base_sha}` | Head: `{head_sha}`")
          lines.append("")

          for backend, base_file_env, pr_file_env, base_out_env, pr_out_env in [
              ("FlatState", "BASE_FLAT_FILE", "PR_FLAT_FILE", "BASE_FLAT_OUTCOME", "PR_FLAT_OUTCOME"),
              ("Trie", "BASE_TRIE_FILE", "PR_TRIE_FILE", "BASE_TRIE_OUTCOME", "PR_TRIE_OUTCOME"),
          ]:
              base_outcome = os.environ.get(base_out_env, "")
              pr_outcome = os.environ.get(pr_out_env, "")

              if base_outcome != "success" or pr_outcome != "success":
                  lines.append(f"#### {backend}")
                  lines.append("")
                  lines.append(f":x: **{backend} benchmark failed.** (base={base_outcome}, pr={pr_outcome})")
                  lines.append("")
                  continue

              base = parse_results(os.environ.get(base_file_env, ""))
              pr = parse_results(os.environ.get(pr_file_env, ""))

              if not base or not pr:
                  lines.append(f"#### {backend}")
                  lines.append("")
                  lines.append(f":warning: Could not parse {backend} results.")
                  lines.append("")
                  continue

              lines.extend(build_table(base, pr, backend))
              lines.append("")

          body = "\n".join(lines)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<GHEOF\n{body}\nGHEOF\n")
          PYEOF

      - name: Post benchmark comparison comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.compare.outputs.body }}
        with:
          script: |
            const marker = '<!-- newpayload-benchmark-report -->';
            const body = process.env.COMMENT_BODY;
            if (!body) {
              console.log('No comment body produced, skipping.');
              return;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newpayload-benchmark-results
          path: |
            ${{ runner.temp }}/newpayload-base-flat.txt
            ${{ runner.temp }}/newpayload-base-trie.txt
            ${{ runner.temp }}/newpayload-pr-flat.txt
            ${{ runner.temp }}/newpayload-pr-trie.txt
          retention-days: 30
