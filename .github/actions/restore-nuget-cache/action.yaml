name: Restore NuGet cache
description: |
  Restore the shared NuGet packages cache. Use save=true exactly once per OS
  per workflow run (in a dedicated warmup job) and save=false everywhere else.
  This eliminates the save races that produce red icons when many matrix
  entries try to populate the same cache key in parallel.

inputs:
  save:
    description: 'true to also save (warmup job only); false to restore-only (matrix consumers)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # Default branch — runs whenever save is anything other than the literal 'true'.
    # Defensive against YAML booleans (e.g. save: False) which would otherwise silently
    # disable both branches.
    - name: Restore NuGet cache (read-only)
      if: inputs.save != 'true'
      uses: actions/cache/restore@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', 'global.json') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore + save NuGet cache (warmup)
      if: inputs.save == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', 'global.json') }}
        restore-keys: nuget-${{ runner.os }}-
