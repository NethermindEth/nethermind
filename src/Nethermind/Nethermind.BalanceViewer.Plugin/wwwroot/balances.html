<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Nethermind Balances</title>
    <link rel="icon" href="favicon.webp" type="image/webp">
    <link rel="manifest" href="balances.webmanifest">
    <meta name="theme-color" content="#000000">
    <style>
        @font-face {
            font-family: 'DM Sans';
            font-style: normal;
            font-weight: 100 1000;
            font-display: swap;
            src: url(fonts/dm-sans-latin.woff2) format('woff2');
        }
        @font-face {
            font-family: 'DM Mono';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(fonts/dm-mono-latin.woff2) format('woff2');
        }
        @font-face {
            font-family: 'Exo';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url(fonts/exo-latin.woff2) format('woff2');
        }

        /* Dracula-inspired palette on the dashboard's black background */
        :root {
            --border: #6272a4;
            --border-soft: #44475a;
            --accent: #8be9fd;
            --muted: #6272a4;
            --danger: #ff5555;
            --c-name: #ff79c6;   /* ENS / display names */
            --c-addr: #bd93f9;   /* raw addresses */
            --c-ticker: #8be9fd; /* native ticker (tokens get their own colors) */
            --c-amount: #50fa7b; /* token amounts */
            --c-fiat: #9aa5ce;   /* per-row fiat values */
            --c-total: #ffb86c;  /* fiat totals */
        }

        html, body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 14px;
        }

        body { padding: 16px; }

        .number, input, button.mono {
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 12px;
        }

        header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        header .brand {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .brand img { height: 28px; width: 211px; }

        header .brand span { color: var(--accent); }

        header .net {
            color: var(--muted);
            font-size: 12px;
        }

        header .net .number { color: white; }

        header .total {
            display: none;
            align-items: baseline;
            gap: 8px;
        }

        header .total .number { font-size: 15px; color: var(--c-total); }

        /* chain toggles replace the chain/head text when sibling nodes are detected */
        #chainToggles { display: none; gap: 8px; align-items: center; }

        button.chain-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            opacity: 0.35;
        }

        button.chain-btn.on { opacity: 1; border-color: var(--accent); }
        button.chain-btn img { width: 20px; height: 20px; display: block; }

        /* overlaid above the logo so the button keeps its size when syncing finishes */
        button.chain-btn .sync {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            box-sizing: border-box;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border: 1.5px solid rgba(248, 248, 242, 0.75);
            border-top-color: transparent;
            border-radius: 50%;
            filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.9));
            animation: spin 2.4s linear infinite;
        }

        button.chain-btn.syncing .sync { display: block; }

        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        sup.suptag { color: var(--muted); font-size: 9px; margin-left: 1px; }

        select {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: white;
            padding: 4px 6px;
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 12px;
            outline: none;
        }

        select:focus { border-color: var(--accent); }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: white;
            padding: 7px 10px;
            outline: none;
            min-width: 0;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: #666; }

        button {
            background: black;
            border: 1px solid var(--border);
            color: white;
            padding: 7px 14px;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { border-color: var(--accent); color: var(--accent); }
        button.link {
            border: none;
            padding: 2px 4px;
            color: var(--muted);
            font-size: 12px;
        }
        button.link:hover { color: var(--accent); }
        button.danger:hover { border-color: var(--danger); color: var(--danger); }
        button.bell { filter: grayscale(1) opacity(0.45); font-size: 13px; }
        button.bell.on { filter: none; }

        .panel {
            position: relative;
            border: 1px solid var(--border);
            padding: 34px 12px 12px 12px;
            margin-top: 16px;
        }

        .panel > .title {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-bottom-right-radius: 8px;
            padding: 4px 10px 4px 8px;
            position: absolute;
            top: 0;
            left: 0;
            background: black;
        }

        #addAddress input { flex: 1 1 320px; }

        #tokenForm {
            display: none;
            border-top: 1px solid var(--border-soft);
            margin-top: 12px;
            padding-top: 12px;
        }

        #tokenForm.open { display: flex; }
        #tokenForm input.addr { flex: 2 1 300px; }
        #tokenForm input.sm { flex: 1 1 80px; }

        #tokens { margin-top: 12px; }

        body.hideZero tr.zero { display: none; }

        button.zero-toggle {
            margin-left: auto;
            border: 1px solid var(--border);
            padding: 4px 9px;
            color: var(--muted);
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 13px;
        }

        button.zero-toggle.on { color: var(--accent); border-color: var(--accent); }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            padding: 3px 4px 3px 8px;
            margin: 0 6px 6px 0;
        }

        .chip .number { color: var(--tcol, var(--c-ticker)); cursor: pointer; }
        .chip .number:hover { color: var(--accent); }
        .chip.nft { border-style: dashed; }
        .chip .kind { color: var(--muted); font-size: 10px; }

        .thumbs {
            display: flex;
            gap: 6px;
            padding: 4px 0 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .thumbs img {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            cursor: pointer;
        }

        .thumbs img:hover { border-color: var(--accent); }

        .thumbs .more { color: var(--muted); font-size: 11px; }
        .thumbs .more.expand { cursor: pointer; }
        .thumbs .more.expand:hover { color: var(--accent); }

        .chip .x {
            cursor: pointer;
            color: var(--muted);
            padding: 0 4px;
        }

        .chip .x:hover { color: var(--danger); }

        button.chip-add {
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            padding: 3px 10px;
            margin: 0 6px 6px 0;
            font-size: 13px;
            line-height: 17px;
        }

        #cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .card {
            border: 1px solid var(--border);
            padding: 10px 12px;
        }

        .card .head {
            display: flex;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .card .name {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            color: var(--c-name);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card .addr {
            color: var(--acct, var(--c-addr));
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .card .addr:hover { color: var(--accent); }

        .card table { width: 100%; border-collapse: collapse; }
        .card td { padding: 4px 0; }
        .card td.bal { text-align: right; font-size: 13px; color: var(--c-amount); }
        .card td.bal.spin { color: var(--muted); }
        .card td.tick { color: var(--tcol, var(--c-ticker)); width: 72px; }
        .card td.tick.copyable { cursor: pointer; }
        .card td.tick.copyable:hover { color: var(--accent); }
        .card td.fiat { text-align: right; color: var(--c-fiat); width: 110px; font-size: 12px; padding-left: 16px; }
        .card tr.cardTotal td { border-top: 1px solid var(--border-soft); }
        .card tr.cardTotal td.tick { color: var(--muted); }
        .card tr.cardTotal td.fiat { color: var(--c-total); }

        #status {
            min-height: 18px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        #status.error { color: var(--danger); }

        .empty {
            color: var(--muted);
            padding: 24px 0;
            text-align: center;
        }

        .spin { color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <div class="brand"><img src="nethermind.svg" alt="NETHERMIND" onerror="this.replaceWith('NETHERMIND')"><span>/ BALANCES</span></div>
        <div id="singleNet" style="display: contents">
            <div class="net">network <span id="netName" class="number">…</span></div>
            <div class="net">chain <span id="chainId" class="number">…</span></div>
            <div class="net">head <span id="headBlock" class="number">…</span></div>
        </div>
        <div id="chainToggles"></div>
        <button id="hideZero" class="zero-toggle" title="Hide zero balances">∅</button>
        <div class="total" id="totalBox">
            <span class="net">total ≈</span>
            <span id="totalFiat" class="number">…</span>
            <select id="currency" title="Display currency (Chainlink on-chain feeds)"></select>
        </div>
    </header>

    <div class="panel">
        <div class="title">Watch</div>
        <div class="row" id="addAddress">
            <input id="addrInput" class="number" placeholder="0x address or ENS name (name.eth)" spellcheck="false" />
            <button id="addAddrBtn" title="Pin address">+</button>
        </div>
        <div class="row" id="tokenForm">
            <select id="tokKind" title="Asset type">
                <option value="token">token</option>
                <option value="nft">NFT</option>
            </select>
            <select id="tokChain" title="Chain" style="display: none"></select>
            <input id="tokAddr" class="number addr" placeholder="token contract 0x address" spellcheck="false" />
            <input id="tokTicker" class="number sm" placeholder="ticker" spellcheck="false" />
            <input id="tokDecimals" class="number sm" placeholder="decimals" inputmode="numeric" />
            <input id="tokName" class="sm" placeholder="name (optional)" />
            <button id="addTokBtn">Track</button>
        </div>
        <div id="tokens"></div>
        <div id="status"></div>
    </div>

    <div id="cards"></div>

    <script>
        'use strict';

        // ---------- keccak-256 (original 0x01 padding), BigInt lanes ----------
        const KECCAK_RC = [
            0x0000000000000001n, 0x0000000000008082n, 0x800000000000808an, 0x8000000080008000n,
            0x000000000000808bn, 0x0000000080000001n, 0x8000000080008081n, 0x8000000000008009n,
            0x000000000000008an, 0x0000000000000088n, 0x0000000080008009n, 0x000000008000000an,
            0x000000008000808bn, 0x800000000000008bn, 0x8000000000008089n, 0x8000000000008003n,
            0x8000000000008002n, 0x8000000000000080n, 0x000000000000800an, 0x800000008000000an,
            0x8000000080008081n, 0x8000000000008080n, 0x0000000080000001n, 0x8000000080008008n];
        const KECCAK_RHO = [
            0, 1, 62, 28, 27, 36, 44, 6, 55, 20, 3, 10, 43, 25, 39, 41, 45, 15, 21, 8, 18, 2, 61, 56, 14];
        const M64 = (1n << 64n) - 1n;

        function keccakF(s) {
            const c = new Array(5), b = new Array(25);
            for (let r = 0; r < 24; r++) {
                for (let x = 0; x < 5; x++) c[x] = s[x] ^ s[x + 5] ^ s[x + 10] ^ s[x + 15] ^ s[x + 20];
                for (let x = 0; x < 5; x++) {
                    const t = c[(x + 4) % 5] ^ (((c[(x + 1) % 5] << 1n) | (c[(x + 1) % 5] >> 63n)) & M64);
                    for (let y = 0; y < 25; y += 5) s[x + y] ^= t;
                }
                for (let x = 0; x < 5; x++) for (let y = 0; y < 5; y++) {
                    const i = x + 5 * y, n = BigInt(KECCAK_RHO[i]);
                    b[y + 5 * ((2 * x + 3 * y) % 5)] = n === 0n ? s[i] : (((s[i] << n) | (s[i] >> (64n - n))) & M64);
                }
                for (let x = 0; x < 5; x++) for (let y = 0; y < 25; y += 5)
                    s[x + y] = b[x + y] ^ (~b[(x + 1) % 5 + y] & M64 & b[(x + 2) % 5 + y]);
                s[0] ^= KECCAK_RC[r];
            }
        }

        function keccak256(bytes) {
            const rate = 136, s = new Array(25).fill(0n);
            const padded = new Uint8Array(Math.floor(bytes.length / rate) * rate + rate);
            padded.set(bytes);
            padded[bytes.length] |= 0x01;
            padded[padded.length - 1] |= 0x80;
            for (let off = 0; off < padded.length; off += rate) {
                for (let i = 0; i < rate / 8; i++) {
                    let lane = 0n;
                    for (let j = 7; j >= 0; j--) lane = (lane << 8n) | BigInt(padded[off + i * 8 + j]);
                    s[i] ^= lane;
                }
                keccakF(s);
            }
            const out = new Uint8Array(32);
            for (let i = 0; i < 4; i++) {
                let lane = s[i];
                for (let j = 0; j < 8; j++) { out[i * 8 + j] = Number(lane & 0xffn); lane >>= 8n; }
            }
            return out;
        }

        const toHex = (bytes) => Array.from(bytes, (b) => b.toString(16).padStart(2, '0')).join('');
        const utf8 = (s) => new TextEncoder().encode(s);

        function namehash(name) {
            let node = new Uint8Array(32);
            for (const label of name.toLowerCase().split('.').reverse()) {
                const combined = new Uint8Array(64);
                combined.set(node);
                combined.set(keccak256(utf8(label)), 32);
                node = keccak256(combined);
            }
            return '0x' + toHex(node);
        }

        // EIP-55 checksum for display
        function checksum(addr) {
            const lower = addr.toLowerCase().replace('0x', '');
            const hash = toHex(keccak256(utf8(lower)));
            let out = '0x';
            for (let i = 0; i < 40; i++) out += parseInt(hash[i], 16) >= 8 ? lower[i].toUpperCase() : lower[i];
            return out;
        }

        // ---------- JSON-RPC ----------
        // rpcPath '/' talks to the node serving this page; sibling nodes discovered by the
        // plugin are reached through its same-origin proxy at /balances-rpc/{port}, so all
        // data still flows exclusively through local Nethermind nodes.
        let rpcId = 1;

        async function rpc(method, params, rpcPath = '/') {
            const res = await fetch(rpcPath, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', id: rpcId++, method, params })
            });
            const json = await res.json();
            if (json.error) throw new Error(json.error.message || 'RPC error');
            return json.result;
        }

        async function rpcBatch(calls, rpcPath = '/') {
            if (calls.length === 0) return [];
            const body = calls.map(([method, params]) => ({ jsonrpc: '2.0', id: rpcId++, method, params }));
            const res = await fetch(rpcPath, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            const byId = new Map(json.map((r) => [r.id, r]));
            return body.map((req) => {
                const r = byId.get(req.id);
                return r && !r.error ? r.result : null;
            });
        }

        // ---------- chains ----------
        // Chainlink Feed Registry (mainnet only): prices looked up by (base, quote) address pair.
        // Fiat quotes use ISO 4217 numeric codes as pseudo-addresses; ETH/BTC have dedicated pseudo-addresses.
        const FEED_REGISTRY = '0x47Fb2585D2C56Fe188D0E6ec628a38b74fCeeeDf';
        const PSEUDO_ETH = '0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE';
        const PSEUDO_BTC = '0xbBbBBBBbbBBBbbbBbbBbbbbBBbBbbbbBbBbbBBbB';
        const DENOM = {
            USD: '0x0000000000000000000000000000000000000348',
            AUD: '0x0000000000000000000000000000000000000024',
            BRL: '0x00000000000000000000000000000000000003da',
            CAD: '0x000000000000000000000000000000000000007c',
            CHF: '0x00000000000000000000000000000000000002f4',
            CNY: '0x000000000000000000000000000000000000009c',
            EUR: '0x00000000000000000000000000000000000003d2',
            GBP: '0x000000000000000000000000000000000000033a',
            JPY: '0x0000000000000000000000000000000000000188',
            KRW: '0x000000000000000000000000000000000000019a',
            NZD: '0x000000000000000000000000000000000000022a',
            PHP: '0x0000000000000000000000000000000000000260',
            SGD: '0x00000000000000000000000000000000000002be',
        };

        // Verified Chainlink aggregator addresses on Gnosis (no feed registry there).
        const GNOSIS_FEEDS = {
            native: '0x678df3415fc31947dA4324eC63212874be5a82f8',                        // DAI/USD (xDAI)
            '0x6a023ccd1ff6f2045c3309768ead9e68f978f6e1': '0xa767f745331D267c7751297D982b050c93985627', // WETH → ETH/USD
            '0x9c58bacc331c9aa871afd802db6379a98e80cedb': '0x22441d81416430A54336aB28765abd31a792Ad37', // GNO
            '0xddafbb505ad214d7b80b1f830fccc89b60fb7a83': '0x26C31ac71010aF62E6B486D1132E266D6298857D', // USDC
            '0x4ecaba5870353805a9f068101a40e0f32ed605c6': '0x68811D7DF835B1c33e6EEae8E7C141eF48d48cc7', // USDT
            '0x8e5bbbb09ed1ebde8674cda39a0c169401db4252': '0x00288135bE38B83249F380e9b6b9a04c90EC39eE', // WBTC
            '0xe91d153e0b41518a2ce8dd3d7944fa863463a97d': '0x678df3415fc31947dA4324eC63212874be5a82f8', // WXDAI → DAI/USD
        };
        const GNOSIS_FX = {
            CHF: '0xFb00261Af80ADb1629D3869E377ae1EEC7bE659F',
            EUR: '0xab70BCB260073d036d1660201e9d5405F5829b7a',
            JPY: '0x2AfB993C670C01e9dA1550c58e8039C1D8b8A317',
            MXN: '0xe9cea51a7b1b9B32E057ff62762a2066dA933cD2',
        };

        const MAINNET_DEFAULT_TOKENS = [
            { address: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', ticker: 'USDC', decimals: 6, name: 'USD Coin' },
            { address: '0xdAC17F958D2ee523a2206206994597C13D831ec7', ticker: 'USDT', decimals: 6, name: 'Tether USD' },
            { address: '0x6B175474E89094C44Da98b954EedeAC495271d0F', ticker: 'DAI', decimals: 18, name: 'Dai Stablecoin' },
            { address: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2', ticker: 'WETH', decimals: 18, name: 'Wrapped Ether' },
            { address: '0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599', ticker: 'WBTC', decimals: 8, name: 'Wrapped BTC' },
        ];
        const GNOSIS_DEFAULT_TOKENS = [
            { address: '0xDDAfbb505ad214D7b80b1f830fcCc89B60fb7A83', ticker: 'USDC', decimals: 6, name: 'USD Coin on Gnosis' },
            { address: '0x4ECaBa5870353805a9F068101A40E0f32ed605C6', ticker: 'USDT', decimals: 6, name: 'Tether USD on Gnosis' },
            { address: '0x6A023CCd1ff6F2045C3309768eAd9E68F978f6e1', ticker: 'WETH', decimals: 18, name: 'Wrapped Ether on Gnosis' },
            { address: '0x9C58BAcC331c9aa871AFD802DB6379a98e80CEdb', ticker: 'GNO', decimals: 18, name: 'Gnosis Token' },
            { address: '0x8e5bBbb09Ed1ebdE8674Cda39A0c169401db4252', ticker: 'WBTC', decimals: 8, name: 'Wrapped BTC on Gnosis' },
        ];

        const CHAINS = {
            1: {
                name: 'Ethereum', ticker: 'ETH', ens: true, tag: '', logo: 'logos/ethereum-logo.svg',
                registry: FEED_REGISTRY,
                // no direct registry feeds for wrapped assets — price via the underlying
                alias: {
                    '0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2': PSEUDO_ETH, // WETH
                    '0x2260fac5e5542a773aa44fbcfedf7c193bc2c599': PSEUDO_BTC, // WBTC
                },
                // beyond the registry, some fiats only have standalone mainnet aggregators
                fx: {
                    MXN: '0xdb4881Ab0ad6b8423f76dd8C9d65542749a1dB77',
                    TRY: '0xB09fC5fD3f11Cf9eb5E1C5Dba43114e3C9f477b5',
                    IDR: '0x91b99C9b75aF469a71eE1AB528e8da994A5D7030',
                    ARS: '0xE41cD2DcC63EB63A9D9e62f2a3D9b49e6d0C0A1d',
                },
                // ordered by global currency popularity (forex turnover)
                currencies: ['USD', 'EUR', 'JPY', 'GBP', 'CNY', 'AUD', 'CAD', 'CHF', 'KRW', 'SGD', 'NZD', 'MXN', 'TRY', 'BRL', 'PHP', 'IDR', 'ARS'],
                defaults: MAINNET_DEFAULT_TOKENS,
            },
            11155111: { name: 'Sepolia', ticker: 'ETH', ens: true, tag: 'SEP', logo: 'logos/ethereum-logo.svg' },
            17000: { name: 'Holesky', ticker: 'ETH', ens: true, tag: 'HOL', logo: 'logos/ethereum-logo.svg' },
            560048: { name: 'Hoodi', ticker: 'ETH', ens: true, tag: 'HOO', logo: 'logos/ethereum-logo.svg' },
            100: {
                name: 'Gnosis', ticker: 'xDAI', ens: false, tag: 'GNO', logo: 'logos/gnosis.png',
                feeds: GNOSIS_FEEDS,
                fx: GNOSIS_FX,
                currencies: ['USD', 'EUR', 'JPY', 'CHF', 'MXN'],
                defaults: GNOSIS_DEFAULT_TOKENS,
            },
            10200: { name: 'Chiado', ticker: 'xDAI', ens: false, tag: 'CHI', logo: 'logos/gnosis.png' },
        };
        const ENS_REGISTRY = '0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e';
        const SEL_RESOLVER = '0x0178b8bf';         // resolver(bytes32)
        const SEL_ADDR = '0x3b3b57de';             // addr(bytes32)
        const SEL_BALANCE_OF = '0x70a08231';       // balanceOf(address)
        const SEL_SYMBOL = '0x95d89b41';           // symbol()
        const SEL_NAME = '0x06fdde03';             // name()
        const SEL_DECIMALS = '0x313ce567';         // decimals()
        const SEL_LATEST_ROUND = '0xfeaf968c';     // latestRoundData()
        const SEL_LATEST_ROUND_REG = '0xbcfd032d'; // latestRoundData(address,address)
        const SEL_FEED_DECIMALS_REG = '0x58e2d3a8'; // decimals(address,address)
        const SEL_SUPPORTS_INTERFACE = '0x01ffc9a7'; // supportsInterface(bytes4)
        const SEL_TOKEN_OF_OWNER = '0x2f745c59';   // tokenOfOwnerByIndex(address,uint256)
        const SEL_TOKEN_URI = '0xc87b56dd';        // tokenURI(uint256)
        const IFACE_ERC721_ENUMERABLE = '780e9d63';
        const MAX_NFT_THUMBS = 4;

        const PRICE_DECIMALS = 8n;      // Chainlink USD-quote feeds use 8 decimals by convention
        const PRICE_SCALE = 10n ** PRICE_DECIMALS;
        const PRICE_STALE_SECONDS = 48 * 3600;

        function chainMeta(id) {
            return CHAINS[id] ?? { name: 'chain ' + id, ticker: 'NATIVE', ens: false, tag: 'C' + id, logo: 'logos/unknown.png' };
        }

        // ---------- nodes (the serving node + siblings discovered by the plugin) ----------
        let nodes = [];
        let ownNode = null;

        const own = () => ownNode;
        const multi = () => nodes.length > 1;
        const enabledNodes = () => nodes.filter((n) => n.enabled);

        // Ethereum mainnet first, then its testnets, then Gnosis and its testnet
        function chainOrder(id) {
            if (id === 1) return 0;
            if (chainMeta(id).ticker === 'ETH') return 1;
            if (id === 100) return 2;
            if (id === 10200) return 3;
            return 4;
        }

        const sortNodes = () => nodes.sort((a, b) => chainOrder(a.chainId) - chainOrder(b.chainId) || a.chainId - b.chainId);

        function makeNode(rpcPath, chainId) {
            return { rpcPath, chainId, meta: chainMeta(chainId), enabled: true, head: null, syncing: false, lastScanned: null, scanning: false, button: null };
        }

        // ---------- persistence (per chain) ----------
        const store = {
            key: (chainId) => 'nethermind.balances.' + chainId,
            load(node) {
                try {
                    const raw = localStorage.getItem(this.key(node.chainId));
                    if (raw === null) {
                        // first visit on this chain — seed the popular tokens (still removable)
                        return { addresses: [], tokens: (node.meta.defaults || []).map((t) => ({ ...t })), nfts: [], watched: [] };
                    }
                    const data = JSON.parse(raw);
                    return { addresses: data.addresses || [], tokens: data.tokens || [], nfts: data.nfts || [], watched: data.watched || [] };
                } catch { return { addresses: [], tokens: [], nfts: [], watched: [] }; }
            },
            save(chainId) { localStorage.setItem(this.key(chainId), JSON.stringify(states.get(chainId))); }
        };

        const CURRENCY_KEY = 'nethermind.balances.currency';
        // disabled ids are stored (not enabled ones) so newly discovered chains default to visible
        const DISABLED_KEY = 'nethermind.balances.disabledChains';
        const states = new Map(); // chainId -> { addresses, tokens, nfts, watched }
        const stateOf = (chainId) => states.get(chainId);
        let currency = 'USD';

        // pinned addresses merged across enabled chains
        function mergedAddresses() {
            const merged = new Map();
            for (const node of enabledNodes()) {
                for (const entry of stateOf(node.chainId).addresses) {
                    const existing = merged.get(entry.address);
                    if (!existing) merged.set(entry.address, { address: entry.address, label: entry.label });
                    else if (!existing.label && entry.label) existing.label = entry.label;
                }
            }
            return [...merged.values()];
        }

        // ---------- helpers ----------
        const $ = (id) => document.getElementById(id);
        const isAddress = (s) => /^0x[0-9a-fA-F]{40}$/.test(s);

        function el(tag, cls, text) {
            const e = document.createElement(tag);
            if (cls) e.className = cls;
            if (text !== undefined) e.textContent = text;
            return e;
        }

        function setStatus(msg, isError) {
            const s = $('status');
            s.textContent = msg || '';
            s.className = isError ? 'error' : '';
        }

        function shortAddr(addr) { return addr.slice(0, 8) + '…' + addr.slice(-6); }

        // navigator.clipboard needs a secure context, which a plain-HTTP node is not —
        // fall back to a hidden textarea + execCommand
        function copyAddress(address) {
            let ok = false;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(address);
                ok = true;
            } else {
                const area = document.createElement('textarea');
                area.value = address;
                area.style.position = 'fixed';
                area.style.opacity = '0';
                document.body.append(area);
                area.select();
                try { ok = document.execCommand('copy'); } catch { }
                area.remove();
            }
            setStatus(ok ? 'Copied ' + address : 'Copy failed — ' + address, !ok);
        }

        // each token gets a stable Dracula color derived from its ticker; cyan is
        // reserved for the native asset, WBTC is pinned to red, and the multiplier
        // is chosen so the default token sets all land on distinct colors
        const TOKEN_COLORS = ['#ff79c6', '#bd93f9', '#ffb86c', '#69ff94', '#f1fa8c', '#a4ffff', '#ff92df'];

        function tokenColor(ticker) {
            if (ticker.toUpperCase() === 'WBTC') return '#ff5555';
            let hash = 0;
            for (const ch of ticker) hash = (hash * 4 + ch.codePointAt(0)) >>> 0;
            return TOKEN_COLORS[hash % TOKEN_COLORS.length];
        }

        // accounts are color-coded too, so cards are easy to tell apart at a glance
        function accountColor(address) {
            let hash = 0;
            for (const ch of address.toLowerCase()) hash = (hash * 31 + ch.codePointAt(0)) >>> 0;
            return TOKEN_COLORS[hash % TOKEN_COLORS.length];
        }

        // ticker cell content: superscript chain tag on non-mainnet chains when several nodes are shown
        function tickerLabel(ticker, node) {
            const holder = el('span', 'number', ticker);
            if (multi() && node.chainId !== 1 && node.meta.tag) holder.append(el('sup', 'suptag', node.meta.tag));
            return holder;
        }

        function formatUnits(hexValue, decimals) {
            if (hexValue === null) return null;
            let value;
            try { value = BigInt(hexValue); } catch { return null; }
            const base = 10n ** BigInt(decimals);
            const whole = value / base;
            const frac = value % base;
            let out = whole.toLocaleString('en-US');
            if (decimals > 0 && frac > 0n) {
                let fracStr = frac.toString().padStart(decimals, '0').slice(0, 5).replace(/0+$/, '');
                if (fracStr === '' && whole === 0n) return '<0.00001';
                if (fracStr !== '') out += '.' + fracStr;
            }
            return out;
        }

        function decodeAbiString(hexValue) {
            if (!hexValue || hexValue === '0x' || hexValue.length < 130) return null;
            try {
                const data = hexValue.slice(2);
                const len = Number(BigInt('0x' + data.slice(64, 128)));
                const bytes = data.slice(128, 128 + len * 2);
                return new TextDecoder().decode(new Uint8Array(bytes.match(/../g).map((h) => parseInt(h, 16)))) || null;
            } catch { return null; }
        }

        const pad32 = (addr) => addr.toLowerCase().replace('0x', '').padStart(64, '0');

        // ---------- Chainlink prices (read from the nodes only) ----------
        const fiatEnabled = (meta) => Boolean(meta.registry || meta.feeds);
        const anyFiat = () => enabledNodes().some((n) => fiatEnabled(n.meta));

        function parseRoundAnswer(hexValue) {
            if (!hexValue || hexValue.length < 2 + 64 * 5) return null;
            const words = hexValue.slice(2);
            const answer = BigInt('0x' + words.slice(64, 128));
            const updatedAt = Number(BigInt('0x' + words.slice(192, 256)));
            if (answer <= 0n || answer >= 1n << 255n) return null; // zero or negative int256
            if (Date.now() / 1000 - updatedAt > PRICE_STALE_SECONDS) return null;
            return answer;
        }

        // assetKey: 'native' or a lowercase token address
        function priceCall(meta, assetKey) {
            if (meta.registry) {
                const base = assetKey === 'native' ? PSEUDO_ETH : (meta.alias?.[assetKey] ?? assetKey);
                return ['eth_call', [{ to: meta.registry, data: SEL_LATEST_ROUND_REG + pad32(base) + pad32(DENOM.USD) }, 'latest']];
            }
            const feed = assetKey === 'native' ? meta.feeds?.native : meta.feeds?.[assetKey];
            return feed ? ['eth_call', [{ to: feed, data: SEL_LATEST_ROUND }, 'latest']] : null;
        }

        // FX feeds mostly use 8 decimals, but not all (e.g. PHP/USD is 18),
        // so the rate is fetched together with its decimals and normalized
        function fxCalls(meta) {
            if (currency === 'USD') return null;
            if (meta.registry && DENOM[currency]) {
                return [
                    ['eth_call', [{ to: meta.registry, data: SEL_LATEST_ROUND_REG + pad32(DENOM[currency]) + pad32(DENOM.USD) }, 'latest']],
                    ['eth_call', [{ to: meta.registry, data: SEL_FEED_DECIMALS_REG + pad32(DENOM[currency]) + pad32(DENOM.USD) }, 'latest']],
                ];
            }
            const feed = meta.fx?.[currency];
            return feed ? [
                ['eth_call', [{ to: feed, data: SEL_LATEST_ROUND }, 'latest']],
                ['eth_call', [{ to: feed, data: SEL_DECIMALS }, 'latest']],
            ] : null;
        }

        function normalizeFxRate(answer, decimalsRaw) {
            if (answer === null) return null;
            let decimals = PRICE_DECIMALS;
            try { if (decimalsRaw && decimalsRaw !== '0x') decimals = BigInt(decimalsRaw); } catch { }
            const rate = decimals >= PRICE_DECIMALS
                ? answer / 10n ** (decimals - PRICE_DECIMALS)
                : answer * 10n ** (PRICE_DECIMALS - decimals);
            return rate > 0n ? rate : null;
        }

        const CURRENCY_SYMBOLS = {
            USD: '$', ARS: 'AR$', AUD: 'A$', BRL: 'R$', CAD: 'C$', CHF: 'CHF ', CNY: 'CN¥', EUR: '€',
            GBP: '£', IDR: 'Rp ', JPY: '¥', KRW: '₩', MXN: 'MX$', NZD: 'NZ$', PHP: '₱', SGD: 'S$', TRY: '₺',
        };

        // value scaled by PRICE_SCALE (1e8) in the selected currency, prefixed with its symbol
        function formatFiat(value8) {
            const cents = value8 / 10n ** (PRICE_DECIMALS - 2n);
            return CURRENCY_SYMBOLS[currency] + (cents / 100n).toLocaleString('en-US') + '.' + (cents % 100n).toString().padStart(2, '0');
        }

        function setTotal(text) {
            $('totalFiat').textContent = text;
        }

        // last fetched values per `${address}|${chainId}:${assetKey}`, so re-rendering
        // (e.g. after unpinning) never blanks cells while waiting for a refetch
        const cache = new Map();
        const assetKeysFor = (chainId) => ['native'].concat(stateOf(chainId).tokens.map((t) => t.address.toLowerCase()));

        function recomputeTotals() {
            if (!anyFiat()) return;
            let grand = 0n;
            let any = false;
            for (const entry of mergedAddresses()) {
                let cardTotal = 0n;
                let cardAny = false;
                for (const node of enabledNodes()) {
                    for (const key of assetKeysFor(node.chainId)) {
                        const cached = cache.get(entry.address + '|' + node.chainId + ':' + key);
                        if (cached?.value8 !== null && cached?.value8 !== undefined) { cardTotal += cached.value8; cardAny = true; }
                    }
                }
                const cell = document.querySelector(`td[data-cardtotal="${entry.address}"]`);
                if (cell) cell.textContent = cardAny ? formatFiat(cardTotal) : '—';
                if (cardAny) { grand += cardTotal; any = true; }
            }
            setTotal(any ? formatFiat(grand) : (mergedAddresses().length === 0 ? CURRENCY_SYMBOLS[currency] + '0.00' : '—'));
        }

        // ---------- NFTs (ERC-721, node-data only) ----------
        // Counts come from balanceOf. When a collection is ERC721Enumerable, the first
        // few token ids are enumerated and their tokenURI decoded; only fully on-chain
        // metadata (data: URIs, e.g. Nouns or Loot) is rendered — external URIs are
        // never fetched, so no request leaves the node.
        const nftCache = new Map();       // `${address}|${chainId}|${collection}` -> { count, thumbs: [{src, title}] }
        const enumerableCache = new Map(); // `${chainId}|${collection}` -> bool
        const NFT_PAGE = 24;
        let nftRefreshing = false;

        function parseOnChainMetadata(uri) {
            if (!uri || !uri.startsWith('data:application/json')) return null;
            try {
                const payload = uri.slice(uri.indexOf(',') + 1);
                return JSON.parse(uri.includes(';base64') ? atob(payload) : decodeURIComponent(payload));
            } catch { return null; }
        }

        // enumerates owned token ids [start, end) and decodes their on-chain metadata
        async function fetchThumbRange(node, collection, owner, start, end) {
            const idCalls = [];
            for (let index = start; index < end; index++) {
                idCalls.push(['eth_call', [{ to: collection.address, data: SEL_TOKEN_OF_OWNER + pad32(owner) + pad32(index.toString(16)) }, 'latest']]);
            }
            const ids = (await rpcBatch(idCalls, node.rpcPath)).filter((id) => id !== null).map((id) => BigInt(id));
            const uris = await rpcBatch(ids.map((id) => ['eth_call', [{ to: collection.address, data: SEL_TOKEN_URI + pad32(id.toString(16)) }, 'latest']]), node.rpcPath);
            const thumbs = [];
            for (let index = 0; index < ids.length; index++) {
                const metadata = parseOnChainMetadata(decodeAbiString(uris[index]));
                const title = metadata?.name || collection.ticker + ' #' + ids[index];
                // render only fully on-chain images; anything else stays a text label
                const src = typeof metadata?.image === 'string' && metadata.image.startsWith('data:image/') ? metadata.image : null;
                thumbs.push({ src, title: src ? title : '#' + ids[index] });
            }
            return thumbs;
        }

        // browsers block navigating a new tab straight to a data: URI, so serve it as a blob
        function openArt(dataUri) {
            try {
                const comma = dataUri.indexOf(',');
                const header = dataUri.slice(5, comma);
                const payload = dataUri.slice(comma + 1);
                const bytes = header.endsWith(';base64')
                    ? Uint8Array.from(atob(payload), (c) => c.charCodeAt(0))
                    : utf8(decodeURIComponent(payload));
                window.open(URL.createObjectURL(new Blob([bytes], { type: header.replace(';base64', '') })), '_blank');
            } catch { setStatus('Could not open artwork', true); }
        }

        function fillThumbs(box, cached, node, owner, collection) {
            box.replaceChildren();
            if (!cached) return;
            for (const thumb of cached.thumbs) {
                if (thumb.src) {
                    const img = el('img');
                    img.src = thumb.src;
                    img.title = thumb.title + ' (click to open)';
                    img.onclick = () => openArt(thumb.src);
                    box.append(img);
                } else {
                    box.append(el('span', 'more number', thumb.title));
                }
            }
            const remaining = cached.count - cached.thumbs.length;
            if (remaining > 0 && cached.thumbs.length > 0) {
                const more = el('span', 'more expand', '+' + remaining + ' more');
                more.title = 'Show more';
                more.onclick = async () => {
                    more.textContent = '…';
                    more.onclick = null;
                    try {
                        const start = cached.thumbs.length;
                        cached.thumbs.push(...await fetchThumbRange(node, collection, owner, start, Math.min(cached.count, start + NFT_PAGE)));
                    } catch { /* keep what we have */ }
                    fillThumbs(box, cached, node, owner, collection);
                };
                box.append(more);
            }
            if (cached.thumbs.length > MAX_NFT_THUMBS) {
                const less = el('span', 'more expand', 'show less');
                less.onclick = () => {
                    cached.thumbs.length = MAX_NFT_THUMBS;
                    fillThumbs(box, cached, node, owner, collection);
                };
                box.append(less);
            }
        }

        async function refreshNftThumbs() {
            if (nftRefreshing) return;
            nftRefreshing = true;
            try {
                for (const node of enabledNodes()) {
                    for (const entry of mergedAddresses()) {
                        for (const collection of stateOf(node.chainId).nfts) {
                            const colKey = collection.address.toLowerCase();
                            const key = entry.address + '|' + node.chainId + '|' + colKey;
                            const countCached = cache.get(entry.address + '|' + node.chainId + ':nft:' + colKey);
                            const count = countCached?.bal === null || countCached === undefined ? 0 : Number(countCached.bal.replace(/,/g, ''));
                            const box = document.querySelector(`[data-thumbs="${key}"]`);
                            if (nftCache.get(key)?.count === count) continue;

                            let thumbs = [];
                            if (count > 0) {
                                const enumKey = node.chainId + '|' + colKey;
                                if (!enumerableCache.has(enumKey)) {
                                    const supports = await rpc('eth_call', [{ to: collection.address, data: SEL_SUPPORTS_INTERFACE + IFACE_ERC721_ENUMERABLE.padEnd(64, '0') }, 'latest'], node.rpcPath).catch(() => null);
                                    enumerableCache.set(enumKey, supports !== null && BigInt(supports) === 1n);
                                }
                                if (enumerableCache.get(node.chainId + '|' + colKey)) {
                                    thumbs = await fetchThumbRange(node, collection, entry.address, 0, Math.min(count, MAX_NFT_THUMBS));
                                }
                            }
                            nftCache.set(key, { count, thumbs });
                            if (box) fillThumbs(box, nftCache.get(key), node, entry.address, collection);
                        }
                    }
                }
            } catch { /* thumbnails are cosmetic — leave whatever is displayed */ }
            finally { nftRefreshing = false; }
        }

        // ---------- notifications (activity derived from node data only) ----------
        // A bell on each card watches the address: new blocks on every enabled chain are
        // scanned for its transactions and ERC-20 Transfer logs, and events (sent/received,
        // swaps, contract interactions) surface as system notifications via the service
        // worker. No push service is involved — data never leaves the nodes.
        const TRANSFER_TOPIC = '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';
        const MAX_BLOCKS_PER_POLL = 4;

        const isWatchedAny = (address) =>
            enabledNodes().some((n) => stateOf(n.chainId).watched.includes(address.toLowerCase()));

        async function toggleWatch(entry, bell) {
            const key = entry.address.toLowerCase();
            const who = entry.label || shortAddr(entry.address);
            if (isWatchedAny(key)) {
                for (const node of enabledNodes()) {
                    const state = stateOf(node.chainId);
                    state.watched = state.watched.filter((w) => w !== key);
                    store.save(node.chainId);
                }
                bell.classList.remove('on');
                setStatus('Notifications off for ' + who);
                return;
            }

            let systemNotifications = false;
            if (!window.isSecureContext) {
                // browsers refuse service workers and notification permission on plain
                // HTTP (except localhost) — a tunnel or TLS proxy enables the real thing
                setStatus('System notifications need HTTPS or localhost — activity will only show in this line', true);
            } else if (!('Notification' in window)) {
                setStatus('This browser has no Notification support — activity will only show in this line', true);
            } else {
                const permission = Notification.permission === 'granted' ? 'granted' : await Notification.requestPermission();
                if (permission !== 'granted') {
                    setStatus('Notification permission was not granted — activity will only show in this line', true);
                } else {
                    try {
                        await navigator.serviceWorker.register('balances-sw.js');
                        await navigator.serviceWorker.ready;
                        systemNotifications = true;
                    } catch { setStatus('Service worker registration failed — activity will only show in this line', true); }
                }
            }

            for (const node of enabledNodes()) {
                const state = stateOf(node.chainId);
                if (!state.watched.includes(key)) state.watched.push(key);
                store.save(node.chainId);
            }
            bell.classList.add('on');
            if (systemNotifications) {
                setStatus('Watching ' + who + ' for activity');
                notify(who, 'Notifications enabled on this device'); // immediate proof it works
            }
        }

        async function notify(title, body) {
            setStatus('🔔 ' + title + ': ' + body);
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            try {
                const registration = await navigator.serviceWorker?.getRegistration();
                if (registration) registration.showNotification(title, { body, icon: 'favicon.webp' });
                else new Notification(title, { body });
            } catch { }
        }

        function displayName(address) {
            const entry = mergedAddresses().find((a) => a.address.toLowerCase() === address);
            return entry?.label || shortAddr(entry?.address || address);
        }

        function tokenAmount(log, chainId) {
            const token = stateOf(chainId).tokens.find((t) => t.address.toLowerCase() === log.address.toLowerCase());
            let amount = null;
            try { amount = BigInt(log.data); } catch { }
            if (token && amount !== null) return formatUnits('0x' + amount.toString(16), token.decimals) + ' ' + token.ticker;
            return 'tokens of ' + shortAddr(checksum(log.address));
        }

        async function scanForActivity(node, headHex) {
            const watched = stateOf(node.chainId).watched;
            if (node.scanning || watched.length === 0) { node.lastScanned = BigInt(headHex); return; }
            const head = BigInt(headHex);
            if (node.lastScanned === null) { node.lastScanned = head; return; }
            if (head <= node.lastScanned) return;
            node.scanning = true;
            try {
                const from = head - node.lastScanned > BigInt(MAX_BLOCKS_PER_POLL) ? head - BigInt(MAX_BLOCKS_PER_POLL) + 1n : node.lastScanned + 1n;
                const range = { fromBlock: '0x' + from.toString(16), toBlock: headHex };
                const watchedTopics = watched.map((w) => '0x' + pad32(w));
                const blockCalls = [];
                for (let n = from; n <= head; n++) blockCalls.push(['eth_getBlockByNumber', ['0x' + n.toString(16), true]]);
                const results = await rpcBatch(blockCalls.concat([
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, watchedTopics] }]],
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, null, watchedTopics] }]],
                ]), node.rpcPath);
                node.lastScanned = head;

                const isWatched = (address) => watched.includes(address);

                // facts per (watched address | tx hash) so one tx yields one notification
                const facts = new Map();
                const addFact = (watchedAddr, txHash, kind, text) => {
                    const key = watchedAddr + '|' + txHash;
                    if (!facts.has(key)) facts.set(key, { out: null, in: null, other: [] });
                    const f = facts.get(key);
                    if (kind === 'out' && f.out === null) f.out = text;
                    else if (kind === 'in' && f.in === null) f.in = text;
                    else if (kind === 'other') f.other.push(text);
                };

                for (let b = 0; b < blockCalls.length; b++) {
                    for (const tx of results[b]?.transactions ?? []) {
                        const txFrom = tx.from?.toLowerCase(), txTo = tx.to?.toLowerCase();
                        const value = (() => { try { return BigInt(tx.value); } catch { return 0n; } })();
                        if (txFrom && isWatched(txFrom)) {
                            if (value > 0n) addFact(txFrom, tx.hash, 'out', formatUnits(tx.value, 18) + ' ' + node.meta.ticker);
                            if (tx.input && tx.input !== '0x' && txTo) addFact(txFrom, tx.hash, 'other', 'interacted with contract ' + shortAddr(checksum(txTo)));
                        }
                        if (txTo && isWatched(txTo) && value > 0n) addFact(txTo, tx.hash, 'in', formatUnits(tx.value, 18) + ' ' + node.meta.ticker);
                    }
                }
                for (const log of results[blockCalls.length] ?? []) addFact('0x' + log.topics[1].slice(-40), log.transactionHash, 'out', tokenAmount(log, node.chainId));
                for (const log of results[blockCalls.length + 1] ?? []) addFact('0x' + log.topics[2].slice(-40), log.transactionHash, 'in', tokenAmount(log, node.chainId));

                for (const [key, f] of facts) {
                    const watchedAddr = key.slice(0, 42);
                    if (!isWatched(watchedAddr)) continue;
                    const who = displayName(watchedAddr);
                    if (f.out && f.in) notify(who, `swapped ${f.out} for ${f.in}`);
                    else if (f.out) notify(who, 'sent ' + f.out);
                    else if (f.in) notify(who, 'received ' + f.in);
                    else if (f.other.length) notify(who, f.other[0]);
                }
            } catch { /* activity scan is best-effort; next poll retries from the new head */ }
            finally { node.scanning = false; }
        }

        // ---------- ENS (forward resolution, simple case) ----------
        function ensNode() {
            return enabledNodes().find((n) => n.chainId === 1) ?? enabledNodes().find((n) => n.meta.ens) ?? null;
        }

        async function resolveEns(name) {
            const via = ensNode();
            if (!via) throw new Error('ENS is not available on ' + enabledNodes().map((n) => n.meta.name).join('/'));
            const node = namehash(name);
            const resolverRaw = await rpc('eth_call', [{ to: ENS_REGISTRY, data: SEL_RESOLVER + node.slice(2) }, 'latest'], via.rpcPath);
            const resolver = resolverRaw && resolverRaw.length >= 66 ? '0x' + resolverRaw.slice(-40) : null;
            if (!resolver || /^0x0{40}$/.test(resolver)) throw new Error(`ENS name '${name}' is not registered`);
            const addrRaw = await rpc('eth_call', [{ to: resolver, data: SEL_ADDR + node.slice(2) }, 'latest'], via.rpcPath);
            const addr = addrRaw && addrRaw.length >= 66 ? '0x' + addrRaw.slice(-40) : null;
            if (!addr || /^0x0{40}$/.test(addr)) throw new Error(`ENS name '${name}' has no address record`);
            return checksum(addr);
        }

        // ---------- chain toggles (shown when sibling nodes are detected) ----------
        function renderChainToggles() {
            const box = $('chainToggles');
            box.replaceChildren();
            for (const node of nodes) {
                const btn = el('button', node.enabled ? 'chain-btn on' : 'chain-btn');
                const logo = el('img');
                logo.src = node.meta.logo;
                logo.alt = node.meta.name;
                // when the logo isn't served (static files off) fall back to a text label
                logo.onerror = () => logo.replaceWith(el('span', 'number', node.meta.tag || node.meta.name));
                btn.append(logo);
                btn.append(el('span', 'sync'));
                btn.onclick = () => toggleChain(node, btn);
                node.button = btn;
                updateChainButton(node);
                box.append(btn);
            }
        }

        function updateChainButton(node) {
            if (!node.button) return;
            node.button.classList.toggle('syncing', Boolean(node.syncing));
            const head = node.head ? BigInt(node.head).toLocaleString('en-US') : '?';
            node.button.title = `${node.meta.name} · head ${head}${node.syncing ? ' · syncing' : ''}`
                + (node.unreachable ? ' · unreachable' : '')
                + (node.enabled ? '' : ' · hidden (click to show)');
        }

        function toggleChain(node, btn) {
            if (node.enabled && enabledNodes().length === 1) {
                setStatus('At least one chain must stay enabled', true);
                return;
            }
            node.enabled = !node.enabled;
            localStorage.setItem(DISABLED_KEY, JSON.stringify(nodes.filter((n) => !n.enabled).map((n) => n.chainId)));
            btn.classList.toggle('on', node.enabled);
            updateChainButton(node);
            buildCurrencyOptions();
            updateTokenFormChains();
            renderTokens();
            renderCards();
            refreshBalances();
        }

        function buildCurrencyOptions() {
            const select = $('currency');
            const list = [];
            for (const node of enabledNodes()) {
                if (!fiatEnabled(node.meta)) continue;
                for (const code of node.meta.currencies) if (!list.includes(code)) list.push(code);
            }
            if (list.length === 0) {
                $('totalBox').style.display = 'none';
                return;
            }
            select.replaceChildren();
            for (const code of list) select.append(el('option', null, code));
            const stored = localStorage.getItem(CURRENCY_KEY);
            currency = list.includes(currency) ? currency : (list.includes(stored) ? stored : list[0]);
            select.value = currency;
            $('totalBox').style.display = 'flex';
        }

        function updateTokenFormChains() {
            const select = $('tokChain');
            select.replaceChildren();
            for (const node of enabledNodes()) {
                const option = el('option', null, node.meta.name);
                option.value = node.chainId;
                select.append(option);
            }
            select.style.display = enabledNodes().length > 1 ? '' : 'none';
        }

        // ---------- balance refresh ----------
        let refreshing = false;

        // The FX rate (CCY/USD) is chain-agnostic, so it is resolved once from the first
        // enabled chain that has a fresh feed for the selected currency (mainnet-first
        // order). This lets chains cover each other's currencies — e.g. GBP (mainnet-only
        // feed) converts Gnosis rows and MXN (Gnosis-only feed) converts mainnet rows.
        async function resolveFxRate() {
            if (currency === 'USD') return PRICE_SCALE;
            for (const node of enabledNodes()) {
                if (!fiatEnabled(node.meta)) continue;
                const calls = fxCalls(node.meta);
                if (!calls) continue;
                try {
                    const results = await rpcBatch(calls, node.rpcPath);
                    const rate = normalizeFxRate(parseRoundAnswer(results[0]), results[1]);
                    if (rate) return rate;
                } catch { /* try the next chain's feed */ }
            }
            return null;
        }

        async function refreshNode(node, addresses, fxRate) {
            const meta = node.meta;
            const chainState = stateOf(node.chainId);
            const fiat = fiatEnabled(meta);
            const assets = [{ key: 'native', decimals: 18 }]
                .concat(chainState.tokens.map((t) => ({ key: t.address.toLowerCase(), decimals: t.decimals })))
                .concat(chainState.nfts.map((c) => ({ key: 'nft:' + c.address.toLowerCase(), decimals: 0, isNft: true })));

            // one batched request per node: sync state, then prices, then all balances
            const calls = [['eth_syncing', []], ['eth_blockNumber', []]];
            const priceIndex = new Map();
            if (fiat) {
                for (const asset of assets) {
                    if (asset.isNft) continue;
                    const call = priceCall(meta, asset.key);
                    if (call) { priceIndex.set(asset.key, calls.length); calls.push(call); }
                }
            }
            const balanceStart = calls.length;
            for (const entry of addresses) {
                calls.push(['eth_getBalance', [entry.address, 'latest']]);
                for (const token of chainState.tokens) {
                    calls.push(['eth_call', [{ to: token.address, data: SEL_BALANCE_OF + pad32(entry.address) }, 'latest']]);
                }
                for (const collection of chainState.nfts) {
                    calls.push(['eth_call', [{ to: collection.address, data: SEL_BALANCE_OF + pad32(entry.address) }, 'latest']]);
                }
            }
            const results = await rpcBatch(calls, node.rpcPath);

            // balances read from a syncing (or genesis-stuck) chain would be stale or
            // misleading zeros, so they display as '—' until the node is at head
            const syncing = isNodeSyncing(results[0], results[1]);
            node.syncing = syncing;
            updateChainButton(node);

            const prices = new Map();
            for (const [key, index] of priceIndex) prices.set(key, parseRoundAnswer(results[index]));

            let i = balanceStart;
            for (const entry of addresses) {
                const card = document.querySelector(`.card[data-address="${entry.address}"]`);
                for (const asset of assets) {
                    const raw = results[i++];
                    const balText = syncing ? null : formatUnits(raw, asset.decimals);
                    const price = prices.get(asset.key);
                    let value8 = null;
                    if (fiat && !asset.isNft && balText !== null && price && fxRate) {
                        try { value8 = BigInt(raw) * price / 10n ** BigInt(asset.decimals); } catch { value8 = null; }
                        if (value8 !== null && currency !== 'USD') value8 = value8 * PRICE_SCALE / fxRate;
                    }
                    const fiatText = value8 !== null ? formatFiat(value8) : '';
                    const rowKey = node.chainId + ':' + asset.key;
                    cache.set(entry.address + '|' + rowKey, { bal: balText, fiat: fiatText, value8 });

                    const balCell = card?.querySelector(`td[data-key="${rowKey}"]`);
                    if (balCell) {
                        balCell.textContent = balText ?? '—';
                        balCell.classList.remove('spin');
                        balCell.parentElement.classList.toggle('zero', balText === '0');
                        if (asset.isNft) {
                            const thumbsRow = card?.querySelector(`[data-thumbs="${entry.address}|${node.chainId}|${asset.key.slice(4)}"]`)?.closest('tr');
                            thumbsRow?.classList.toggle('zero', balText === '0');
                        }
                    }
                    const fiatCell = card?.querySelector(`td[data-fiatkey="${rowKey}"]`);
                    if (fiatCell) fiatCell.textContent = fiatText;
                }
            }
        }

        async function refreshBalances() {
            if (refreshing) return;
            const addresses = mergedAddresses();
            if (addresses.length === 0) {
                if (anyFiat()) setTotal(CURRENCY_SYMBOLS[currency] + '0.00');
                return;
            }
            refreshing = true;
            try {
                const fxRate = await resolveFxRate();
                await Promise.all(enabledNodes().map((node) =>
                    refreshNode(node, addresses, fxRate).catch((e) => setStatus(`${node.meta.name} refresh failed: ` + e.message, true))));
                recomputeTotals();
                refreshNftThumbs();
            } finally {
                refreshing = false;
            }
        }

        // ---------- actions ----------
        async function addAddress() {
            const input = $('addrInput');
            const value = input.value.trim();
            if (!value) return;
            try {
                let address, label = null;
                if (isAddress(value)) {
                    address = checksum(value);
                } else if (value.includes('.')) {
                    setStatus(`Resolving ${value}…`);
                    address = await resolveEns(value);
                    label = value.toLowerCase();
                } else {
                    throw new Error('Enter a 0x address or an ENS name like name.eth');
                }
                if (mergedAddresses().some((a) => a.address === address)) throw new Error(address + ' is already pinned');
                for (const node of enabledNodes()) {
                    const state = stateOf(node.chainId);
                    if (!state.addresses.some((a) => a.address === address)) state.addresses.push({ address, label });
                    store.save(node.chainId);
                }
                input.value = '';
                setStatus(label ? `${label} → ${address}` : 'Pinned ' + address);
                renderCards();
                refreshBalances();
            } catch (e) {
                setStatus(e.message, true);
            }
        }

        function tokenTargetNode() {
            const selected = Number($('tokChain').value);
            return enabledNodes().find((n) => n.chainId === selected) ?? enabledNodes()[0] ?? own();
        }

        async function prefillTokenMeta() {
            const address = $('tokAddr').value.trim();
            if (!isAddress(address)) return;
            const [symbol, name, decimals] = await rpcBatch([
                ['eth_call', [{ to: address, data: SEL_SYMBOL }, 'latest']],
                ['eth_call', [{ to: address, data: SEL_NAME }, 'latest']],
                ['eth_call', [{ to: address, data: SEL_DECIMALS }, 'latest']],
            ], tokenTargetNode().rpcPath);
            if (!$('tokTicker').value && symbol) $('tokTicker').value = decodeAbiString(symbol) || '';
            if (!$('tokName').value && name) $('tokName').value = decodeAbiString(name) || '';
            if (!$('tokDecimals').value && decimals && decimals !== '0x') {
                try { $('tokDecimals').value = Number(BigInt(decimals)).toString(); } catch { }
            }
        }

        function addToken() {
            try {
                const isNft = $('tokKind').value === 'nft';
                const address = $('tokAddr').value.trim();
                if (!isAddress(address)) throw new Error('Invalid token contract address');
                const ticker = $('tokTicker').value.trim();
                if (!ticker) throw new Error('Ticker is required');
                const checksummed = checksum(address);
                const target = tokenTargetNode();
                const state = stateOf(target.chainId);
                if (state.tokens.concat(state.nfts).some((t) => t.address.toLowerCase() === address.toLowerCase()))
                    throw new Error(ticker + ' is already tracked on ' + target.meta.name);
                const name = $('tokName').value.trim() || null;
                if (isNft) {
                    state.nfts.push({ address: checksummed, ticker, name });
                } else {
                    const decimals = parseInt($('tokDecimals').value, 10);
                    if (!Number.isInteger(decimals) || decimals < 0 || decimals > 77) throw new Error('Decimals must be 0–77');
                    state.tokens.push({ address: checksummed, ticker, decimals, name });
                }
                store.save(target.chainId);
                for (const id of ['tokAddr', 'tokTicker', 'tokDecimals', 'tokName']) $(id).value = '';
                setStatus('Tracking ' + ticker + ' on ' + target.meta.name);
                renderTokens();
                renderCards();
                refreshBalances();
            } catch (e) {
                setStatus(e.message, true);
            }
        }

        // ---------- init + head polling ----------
        // siblings are re-discovered continuously so a node that starts (or restarts)
        // after this page loaded still joins the multi-chain view without a reload
        async function discoverSiblings() {
            let added = false;
            try {
                const res = await fetch('balances-nodes');
                if (!res.ok) return false;
                let storedDisabled = [];
                try { storedDisabled = JSON.parse(localStorage.getItem(DISABLED_KEY) || '[]'); } catch { }
                for (const sibling of await res.json()) {
                    const id = Number(BigInt(sibling.chainId));
                    const existing = nodes.find((n) => n.chainId === id);
                    if (existing) {
                        if (existing !== own()) existing.rpcPath = 'balances-rpc/' + sibling.port;
                        continue;
                    }
                    const node = makeNode('balances-rpc/' + sibling.port, id);
                    node.enabled = !storedDisabled.includes(id);
                    nodes.push(node);
                    states.set(id, store.load(node));
                    added = true;
                }
            } catch { /* discovery is optional — single-node view works without it */ }
            if (added) {
                sortNodes();
                applyNodeLayout();
            }
            return added;
        }

        function applyNodeLayout() {
            $('singleNet').style.display = multi() ? 'none' : 'contents';
            $('chainToggles').style.display = multi() ? 'flex' : 'none';
            if (multi()) renderChainToggles();
            updateTokenFormChains();
            buildCurrencyOptions();
            renderTokens();
            renderCards();
            refreshBalances();
        }

        let pollTick = 0;

        // Nethermind can keep returning a sync object while already processing at head
        // (background stages like state heal); treat "at head" as synced so balances show
        function isNodeSyncing(syncingResult, headHex) {
            if (headHex === '0x0') return true;
            if (syncingResult === false || syncingResult === null) return false;
            try {
                return BigInt(syncingResult.highestBlock) - BigInt(syncingResult.currentBlock) > 16n;
            } catch { return true; }
        }

        async function pollHead() {
            if (pollTick++ % 5 === 0 && pollTick > 1) await discoverSiblings();
            let changed = false;
            for (const node of nodes) {
                try {
                    const [head, syncing] = await rpcBatch([['eth_blockNumber', []], ['eth_syncing', []]], node.rpcPath);
                    node.unreachable = head === null && syncing === null;
                    node.syncing = !node.unreachable && isNodeSyncing(syncing, head);
                    if (node === own() && !multi() && head !== null) $('headBlock').textContent = BigInt(head).toLocaleString('en-US');
                    updateChainButton(node);
                    if (node.enabled && head !== null && head !== node.head) {
                        node.head = head;
                        changed = true;
                        scanForActivity(node, head);
                    }
                } catch (e) {
                    node.unreachable = true;
                    node.syncing = false;
                    updateChainButton(node);
                    if (node === own()) setStatus('Node unreachable: ' + e.message, true);
                }
            }
            if (changed) refreshBalances();
        }

        async function init() {
            $('addAddrBtn').onclick = addAddress;
            $('addrInput').onkeydown = (e) => { if (e.key === 'Enter') addAddress(); };
            $('addTokBtn').onclick = addToken;
            $('tokAddr').onchange = () => prefillTokenMeta().catch(() => { });
            $('tokKind').onchange = () => { $('tokDecimals').style.display = $('tokKind').value === 'nft' ? 'none' : ''; };

            const HIDE_ZERO_KEY = 'nethermind.balances.hidezero';
            const hideZero = $('hideZero');
            const applyHideZero = (on) => {
                hideZero.classList.toggle('on', on);
                document.body.classList.toggle('hideZero', on);
            };
            applyHideZero(localStorage.getItem(HIDE_ZERO_KEY) === '1');
            hideZero.onclick = () => {
                const on = !hideZero.classList.contains('on');
                localStorage.setItem(HIDE_ZERO_KEY, on ? '1' : '0');
                applyHideZero(on);
            };

            try {
                const ownId = Number(BigInt(await rpc('eth_chainId', [])));
                ownNode = makeNode('/', ownId);
                nodes = [ownNode];
                states.set(ownId, store.load(ownNode));
            } catch (e) {
                setStatus('Cannot reach JSON-RPC on this endpoint: ' + e.message, true);
                return;
            }

            let storedDisabled = [];
            try { storedDisabled = JSON.parse(localStorage.getItem(DISABLED_KEY) || '[]'); } catch { }
            ownNode.enabled = !storedDisabled.includes(ownNode.chainId);

            const storedCurrency = localStorage.getItem(CURRENCY_KEY);
            if (storedCurrency) currency = storedCurrency;
            $('currency').onchange = () => {
                currency = $('currency').value;
                localStorage.setItem(CURRENCY_KEY, currency);
                for (const node of nodes) node.head = null; // force a refetch on the next poll
                refreshBalances();
            };

            await discoverSiblings();
            if (enabledNodes().length === 0) own().enabled = true;

            $('netName').textContent = own().meta.name;
            $('chainId').textContent = own().chainId;
            if (!multi() && !own().meta.ens) {
                $('addrInput').placeholder = '0x address' + (own().chainId === 100 || own().chainId === 10200 ? ' (ENS unavailable on Gnosis)' : '');
            }
            applyNodeLayout();
            pollHead();
            setInterval(pollHead, 12000);
        }

        init();
    </script>
</body>
</html>
