<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Nethermind Balances</title>
    <link rel="icon" href="favicon.webp" type="image/webp">
    <link rel="manifest" href="balances.webmanifest">
    <meta name="theme-color" content="#000000">
    <style>
        @font-face {
            font-family: 'DM Sans';
            font-style: normal;
            font-weight: 100 1000;
            font-display: swap;
            src: url(fonts/dm-sans-latin.woff2) format('woff2');
        }
        @font-face {
            font-family: 'DM Mono';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(fonts/dm-mono-latin.woff2) format('woff2');
        }
        @font-face {
            font-family: 'Exo';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url(fonts/exo-latin.woff2) format('woff2');
        }

        /* Dracula-inspired palette on the dashboard's black background */
        :root {
            --border: #6272a4;
            --border-soft: #44475a;
            --accent: #8be9fd;
            --muted: #6272a4;
            --danger: #ff5555;
            --c-name: #ff79c6;   /* ENS / display names */
            --c-addr: #bd93f9;   /* raw addresses */
            --c-ticker: #8be9fd; /* native ticker (tokens get their own colors) */
            --c-amount: #50fa7b; /* token amounts */
            --c-fiat: #9aa5ce;   /* per-row fiat values */
            --c-total: #ffb86c;  /* fiat totals */
        }

        html, body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 14px;
        }

        body { padding: 16px; }

        .number, input, button.mono {
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 12px;
        }

        header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        header .brand {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .brand img { height: 28px; width: 211px; }

        header .brand span { color: var(--accent); }

        header .net {
            color: var(--muted);
            font-size: 12px;
        }

        header .net .number { color: white; }

        header .total {
            display: none;
            align-items: baseline;
            gap: 8px;
        }

        header .total .number { font-size: 15px; color: var(--c-total); }

        /* chain toggles replace the chain/head text when sibling nodes are detected */
        #chainToggles { display: none; gap: 8px; align-items: center; }

        button.chain-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            opacity: 0.35;
        }

        button.chain-btn.on { opacity: 1; border-color: var(--accent); }
        button.chain-btn img { width: 20px; height: 20px; display: block; }

        /* overlaid above the logo so the button keeps its size when syncing finishes */
        button.chain-btn .sync {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            box-sizing: border-box;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border: 1.5px solid rgba(248, 248, 242, 0.75);
            border-top-color: transparent;
            border-radius: 50%;
            filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.9));
            animation: spin 2.4s linear infinite;
        }

        button.chain-btn.syncing .sync { display: block; }

        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        sup.suptag { color: var(--muted); font-size: 9px; margin-left: 1px; }

        select {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: white;
            padding: 4px 6px;
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 12px;
            outline: none;
        }

        select:focus { border-color: var(--accent); }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: white;
            padding: 7px 10px;
            outline: none;
            min-width: 0;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: #666; }

        button {
            background: black;
            border: 1px solid var(--border);
            color: white;
            padding: 7px 14px;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { border-color: var(--accent); color: var(--accent); }
        button.link {
            border: none;
            padding: 2px 4px;
            color: var(--muted);
            font-size: 12px;
        }
        button.link:hover { color: var(--accent); }
        button.danger:hover { border-color: var(--danger); color: var(--danger); }
        button.bell { filter: grayscale(1) opacity(0.45); font-size: 13px; }
        button.bell.on { filter: none; }
        button.tag { font-size: 13px; filter: grayscale(1) opacity(0.55); }
        button.tag:hover { filter: none; }

        .panel {
            position: relative;
            border: 1px solid var(--border);
            padding: 34px 12px 12px 12px;
            margin-top: 16px;
        }

        .panel > .title {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-bottom-right-radius: 8px;
            padding: 4px 10px 4px 8px;
            position: absolute;
            top: 0;
            left: 0;
            background: black;
        }

        #addAddress input { flex: 1 1 320px; }

        #tokenForm {
            display: none;
            border-top: 1px solid var(--border-soft);
            margin-top: 12px;
            padding-top: 12px;
        }

        #tokenForm.open { display: flex; }
        #tokenForm input.addr { flex: 2 1 300px; }
        #tokenForm input.sm { flex: 1 1 80px; }

        #tokens { margin-top: 12px; }

        body.hideZero tr.zero { display: none; }

        header .toggles { margin-left: auto; display: flex; gap: 8px; align-items: baseline; }
        button.zero-toggle {
            border: 1px solid var(--border);
            padding: 4px 9px;
            color: var(--muted);
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 13px;
        }

        button.zero-toggle.on { color: var(--accent); border-color: var(--accent); }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            padding: 3px 4px 3px 8px;
            margin: 0 6px 6px 0;
        }

        .chip .number { color: var(--tcol, var(--c-ticker)); cursor: pointer; max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: bottom; }
        .chip .number:hover { color: var(--accent); }
        .chip.nft { border-style: dashed; }
        .chip.auto { border-style: dotted; opacity: 0.85; }
        .chip .kind { color: var(--muted); font-size: 10px; }
        .chip .restore { cursor: pointer; color: var(--muted); padding: 0 2px; }
        .chip .restore:hover { color: var(--accent); }
        .hidden-tokens { margin-top: 6px; }
        @keyframes bvspin { to { transform: rotate(360deg); } }
        button.zero-toggle.scanning { position: relative; }
        /* hide the glyph (visibility keeps the button's width) so the centred spinner reads cleanly */
        button.zero-toggle.scanning .glyph { visibility: hidden; }
        button.zero-toggle.scanning::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; margin: -6px 0 0 -6px; box-sizing: border-box;
            border: 1.5px solid var(--border-soft); border-top-color: var(--accent);
            border-radius: 50%;
            animation: bvspin 0.8s linear infinite;
        }

        .thumbs {
            display: flex;
            gap: 6px;
            padding: 4px 0 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .thumbs img {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            cursor: pointer;
        }

        .thumbs img:hover { border-color: var(--accent); }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 24px;
            cursor: zoom-out;
            animation: fade 0.12s ease-out;
        }

        .lightbox img {
            max-width: min(90vw, 640px);
            max-height: 82vh;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #0a0a0a;
        }

        .lightbox-caption {
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 13px;
            color: var(--c-name);
        }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .thumbs .more { color: var(--muted); font-size: 11px; }
        .thumbs .more.expand { cursor: pointer; }
        .thumbs .more.expand:hover { color: var(--accent); }

        .chip .x {
            cursor: pointer;
            color: var(--muted);
            padding: 0 4px;
        }

        .chip .x:hover { color: var(--danger); }

        button.chip-add {
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            padding: 3px 10px;
            margin: 0 6px 6px 0;
            font-size: 13px;
            line-height: 17px;
        }

        #cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .card {
            border: 1px solid var(--border);
            padding: 10px 12px;
        }

        .card .head {
            display: flex;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .card .name {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            color: var(--c-name);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card .addr {
            color: var(--acct, var(--c-addr));
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .card .addr:hover { color: var(--accent); }

        .card table { width: 100%; border-collapse: collapse; }
        .card td { padding: 4px 0; }
        .card td.bal { text-align: right; font-size: 13px; color: var(--c-amount); max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .card td.bal.spin { color: var(--muted); }
        .card td.tick { color: var(--tcol, var(--c-ticker)); width: 72px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card td.tick.copyable { cursor: pointer; }
        .card td.tick.copyable:hover { color: var(--accent); }
        .card td.fiat { text-align: right; color: var(--c-fiat); width: 110px; font-size: 12px; padding-left: 16px; }
        .card tr.cardTotal td { border-top: 1px solid var(--border-soft); }
        .card tr.cardTotal td.tick { color: var(--muted); }
        .card tr.cardTotal td.fiat { color: var(--c-total); }

        #status {
            min-height: 18px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        #status.error { color: var(--danger); }

        #feed { margin-top: 4px; }

        .feed-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
            padding: 3px 0;
            border-top: 1px dashed var(--border-soft);
        }

        .feed-item .when { color: var(--border); min-width: 72px; }
        .feed-item .what { flex: 1; color: #b9c0de; }
        .feed-item .x { cursor: pointer; padding: 0 4px; }
        .feed-item .x:hover { color: var(--danger); }

        button.chain-btn .chain-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .empty {
            color: var(--muted);
            padding: 24px 0;
            text-align: center;
        }

        .spin { color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <div class="brand"><img src="nethermind.svg" alt="NETHERMIND" onerror="this.replaceWith('NETHERMIND')"><span>/ BALANCES</span></div>
        <div id="singleNet" style="display: contents">
            <div class="net">network <span id="netName" class="number">…</span></div>
            <div class="net">chain <span id="chainId" class="number">…</span></div>
            <div class="net">head <span id="headBlock" class="number">…</span></div>
        </div>
        <div id="chainToggles"></div>
        <div class="toggles">
            <button id="detectToggle" class="zero-toggle" title="Auto-detect held tokens"><span class="glyph">🔍</span></button>
            <button id="hideZero" class="zero-toggle" title="Hide zero balances">∅</button>
        </div>
        <div class="total" id="totalBox">
            <span class="net">total ≈</span>
            <span id="totalFiat" class="number">…</span>
            <select id="currency" title="Display currency (Chainlink on-chain feeds)"></select>
        </div>
    </header>

    <div class="panel">
        <div class="title">Watch</div>
        <div class="row" id="addAddress">
            <input id="addrInput" class="number" placeholder="0x address or ENS name (name.eth)" spellcheck="false" />
            <button id="addAddrBtn" title="Pin address">+</button>
        </div>
        <div class="row" id="tokenForm">
            <select id="tokKind" title="Asset type">
                <option value="token">token</option>
                <option value="nft">NFT</option>
            </select>
            <select id="tokChain" title="Chain" style="display: none"></select>
            <input id="tokAddr" class="number addr" placeholder="token contract 0x address" spellcheck="false" />
            <input id="tokTicker" class="number sm" placeholder="ticker" spellcheck="false" />
            <input id="tokDecimals" class="number sm" placeholder="decimals" inputmode="numeric" />
            <input id="tokName" class="sm" placeholder="name (optional)" />
            <button id="addTokBtn">Track</button>
        </div>
        <div id="tokens"></div>
        <div id="status"></div>
        <div id="feed"></div>
    </div>

    <div id="cards"></div>

    <script>
        'use strict';

        // ---------- keccak-256 (original 0x01 padding), BigInt lanes ----------
        const KECCAK_RC = [
            0x0000000000000001n, 0x0000000000008082n, 0x800000000000808an, 0x8000000080008000n,
            0x000000000000808bn, 0x0000000080000001n, 0x8000000080008081n, 0x8000000000008009n,
            0x000000000000008an, 0x0000000000000088n, 0x0000000080008009n, 0x000000008000000an,
            0x000000008000808bn, 0x800000000000008bn, 0x8000000000008089n, 0x8000000000008003n,
            0x8000000000008002n, 0x8000000000000080n, 0x000000000000800an, 0x800000008000000an,
            0x8000000080008081n, 0x8000000000008080n, 0x0000000080000001n, 0x8000000080008008n];
        const KECCAK_RHO = [
            0, 1, 62, 28, 27, 36, 44, 6, 55, 20, 3, 10, 43, 25, 39, 41, 45, 15, 21, 8, 18, 2, 61, 56, 14];
        const M64 = (1n << 64n) - 1n;

        function keccakF(s) {
            const c = new Array(5), b = new Array(25);
            for (let r = 0; r < 24; r++) {
                for (let x = 0; x < 5; x++) c[x] = s[x] ^ s[x + 5] ^ s[x + 10] ^ s[x + 15] ^ s[x + 20];
                for (let x = 0; x < 5; x++) {
                    const t = c[(x + 4) % 5] ^ (((c[(x + 1) % 5] << 1n) | (c[(x + 1) % 5] >> 63n)) & M64);
                    for (let y = 0; y < 25; y += 5) s[x + y] ^= t;
                }
                for (let x = 0; x < 5; x++) for (let y = 0; y < 5; y++) {
                    const i = x + 5 * y, n = BigInt(KECCAK_RHO[i]);
                    b[y + 5 * ((2 * x + 3 * y) % 5)] = n === 0n ? s[i] : (((s[i] << n) | (s[i] >> (64n - n))) & M64);
                }
                for (let x = 0; x < 5; x++) for (let y = 0; y < 25; y += 5)
                    s[x + y] = b[x + y] ^ (~b[(x + 1) % 5 + y] & M64 & b[(x + 2) % 5 + y]);
                s[0] ^= KECCAK_RC[r];
            }
        }

        function keccak256(bytes) {
            const rate = 136, s = new Array(25).fill(0n);
            const padded = new Uint8Array(Math.floor(bytes.length / rate) * rate + rate);
            padded.set(bytes);
            padded[bytes.length] |= 0x01;
            padded[padded.length - 1] |= 0x80;
            for (let off = 0; off < padded.length; off += rate) {
                for (let i = 0; i < rate / 8; i++) {
                    let lane = 0n;
                    for (let j = 7; j >= 0; j--) lane = (lane << 8n) | BigInt(padded[off + i * 8 + j]);
                    s[i] ^= lane;
                }
                keccakF(s);
            }
            const out = new Uint8Array(32);
            for (let i = 0; i < 4; i++) {
                let lane = s[i];
                for (let j = 0; j < 8; j++) { out[i * 8 + j] = Number(lane & 0xffn); lane >>= 8n; }
            }
            return out;
        }

        const toHex = (bytes) => Array.from(bytes, (b) => b.toString(16).padStart(2, '0')).join('');
        const utf8 = (s) => new TextEncoder().encode(s);

        function namehash(name) {
            let node = new Uint8Array(32);
            for (const label of name.toLowerCase().split('.').reverse()) {
                const combined = new Uint8Array(64);
                combined.set(node);
                combined.set(keccak256(utf8(label)), 32);
                node = keccak256(combined);
            }
            return '0x' + toHex(node);
        }

        // EIP-55 checksum for display
        function checksum(addr) {
            const lower = addr.toLowerCase().replace('0x', '');
            const hash = toHex(keccak256(utf8(lower)));
            let out = '0x';
            for (let i = 0; i < 40; i++) out += parseInt(hash[i], 16) >= 8 ? lower[i].toUpperCase() : lower[i];
            return out;
        }

        // ---------- JSON-RPC ----------
        // rpcPath '/' talks to the node serving this page; sibling nodes discovered by the
        // plugin are reached through its same-origin proxy at /balances-rpc/{port}, so all
        // data still flows exclusively through local Nethermind nodes.
        let rpcId = 1;

        async function rpc(method, params, rpcPath = '/') {
            const res = await fetch(rpcPath, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', id: rpcId++, method, params })
            });
            const json = await res.json();
            if (json.error) throw new Error(json.error.message || 'RPC error');
            return json.result;
        }

        // JSON-RPC servers cap batch size (Nethermind's JsonRpc.MaxBatchSize defaults to 1024); split into
        // sub-batches so large detection sweeps (up to 2000 contracts) don't get rejected wholesale.
        const RPC_BATCH_MAX = 500;
        async function rpcBatch(calls, rpcPath = '/') {
            if (calls.length === 0) return [];
            if (calls.length > RPC_BATCH_MAX) {
                const results = [];
                for (let i = 0; i < calls.length; i += RPC_BATCH_MAX) {
                    results.push(...await rpcBatch(calls.slice(i, i + RPC_BATCH_MAX), rpcPath));
                }
                return results;
            }
            const body = calls.map(([method, params]) => ({ jsonrpc: '2.0', id: rpcId++, method, params }));
            const res = await fetch(rpcPath, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            if (!Array.isArray(json)) return body.map(() => null); // server rejected the batch (e.g. size/body limit)
            const byId = new Map(json.map((r) => [r.id, r]));
            return body.map((req) => {
                const r = byId.get(req.id);
                return r && !r.error ? r.result : null;
            });
        }

        // ---------- chains ----------
        // Chainlink Feed Registry (mainnet only): prices looked up by (base, quote) address pair.
        // Fiat quotes use ISO 4217 numeric codes as pseudo-addresses; ETH/BTC have dedicated pseudo-addresses.
        const FEED_REGISTRY = '0x47Fb2585D2C56Fe188D0E6ec628a38b74fCeeeDf';
        const PSEUDO_ETH = '0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE';
        const PSEUDO_BTC = '0xbBbBBBBbbBBBbbbBbbBbbbbBBbBbbbbBbBbbBBbB';
        const DENOM = {
            USD: '0x0000000000000000000000000000000000000348',
            AUD: '0x0000000000000000000000000000000000000024',
            BRL: '0x00000000000000000000000000000000000003da',
            CAD: '0x000000000000000000000000000000000000007c',
            CHF: '0x00000000000000000000000000000000000002f4',
            CNY: '0x000000000000000000000000000000000000009c',
            EUR: '0x00000000000000000000000000000000000003d2',
            GBP: '0x000000000000000000000000000000000000033a',
            JPY: '0x0000000000000000000000000000000000000188',
            KRW: '0x000000000000000000000000000000000000019a',
            NZD: '0x000000000000000000000000000000000000022a',
            PHP: '0x0000000000000000000000000000000000000260',
            SGD: '0x00000000000000000000000000000000000002be',
        };

        // Verified Chainlink aggregator addresses on Gnosis (no feed registry there).
        const GNOSIS_FEEDS = {
            native: '0x678df3415fc31947dA4324eC63212874be5a82f8',                        // DAI/USD (xDAI)
            '0x6a023ccd1ff6f2045c3309768ead9e68f978f6e1': '0xa767f745331D267c7751297D982b050c93985627', // WETH → ETH/USD
            '0x9c58bacc331c9aa871afd802db6379a98e80cedb': '0x22441d81416430A54336aB28765abd31a792Ad37', // GNO
            '0xddafbb505ad214d7b80b1f830fccc89b60fb7a83': '0x26C31ac71010aF62E6B486D1132E266D6298857D', // USDC
            '0x4ecaba5870353805a9f068101a40e0f32ed605c6': '0x68811D7DF835B1c33e6EEae8E7C141eF48d48cc7', // USDT
            '0x8e5bbbb09ed1ebde8674cda39a0c169401db4252': '0x00288135bE38B83249F380e9b6b9a04c90EC39eE', // WBTC
            '0xe91d153e0b41518a2ce8dd3d7944fa863463a97d': '0x678df3415fc31947dA4324eC63212874be5a82f8', // WXDAI → DAI/USD
        };
        const GNOSIS_FX = {
            CHF: '0xFb00261Af80ADb1629D3869E377ae1EEC7bE659F',
            EUR: '0xab70BCB260073d036d1660201e9d5405F5829b7a',
