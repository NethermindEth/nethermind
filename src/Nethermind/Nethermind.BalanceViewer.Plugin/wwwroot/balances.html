            if (reserveToken <= 0n || reserveQuote <= 0n) return null;
            const quoteScale = 10n ** BigInt(quote.decimals);
            // reject thin pools: reserveQuote (USD) = reserveQuote * quoteUsd8 / quoteScale / PRICE_SCALE
            if (reserveQuote * quoteUsd8 < DEX_MIN_LIQUIDITY_USD * quoteScale * PRICE_SCALE) return null;
            return reserveQuote * 10n ** BigInt(tokenDecimals) * quoteUsd8 / (reserveToken * quoteScale);
        }

        const pairFromResult = (raw) => (raw && raw.length >= 66 && !/^0x0*$/.test(raw)) ? '0x' + raw.slice(-40) : null;

        // Resolve USD prices (PRICE_DECIMALS scale) for token addresses: Chainlink first, then a Uniswap-V2
        // pool fallback (quote prices come from Chainlink, so only the pool ratio is taken on-chain).
        // `items` is [{ addr, decimals }]. Returns Map(addr -> price8 | null).
        async function resolvePrices8(node, items) {
            const meta = node.meta;
            const prices = new Map();
            // 1) Chainlink registry / standalone / derived
            const clCalls = [];
            const clProbes = items.map(({ addr }) => {
                const probe = priceProbe(meta, addr);
                if (!probe) return null;
                const start = clCalls.length;
                for (const c of probe.calls) clCalls.push(c);
                return { start, n: probe.calls.length, combine: probe.combine };
            });
            const clRes = clCalls.length ? await rpcBatch(clCalls, node.rpcPath) : [];
            items.forEach(({ addr }, i) => {
                const p = clProbes[i];
                prices.set(addr, p ? p.combine(clRes.slice(p.start, p.start + p.n)) : null);
            });

            // 2) DEX fallback for the still-unpriced
            const unpriced = items.filter((it) => prices.get(it.addr) === null || prices.get(it.addr) === undefined);
            if (!meta.dex || unpriced.length === 0) return prices;

            // quote-token USD prices via Chainlink
            const qCalls = [];
            const qProbes = meta.dex.quotes.map((q) => {
                const probe = priceProbe(meta, q.addr);
                if (!probe) return null;
                const start = qCalls.length;
                for (const c of probe.calls) qCalls.push(c);
                return { start, n: probe.calls.length, combine: probe.combine };
            });
            const qRes = qCalls.length ? await rpcBatch(qCalls, node.rpcPath) : [];
            const quoteUsd = meta.dex.quotes.map((q, i) => (qProbes[i] ? qProbes[i].combine(qRes.slice(qProbes[i].start, qProbes[i].start + qProbes[i].n)) : null));

            // getPair(token, quote) for every unpriced token against every quote
            const pairCalls = [];
            for (const it of unpriced) for (const q of meta.dex.quotes) pairCalls.push(['eth_call', [{ to: meta.dex.factory, data: SEL_GET_PAIR + pad32(it.addr) + pad32(q.addr) }, 'latest']]);
            const pairRes = await rpcBatch(pairCalls, node.rpcPath);
            const found = [];
            let k = 0;
            for (const it of unpriced) for (let qi = 0; qi < meta.dex.quotes.length; qi++) {
                const pair = pairFromResult(pairRes[k++]);
                if (pair && quoteUsd[qi] !== null) found.push({ it, qi, pair });
            }
            if (found.length === 0) return prices;

            // getReserves + token0 for each candidate pair
            const rCalls = [];
            for (const f of found) { rCalls.push(['eth_call', [{ to: f.pair, data: SEL_GET_RESERVES }, 'latest']]); rCalls.push(['eth_call', [{ to: f.pair, data: SEL_TOKEN0 }, 'latest']]); }
            const rRes = await rpcBatch(rCalls, node.rpcPath);
            for (let i = 0; i < found.length; i++) {
                const { it, qi } = found[i];
                if (prices.get(it.addr)) continue; // priced by an earlier quote
                const price = computeV2Price8(rRes[i * 2], rRes[i * 2 + 1], it.addr, it.decimals, meta.dex.quotes[qi], quoteUsd[qi]);
                if (price !== null && price > 0n) prices.set(it.addr, price);
            }
            return prices;
        }

        // FX feeds mostly use 8 decimals, but not all (e.g. PHP/USD is 18),
        // so the rate is fetched together with its decimals and normalized
        function fxCalls(meta) {
            if (currency === 'USD') return null;
            if (meta.registry && DENOM[currency]) {
                return [
                    ['eth_call', [{ to: meta.registry, data: SEL_LATEST_ROUND_REG + pad32(DENOM[currency]) + pad32(DENOM.USD) }, 'latest']],
                    ['eth_call', [{ to: meta.registry, data: SEL_FEED_DECIMALS_REG + pad32(DENOM[currency]) + pad32(DENOM.USD) }, 'latest']],
                ];
            }
            const feed = meta.fx?.[currency];
            return feed ? [
                ['eth_call', [{ to: feed, data: SEL_LATEST_ROUND }, 'latest']],
                ['eth_call', [{ to: feed, data: SEL_DECIMALS }, 'latest']],
            ] : null;
        }

        function normalizeFxRate(answer, decimalsRaw) {
            if (answer === null) return null;
            let decimals = PRICE_DECIMALS;
            try { if (decimalsRaw && decimalsRaw !== '0x') decimals = BigInt(decimalsRaw); } catch { }
            const rate = decimals >= PRICE_DECIMALS
                ? answer / 10n ** (decimals - PRICE_DECIMALS)
                : answer * 10n ** (PRICE_DECIMALS - decimals);
            return rate > 0n ? rate : null;
        }

        const CURRENCY_SYMBOLS = {
            USD: '$', ARS: 'AR$', AUD: 'A$', BRL: 'R$', CAD: 'C$', CHF: 'CHF ', CNY: 'CN¥', EUR: '€',
            GBP: '£', IDR: 'Rp ', JPY: '¥', KRW: '₩', MXN: 'MX$', NZD: 'NZ$', PHP: '₱', SGD: 'S$', TRY: '₺',
        };
        // per-row symbol: drop the country-disambiguating prefix (MX$, A$, CN¥ …) so individual amounts
        // stay compact; the fully-qualified symbol appears only in the top grand total.
        const CURRENCY_SYMBOLS_SHORT = {
            ARS: '$', AUD: '$', CAD: '$', CNY: '¥', MXN: '$', NZD: '$', SGD: '$',
        };
        const currencySymbol = (full) => (full ? CURRENCY_SYMBOLS[currency] : CURRENCY_SYMBOLS_SHORT[currency] ?? CURRENCY_SYMBOLS[currency]);

        // value scaled by PRICE_SCALE (1e8) in the selected currency, prefixed with its symbol.
        // `full` uses the disambiguated symbol (top total); otherwise the short per-row symbol.
        function formatFiat(value8, full = false) {
            const cents = value8 / 10n ** (PRICE_DECIMALS - 2n);
            return currencySymbol(full) + (cents / 100n).toLocaleString('en-US') + '.' + (cents % 100n).toString().padStart(2, '0');
        }

        function setTotal(text) {
            $('totalFiat').textContent = text;
        }

        // last fetched values per `${address}|${chainId}:${assetKey}`, so re-rendering
        // (e.g. after unpinning) never blanks cells while waiting for a refetch
        const cache = new Map();
        // manual tokens plus auto-detected ones (t.auto === true); both render and price identically
        const tokensOf = (chainId) => stateOf(chainId).tokens.concat(stateOf(chainId).detected);
        const assetKeysFor = (chainId) => ['native'].concat(tokensOf(chainId).map((t) => t.address.toLowerCase()));

        function recomputeTotals() {
            if (!anyFiat()) return;
            let grand = 0n;
            let any = false;
            for (const entry of mergedAddresses()) {
                let cardTotal = 0n;
                let cardAny = false;
                for (const node of enabledNodes()) {
                    for (const key of assetKeysFor(node.chainId)) {
                        const cached = cache.get(entry.address + '|' + node.chainId + ':' + key);
                        if (cached?.value8 !== null && cached?.value8 !== undefined) { cardTotal += cached.value8; cardAny = true; }
                    }
                }
                const cell = document.querySelector(`td[data-cardtotal="${entry.address}"]`);
                if (cell) cell.textContent = cardAny ? formatFiat(cardTotal) : '—';
                if (cardAny) { grand += cardTotal; any = true; }
            }
            setTotal(any ? formatFiat(grand, true) : (mergedAddresses().length === 0 ? CURRENCY_SYMBOLS[currency] + '0.00' : '—'));
        }

        // ---------- NFTs (ERC-721 / ERC-1155, node-data only) ----------
        // Owned token ids come from tokenOfOwnerByIndex for ERC721Enumerable, or from
        // owner-filtered Transfer logs for plain ERC-721 and ERC-1155 (then confirmed via
        // ownerOf / balanceOf). Only fully on-chain metadata (data: URIs, e.g. Nouns) is
        // rendered — external URIs are never fetched, so no request leaves the node.
        // Note: log discovery needs the node to retain historical logs; a node pruned of
        // old receipts will surface only recently-acquired ids.
        const nftCache = new Map();        // `${address}|${chainId}|${collection}` -> { count, ids, thumbs }
        const collectionKind = new Map();  // `${chainId}|${collection}` -> 'enum721'|'plain721'|'erc1155'|'none'
        let nftRefreshing = false;

        function parseOnChainMetadata(uri) {
            if (!uri || !uri.startsWith('data:application/json')) return null;
            try {
                const payload = uri.slice(uri.indexOf(',') + 1);
                return JSON.parse(uri.includes(';base64') ? atob(payload) : decodeURIComponent(payload));
            } catch { return null; }
        }

        const iface1 = (x) => { try { return BigInt(x) === 1n; } catch { return false; } };

        async function detectKind(node, collection) {
            const key = node.chainId + '|' + collection.address.toLowerCase();
            if (collectionKind.has(key)) return collectionKind.get(key);
            const q = (id) => ['eth_call', [{ to: collection.address, data: SEL_SUPPORTS_INTERFACE + id.padEnd(64, '0') }, 'latest']];
            const [enumerable, is721, is1155] = await rpcBatch([q(IFACE_ERC721_ENUMERABLE), q(IFACE_ERC721), q(IFACE_ERC1155)], node.rpcPath);
            const kind = iface1(enumerable) ? 'enum721' : iface1(is1155) ? 'erc1155' : iface1(is721) ? 'plain721' : 'none';
            collectionKind.set(key, kind);
            return kind;
        }

        // TransferBatch data is (uint256[] ids, uint256[] values); pull the ids array
        function parseBatchIds(data) {
            try {
                const d = data.slice(2);
                const off = Number(BigInt('0x' + d.slice(0, 64))) * 2;
                const len = Number(BigInt('0x' + d.slice(off, off + 64)));
                const ids = [];
                for (let i = 0; i < len; i++) ids.push(BigInt('0x' + d.slice(off + 64 + i * 64, off + 128 + i * 64)));
                return ids;
            } catch { return []; }
        }

        // the token ids an owner currently holds in a collection (capped), by kind
        async function heldTokenIds(node, collection, owner, kind, count) {
            if (kind === 'enum721') {
                const n = Math.min(count, NFT_ID_CAP);
                const calls = [];
                for (let i = 0; i < n; i++) calls.push(['eth_call', [{ to: collection.address, data: SEL_TOKEN_OF_OWNER + pad32(owner) + pad32(i.toString(16)) }, 'latest']]);
                return (await rpcBatch(calls, node.rpcPath)).filter(Boolean).map((x) => BigInt(x));
            }
            const ownerTopic = '0x' + pad32(owner);
            const range = { fromBlock: '0x0', toBlock: 'latest', address: collection.address };
            const candidates = new Set();
            if (kind === 'plain721') {
                const logs = await rpc('eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, null, ownerTopic] }], node.rpcPath).catch(() => []);
                for (const log of logs || []) if (log.topics?.length === 4) { try { candidates.add(BigInt(log.topics[3])); } catch { } }
                const ids = [...candidates].slice(0, NFT_ID_CAP);
                const owners = await rpcBatch(ids.map((id) => ['eth_call', [{ to: collection.address, data: SEL_OWNER_OF + pad32(id.toString(16)) }, 'latest']]), node.rpcPath);
                return ids.filter((id, i) => { try { return owners[i] && ('0x' + owners[i].slice(-40)).toLowerCase() === owner.toLowerCase(); } catch { return false; } });
            }
            // erc1155: ids live in log data, not topics
            const single = await rpc('eth_getLogs', [{ ...range, topics: [TRANSFER_SINGLE_TOPIC, null, null, ownerTopic] }], node.rpcPath).catch(() => []);
            for (const log of single || []) { try { candidates.add(BigInt('0x' + log.data.slice(2, 66))); } catch { } }
            const batch = await rpc('eth_getLogs', [{ ...range, topics: [TRANSFER_BATCH_TOPIC, null, null, ownerTopic] }], node.rpcPath).catch(() => []);
            for (const log of batch || []) for (const id of parseBatchIds(log.data)) candidates.add(id);
            const ids = [...candidates].slice(0, NFT_ID_CAP);
            const bals = await rpcBatch(ids.map((id) => ['eth_call', [{ to: collection.address, data: SEL_ERC1155_BALANCE + pad32(owner) + pad32(id.toString(16)) }, 'latest']]), node.rpcPath);
            return ids.filter((id, i) => { try { return BigInt(bals[i]) > 0n; } catch { return false; } });
        }

        // decodes on-chain metadata for a slice of ids into thumbnails
        async function fetchThumbsForIds(node, collection, ids, kind) {
            const sel = kind === 'erc1155' ? SEL_ERC1155_URI : SEL_TOKEN_URI;
            const uris = await rpcBatch(ids.map((id) => ['eth_call', [{ to: collection.address, data: sel + pad32(id.toString(16)) }, 'latest']]), node.rpcPath);
            const thumbs = [];
            for (let i = 0; i < ids.length; i++) {
                let uri = decodeAbiString(uris[i]);
                // ERC-1155 uri() may template the id as a 64-hex lowercase string
                if (uri && kind === 'erc1155' && uri.includes('{id}')) uri = uri.replaceAll('{id}', ids[i].toString(16).padStart(64, '0'));
                const metadata = parseOnChainMetadata(uri);
                const title = metadata?.name || collection.ticker + ' #' + ids[i];
                const src = typeof metadata?.image === 'string' && metadata.image.startsWith('data:image/') ? metadata.image : null;
                thumbs.push({ src, title: src ? title : '#' + ids[i] });
            }
            return thumbs;
        }

        // Full-size view in an in-page lightbox. The art is rendered via <img>, which puts
        // SVG in the browser's secure static mode — embedded scripts/external refs never
        // run — so a malicious on-chain NFT can't execute code (unlike opening it as a tab).
        function openArt(src, title) {
            const overlay = el('div', 'lightbox');
            const img = el('img');
            img.src = src;
            img.alt = title || '';
            const caption = el('div', 'lightbox-caption', title || '');
            overlay.append(img, caption);
            overlay.onclick = () => overlay.remove();
            const onKey = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
            document.addEventListener('keydown', onKey);
            document.body.append(overlay);
        }

        function fillThumbs(box, cached, node, owner, collection) {
            box.replaceChildren();
            if (!cached) return;
            for (const thumb of cached.thumbs) {
                if (thumb.src) {
                    const img = el('img');
                    img.src = thumb.src;
                    img.title = thumb.title + ' (click to enlarge)';
                    img.onclick = () => openArt(thumb.src, thumb.title);
                    box.append(img);
                } else {
                    box.append(el('span', 'more number', thumb.title));
                }
            }
            const remaining = (cached.ids?.length ?? cached.count) - cached.thumbs.length;
            if (remaining > 0 && cached.thumbs.length > 0) {
                const more = el('span', 'more expand', '+' + remaining + ' more');
                more.title = 'Show more';
                more.onclick = async () => {
                    more.textContent = '…';
                    more.onclick = null;
                    try {
                        const start = cached.thumbs.length;
                        const next = cached.ids.slice(start, start + MAX_NFT_THUMBS * 3);
                        cached.thumbs.push(...await fetchThumbsForIds(node, collection, next, cached.kind));
                    } catch { /* keep what we have */ }
                    fillThumbs(box, cached, node, owner, collection);
                };
                box.append(more);
            }
            if (cached.thumbs.length > MAX_NFT_THUMBS) {
                const less = el('span', 'more expand', 'show less');
                less.onclick = () => {
                    cached.thumbs.length = MAX_NFT_THUMBS;
                    fillThumbs(box, cached, node, owner, collection);
                };
                box.append(less);
            }
        }

        async function refreshNftThumbs() {
            if (nftRefreshing) return;
            nftRefreshing = true;
            try {
                for (const node of enabledNodes()) {
                    for (const entry of mergedAddresses()) {
                        for (const collection of stateOf(node.chainId).nfts) {
                            const colKey = collection.address.toLowerCase();
                            const key = entry.address + '|' + node.chainId + '|' + colKey;
                            const box = document.querySelector(`[data-thumbs="${key}"]`);
                            // balanceOf(address) gives the count for ERC-721; ERC-1155 reverts
                            // it (needs an id), so its count is the number of held ids found
                            const balCached = cache.get(entry.address + '|' + node.chainId + ':nft:' + colKey);
                            const erc721Count = balCached?.bal && balCached.bal !== null ? Number(balCached.bal.replace(/,/g, '')) : null;

                            const kind = await detectKind(node, collection);
                            // re-discover only when the ERC-721 count changes; ERC-1155 has no
                            // cheap count signal, so discover once and keep
                            const sig = kind === 'erc1155' ? 'x' : erc721Count;
                            if (nftCache.get(key)?.sig === sig) continue;

                            let ids = [];
                            if (kind !== 'none' && (kind === 'erc1155' || erc721Count > 0)) {
                                ids = await heldTokenIds(node, collection, entry.address, kind, erc721Count || 0);
                            }
                            const count = kind === 'erc1155' ? ids.length : (erc721Count ?? 0);
                            const thumbs = ids.length ? await fetchThumbsForIds(node, collection, ids.slice(0, MAX_NFT_THUMBS), kind) : [];
                            nftCache.set(key, { count, ids, thumbs, kind, sig });

                            // fill in the count cell for ERC-1155 (refreshNode left it blank)
                            if (kind === 'erc1155') {
                                const cell = document.querySelector(`.card[data-address="${entry.address}"] td[data-key="${node.chainId}:nft:${colKey}"]`);
                                if (cell) { cell.textContent = String(count); cell.classList.remove('spin'); }
                            }
                            if (box) fillThumbs(box, nftCache.get(key), node, entry.address, collection);
                        }
                    }
                }
            } catch { /* thumbnails are cosmetic — leave whatever is displayed */ }
            finally { nftRefreshing = false; }
        }

        // ---------- notifications (activity derived from node data only) ----------
        // A bell on each card watches the address: new blocks on every enabled chain are
        // scanned for its transactions and ERC-20 Transfer logs, and events (sent/received,
        // swaps, contract interactions) surface as system notifications via the service
        // worker. No push service is involved — data never leaves the nodes.
        const TRANSFER_TOPIC = '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';
        const APPROVAL_TOPIC = '0x8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925';
        const MAX_BLOCKS_PER_POLL = 4;

        // symbol/decimals of tokens seen in activity logs, resolved on demand so
        // notifications can say "sent 250 USDC" even for untracked tokens
        const tokenMetaCache = new Map(); // `${chainId}|${address}` -> { ticker, decimals } | null

        async function resolveTokenMetas(node, addresses) {
            const unknown = [...new Set(addresses)].filter((a) => !tokenMetaCache.has(node.chainId + '|' + a));
            if (unknown.length === 0) return;
            const calls = [];
            for (const address of unknown) {
                calls.push(['eth_call', [{ to: address, data: SEL_SYMBOL }, 'latest']]);
                calls.push(['eth_call', [{ to: address, data: SEL_DECIMALS }, 'latest']]);
            }
            const results = await rpcBatch(calls, node.rpcPath);
            for (let i = 0; i < unknown.length; i++) {
                const ticker = decodeAbiString(results[i * 2]);
                let decimals = null;
                try { if (results[i * 2 + 1] && results[i * 2 + 1] !== '0x') decimals = Number(BigInt(results[i * 2 + 1])); } catch { }
                tokenMetaCache.set(node.chainId + '|' + unknown[i], ticker ? { ticker, decimals } : null);
            }
        }

        const isWatchedAny = (address) =>
            enabledNodes().some((n) => stateOf(n.chainId).watched.includes(address.toLowerCase()));

        async function toggleWatch(entry, bell) {
            const key = entry.address.toLowerCase();
            const who = entry.label || shortAddr(entry.address);
            if (isWatchedAny(key)) {
                for (const node of enabledNodes()) {
                    const state = stateOf(node.chainId);
                    state.watched = state.watched.filter((w) => w !== key);
                    store.save(node.chainId);
                }
                bell.classList.remove('on');
                setStatus('Notifications off for ' + who);
                return;
            }

            let systemNotifications = false;
            if (!window.isSecureContext) {
                // browsers refuse service workers and notification permission on plain
                // HTTP (except localhost) — a tunnel or TLS proxy enables the real thing
                setStatus('System notifications need HTTPS or localhost — activity will only show in this line', true);
            } else if (!('Notification' in window)) {
                setStatus('This browser has no Notification support — activity will only show in this line', true);
            } else {
                const permission = Notification.permission === 'granted' ? 'granted' : await Notification.requestPermission();
                if (permission !== 'granted') {
                    setStatus('Notification permission was not granted — activity will only show in this line', true);
                } else {
                    try {
                        await navigator.serviceWorker.register('balances-sw.js');
                        await navigator.serviceWorker.ready;
                        systemNotifications = true;
                    } catch { setStatus('Service worker registration failed — activity will only show in this line', true); }
                }
            }

            for (const node of enabledNodes()) {
                const state = stateOf(node.chainId);
                if (!state.watched.includes(key)) state.watched.push(key);
                store.save(node.chainId);
            }
            bell.classList.add('on');
            if (systemNotifications) {
                setStatus('Watching ' + who + ' for activity');
                notify(who, 'Notifications enabled on this device'); // immediate proof it works
            }
        }

        // ---------- in-page notification feed (persisted, dismissable) ----------
        const FEED_KEY = 'nethermind.balances.feed';
        const FEED_LIMIT = 30;
        let feed = [];
        try { feed = JSON.parse(localStorage.getItem(FEED_KEY) || '[]'); } catch { }

        function timeAgo(t) {
            const s = Math.max(0, (Date.now() - t) / 1000);
            if (s < 60) return 'just now';
            if (s < 3600) return Math.floor(s / 60) + 'm ago';
            if (s < 86400) return Math.floor(s / 3600) + 'h ago';
            return Math.floor(s / 86400) + 'd ago';
        }

        function renderFeed() {
            const box = $('feed');
            box.replaceChildren();
            for (const item of feed) {
                const row = el('div', 'feed-item');
                row.append(el('span', 'when number', timeAgo(item.t)));
                row.append(el('span', 'what', '🔔 ' + item.title + ' ' + item.body));
                const x = el('span', 'x', '×');
                x.title = 'Dismiss';
                x.onclick = () => {
                    feed = feed.filter((f) => f !== item);
                    localStorage.setItem(FEED_KEY, JSON.stringify(feed));
                    renderFeed();
                };
                row.append(x);
                box.append(row);
            }
        }

        async function notify(title, body) {
            feed.unshift({ t: Date.now(), title, body });
            feed.length = Math.min(feed.length, FEED_LIMIT);
            localStorage.setItem(FEED_KEY, JSON.stringify(feed));
            renderFeed();
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            try {
                const registration = await navigator.serviceWorker?.getRegistration();
                if (registration) registration.showNotification(title, { body, icon: 'favicon.webp' });
                else new Notification(title, { body });
            } catch { }
        }

        function displayName(address) {
            const entry = mergedAddresses().find((a) => a.address.toLowerCase() === address);
            return (entry && labelFor(entry)) || shortAddr(entry?.address || address);
        }

        // describes a Transfer log: ERC-20 amounts with symbol/decimals (tracked tokens
        // first, then the on-demand meta cache), ERC-721 transfers by token id
        function describeTransfer(log, node) {
            const address = log.address.toLowerCase();
            const tracked = tokensOf(node.chainId).find((t) => t.address.toLowerCase() === address);
            const meta = tracked ?? tokenMetaCache.get(node.chainId + '|' + address);
            const name = meta?.ticker ?? shortAddr(checksum(log.address));
            if (log.topics.length === 4) {
                let id = null;
                try { id = BigInt(log.topics[3]); } catch { }
                return name + (id !== null ? ' #' + id : '') + ' (NFT)';
            }
            let amount = null;
            try { amount = BigInt(log.data); } catch { }
            if (amount === null) return 'tokens of ' + name;
            return meta?.decimals !== null && meta?.decimals !== undefined
                ? formatUnits('0x' + amount.toString(16), meta.decimals) + ' ' + name
                : amount + ' units of ' + name;
        }

        async function scanForActivity(node, headHex) {
            const watched = stateOf(node.chainId).watched;
            if (node.scanning || watched.length === 0) { node.lastScanned = BigInt(headHex); return; }
            const head = BigInt(headHex);
            if (node.lastScanned === null) { node.lastScanned = head; return; }
            if (head <= node.lastScanned) return;
            node.scanning = true;
            try {
                const from = head - node.lastScanned > BigInt(MAX_BLOCKS_PER_POLL) ? head - BigInt(MAX_BLOCKS_PER_POLL) + 1n : node.lastScanned + 1n;
                const range = { fromBlock: '0x' + from.toString(16), toBlock: headHex };
                const watchedTopics = watched.map((w) => '0x' + pad32(w));
                const blockCalls = [];
                for (let n = from; n <= head; n++) blockCalls.push(['eth_getBlockByNumber', ['0x' + n.toString(16), true]]);
                const results = await rpcBatch(blockCalls.concat([
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, watchedTopics] }]],
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, null, watchedTopics] }]],
                    ['eth_getLogs', [{ ...range, topics: [APPROVAL_TOPIC, watchedTopics] }]],
                ]), node.rpcPath);
                node.lastScanned = head;

                const outLogs = results[blockCalls.length] ?? [];
                const inLogs = results[blockCalls.length + 1] ?? [];
                const approvalLogs = results[blockCalls.length + 2] ?? [];
                await resolveTokenMetas(node, outLogs.concat(inLogs, approvalLogs).map((log) => log.address.toLowerCase()));

                const isWatched = (address) => watched.includes(address);

                // facts per (watched address | tx hash) so one tx yields one notification
                const facts = new Map();
                const addFact = (watchedAddr, txHash, kind, text) => {
                    const key = watchedAddr + '|' + txHash;
                    if (!facts.has(key)) facts.set(key, { out: null, in: null, other: [] });
                    const f = facts.get(key);
                    if (kind === 'out' && f.out === null) f.out = text;
                    else if (kind === 'in' && f.in === null) f.in = text;
                    else if (kind === 'approval') f.other.unshift(text);
                    else if (kind === 'other') f.other.push(text);
                };

                for (let b = 0; b < blockCalls.length; b++) {
                    for (const tx of results[b]?.transactions ?? []) {
                        const txFrom = tx.from?.toLowerCase(), txTo = tx.to?.toLowerCase();
                        const value = (() => { try { return BigInt(tx.value); } catch { return 0n; } })();
                        if (txFrom && isWatched(txFrom)) {
                            if (value > 0n) addFact(txFrom, tx.hash, 'out', formatUnits(tx.value, 18) + ' ' + node.meta.ticker);
                            if (!txTo) addFact(txFrom, tx.hash, 'other', 'deployed a contract');
                            else if (tx.input && tx.input !== '0x') addFact(txFrom, tx.hash, 'other', 'interacted with contract ' + shortAddr(checksum(txTo)));
                        }
                        if (txTo && isWatched(txTo) && value > 0n) addFact(txTo, tx.hash, 'in', formatUnits(tx.value, 18) + ' ' + node.meta.ticker);
                    }
                }
                for (const log of outLogs) addFact('0x' + log.topics[1].slice(-40), log.transactionHash, 'out', describeTransfer(log, node));
                for (const log of inLogs) addFact('0x' + log.topics[2].slice(-40), log.transactionHash, 'in', describeTransfer(log, node));
                for (const log of approvalLogs) {
                    const spender = shortAddr(checksum('0x' + log.topics[2].slice(-40)));
                    const meta = tokenMetaCache.get(node.chainId + '|' + log.address.toLowerCase());
                    addFact('0x' + log.topics[1].slice(-40), log.transactionHash, 'approval',
                        'approved ' + spender + ' for ' + (meta?.ticker ?? shortAddr(checksum(log.address))));
                }

                const chainSuffix = multi() ? ' · ' + node.meta.name : '';
                for (const [key, f] of facts) {
                    const watchedAddr = key.slice(0, 42);
                    if (!isWatched(watchedAddr)) continue;
                    const who = displayName(watchedAddr);
                    if (f.out && f.in) notify(who, `swapped ${f.out} for ${f.in}` + chainSuffix);
                    else if (f.out) notify(who, 'sent ' + f.out + chainSuffix);
                    else if (f.in) notify(who, 'received ' + f.in + chainSuffix);
                    else if (f.other.length) notify(who, f.other[0] + chainSuffix);
                }
            } catch { /* activity scan is best-effort; next poll retries from the new head */ }
            finally { node.scanning = false; }
        }

        // ---------- auto token detection ----------
        // With the top-bar 🔍 toggle on (default), held ERC-20s surface automatically as removable
        // "auto" token rows. Two node-data-only sources:
        //  • real-time — each poll scans the few newly-arrived blocks (client eth_getLogs, kept under
        //    the node's 1000-block range cap) for Transfer logs touching a pinned address.
        //  • historical — the node scans its own retained history IN-PROCESS via its bloom-indexed log
        //    finder (see DetectionScanner), which avoids the RPC range/result caps and thousands of
        //    round-trips, and is throttled/cancellable so it can't starve validator duties. Results are
        //    cached on the node, so the scan runs once and reloads/other devices load instantly.
        // Historical detection covers the chain of the node you're connected to (its /balances-detect
        // endpoint); sibling chains get real-time detection only. Every candidate is confirmed with a
        // live balanceOf before it's shown.
        const DETECT_REALTIME_MAX = 900n;   // forward blocks scanned per poll (under the 1000-block getLogs cap)
        let detectEnabled = true;           // top-bar toggle, default on
        let detecting = false;              // node historical scan still in progress (drives the spinner)
        let nodeDetectBusy = false;         // guards against overlapping nodeDetect passes
        let tokensExpanded = false;         // detected-chip list expanded past the collapse limit
        let hiddenExpanded = false;         // hidden-tokens section expanded
        let hiddenShowAll = false;          // show all hidden chips past HIDDEN_COLLAPSE
        const TOKEN_COLLAPSE = 20;          // detected chips shown before "＋N more…"
        const HIDDEN_COLLAPSE = 30;         // hidden chips shown when the section is expanded

        // ERC-20 Transfer logs carry exactly 3 topics (ERC-721's are fully indexed → 4); the emitting
        // contract is a token the account moved. Returns lowercased contract addresses not already
        // tracked (known) or hidden (ignored).
        function erc20ContractsFromLogs(logs, known, ignored) {
            const found = new Set();
            for (const log of logs) {
                if (!log || (log.topics?.length ?? 0) !== 3) continue;
                const address = log.address.toLowerCase();
                if (known.has(address) || ignored.has(address)) continue;
                found.add(address);
            }
            return [...found];
        }

        // hidden token addresses (lower-cased) — a client-side display filter only; never sent to the node
        function ignoredAddrs(chainId) {
            return new Set(stateOf(chainId).ignored.map((t) => (typeof t === 'string' ? t : t.address).toLowerCase()));
        }

        // heuristic spam filter (node data only): blank/absurdly long symbols, non-ASCII, URL- or
        // promo-like tickers, bogus decimals, and dust-airdrop-style astronomically large balances.
        // Suspected spam is hidden by default but recorded, so it can be restored one-by-one.
        function looksLikeSpam(ticker, decimals, balanceRaw) {
            const t = (ticker || '').trim();
            if (t.length === 0 || t.length > 20) return true;
            if (/[^\x20-\x7E]/.test(t)) return true;
            if (/https?:|www\.|t\.me|\.(com|xyz|io|net|org|app|fi|click|top|vip|site|live|gift|cash|finance|pro|link|online|world|store|life|gg)\b/i.test(t)) return true;
            if (/claim|reward|voucher|airdrop|visit|redeem|bonus|giveaway|presale|whitelist|telegram|discord|\.eth\b|→|\$\s?\d/i.test(t)) return true;
            if (!Number.isInteger(decimals) || decimals < 0 || decimals > 36) return true;
            try { if (balanceRaw && BigInt(balanceRaw) / (10n ** BigInt(decimals)) >= 1000000000000000n) return true; } catch { }
            return false;
        }

        // confirms a positive balance for candidate contracts and adds genuine holdings (held by any of
        // addrList) to the chain's detected list, skipping manually-tracked and hidden ones
        async function vetAndAdd(node, addrList, candidates) {
            const state = stateOf(node.chainId);
            const manual = new Set(state.tokens.map((t) => t.address.toLowerCase()));
            const shown = new Set(state.detected.map((t) => t.address.toLowerCase()));
            const ignored = ignoredAddrs(node.chainId);
            const fresh = candidates.map((c) => c.toLowerCase()).filter((c) => !manual.has(c) && !shown.has(c) && !ignored.has(c));
            if (fresh.length === 0) return;
            // balanceOf first — then metadata and pricing only touch tokens actually held, not every
            // candidate the node returned (an active account has thousands of spam candidates, ~none held)
            const calls = [];
            for (const c of fresh) for (const a of addrList) calls.push(['eth_call', [{ to: c, data: SEL_BALANCE_OF + pad32(a) }, 'latest']]);
            const bals = await rpcBatch(calls, node.rpcPath);
            const heldRawByAddr = [];
            for (let ci = 0; ci < fresh.length; ci++) {
                let heldRaw = null;
                for (let ai = 0; ai < addrList.length; ai++) {
                    const raw = bals[ci * addrList.length + ai];
                    try { if (raw && raw !== '0x' && BigInt(raw) > 0n) { heldRaw = raw; break; } } catch { }
                }
                if (heldRaw !== null) heldRawByAddr.push({ addr: fresh[ci], heldRaw });
            }
            if (heldRawByAddr.length === 0) return;

            await resolveTokenMetas(node, heldRawByAddr.map((h) => h.addr));
            const held = [];
            for (const { addr, heldRaw } of heldRawByAddr) {
                const meta = tokenMetaCache.get(node.chainId + '|' + addr);
                if (!meta || !meta.ticker || meta.decimals === null || meta.decimals === undefined) continue;
                held.push({ addr, meta, heldRaw });
            }
            if (held.length === 0) return;

            // Value gate: a genuine holding has a discoverable price (Chainlink or a liquid DEX pool) and is
            // worth more than a dust threshold. Auto-detected tokens that can't be priced, or whose holding
            // is worth under the threshold, are hidden by default (restorable one-by-one) — this filters the
            // airdrop spam that floods active accounts. Only gate on chains that have price sources.
            const priceGate = fiatEnabled(node.meta);
            const prices = priceGate ? await resolvePrices8(node, held.map((h) => ({ addr: h.addr, decimals: h.meta.decimals }))) : null;

            let added = false;
            for (let k = 0; k < held.length; k++) {
                const { addr, meta, heldRaw } = held[k];
                // re-check synchronously (no await before the push/hide) so concurrent passes can't double-add
                if (state.detected.some((t) => t.address.toLowerCase() === addr)) continue;
                if (state.ignored.some((t) => typeof t !== 'string' && t.address.toLowerCase() === addr)) continue;
                const token = { address: checksum(addr), ticker: meta.ticker, decimals: meta.decimals, name: meta.ticker, auto: true };
                let hide = looksLikeSpam(meta.ticker, meta.decimals, heldRaw);
                if (!hide && priceGate) {
                    const price = prices.get(addr);
                    if (price !== null && price !== undefined) {
                        if (BigInt(heldRaw) * price / 10n ** BigInt(meta.decimals) < DETECT_MIN_VALUE_USD * PRICE_SCALE) hide = true; // priced dust
                    } else if (node.meta.strictValueGate) {
                        // unpriceable: only treat as spam on chains with deep price coverage (mainnet), where
                        // a legit token would have been priced. On sparsely-covered chains (e.g. Gnosis, where
                        // liquidity sits on venues we don't read) keep it — the name/amount heuristic already ran.
                        hide = true;
                    }
                }
                if (hide) {
                    state.ignored.push({ address: token.address, ticker: token.ticker, decimals: token.decimals, name: token.name, spam: true });
                } else {
                    state.detected.push(token);
                }
                added = true;
            }
            if (added) { store.save(node.chainId); renderTokens(); renderCards(); refreshBalances(); }
        }

        // confirms candidate NFT collections (ERC-721 / ERC-1155) the account owns and adds them to the
        // chain's nfts list; suspected-spam collections are hidden by default (restorable)
        async function vetAndAddNfts(node, addrList, candidates) {
            const state = stateOf(node.chainId);
            const known = new Set(state.nfts.map((t) => t.address.toLowerCase()));
            const ignored = ignoredAddrs(node.chainId);
            const fresh = candidates.map((c) => c.toLowerCase()).filter((c) => !known.has(c) && !ignored.has(c));
            let added = false;
            for (const c of fresh) {
                if (state.nfts.some((t) => t.address.toLowerCase() === c) || ignoredAddrs(node.chainId).has(c)) continue;
                let kind;
                try { kind = await detectKind(node, { address: c }); } catch { continue; }
                if (kind === 'none') continue;
                let meta;
                try { meta = await rpcBatch([['eth_call', [{ to: c, data: SEL_SYMBOL }, 'latest']], ['eth_call', [{ to: c, data: SEL_NAME }, 'latest']]], node.rpcPath); } catch { continue; }
                const ticker = decodeAbiString(meta[0]) || decodeAbiString(meta[1]) || 'NFT';
                const name = decodeAbiString(meta[1]) || ticker;
                // ERC-721 exposes balanceOf(owner); ERC-1155 does not (holdings are per-id, resolved by the NFT view)
                if (kind !== 'erc1155') {
                    let held = false;
                    try {
                        const bals = await rpcBatch(addrList.map((a) => ['eth_call', [{ to: c, data: SEL_BALANCE_OF + pad32(a) }, 'latest']]), node.rpcPath);
                        held = bals.some((r) => { try { return r && r !== '0x' && BigInt(r) > 0n; } catch { return false; } });
                    } catch { }
                    if (!held) continue;
                }
                // re-check synchronously (no await before the push) so concurrent passes can't double-add
                if (state.nfts.some((t) => t.address.toLowerCase() === c) || ignoredAddrs(node.chainId).has(c)) continue;
                const entry = { address: checksum(c), ticker, name };
                if (looksLikeSpam(ticker, 0, null) || looksLikeSpam(name, 0, null)) {
                    state.ignored.push({ ...entry, nft: true, spam: true });
                } else {
                    state.nfts.push({ ...entry, auto: true });
                }
                added = true;
            }
            if (added) { store.save(node.chainId); renderTokens(); renderCards(); refreshBalances(); refreshNftThumbs(); }
        }

        // real-time: scan blocks arrived since the last poll for Transfer logs touching a pinned address
        async function realtimeDetect(node) {
            const addresses = mergedAddresses();
            if (!detectEnabled || addresses.length === 0 || !node.head) return;
            const head = BigInt(node.head);
            if (node.detectHead === null || node.detectHead === undefined) { node.detectHead = head; return; } // seed
            if (head <= node.detectHead) return;
            const from = head - node.detectHead > DETECT_REALTIME_MAX ? head - DETECT_REALTIME_MAX + 1n : node.detectHead + 1n;
            node.detectHead = head;
            const addrTopics = addresses.map((a) => '0x' + pad32(a.address));
            const range = { fromBlock: '0x' + from.toString(16), toBlock: '0x' + head.toString(16) };
            const known = new Set(tokensOf(node.chainId).map((t) => t.address.toLowerCase()));
            try {
                const [outLogs, inLogs] = await rpcBatch([
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, addrTopics] }]],
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, null, addrTopics] }]],
                ], node.rpcPath);
                const contracts = erc20ContractsFromLogs((outLogs ?? []).concat(inLogs ?? []), known, new Set());
                if (contracts.length) await vetAndAdd(node, addresses.map((a) => a.address), contracts);
            } catch { /* next poll retries from the advanced cursor */ }
        }

        // historical: ask each node to scan its retained history in-process (POST triggers/resumes and
        // returns progress), then vet whatever contracts it has found so far. Runs every enabled node —
        // the connected one directly, siblings through the same-origin proxy — so every chain is scanned,
        // not just the one serving the page. The node resumes and caches, converging then no-opping.
        async function nodeDetect() {
            if (!detectEnabled || nodeDetectBusy) return;
            const addresses = mergedAddresses();
            if (addresses.length === 0) { detecting = false; updateDetectIndicator(); return; }
            nodeDetectBusy = true;
            detecting = true; updateDetectIndicator(); // show the spinner while vetting too, not just during the node scan
            try {
                let scanning = false;
                for (const node of enabledNodes()) {
                    for (const entry of addresses) {
                        let data;
                        try {
                            const res = await fetch(node.detectPath, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chainId: node.chainId, address: entry.address }),
                            });
                            data = res.ok ? await res.json() : null;
                        } catch { continue; }
                        if (!data) { scanning = true; continue; } // scan just started; nothing cached yet
                        if (data.contracts?.length) await vetAndAdd(node, [entry.address], data.contracts);
                        if (data.nftContracts?.length) await vetAndAddNfts(node, [entry.address], data.nftContracts);
                        if (!data.complete) scanning = true;
                    }
                }
                detecting = scanning;
                updateDetectIndicator();
            } finally { nodeDetectBusy = false; if (!detecting) updateDetectIndicator(); }
        }

        function updateDetectIndicator() {
            const btn = $('detectToggle');
            if (btn) btn.classList.toggle('scanning', detectEnabled && detecting);
        }

        // restores a single hidden token: remove it from the ignore list and show it again
        function restoreOne(node, token) {
            const key = token.address.toLowerCase();
            const state = stateOf(node.chainId);
            state.ignored = state.ignored.filter((t) => (typeof t === 'string' ? t : t.address).toLowerCase() !== key);
            if (token.ticker) {
                if (token.nft) {
                    if (!state.nfts.some((x) => x.address.toLowerCase() === key)) state.nfts.push({ address: token.address, ticker: token.ticker, name: token.name ?? token.ticker, auto: true });
                } else if (!tokensOf(node.chainId).some((x) => x.address.toLowerCase() === key)) {
                    state.detected.push({ address: token.address, ticker: token.ticker, decimals: token.decimals, name: token.name ?? token.ticker, auto: true });
                }
            }
            store.save(node.chainId);
            renderTokens();
            renderCards();
            refreshBalances();
        }

        // restores hidden tokens by moving the stored objects back to the detected list — works
        // regardless of cache/scan state
        function restoreHidden() {
            for (const node of nodes) {
                const state = stateOf(node.chainId);
                if (!state.ignored.length) continue;
                for (const t of state.ignored) {
                    if (typeof t === 'string' || !t.ticker) continue;
                    const key = t.address.toLowerCase();
                    if (t.nft) {
                        if (!state.nfts.some((x) => x.address.toLowerCase() === key)) state.nfts.push({ address: t.address, ticker: t.ticker, name: t.name ?? t.ticker, auto: true });
                    } else if (!tokensOf(node.chainId).some((x) => x.address.toLowerCase() === key)) {
                        state.detected.push({ address: t.address, ticker: t.ticker, decimals: t.decimals, name: t.name ?? t.ticker, auto: true });
                    }
                }
                state.ignored = [];
                store.save(node.chainId);
            }
            renderTokens();
            renderCards();
            refreshBalances();
        }

        // Developer-only: wipe the connected node's detection cache and this browser's auto-detected
        // state, then let the next poll re-scan from scratch. Deliberately not surfaced in the UI —
        // invoke from the web console:  await bvClearDetectionCache()
        globalThis.bvClearDetectionCache = async function () {
            let nodeCleared = false;
            try { nodeCleared = (await fetch('balances-detect', { method: 'DELETE' })).ok; }
            catch (e) { console.warn('[balances] node cache clear failed:', e); }
            for (const node of nodes) {
                const state = stateOf(node.chainId);
                if (!state) continue;
                state.detected = (node.meta.defaults || []).map((t) => ({ ...t, auto: true }));
                state.nfts = state.nfts.filter((n) => !n.auto);
                state.ignored = [];
                node.detectHead = null; // let realtime re-seed
                store.save(node.chainId);
            }
            renderTokens(); renderCards(); refreshBalances();
            console.log('[balances] detection cache cleared (connected node: ' + (nodeCleared ? 'ok' : 'unreachable') + '); re-scanning…');
            return nodeCleared;
        };

        // ---------- ENS (simple forward + reverse resolution) ----------
        function ensNode() {
            return enabledNodes().find((n) => n.chainId === 1 && n.ens) ?? enabledNodes().find((n) => n.ens) ?? null;
        }

        async function resolverFor(namehashHex, via) {
            const raw = await rpc('eth_call', [{ to: ENS_REGISTRY, data: SEL_RESOLVER + namehashHex.slice(2) }, 'latest'], via.rpcPath);
            const resolver = raw && raw.length >= 66 ? '0x' + raw.slice(-40) : null;
            return resolver && !/^0x0{40}$/.test(resolver) ? resolver : null;
        }

        // forward resolve name -> checksummed address, or null if not resolvable
        async function resolveEnsAddress(name, via) {
            const node = namehash(name);
            const resolver = await resolverFor(node, via);
            if (!resolver) return null;
            const raw = await rpc('eth_call', [{ to: resolver, data: SEL_ADDR + node.slice(2) }, 'latest'], via.rpcPath);
            const addr = raw && raw.length >= 66 ? '0x' + raw.slice(-40) : null;
            return addr && !/^0x0{40}$/.test(addr) ? checksum(addr) : null;
        }

        async function resolveEns(name) {
            const via = ensNode();
            if (!via) throw new Error('ENS is not available on ' + enabledNodes().map((n) => n.meta.name).join('/'));
            const addr = await resolveEnsAddress(name, via);
            if (!addr) throw new Error(`ENS name '${name}' is not registered or has no address`);
            return addr;
        }

        // reverse resolve address -> primary ENS name, forward-verified (a reverse record
        // can claim any name, so it is only trusted if the name resolves back to the address)
        const reverseCache = new Map(); // address(lower) -> name | null
        async function reverseName(address) {
            const via = ensNode();
            if (!via) return null;
            const node = namehash(address.slice(2).toLowerCase() + '.addr.reverse');
            const resolver = await resolverFor(node, via);
            if (!resolver) return null;
            const raw = await rpc('eth_call', [{ to: resolver, data: SEL_ENS_NAME + node.slice(2) }, 'latest'], via.rpcPath);
            const name = decodeAbiString(raw);
            if (!name) return null;
            const forward = await resolveEnsAddress(name, via);
            return forward && forward.toLowerCase() === address.toLowerCase() ? name : null;
        }

        // fill in ENS names for pinned raw addresses (no user label), once each
        async function resolveReverseNames() {
            if (!ensNode()) return;
            for (const entry of mergedAddresses()) {
                const key = entry.address.toLowerCase();
                if (entry.label || reverseCache.has(key)) continue;
                reverseCache.set(key, null); // reserve to avoid duplicate in-flight lookups
                try {
                    const name = await reverseName(entry.address);
                    if (name) { reverseCache.set(key, name); renderCards(); }
                } catch { }
            }
        }

        // display label for an address: user-given name, else forward-verified ENS name
        function labelFor(entry) {
            return entry.label || reverseCache.get(entry.address.toLowerCase()) || null;
        }

        // ---------- rendering ----------
        // hides an auto-detected token from the display and stores it so it can be restored; the
        // node cache still records it (ignore is a client-side preference only)
        function hideDetected(node, token, isNft) {
            const key = token.address.toLowerCase();
            const state = stateOf(node.chainId);
            if (isNft) state.nfts = state.nfts.filter((t) => t.address.toLowerCase() !== key);
            else state.detected = state.detected.filter((t) => t.address.toLowerCase() !== key);
            if (!state.ignored.some((t) => typeof t !== 'string' && t.address.toLowerCase() === key)) {
                state.ignored.push({ address: token.address, ticker: token.ticker, decimals: token.decimals, name: token.name ?? token.ticker, nft: !!isNft });
            }
            store.save(node.chainId);
            renderTokens();
            renderCards();
            recomputeTotals();
        }

        function renderTokens() {
            const box = $('tokens');
            box.replaceChildren();
            const addChip = (node, item, list, isNft) => {
                const isAuto = list === 'detected' || (isNft && item.auto);
                const chip = el('span', (isNft ? 'chip nft' : 'chip') + (isAuto ? ' auto' : ''));
                const ticker = tickerLabel(item.ticker, node);
                ticker.style.setProperty('--tcol', tokenColor(item.ticker));
                ticker.onclick = () => copyAddress(item.address);
                chip.append(ticker);
                if (isNft) chip.append(el('span', 'kind', 'nft'));
                chip.title = `${item.name || item.ticker} · ${node.meta.name} · ${item.address}` + (isNft ? '' : ` · ${item.decimals} decimals`) + ' (click to copy address)';
                const x = el('span', 'x', '×');
                x.onclick = () => {
                    if (isAuto) { hideDetected(node, item, isNft); return; }
                    const state = stateOf(node.chainId);
                    state[list] = state[list].filter((t) => t !== item);
                    store.save(node.chainId);
                    renderTokens();
                    renderCards();
                    recomputeTotals();
                };
                chip.append(x);
                box.append(chip);
            };
            // manual (tracked) tokens first — always shown
            for (const node of enabledNodes()) {
                for (const token of stateOf(node.chainId).tokens) addChip(node, token, 'tokens', false);
            }
            // detected tokens — collapse the list past a limit so a long tail can't fill the panel
            const detected = enabledNodes().flatMap((node) => stateOf(node.chainId).detected.map((token) => [node, token]));
            const shownDetected = tokensExpanded ? detected : detected.slice(0, TOKEN_COLLAPSE);
            for (const [node, token] of shownDetected) addChip(node, token, 'detected', false);
            if (detected.length > TOKEN_COLLAPSE) {
                const more = el('button', 'link chip-add', tokensExpanded ? 'show less' : `＋${detected.length - TOKEN_COLLAPSE} more…`);
                more.onclick = () => { tokensExpanded = !tokensExpanded; renderTokens(); };
                box.append(more);
            }
            for (const node of enabledNodes()) {
                for (const collection of stateOf(node.chainId).nfts) addChip(node, collection, 'nfts', true);
            }
            const add = el('button', 'link chip-add', '+');
            add.title = 'Track token or NFT collection';
            add.onclick = () => $('tokenForm').classList.toggle('open');
            box.append(add);

            // hidden tokens (suspected spam + manually hidden) — collapsed; restore one-by-one
            const hidden = enabledNodes().flatMap((node) => stateOf(node.chainId).ignored
                .filter((t) => typeof t !== 'string' && t.ticker).map((token) => [node, token]));
            if (hidden.length) {
                const toggle = el('button', 'link chip-add', `⊘ ${hidden.length} hidden${hiddenExpanded ? '' : ' ▸'}`);
                toggle.title = 'Suspected-spam and hidden tokens — click to review and restore individually';
                toggle.onclick = () => { hiddenExpanded = !hiddenExpanded; renderTokens(); };
                box.append(toggle);
                if (hiddenExpanded) {
                    const wrap = el('div', 'hidden-tokens');
                    for (const [node, token] of hidden.slice(0, hiddenShowAll ? hidden.length : HIDDEN_COLLAPSE)) {
                        const chip = el('span', 'chip auto');
                        const ticker = tickerLabel(token.ticker, node);
                        ticker.style.setProperty('--tcol', tokenColor(token.ticker));
                        ticker.onclick = () => copyAddress(token.address);
                        chip.append(ticker);
                        chip.title = `${token.name || token.ticker} · ${node.meta.name} · ${token.address} (click to copy address)`;
                        const restore = el('span', 'restore', '＋');
                        restore.title = 'Restore this token';
                        restore.onclick = () => restoreOne(node, token);
                        chip.append(restore);
                        wrap.append(chip);
                    }
                    if (hidden.length > HIDDEN_COLLAPSE) {
                        const more = el('button', 'link chip-add', hiddenShowAll ? 'show fewer' : `＋${hidden.length - HIDDEN_COLLAPSE} more…`);
                        more.onclick = () => { hiddenShowAll = !hiddenShowAll; renderTokens(); };
                        wrap.append(more);
                    }
                    const all = el('button', 'link chip-add', 'restore all');
                    all.onclick = restoreHidden;
                    wrap.append(all);
                    box.append(wrap);
                }
            }
        }

                        // re-run below, re-adding whatever any remaining address still holds — so an unpinned
                        // account's tokens disappear entirely (not left in the hidden tab) and return if re-added.
                        state.detected = (node.meta.defaults || []).map((t) => ({ ...t, auto: true }));

        // ---------- chain toggles (shown when sibling nodes are detected) ----------

        function updateChainButton(node) {

                + (node.unreachable ? ' · unreachable' : '')

        function toggleChain(node, btn) {

        function buildCurrencyOptions() {
            const select = $('currency');
            const list = [];
            for (const node of enabledNodes()) {
                if (!fiatEnabled(node.meta)) continue;
                for (const code of node.meta.currencies) if (!list.includes(code)) list.push(code);
            }

            for (const code of list) select.append(el('option', null, code));

        function updateTokenFormChains() {
            const select = $('tokChain');
            select.replaceChildren();
