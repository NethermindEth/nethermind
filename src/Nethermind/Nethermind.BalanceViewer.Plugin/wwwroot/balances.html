<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Nethermind Balances</title>
    <link rel="icon" href="favicon.webp" type="image/webp">
    <style>
        @font-face {
            font-family: 'DM Sans';
            font-style: normal;
            font-weight: 100 1000;
            font-display: swap;
            src: url(fonts/dm-sans-latin.woff2) format('woff2');
        }
        @font-face {
            font-family: 'DM Mono';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(fonts/dm-mono-latin.woff2) format('woff2');
        }
        @font-face {
            font-family: 'Exo';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url(fonts/exo-latin.woff2) format('woff2');
        }

        /* Dracula-inspired palette on the dashboard's black background */
        :root {
            --border: #6272a4;
            --border-soft: #44475a;
            --accent: #8be9fd;
            --muted: #6272a4;
            --danger: #ff5555;
            --c-name: #ff79c6;   /* ENS / display names */
            --c-addr: #bd93f9;   /* raw addresses */
            --c-ticker: #8be9fd; /* native ticker (tokens get their own colors) */
            --c-amount: #50fa7b; /* token amounts */
            --c-fiat: #9aa5ce;   /* per-row fiat values */
            --c-total: #ffb86c;  /* fiat totals */
        }

        html, body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 14px;
        }

        body { padding: 16px; }

        .number, input, button.mono {
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 12px;
        }

        header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        header .brand {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .brand img { height: 28px; width: 211px; }

        header .brand span { color: var(--accent); }

        header .net {
            color: var(--muted);
            font-size: 12px;
        }

        header .net .number { color: white; }

        header .total {
            display: none;
            align-items: baseline;
            gap: 8px;
        }

        header .total .number { font-size: 15px; color: var(--c-total); }

        select {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: white;
            padding: 4px 6px;
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 12px;
            outline: none;
        }

        select:focus { border-color: var(--accent); }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: white;
            padding: 7px 10px;
            outline: none;
            min-width: 0;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: #666; }

        button {
            background: black;
            border: 1px solid var(--border);
            color: white;
            padding: 7px 14px;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 13px;
            cursor: pointer;
        }

        button:hover { border-color: var(--accent); color: var(--accent); }
        button.link {
            border: none;
            padding: 2px 4px;
            color: var(--muted);
            font-size: 12px;
        }
        button.link:hover { color: var(--accent); }
        button.danger:hover { border-color: var(--danger); color: var(--danger); }
        button.bell { filter: grayscale(1) opacity(0.45); font-size: 13px; }
        button.bell.on { filter: none; }

        .panel {
            position: relative;
            border: 1px solid var(--border);
            padding: 34px 12px 12px 12px;
            margin-top: 16px;
        }

        .panel > .title {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            border-bottom-right-radius: 8px;
            padding: 4px 10px 4px 8px;
            position: absolute;
            top: 0;
            left: 0;
            background: black;
        }

        #addAddress input { flex: 1 1 320px; }

        #tokenForm {
            display: none;
            border-top: 1px solid var(--border-soft);
            margin-top: 12px;
            padding-top: 12px;
        }

        #tokenForm.open { display: flex; }
        #tokenForm input.addr { flex: 2 1 300px; }
        #tokenForm input.sm { flex: 1 1 80px; }

        #tokens { margin-top: 12px; }

        body.hideZero tr.zero { display: none; }

        button.zero-toggle {
            margin-left: auto;
            border: 1px solid var(--border);
            padding: 4px 9px;
            color: var(--muted);
            font-family: 'DM Mono', ui-monospace, monospace;
            font-size: 13px;
        }

        button.zero-toggle.on { color: var(--accent); border-color: var(--accent); }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            padding: 3px 4px 3px 8px;
            margin: 0 6px 6px 0;
        }

        .chip .number { color: var(--tcol, var(--c-ticker)); cursor: pointer; }
        .chip .number:hover { color: var(--accent); }
        .chip.nft { border-style: dashed; }
        .chip .kind { color: var(--muted); font-size: 10px; }

        .thumbs {
            display: flex;
            gap: 6px;
            padding: 4px 0 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .thumbs img {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            cursor: pointer;
        }

        .thumbs img:hover { border-color: var(--accent); }

        .thumbs .more { color: var(--muted); font-size: 11px; }
        .thumbs .more.expand { cursor: pointer; }
        .thumbs .more.expand:hover { color: var(--accent); }

        .chip .x {
            cursor: pointer;
            color: var(--muted);
            padding: 0 4px;
        }

        .chip .x:hover { color: var(--danger); }

        button.chip-add {
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            padding: 3px 10px;
            margin: 0 6px 6px 0;
            font-size: 13px;
            line-height: 17px;
        }

        #cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .card {
            border: 1px solid var(--border);
            padding: 10px 12px;
        }

        .card .head {
            display: flex;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid var(--border-soft);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .card .name {
            font-family: 'Exo', system-ui, sans-serif;
            font-weight: 600;
            color: var(--c-name);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card .addr {
            color: var(--acct, var(--c-addr));
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .card .addr:hover { color: var(--accent); }

        .card table { width: 100%; border-collapse: collapse; }
        .card td { padding: 4px 0; }
        .card td.bal { text-align: right; font-size: 13px; color: var(--c-amount); }
        .card td.bal.spin { color: var(--muted); }
        .card td.tick { color: var(--tcol, var(--c-ticker)); width: 72px; }
        .card td.tick.copyable { cursor: pointer; }
        .card td.tick.copyable:hover { color: var(--accent); }
        .card td.fiat { text-align: right; color: var(--c-fiat); width: 110px; font-size: 12px; }
        .card tr.cardTotal td { border-top: 1px solid var(--border-soft); }
        .card tr.cardTotal td.tick { color: var(--muted); }
        .card tr.cardTotal td.fiat { color: var(--c-total); }

        #status {
            min-height: 18px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        #status.error { color: var(--danger); }

        .empty {
            color: var(--muted);
            padding: 24px 0;
            text-align: center;
        }

        .spin { color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <div class="brand"><img src="nethermind.svg" alt="NETHERMIND" onerror="this.replaceWith('NETHERMIND')"><span>/ BALANCES</span></div>
        <div class="net">network <span id="netName" class="number">…</span></div>
        <div class="net">chain <span id="chainId" class="number">…</span></div>
        <div class="net">head <span id="headBlock" class="number">…</span></div>
        <button id="hideZero" class="zero-toggle" title="Hide zero balances">∅</button>
        <div class="total" id="totalBox">
            <span class="net">total ≈</span>
            <span id="totalFiat" class="number">…</span>
            <select id="currency" title="Display currency (Chainlink on-chain feeds)"></select>
        </div>
    </header>

    <div class="panel">
        <div class="title">Watch</div>
        <div class="row" id="addAddress">
            <input id="addrInput" class="number" placeholder="0x address or ENS name (name.eth)" spellcheck="false" />
            <button id="addAddrBtn" title="Pin address">+</button>
        </div>
        <div class="row" id="tokenForm">
            <select id="tokKind" title="Asset type">
                <option value="token">token</option>
                <option value="nft">NFT</option>
            </select>
            <input id="tokAddr" class="number addr" placeholder="token contract 0x address" spellcheck="false" />
            <input id="tokTicker" class="number sm" placeholder="ticker" spellcheck="false" />
            <input id="tokDecimals" class="number sm" placeholder="decimals" inputmode="numeric" />
            <input id="tokName" class="sm" placeholder="name (optional)" />
            <button id="addTokBtn">Track</button>
        </div>
        <div id="tokens"></div>
        <div id="status"></div>
    </div>

    <div id="cards"></div>

    <script>
        'use strict';

        // ---------- keccak-256 (original 0x01 padding), BigInt lanes ----------
        const KECCAK_RC = [
            0x0000000000000001n, 0x0000000000008082n, 0x800000000000808an, 0x8000000080008000n,
            0x000000000000808bn, 0x0000000080000001n, 0x8000000080008081n, 0x8000000000008009n,
            0x000000000000008an, 0x0000000000000088n, 0x0000000080008009n, 0x000000008000000an,
            0x000000008000808bn, 0x800000000000008bn, 0x8000000000008089n, 0x8000000000008003n,
            0x8000000000008002n, 0x8000000000000080n, 0x000000000000800an, 0x800000008000000an,
            0x8000000080008081n, 0x8000000000008080n, 0x0000000080000001n, 0x8000000080008008n];
        const KECCAK_RHO = [
            0, 1, 62, 28, 27, 36, 44, 6, 55, 20, 3, 10, 43, 25, 39, 41, 45, 15, 21, 8, 18, 2, 61, 56, 14];
        const M64 = (1n << 64n) - 1n;

        function keccakF(s) {
            const c = new Array(5), b = new Array(25);
            for (let r = 0; r < 24; r++) {
                for (let x = 0; x < 5; x++) c[x] = s[x] ^ s[x + 5] ^ s[x + 10] ^ s[x + 15] ^ s[x + 20];
                for (let x = 0; x < 5; x++) {
                    const t = c[(x + 4) % 5] ^ (((c[(x + 1) % 5] << 1n) | (c[(x + 1) % 5] >> 63n)) & M64);
                    for (let y = 0; y < 25; y += 5) s[x + y] ^= t;
                }
                for (let x = 0; x < 5; x++) for (let y = 0; y < 5; y++) {
                    const i = x + 5 * y, n = BigInt(KECCAK_RHO[i]);
                    b[y + 5 * ((2 * x + 3 * y) % 5)] = n === 0n ? s[i] : (((s[i] << n) | (s[i] >> (64n - n))) & M64);
                }
                for (let x = 0; x < 5; x++) for (let y = 0; y < 25; y += 5)
                    s[x + y] = b[x + y] ^ (~b[(x + 1) % 5 + y] & M64 & b[(x + 2) % 5 + y]);
                s[0] ^= KECCAK_RC[r];
            }
        }

        function keccak256(bytes) {
            const rate = 136, s = new Array(25).fill(0n);
            const padded = new Uint8Array(Math.floor(bytes.length / rate) * rate + rate);
            padded.set(bytes);
            padded[bytes.length] |= 0x01;
            padded[padded.length - 1] |= 0x80;
            for (let off = 0; off < padded.length; off += rate) {
                for (let i = 0; i < rate / 8; i++) {
                    let lane = 0n;
                    for (let j = 7; j >= 0; j--) lane = (lane << 8n) | BigInt(padded[off + i * 8 + j]);
                    s[i] ^= lane;
                }
                keccakF(s);
            }
            const out = new Uint8Array(32);
            for (let i = 0; i < 4; i++) {
                let lane = s[i];
                for (let j = 0; j < 8; j++) { out[i * 8 + j] = Number(lane & 0xffn); lane >>= 8n; }
            }
            return out;
        }

        const toHex = (bytes) => Array.from(bytes, (b) => b.toString(16).padStart(2, '0')).join('');
        const utf8 = (s) => new TextEncoder().encode(s);

        function namehash(name) {
            let node = new Uint8Array(32);
            for (const label of name.toLowerCase().split('.').reverse()) {
                const combined = new Uint8Array(64);
                combined.set(node);
                combined.set(keccak256(utf8(label)), 32);
                node = keccak256(combined);
            }
            return '0x' + toHex(node);
        }

        // EIP-55 checksum for display
        function checksum(addr) {
            const lower = addr.toLowerCase().replace('0x', '');
            const hash = toHex(keccak256(utf8(lower)));
            let out = '0x';
            for (let i = 0; i < 40; i++) out += parseInt(hash[i], 16) >= 8 ? lower[i].toUpperCase() : lower[i];
            return out;
        }

        // ---------- JSON-RPC (same origin — data comes only from this node) ----------
        let rpcId = 1;

        async function rpc(method, params) {
            const res = await fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', id: rpcId++, method, params })
            });
            const json = await res.json();
            if (json.error) throw new Error(json.error.message || 'RPC error');
            return json.result;
        }

        async function rpcBatch(calls) {
            if (calls.length === 0) return [];
            const body = calls.map(([method, params]) => ({ jsonrpc: '2.0', id: rpcId++, method, params }));
            const res = await fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            const byId = new Map(json.map((r) => [r.id, r]));
            return body.map((req) => {
                const r = byId.get(req.id);
                return r && !r.error ? r.result : null;
            });
        }

        // ---------- chains ----------
        // Chainlink Feed Registry (mainnet only): prices looked up by (base, quote) address pair.
        // Fiat quotes use ISO 4217 numeric codes as pseudo-addresses; ETH/BTC have dedicated pseudo-addresses.
        const FEED_REGISTRY = '0x47Fb2585D2C56Fe188D0E6ec628a38b74fCeeeDf';
        const PSEUDO_ETH = '0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE';
        const PSEUDO_BTC = '0xbBbBBBBbbBBBbbbBbbBbbbbBBbBbbbbBbBbbBBbB';
        const DENOM = {
            USD: '0x0000000000000000000000000000000000000348',
            AUD: '0x0000000000000000000000000000000000000024',
            BRL: '0x00000000000000000000000000000000000003da',
            CAD: '0x000000000000000000000000000000000000007c',
            CHF: '0x00000000000000000000000000000000000002f4',
            CNY: '0x000000000000000000000000000000000000009c',
            EUR: '0x00000000000000000000000000000000000003d2',
            GBP: '0x000000000000000000000000000000000000033a',
            JPY: '0x0000000000000000000000000000000000000188',
            KRW: '0x000000000000000000000000000000000000019a',
            NZD: '0x000000000000000000000000000000000000022a',
            PHP: '0x0000000000000000000000000000000000000260',
            SGD: '0x00000000000000000000000000000000000002be',
        };

        // Verified Chainlink aggregator addresses on Gnosis (no feed registry there).
        const GNOSIS_FEEDS = {
            native: '0x678df3415fc31947dA4324eC63212874be5a82f8',                        // DAI/USD (xDAI)
            '0x6a023ccd1ff6f2045c3309768ead9e68f978f6e1': '0xa767f745331D267c7751297D982b050c93985627', // WETH → ETH/USD
            '0x9c58bacc331c9aa871afd802db6379a98e80cedb': '0x22441d81416430A54336aB28765abd31a792Ad37', // GNO
            '0xddafbb505ad214d7b80b1f830fccc89b60fb7a83': '0x26C31ac71010aF62E6B486D1132E266D6298857D', // USDC
            '0x4ecaba5870353805a9f068101a40e0f32ed605c6': '0x68811D7DF835B1c33e6EEae8E7C141eF48d48cc7', // USDT
            '0x8e5bbbb09ed1ebde8674cda39a0c169401db4252': '0x00288135bE38B83249F380e9b6b9a04c90EC39eE', // WBTC
            '0xe91d153e0b41518a2ce8dd3d7944fa863463a97d': '0x678df3415fc31947dA4324eC63212874be5a82f8', // WXDAI → DAI/USD
        };
        const GNOSIS_FX = {
            CHF: '0xFb00261Af80ADb1629D3869E377ae1EEC7bE659F',
            EUR: '0xab70BCB260073d036d1660201e9d5405F5829b7a',
            JPY: '0x2AfB993C670C01e9dA1550c58e8039C1D8b8A317',
            MXN: '0xe9cea51a7b1b9B32E057ff62762a2066dA933cD2',
        };

        const MAINNET_DEFAULT_TOKENS = [
            { address: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', ticker: 'USDC', decimals: 6, name: 'USD Coin' },
            { address: '0xdAC17F958D2ee523a2206206994597C13D831ec7', ticker: 'USDT', decimals: 6, name: 'Tether USD' },
            { address: '0x6B175474E89094C44Da98b954EedeAC495271d0F', ticker: 'DAI', decimals: 18, name: 'Dai Stablecoin' },
            { address: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2', ticker: 'WETH', decimals: 18, name: 'Wrapped Ether' },
            { address: '0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599', ticker: 'WBTC', decimals: 8, name: 'Wrapped BTC' },
        ];
        const GNOSIS_DEFAULT_TOKENS = [
            { address: '0xDDAfbb505ad214D7b80b1f830fcCc89B60fb7A83', ticker: 'USDC', decimals: 6, name: 'USD Coin on Gnosis' },
            { address: '0x4ECaBa5870353805a9F068101A40E0f32ed605C6', ticker: 'USDT', decimals: 6, name: 'Tether USD on Gnosis' },
            { address: '0x6A023CCd1ff6F2045C3309768eAd9E68F978f6e1', ticker: 'WETH', decimals: 18, name: 'Wrapped Ether on Gnosis' },
            { address: '0x9C58BAcC331c9aa871AFD802DB6379a98e80CEdb', ticker: 'GNO', decimals: 18, name: 'Gnosis Token' },
            { address: '0x8e5bBbb09Ed1ebdE8674Cda39A0c169401db4252', ticker: 'WBTC', decimals: 8, name: 'Wrapped BTC on Gnosis' },
        ];

        const CHAINS = {
            1: {
                name: 'Ethereum', ticker: 'ETH', ens: true,
                registry: FEED_REGISTRY,
                // no direct registry feeds for wrapped assets — price via the underlying
                alias: {
                    '0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2': PSEUDO_ETH, // WETH
                    '0x2260fac5e5542a773aa44fbcfedf7c193bc2c599': PSEUDO_BTC, // WBTC
                },
                // ordered by global currency popularity (forex turnover)
                currencies: ['USD', 'EUR', 'JPY', 'GBP', 'CNY', 'AUD', 'CAD', 'CHF', 'KRW', 'SGD', 'NZD', 'BRL', 'PHP'],
                defaults: MAINNET_DEFAULT_TOKENS,
            },
            11155111: { name: 'Sepolia', ticker: 'ETH', ens: true },
            17000: { name: 'Holesky', ticker: 'ETH', ens: true },
            560048: { name: 'Hoodi', ticker: 'ETH', ens: true },
            100: {
                name: 'Gnosis', ticker: 'xDAI', ens: false,
                feeds: GNOSIS_FEEDS,
                fx: GNOSIS_FX,
                currencies: ['USD', 'EUR', 'JPY', 'CHF', 'MXN'],
                defaults: GNOSIS_DEFAULT_TOKENS,
            },
            10200: { name: 'Chiado', ticker: 'xDAI', ens: false },
        };
        const ENS_REGISTRY = '0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e';
        const SEL_RESOLVER = '0x0178b8bf';         // resolver(bytes32)
        const SEL_ADDR = '0x3b3b57de';             // addr(bytes32)
        const SEL_BALANCE_OF = '0x70a08231';       // balanceOf(address)
        const SEL_SYMBOL = '0x95d89b41';           // symbol()
        const SEL_NAME = '0x06fdde03';             // name()
        const SEL_DECIMALS = '0x313ce567';         // decimals()
        const SEL_LATEST_ROUND = '0xfeaf968c';     // latestRoundData()
        const SEL_LATEST_ROUND_REG = '0xbcfd032d'; // latestRoundData(address,address)
        const SEL_FEED_DECIMALS_REG = '0x58e2d3a8'; // decimals(address,address)
        const SEL_SUPPORTS_INTERFACE = '0x01ffc9a7'; // supportsInterface(bytes4)
        const SEL_TOKEN_OF_OWNER = '0x2f745c59';   // tokenOfOwnerByIndex(address,uint256)
        const SEL_TOKEN_URI = '0xc87b56dd';        // tokenURI(uint256)
        const IFACE_ERC721_ENUMERABLE = '780e9d63';
        const MAX_NFT_THUMBS = 4;

        const PRICE_DECIMALS = 8n;      // Chainlink USD-quote feeds use 8 decimals by convention
        const PRICE_SCALE = 10n ** PRICE_DECIMALS;
        const PRICE_STALE_SECONDS = 48 * 3600;

        let chain = { id: 0, name: '…', ticker: 'NATIVE', ens: false };

        // ---------- persistence (per chain) ----------
        const store = {
            key: () => 'nethermind.balances.' + chain.id,
            load() {
                try {
                    const raw = localStorage.getItem(this.key());
                    if (raw === null) {
                        // first visit on this chain — seed the popular tokens (still removable)
                        return { addresses: [], tokens: (chain.defaults || []).map((t) => ({ ...t })), nfts: [], watched: [] };
                    }
                    const data = JSON.parse(raw);
                    return { addresses: data.addresses || [], tokens: data.tokens || [], nfts: data.nfts || [], watched: data.watched || [] };
                } catch { return { addresses: [], tokens: [], nfts: [], watched: [] }; }
            },
            save(data) { localStorage.setItem(this.key(), JSON.stringify(data)); }
        };

        const CURRENCY_KEY = 'nethermind.balances.currency';
        let state = { addresses: [], tokens: [], nfts: [], watched: [] };
        let currency = 'USD';

        // ---------- helpers ----------
        const $ = (id) => document.getElementById(id);
        const isAddress = (s) => /^0x[0-9a-fA-F]{40}$/.test(s);

        function el(tag, cls, text) {
            const e = document.createElement(tag);
            if (cls) e.className = cls;
            if (text !== undefined) e.textContent = text;
            return e;
        }

        function setStatus(msg, isError) {
            const s = $('status');
            s.textContent = msg || '';
            s.className = isError ? 'error' : '';
        }

        function shortAddr(addr) { return addr.slice(0, 8) + '…' + addr.slice(-6); }

        // navigator.clipboard needs a secure context, which a plain-HTTP node is not —
        // fall back to a hidden textarea + execCommand
        function copyAddress(address) {
            let ok = false;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(address);
                ok = true;
            } else {
                const area = document.createElement('textarea');
                area.value = address;
                area.style.position = 'fixed';
                area.style.opacity = '0';
                document.body.append(area);
                area.select();
                try { ok = document.execCommand('copy'); } catch { }
                area.remove();
            }
            setStatus(ok ? 'Copied ' + address : 'Copy failed — ' + address, !ok);
        }

        // each token gets a stable Dracula color derived from its ticker; cyan is
        // reserved for the native asset, WBTC is pinned to red, and the multiplier
        // is chosen so the default token sets all land on distinct colors
        const TOKEN_COLORS = ['#ff79c6', '#bd93f9', '#ffb86c', '#69ff94', '#f1fa8c', '#a4ffff', '#ff92df'];

        function tokenColor(ticker) {
            if (ticker.toUpperCase() === 'WBTC') return '#ff5555';
            let hash = 0;
            for (const ch of ticker) hash = (hash * 4 + ch.codePointAt(0)) >>> 0;
            return TOKEN_COLORS[hash % TOKEN_COLORS.length];
        }

        // accounts are color-coded too, so cards are easy to tell apart at a glance
        function accountColor(address) {
            let hash = 0;
            for (const ch of address.toLowerCase()) hash = (hash * 31 + ch.codePointAt(0)) >>> 0;
            return TOKEN_COLORS[hash % TOKEN_COLORS.length];
        }

        function formatUnits(hexValue, decimals) {
            if (hexValue === null) return null;
            let value;
            try { value = BigInt(hexValue); } catch { return null; }
            const base = 10n ** BigInt(decimals);
            const whole = value / base;
            const frac = value % base;
            let out = whole.toLocaleString('en-US');
            if (decimals > 0 && frac > 0n) {
                let fracStr = frac.toString().padStart(decimals, '0').slice(0, 5).replace(/0+$/, '');
                if (fracStr === '' && whole === 0n) return '<0.00001';
                if (fracStr !== '') out += '.' + fracStr;
            }
            return out;
        }

        function decodeAbiString(hexValue) {
            if (!hexValue || hexValue === '0x' || hexValue.length < 130) return null;
            try {
                const data = hexValue.slice(2);
                const len = Number(BigInt('0x' + data.slice(64, 128)));
                const bytes = data.slice(128, 128 + len * 2);
                return new TextDecoder().decode(new Uint8Array(bytes.match(/../g).map((h) => parseInt(h, 16)))) || null;
            } catch { return null; }
        }

        const pad32 = (addr) => addr.toLowerCase().replace('0x', '').padStart(64, '0');

        // ---------- Chainlink prices (read from this node only) ----------
        const fiatEnabled = () => Boolean(chain.registry || chain.feeds);

        function parseRoundAnswer(hexValue) {
            if (!hexValue || hexValue.length < 2 + 64 * 5) return null;
            const words = hexValue.slice(2);
            const answer = BigInt('0x' + words.slice(64, 128));
            const updatedAt = Number(BigInt('0x' + words.slice(192, 256)));
            if (answer <= 0n || answer >= 1n << 255n) return null; // zero or negative int256
            if (Date.now() / 1000 - updatedAt > PRICE_STALE_SECONDS) return null;
            return answer;
        }

        // assetKey: 'native' or a lowercase token address
        function priceCall(assetKey) {
            if (chain.registry) {
                const base = assetKey === 'native' ? PSEUDO_ETH : (chain.alias?.[assetKey] ?? assetKey);
                return ['eth_call', [{ to: chain.registry, data: SEL_LATEST_ROUND_REG + pad32(base) + pad32(DENOM.USD) }, 'latest']];
            }
            const feed = assetKey === 'native' ? chain.feeds?.native : chain.feeds?.[assetKey];
            return feed ? ['eth_call', [{ to: feed, data: SEL_LATEST_ROUND }, 'latest']] : null;
        }

        // FX feeds mostly use 8 decimals, but not all (e.g. PHP/USD is 18),
        // so the rate is fetched together with its decimals and normalized
        function fxCalls() {
            if (currency === 'USD') return null;
            if (chain.registry) {
                return [
                    ['eth_call', [{ to: chain.registry, data: SEL_LATEST_ROUND_REG + pad32(DENOM[currency]) + pad32(DENOM.USD) }, 'latest']],
                    ['eth_call', [{ to: chain.registry, data: SEL_FEED_DECIMALS_REG + pad32(DENOM[currency]) + pad32(DENOM.USD) }, 'latest']],
                ];
            }
            const feed = chain.fx?.[currency];
            return feed ? [
                ['eth_call', [{ to: feed, data: SEL_LATEST_ROUND }, 'latest']],
                ['eth_call', [{ to: feed, data: SEL_DECIMALS }, 'latest']],
            ] : null;
        }

        function normalizeFxRate(answer, decimalsRaw) {
            if (answer === null) return null;
            let decimals = PRICE_DECIMALS;
            try { if (decimalsRaw && decimalsRaw !== '0x') decimals = BigInt(decimalsRaw); } catch { }
            const rate = decimals >= PRICE_DECIMALS
                ? answer / 10n ** (decimals - PRICE_DECIMALS)
                : answer * 10n ** (PRICE_DECIMALS - decimals);
            return rate > 0n ? rate : null;
        }

        const CURRENCY_SYMBOLS = {
            USD: '$', AUD: 'A$', BRL: 'R$', CAD: 'C$', CHF: 'CHF ', CNY: 'CN¥', EUR: '€',
            GBP: '£', JPY: '¥', KRW: '₩', MXN: 'MX$', NZD: 'NZ$', PHP: '₱', SGD: 'S$',
        };

        // value scaled by PRICE_SCALE (1e8) in the selected currency, prefixed with its symbol
        function formatFiat(value8) {
            const cents = value8 / 10n ** (PRICE_DECIMALS - 2n);
            return CURRENCY_SYMBOLS[currency] + (cents / 100n).toLocaleString('en-US') + '.' + (cents % 100n).toString().padStart(2, '0');
        }

        function setTotal(text) {
            $('totalFiat').textContent = text;
        }

        // last fetched values per `${address}|${assetKey}`, so re-rendering
        // (e.g. after unpinning) never blanks cells while waiting for a refetch
        const cache = new Map();
        const assetKeys = () => ['native'].concat(state.tokens.map((t) => t.address.toLowerCase()));

        function recomputeTotals() {
            if (!fiatEnabled()) return;
            let grand = 0n;
            let any = false;
            for (const entry of state.addresses) {
                let cardTotal = 0n;
                let cardAny = false;
                for (const key of assetKeys()) {
                    const cached = cache.get(entry.address + '|' + key);
                    if (cached?.value8 !== null && cached?.value8 !== undefined) { cardTotal += cached.value8; cardAny = true; }
                }
                const cell = document.querySelector(`td[data-cardtotal="${entry.address}"]`);
                if (cell) cell.textContent = cardAny ? formatFiat(cardTotal) : '—';
                if (cardAny) { grand += cardTotal; any = true; }
            }
            setTotal(any ? formatFiat(grand) : (state.addresses.length === 0 ? CURRENCY_SYMBOLS[currency] + '0.00' : '—'));
        }

        // ---------- NFTs (ERC-721, node-data only) ----------
        // Counts come from balanceOf. When a collection is ERC721Enumerable, the first
        // few token ids are enumerated and their tokenURI decoded; only fully on-chain
        // metadata (data: URIs, e.g. Nouns or Loot) is rendered — external URIs are
        // never fetched, so no request leaves the node.
        const nftCache = new Map();       // `${address}|${collection}` -> { count, thumbs: [{src, title}] }
        const enumerableCache = new Map(); // collection -> bool
        const NFT_PAGE = 24;
        let nftRefreshing = false;

        function parseOnChainMetadata(uri) {
            if (!uri || !uri.startsWith('data:application/json')) return null;
            try {
                const payload = uri.slice(uri.indexOf(',') + 1);
                return JSON.parse(uri.includes(';base64') ? atob(payload) : decodeURIComponent(payload));
            } catch { return null; }
        }

        // enumerates owned token ids [start, end) and decodes their on-chain metadata
        async function fetchThumbRange(collection, owner, start, end) {
            const idCalls = [];
            for (let index = start; index < end; index++) {
                idCalls.push(['eth_call', [{ to: collection.address, data: SEL_TOKEN_OF_OWNER + pad32(owner) + pad32(index.toString(16)) }, 'latest']]);
            }
            const ids = (await rpcBatch(idCalls)).filter((id) => id !== null).map((id) => BigInt(id));
            const uris = await rpcBatch(ids.map((id) => ['eth_call', [{ to: collection.address, data: SEL_TOKEN_URI + pad32(id.toString(16)) }, 'latest']]));
            const thumbs = [];
            for (let index = 0; index < ids.length; index++) {
                const metadata = parseOnChainMetadata(decodeAbiString(uris[index]));
                const title = metadata?.name || collection.ticker + ' #' + ids[index];
                // render only fully on-chain images; anything else stays a text label
                const src = typeof metadata?.image === 'string' && metadata.image.startsWith('data:image/') ? metadata.image : null;
                thumbs.push({ src, title: src ? title : '#' + ids[index] });
            }
            return thumbs;
        }

        // browsers block navigating a new tab straight to a data: URI, so serve it as a blob
        function openArt(dataUri) {
            try {
                const comma = dataUri.indexOf(',');
                const header = dataUri.slice(5, comma);
                const payload = dataUri.slice(comma + 1);
                const bytes = header.endsWith(';base64')
                    ? Uint8Array.from(atob(payload), (c) => c.charCodeAt(0))
                    : utf8(decodeURIComponent(payload));
                window.open(URL.createObjectURL(new Blob([bytes], { type: header.replace(';base64', '') })), '_blank');
            } catch { setStatus('Could not open artwork', true); }
        }

        function fillThumbs(box, cached, owner, collection) {
            box.replaceChildren();
            if (!cached) return;
            for (const thumb of cached.thumbs) {
                if (thumb.src) {
                    const img = el('img');
                    img.src = thumb.src;
                    img.title = thumb.title + ' (click to open)';
                    img.onclick = () => openArt(thumb.src);
                    box.append(img);
                } else {
                    box.append(el('span', 'more number', thumb.title));
                }
            }
            const remaining = cached.count - cached.thumbs.length;
            if (remaining > 0 && cached.thumbs.length > 0) {
                const more = el('span', 'more expand', '+' + remaining + ' more');
                more.title = 'Show more';
                more.onclick = async () => {
                    more.textContent = '…';
                    more.onclick = null;
                    try {
                        const start = cached.thumbs.length;
                        cached.thumbs.push(...await fetchThumbRange(collection, owner, start, Math.min(cached.count, start + NFT_PAGE)));
                    } catch { /* keep what we have */ }
                    fillThumbs(box, cached, owner, collection);
                };
                box.append(more);
            }
            if (cached.thumbs.length > MAX_NFT_THUMBS) {
                const less = el('span', 'more expand', 'show less');
                less.onclick = () => {
                    cached.thumbs.length = MAX_NFT_THUMBS;
                    fillThumbs(box, cached, owner, collection);
                };
                box.append(less);
            }
        }

        async function refreshNftThumbs() {
            if (nftRefreshing || state.nfts.length === 0) return;
            nftRefreshing = true;
            try {
                for (const entry of state.addresses) {
                    for (const collection of state.nfts) {
                        const colKey = collection.address.toLowerCase();
                        const key = entry.address + '|' + colKey;
                        const countCached = cache.get(entry.address + '|nft:' + colKey);
                        const count = countCached?.bal === null || countCached === undefined ? 0 : Number(countCached.bal.replace(/,/g, ''));
                        const box = document.querySelector(`[data-thumbs="${entry.address}|${colKey}"]`);
                        if (nftCache.get(key)?.count === count) continue;

                        let thumbs = [];
                        if (count > 0) {
                            if (!enumerableCache.has(colKey)) {
                                const supports = await rpc('eth_call', [{ to: collection.address, data: SEL_SUPPORTS_INTERFACE + IFACE_ERC721_ENUMERABLE.padEnd(64, '0') }, 'latest']).catch(() => null);
                                enumerableCache.set(colKey, supports !== null && BigInt(supports) === 1n);
                            }
                            if (enumerableCache.get(colKey)) {
                                thumbs = await fetchThumbRange(collection, entry.address, 0, Math.min(count, MAX_NFT_THUMBS));
                            }
                        }
                        nftCache.set(key, { count, thumbs });
                        if (box) fillThumbs(box, nftCache.get(key), entry.address, collection);
                    }
                }
            } catch { /* thumbnails are cosmetic — leave whatever is displayed */ }
            finally { nftRefreshing = false; }
        }

        // ---------- notifications (activity derived from node data only) ----------
        // A bell on each card watches the address: new blocks are scanned for its
        // transactions and ERC-20 Transfer logs, and events (sent/received, swaps,
        // contract interactions) surface as system notifications via the service
        // worker. No push service is involved — data never leaves the node.
        const TRANSFER_TOPIC = '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';
        const MAX_BLOCKS_PER_POLL = 4;
        let lastScannedBlock = null;
        let scanning = false;

        const isWatched = (address) => state.watched.includes(address.toLowerCase());

        async function toggleWatch(entry, bell) {
            const key = entry.address.toLowerCase();
            if (isWatched(key)) {
                state.watched = state.watched.filter((w) => w !== key);
                store.save(state);
                bell.classList.remove('on');
                setStatus('Notifications off for ' + (entry.label || shortAddr(entry.address)));
                return;
            }
            if ('Notification' in window && Notification.permission !== 'granted') {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') setStatus('Notifications not permitted by the browser — activity will only show here', true);
            }
            try { await navigator.serviceWorker?.register('balances-sw.js'); } catch { }
            state.watched.push(key);
            store.save(state);
            bell.classList.add('on');
            setStatus('Watching ' + (entry.label || shortAddr(entry.address)) + ' for activity');
        }

        async function notify(title, body) {
            setStatus('🔔 ' + title + ': ' + body);
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            try {
                const registration = await navigator.serviceWorker?.getRegistration();
                if (registration) registration.showNotification(title, { body, icon: 'favicon.webp' });
                else new Notification(title, { body });
            } catch { }
        }

        function displayName(address) {
            const entry = state.addresses.find((a) => a.address.toLowerCase() === address);
            return entry?.label || shortAddr(entry?.address || address);
        }

        function tokenAmount(log) {
            const token = state.tokens.find((t) => t.address.toLowerCase() === log.address.toLowerCase());
            let amount = null;
            try { amount = BigInt(log.data); } catch { }
            if (token && amount !== null) return formatUnits('0x' + amount.toString(16), token.decimals) + ' ' + token.ticker;
            return 'tokens of ' + shortAddr(checksum(log.address));
        }

        async function scanForActivity(headHex) {
            if (scanning || state.watched.length === 0) { lastScannedBlock = BigInt(headHex); return; }
            const head = BigInt(headHex);
            if (lastScannedBlock === null) { lastScannedBlock = head; return; }
            if (head <= lastScannedBlock) return;
            scanning = true;
            try {
                const from = head - lastScannedBlock > BigInt(MAX_BLOCKS_PER_POLL) ? head - BigInt(MAX_BLOCKS_PER_POLL) + 1n : lastScannedBlock + 1n;
                const range = { fromBlock: '0x' + from.toString(16), toBlock: headHex };
                const watchedTopics = state.watched.map((w) => '0x' + pad32(w));
                const blockCalls = [];
                for (let n = from; n <= head; n++) blockCalls.push(['eth_getBlockByNumber', ['0x' + n.toString(16), true]]);
                const results = await rpcBatch(blockCalls.concat([
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, watchedTopics] }]],
                    ['eth_getLogs', [{ ...range, topics: [TRANSFER_TOPIC, null, watchedTopics] }]],
                ]));
                lastScannedBlock = head;

                // facts per (watched address | tx hash) so one tx yields one notification
                const facts = new Map();
                const addFact = (watched, txHash, kind, text) => {
                    const key = watched + '|' + txHash;
                    if (!facts.has(key)) facts.set(key, { out: null, in: null, other: [] });
                    const f = facts.get(key);
                    if (kind === 'out' && f.out === null) f.out = text;
                    else if (kind === 'in' && f.in === null) f.in = text;
                    else if (kind === 'other') f.other.push(text);
                };

                for (let b = 0; b < blockCalls.length; b++) {
                    for (const tx of results[b]?.transactions ?? []) {
                        const txFrom = tx.from?.toLowerCase(), txTo = tx.to?.toLowerCase();
                        const value = (() => { try { return BigInt(tx.value); } catch { return 0n; } })();
                        if (txFrom && isWatched(txFrom)) {
                            if (value > 0n) addFact(txFrom, tx.hash, 'out', formatUnits(tx.value, 18) + ' ' + chain.ticker);
                            if (tx.input && tx.input !== '0x' && txTo) addFact(txFrom, tx.hash, 'other', 'interacted with contract ' + shortAddr(checksum(txTo)));
                        }
                        if (txTo && isWatched(txTo) && value > 0n) addFact(txTo, tx.hash, 'in', formatUnits(tx.value, 18) + ' ' + chain.ticker);
                    }
                }
                for (const log of results[blockCalls.length] ?? []) addFact('0x' + log.topics[1].slice(-40), log.transactionHash, 'out', tokenAmount(log));
                for (const log of results[blockCalls.length + 1] ?? []) addFact('0x' + log.topics[2].slice(-40), log.transactionHash, 'in', tokenAmount(log));

                for (const [key, f] of facts) {
                    const watched = key.slice(0, 42);
                    if (!isWatched(watched)) continue;
                    const who = displayName(watched);
                    if (f.out && f.in) notify(who, `swapped ${f.out} for ${f.in}`);
                    else if (f.out) notify(who, 'sent ' + f.out);
                    else if (f.in) notify(who, 'received ' + f.in);
                    else if (f.other.length) notify(who, f.other[0]);
                }
            } catch { /* activity scan is best-effort; next poll retries from the new head */ }
            finally { scanning = false; }
        }

        // ---------- ENS (forward resolution, simple case) ----------
        async function resolveEns(name) {
            const node = namehash(name);
            const resolverRaw = await rpc('eth_call', [{ to: ENS_REGISTRY, data: SEL_RESOLVER + node.slice(2) }, 'latest']);
            const resolver = resolverRaw && resolverRaw.length >= 66 ? '0x' + resolverRaw.slice(-40) : null;
            if (!resolver || /^0x0{40}$/.test(resolver)) throw new Error(`ENS name '${name}' is not registered`);
            const addrRaw = await rpc('eth_call', [{ to: resolver, data: SEL_ADDR + node.slice(2) }, 'latest']);
            const addr = addrRaw && addrRaw.length >= 66 ? '0x' + addrRaw.slice(-40) : null;
            if (!addr || /^0x0{40}$/.test(addr)) throw new Error(`ENS name '${name}' has no address record`);
            return checksum(addr);
        }

        // ---------- rendering ----------
        function renderTokens() {
            const box = $('tokens');
            box.replaceChildren();
            const addChip = (item, list, isNft) => {
                const chip = el('span', isNft ? 'chip nft' : 'chip');
                const ticker = el('span', 'number', item.ticker);
                ticker.style.setProperty('--tcol', tokenColor(item.ticker));
                ticker.onclick = () => copyAddress(item.address);
                chip.append(ticker);
                if (isNft) chip.append(el('span', 'kind', 'nft'));
                chip.title = `${item.name || item.ticker} · ${item.address}` + (isNft ? '' : ` · ${item.decimals} decimals`) + ' (click to copy address)';
                const x = el('span', 'x', '×');
                x.onclick = () => {
                    state[list] = state[list].filter((t) => t !== item);
                    store.save(state);
                    renderTokens();
                    renderCards();
                    recomputeTotals();
                };
                chip.append(x);
                box.append(chip);
            };
            for (const token of state.tokens) addChip(token, 'tokens', false);
            for (const collection of state.nfts) addChip(collection, 'nfts', true);
            const add = el('button', 'link chip-add', '+');
            add.title = 'Track token or NFT collection';
            add.onclick = () => $('tokenForm').classList.toggle('open');
            box.append(add);
        }

        function renderCards() {
            const cards = $('cards');
            cards.replaceChildren();
            if (state.addresses.length === 0) {
                cards.append(el('div', 'empty', 'No pinned addresses yet — add one above to start watching balances.'));
                return;
            }
            for (const entry of state.addresses) {
                const card = el('div', 'card');
                card.dataset.address = entry.address;

                const head = el('div', 'head');
                const color = accountColor(entry.address);
                if (entry.label) {
                    const name = el('span', 'name', entry.label);
                    name.style.color = color;
                    head.append(name);
                }
                const addr = el('span', 'addr number', shortAddr(entry.address));
                addr.style.setProperty('--acct', color);
                addr.title = entry.address + ' (click to copy)';
                addr.onclick = () => copyAddress(entry.address);
                head.append(addr);
                const bell = el('button', isWatched(entry.address) ? 'link bell on' : 'link bell', '🔔');
                bell.title = 'Notify on activity (sent/received, swaps, contract calls)';
                bell.onclick = () => toggleWatch(entry, bell);
                head.append(bell);
                const unpin = el('button', 'link danger', '−');
                unpin.title = 'Unpin address';
                unpin.onclick = () => {
                    state.addresses = state.addresses.filter((a) => a !== entry);
                    store.save(state);
                    renderCards();
                    recomputeTotals();
                };
                head.append(unpin);
                card.append(head);

                const table = el('table');
                const rows = [{ ticker: chain.ticker, key: 'native' }].concat(
                    state.tokens.map((t) => ({ ticker: t.ticker, key: t.address.toLowerCase(), color: tokenColor(t.ticker), contract: t.address })));
                const showFiat = fiatEnabled();
                for (const row of rows) {
                    const cached = cache.get(entry.address + '|' + row.key);
                    const tr = el('tr');
                    if (cached?.bal === '0') tr.classList.add('zero');
                    const tick = el('td', 'tick number', row.ticker);
                    if (row.color) tick.style.setProperty('--tcol', row.color);
                    if (row.contract) {
                        tick.classList.add('copyable');
                        tick.title = row.contract + ' (click to copy)';
                        tick.onclick = () => copyAddress(row.contract);
                    }
                    tr.append(tick);
                    const bal = el('td', cached ? 'bal number' : 'bal number spin', cached ? (cached.bal ?? '—') : '…');
                    bal.dataset.key = row.key;
                    tr.append(bal);
                    if (showFiat) {
                        const fiat = el('td', 'fiat number', cached ? cached.fiat : '');
                        fiat.dataset.fiatkey = row.key;
                        tr.append(fiat);
                    }
                    table.append(tr);
                }
                for (const collection of state.nfts) {
                    const colKey = collection.address.toLowerCase();
                    const cached = cache.get(entry.address + '|nft:' + colKey);
                    const tr = el('tr');
                    if (cached?.bal === '0') tr.classList.add('zero');
                    const tick = el('td', 'tick number copyable', collection.ticker);
                    tick.style.setProperty('--tcol', tokenColor(collection.ticker));
                    tick.title = collection.address + ' (click to copy)';
                    tick.onclick = () => copyAddress(collection.address);
                    tr.append(tick);
                    const count = el('td', cached ? 'bal number' : 'bal number spin', cached ? (cached.bal ?? '—') : '…');
                    count.dataset.key = 'nft:' + colKey;
                    tr.append(count);
                    if (showFiat) tr.append(el('td', 'fiat'));
                    table.append(tr);

                    const thumbsTr = el('tr');
                    if (cached?.bal === '0') thumbsTr.classList.add('zero');
                    const thumbsTd = el('td');
                    thumbsTd.colSpan = showFiat ? 3 : 2;
                    const thumbs = el('div', 'thumbs');
                    thumbs.dataset.thumbs = entry.address + '|' + colKey;
                    fillThumbs(thumbs, nftCache.get(entry.address + '|' + colKey), entry.address, collection);
                    thumbsTd.append(thumbs);
                    thumbsTr.append(thumbsTd);
                    table.append(thumbsTr);
                }
                if (showFiat) {
                    const totalRow = el('tr', 'cardTotal');
                    totalRow.append(el('td', 'tick', 'total ≈'));
                    totalRow.append(el('td'));
                    const totalCell = el('td', 'fiat number', '');
                    totalCell.dataset.cardtotal = entry.address;
                    totalRow.append(totalCell);
                    table.append(totalRow);
                }
                card.append(table);
                cards.append(card);
            }
        }

        // ---------- balance refresh ----------
        let refreshing = false;

        async function refreshBalances() {
            if (refreshing) return;
            if (state.addresses.length === 0) {
                recomputeTotals();
                return;
            }
            refreshing = true;
            try {
                const fiat = fiatEnabled();
                const assets = [{ key: 'native', decimals: 18 }]
                    .concat(state.tokens.map((t) => ({ key: t.address.toLowerCase(), decimals: t.decimals })))
                    .concat(state.nfts.map((c) => ({ key: 'nft:' + c.address.toLowerCase(), decimals: 0, contract: c.address, isNft: true })));

                // one batched request: prices (+ FX) first, then all balances
                const calls = [];
                const priceIndex = new Map();
                let fxIndex = -1;
                if (fiat) {
                    for (const asset of assets) {
                        if (asset.isNft) continue;
                        const call = priceCall(asset.key);
                        if (call) { priceIndex.set(asset.key, calls.length); calls.push(call); }
                    }
                    const fx = fxCalls();
                    if (fx) { fxIndex = calls.length; calls.push(...fx); }
                }
                const balanceStart = calls.length;
                for (const entry of state.addresses) {
                    calls.push(['eth_getBalance', [entry.address, 'latest']]);
                    for (const token of state.tokens) {
                        calls.push(['eth_call', [{ to: token.address, data: SEL_BALANCE_OF + pad32(entry.address) }, 'latest']]);
                    }
                    for (const collection of state.nfts) {
                        calls.push(['eth_call', [{ to: collection.address, data: SEL_BALANCE_OF + pad32(entry.address) }, 'latest']]);
                    }
                }
                const results = await rpcBatch(calls);

                const prices = new Map();
                for (const [key, index] of priceIndex) prices.set(key, parseRoundAnswer(results[index]));
                // FX feeds quote CCY/USD; token values are computed in USD then divided by it
                const fxRate = currency === 'USD'
                    ? PRICE_SCALE
                    : (fxIndex >= 0 ? normalizeFxRate(parseRoundAnswer(results[fxIndex]), results[fxIndex + 1]) : null);

                let i = balanceStart;
                for (const entry of state.addresses) {
                    const card = document.querySelector(`.card[data-address="${entry.address}"]`);
                    for (const asset of assets) {
                        const raw = results[i++];
                        const balText = formatUnits(raw, asset.decimals);
                        const price = prices.get(asset.key);
                        let value8 = null;
                        if (fiat && !asset.isNft && balText !== null && price && fxRate) {
                            try { value8 = BigInt(raw) * price / 10n ** BigInt(asset.decimals); } catch { value8 = null; }
                            if (value8 !== null && currency !== 'USD') value8 = value8 * PRICE_SCALE / fxRate;
                        }
                        const fiatText = value8 !== null ? formatFiat(value8) : '';
                        cache.set(entry.address + '|' + asset.key, { bal: balText, fiat: fiatText, value8 });

                        const balCell = card?.querySelector(`td[data-key="${asset.key}"]`);
                        if (balCell) {
                            balCell.textContent = balText ?? '—';
                            balCell.classList.remove('spin');
                            balCell.parentElement.classList.toggle('zero', balText === '0');
                            if (asset.isNft) {
                                const thumbsRow = card?.querySelector(`[data-thumbs="${entry.address}|${asset.key.slice(4)}"]`)?.closest('tr');
                                thumbsRow?.classList.toggle('zero', balText === '0');
                            }
                        }
                        const fiatCell = card?.querySelector(`td[data-fiatkey="${asset.key}"]`);
                        if (fiatCell) fiatCell.textContent = fiatText;
                    }
                }
                recomputeTotals();
                refreshNftThumbs();
            } catch (e) {
                setStatus('Balance refresh failed: ' + e.message, true);
            } finally {
                refreshing = false;
            }
        }

        // ---------- actions ----------
        async function addAddress() {
            const input = $('addrInput');
            const value = input.value.trim();
            if (!value) return;
            try {
                let address, label = null;
                if (isAddress(value)) {
                    address = checksum(value);
                } else if (value.includes('.')) {
                    if (!chain.ens) throw new Error('ENS is not available on ' + chain.name);
                    setStatus(`Resolving ${value}…`);
                    address = await resolveEns(value);
                    label = value.toLowerCase();
                } else {
                    throw new Error('Enter a 0x address or an ENS name like name.eth');
                }
                if (state.addresses.some((a) => a.address === address)) throw new Error(address + ' is already pinned');
                state.addresses.push({ address, label });
                store.save(state);
                input.value = '';
                setStatus(label ? `${label} → ${address}` : 'Pinned ' + address);
                renderCards();
                refreshBalances();
            } catch (e) {
                setStatus(e.message, true);
            }
        }

        async function prefillTokenMeta() {
            const address = $('tokAddr').value.trim();
            if (!isAddress(address)) return;
            const [symbol, name, decimals] = await rpcBatch([
                ['eth_call', [{ to: address, data: SEL_SYMBOL }, 'latest']],
                ['eth_call', [{ to: address, data: SEL_NAME }, 'latest']],
                ['eth_call', [{ to: address, data: SEL_DECIMALS }, 'latest']],
            ]);
            if (!$('tokTicker').value && symbol) $('tokTicker').value = decodeAbiString(symbol) || '';
            if (!$('tokName').value && name) $('tokName').value = decodeAbiString(name) || '';
            if (!$('tokDecimals').value && decimals && decimals !== '0x') {
                try { $('tokDecimals').value = Number(BigInt(decimals)).toString(); } catch { }
            }
        }

        function addToken() {
            try {
                const isNft = $('tokKind').value === 'nft';
                const address = $('tokAddr').value.trim();
                if (!isAddress(address)) throw new Error('Invalid token contract address');
                const ticker = $('tokTicker').value.trim();
                if (!ticker) throw new Error('Ticker is required');
                const checksummed = checksum(address);
                if (state.tokens.concat(state.nfts).some((t) => t.address.toLowerCase() === address.toLowerCase()))
                    throw new Error(ticker + ' is already tracked');
                const name = $('tokName').value.trim() || null;
                if (isNft) {
                    state.nfts.push({ address: checksummed, ticker, name });
                } else {
                    const decimals = parseInt($('tokDecimals').value, 10);
                    if (!Number.isInteger(decimals) || decimals < 0 || decimals > 77) throw new Error('Decimals must be 0–77');
                    state.tokens.push({ address: checksummed, ticker, decimals, name });
                }
                store.save(state);
                for (const id of ['tokAddr', 'tokTicker', 'tokDecimals', 'tokName']) $(id).value = '';
                setStatus('Tracking ' + ticker);
                renderTokens();
                renderCards();
                refreshBalances();
            } catch (e) {
                setStatus(e.message, true);
            }
        }

        // ---------- init + head polling ----------
        let lastBlock = null;

        async function pollHead() {
            try {
                const head = await rpc('eth_blockNumber', []);
                $('headBlock').textContent = BigInt(head).toLocaleString('en-US');
                if (head !== lastBlock) {
                    lastBlock = head;
                    refreshBalances();
                    scanForActivity(head);
                }
            } catch (e) {
                setStatus('Node unreachable: ' + e.message, true);
            }
        }

        async function init() {
            $('addAddrBtn').onclick = addAddress;
            $('addrInput').onkeydown = (e) => { if (e.key === 'Enter') addAddress(); };
            $('addTokBtn').onclick = addToken;
            $('tokAddr').onchange = () => prefillTokenMeta().catch(() => { });
            $('tokKind').onchange = () => { $('tokDecimals').style.display = $('tokKind').value === 'nft' ? 'none' : ''; };

            const HIDE_ZERO_KEY = 'nethermind.balances.hidezero';
            const hideZero = $('hideZero');
            const applyHideZero = (on) => {
                hideZero.classList.toggle('on', on);
                document.body.classList.toggle('hideZero', on);
            };
            applyHideZero(localStorage.getItem(HIDE_ZERO_KEY) === '1');
            hideZero.onclick = () => {
                const on = !hideZero.classList.contains('on');
                localStorage.setItem(HIDE_ZERO_KEY, on ? '1' : '0');
                applyHideZero(on);
            };

            try {
                const id = Number(BigInt(await rpc('eth_chainId', [])));
                chain = CHAINS[id] ? { id, ...CHAINS[id] } : { id, name: 'chain ' + id, ticker: 'NATIVE', ens: false };
                $('netName').textContent = chain.name;
                $('chainId').textContent = chain.id;
                if (!chain.ens) $('addrInput').placeholder = '0x address' + (chain.id === 100 || chain.id === 10200 ? ' (ENS unavailable on Gnosis)' : '');

                if (fiatEnabled()) {
                    const select = $('currency');
                    for (const code of chain.currencies) select.append(el('option', null, code));
                    const stored = localStorage.getItem(CURRENCY_KEY);
                    currency = chain.currencies.includes(stored) ? stored : 'USD';
                    select.value = currency;
                    select.onchange = () => {
                        currency = select.value;
                        localStorage.setItem(CURRENCY_KEY, currency);
                        lastBlock = null; // force a refetch on the next poll even without a new block
                        refreshBalances();
                    };
                    $('totalBox').style.display = 'flex';
                }
            } catch (e) {
                setStatus('Cannot reach JSON-RPC on this endpoint: ' + e.message, true);
                return;
            }

            state = store.load();
            renderTokens();
            renderCards();
            pollHead();
            setInterval(pollHead, 12000);
        }

        init();
    </script>
</body>
</html>
